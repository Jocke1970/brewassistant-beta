###############################################################################
# BrewAssistant v4 - Total Helpers
# Fil: brewassistant_helpers_total.yaml
#
# Rekommenderad placering:
#   /config/packages/brewassistant_helpers_total.yaml
#
# Kräver att packages är aktiverat i configuration.yaml:
#
# homeassistant:
#   packages: !include_dir_named packages
#
# OBS:
# - Den här filen innehåller endast helpers.
# - Template-sensorer, automations och UI-kort bör ligga i separata filer.
# - Byt inte entity_id i efterhand om dashboard/backend redan använder dem.
###############################################################################

###############################################################################
# INPUT BOOLEAN
###############################################################################
input_boolean:

  ###########################################################################
  # Huvudlägen / processvisning
  ###########################################################################

  fwk_process_card_enabled:
    name: FWK Process Card Enabled
    icon: mdi:power

  brewassistant_brew_day_active:
