    icon: mdi:pipe

  fermzilla_dry_hop_done:
    name: FermZilla Dry Hop Done
    icon: mdi:leaf

  fermzilla_ready_for_transfer:
    name: FermZilla Ready For Transfer
    icon: mdi:transfer-right


