  kegerator_fan_force_off:
    name: Kegerator Fan Force Off
    icon: mdi:fan-off

  kegerator_service_mode:
    name: Kegerator Service Mode
    icon: mdi:fridge-alert-outline

  kegerator_door_open_acknowledged:
    name: Kegerator Door Open Acknowledged
    icon: mdi:door-open


