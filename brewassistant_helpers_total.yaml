  itapx_ready:
    name: iTapX Ready
    icon: mdi:bottle-soda-classic-outline

  bottles_sanitized:
    name: Bottles Sanitized
    icon: mdi:spray-bottle

  bottling_done:
    name: Bottling Done
    icon: mdi:check-circle-outline


###############################################################################
# INPUT NUMBER
###############################################################################
input_number:

  ###########################################################################
  # Recept / SG / ABV
  ###########################################################################

  fwk_recipe_og:
    name: FWK Recipe OG
    icon: mdi:hydrometer
    min: 1.000
    max: 1.120
    step: 0.001
    mode: box
    unit_of_measurement: SG

  fwk_recipe_fg:
    name: FWK Recipe FG
    icon: mdi:hydrometer
    min: 0.990
    max: 1.050
    step: 0.001
    mode: box
    unit_of_measurement: SG

  fwk_manual_sg:
    name: FWK Manual SG
    icon: mdi:hydrometer
    min: 0.990
    max: 1.120
    step: 0.001
    mode: box
    unit_of_measurement: SG

  fwk_manual_sg_previous:
    name: FWK Manual SG Previous
    icon: mdi:hydrometer
    min: 0.990
    max: 1.120
    step: 0.001
    mode: box
    unit_of_measurement: SG

  fwk_gravity_stable_delta_limit:
    name: FWK Gravity Stable Delta Limit
    icon: mdi:delta
    min: 0.000
    max: 0.010
    step: 0.001
    mode: box
    unit_of_measurement: SG

  fwk_target_abv:
    name: FWK Target ABV
    icon: mdi:percent-outline
    min: 0
    max: 15
    step: 0.1
    mode: box
    unit_of_measurement: "%"


  ###########################################################################
  # Temperaturmål fermentation
  ###########################################################################

  fwk_primary_temp_target:
    name: FWK Primary Temp Target
    icon: mdi:thermometer
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: °C

  fwk_primary_temp_low:
    name: FWK Primary Temp Low
    icon: mdi:thermometer-low
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: °C

  fwk_primary_temp_high:
    name: FWK Primary Temp High
    icon: mdi:thermometer-high
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: °C

  fwk_diacetyl_rest_temp:
    name: FWK Diacetyl Rest Temp
    icon: mdi:thermometer-chevron-up
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: °C

  cold_crash_temp_target:
    name: Cold Crash Temp Target
    icon: mdi:snowflake-thermometer
    min: -2
    max: 10
    step: 0.1
    mode: box
    unit_of_measurement: °C

  cold_crash_days_target:
    name: Cold Crash Days Target
    icon: mdi:calendar-clock
    min: 0
    max: 7
    step: 0.5
    mode: box
    unit_of_measurement: d


  ###########################################################################
  # Tryck / spunding / CO2
  ###########################################################################

  spunding_target_pressure_bar:
    name: Spunding Target Pressure
    icon: mdi:gauge
    min: 0.0
    max: 2.5
    step: 0.05
    mode: box
    unit_of_measurement: bar

  spunding_pressure_low_bar:
    name: Spunding Pressure Low
    icon: mdi:gauge-low
    min: 0.0
    max: 2.5
    step: 0.05
    mode: box
    unit_of_measurement: bar

  spunding_pressure_high_bar:
    name: Spunding Pressure High
    icon: mdi:gauge-full
    min: 0.0
    max: 2.5
    step: 0.05
    mode: box
    unit_of_measurement: bar

  fermzilla_target_pressure_bar:
    name: FermZilla Target Pressure
    icon: mdi:gauge
    min: 0.0
    max: 2.5
    step: 0.05
    mode: box
    unit_of_measurement: bar

  fermzilla_mal_co2:
    name: FermZilla Mål CO2
    icon: mdi:molecule-co2
    min: 1.0
    max: 4.0
    step: 0.1
    mode: box
    unit_of_measurement: vol

  keg_carbonation_target_volumes:
    name: Keg Carbonation Target Volumes
    icon: mdi:molecule-co2
    min: 1.0
    max: 4.0
    step: 0.1
    mode: box
    unit_of_measurement: vol


  ###########################################################################
  # Kegerator / fläktstyrning
  ###########################################################################

  kegerator_fan_min_runtime:
    name: Kegerator Fan Min Runtime
    icon: mdi:timer-outline
    min: 0
    max: 60
    step: 1
    mode: box
    unit_of_measurement: min

  kegerator_fan_after_compressor_minutes:
    name: Kegerator Fan After Compressor
    icon: mdi:fan-clock
    min: 0
    max: 120
    step: 1
    mode: box
    unit_of_measurement: min

  kegerator_fan_cycle_on_minutes:
    name: Kegerator Fan Cycle On
    icon: mdi:fan
    min: 0
    max: 60
    step: 1
    mode: box
    unit_of_measurement: min

  kegerator_fan_cycle_off_minutes:
    name: Kegerator Fan Cycle Off
    icon: mdi:fan-off
    min: 0
    max: 240
    step: 1
    mode: box
    unit_of_measurement: min

  kegerator_temp_delta_fan_threshold:
    name: Kegerator Temp Delta Fan Threshold
    icon: mdi:delta
    min: 0.0
    max: 10.0
    step: 0.1
    mode: box
    unit_of_measurement: °C


  ###########################################################################
  # Rengöring / dosering
  ###########################################################################

  chemsan_ml_per_liter:
    name: ChemSan ml per liter
    icon: mdi:beaker-outline
    min: 0
    max: 10
    step: 0.1
    mode: box
    unit_of_measurement: ml/L

  chempro_oxi_grams_per_liter:
    name: Chemipro OXI grams per liter
    icon: mdi:scale
    min: 0
    max: 20
    step: 0.5
    mode: box
    unit_of_measurement: g/L

  cleaning_solution_volume_l:
    name: Cleaning Solution Volume
    icon: mdi:cup-water
    min: 0
    max: 30
    step: 0.5
    mode: box
    unit_of_measurement: L


