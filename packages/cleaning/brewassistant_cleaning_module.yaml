###############################################################################
# BrewAssistant v4 - Cleaning
# Self-contained module package.
# Entity names are intentionally preserved from the uploaded v3 files.
# UI/dashboard YAML should live separately from packages.
###############################################################################

input_boolean:
  brewassistant_cleaning_active:
    name: BrewAssistant Cleaning Active
    icon: mdi:spray-bottle
  keg_cleaning_mode:
    name: Keg Cleaning Mode
    icon: mdi:keg-outline
  keg_cleaning_started:
    name: Keg Cleaning Started
    icon: mdi:play-circle-outline
  keg_cleaning_done:
    name: Keg Cleaning Done
    icon: mdi:check-circle-outline
  keg_sanitized:
    name: Keg Sanitized
    icon: mdi:spray-bottle
  keg_purged_with_co2:
    name: Keg Purged With CO2
    icon: mdi:molecule-co2
  keg_pressure_test_done:
    name: Keg Pressure Test Done
    icon: mdi:gauge
  keg_ready_for_filling:
    name: Keg Ready For Filling
    icon: mdi:keg
  bottling_mode:
    name: Bottling Mode
    icon: mdi:bottle-soda-classic
  itapx_ready:
    name: iTapX Ready
    icon: mdi:bottle-soda-classic-outline
  bottles_sanitized:
    name: Bottles Sanitized
    icon: mdi:spray-bottle
  bottling_done:
    name: Bottling Done
    icon: mdi:check-circle-outline
  brewassistant_cleaning_enabled:
    name: BrewAssistant Cleaning Enabled
    icon: mdi:spray-bottle
    initial: true
input_number:
  keg_carbonation_target_volumes:
    name: Keg Carbonation Target Volumes
    icon: mdi:molecule-co2
    min: 1.0
    max: 4.0
    step: 0.1
    mode: box
    unit_of_measurement: vol
  chemsan_ml_per_liter:
    name: ChemSan ml per liter
    icon: mdi:beaker-outline
    min: 0
    max: 10
    step: 0.1
    mode: box
    unit_of_measurement: ml/L
  chempro_oxi_grams_per_liter:
    name: Chemipro OXI grams per liter
    icon: mdi:scale
    min: 0
    max: 20
    step: 0.5
    mode: box
    unit_of_measurement: g/L
  cleaning_solution_volume_l:
    name: Cleaning Solution Volume
    icon: mdi:cup-water
    min: 0
    max: 30
    step: 0.5
    mode: box
    unit_of_measurement: L
input_datetime:
  keg_cleaning_started_at:
    name: Keg Cleaning Started At
    icon: mdi:keg-outline
    has_date: true
    has_time: true
  keg_cleaning_done_at:
    name: Keg Cleaning Done At
    icon: mdi:check-circle-outline
    has_date: true
    has_time: true
input_text:
  keg_cleaning_note:
    name: Keg Cleaning Note
    icon: mdi:note-text-outline
    max: 255
input_select:
  cleaning_process:
    name: Cleaning Process
    icon: mdi:spray-bottle
    options:
    - None
    - FermZilla prep
    - Cornelius keg cleaning
    - Beer line cleaning
    - Bottling equipment
    - General sanitation
counter:
  keg_cleaning_step_counter:
    name: Keg Cleaning Step Counter
    icon: mdi:counter
    initial: 0
    step: 1
timer:
  keg_cleaning_contact_timer:
    name: Keg Cleaning Contact Timer
    icon: mdi:timer-sand
    duration: 00:10:00
input_button:
  keg_cleaning_next_step:
    name: Keg Cleaning Next Step
    icon: mdi:arrow-right-circle-outline
