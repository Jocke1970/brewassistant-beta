# =========================
# BREWASSISTANT SMART AUTOMATION LAYER V2
# =========================
# Purpose:
# - smart suggestions
# - safe semiauto chamber control
# - optional guarded auto-apply
# - persistent notifications when recipe/chamber mismatch exists
#
# Important:
# If you already added script.fwk_apply_brewfather_target or
# sensor.fwk_suggested_chamber_range elsewhere, remove the old snippet
# or keep only one definition to avoid duplicate package keys/entities.

input_boolean:
  fwk_semiauto_enabled:
    name: FWK Semiauto Enabled
    icon: mdi:robot-outline
    initial: true

  fwk_auto_apply_bf_target:
    name: FWK Auto Apply Brewfather Target
    icon: mdi:robot
    initial: false

  fwk_allow_cold_crash_semiauto:
    name: FWK Allow Cold Crash Semiauto
    icon: mdi:snowflake-check
    initial: true

input_number:
  fwk_semiauto_target_half_span:
    name: FWK Semiauto Target Half Span
    min: 0.2
    max: 2.0
    step: 0.1
    mode: box
    unit_of_measurement: "°C"
    icon: mdi:arrow-expand-vertical
    initial: 0.5

  fwk_semiauto_apply_threshold:
    name: FWK Semiauto Apply Threshold
    min: 0.2
    max: 5.0
    step: 0.1
    mode: box
    unit_of_measurement: "°C"
    icon: mdi:delta
    initial: 0.5

  fwk_semiauto_max_target_jump:
    name: FWK Semiauto Max Target Jump
    min: 1
    max: 20
    step: 0.5
    mode: box
    unit_of_measurement: "°C"
    icon: mdi:shield-alert
    initial: 10

template:
  - sensor:
      - name: "FWK Suggested Chamber Low"
        unique_id: fwk_suggested_chamber_low_v2
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% set target = states('sensor.fwk_recipe_active_target_temp') | float(15) %}
          {% set half = states('input_number.fwk_semiauto_target_half_span') | float(0.5) %}
          {{ (target - half) | round(1) }}

      - name: "FWK Suggested Chamber High"
        unique_id: fwk_suggested_chamber_high_v2
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% set target = states('sensor.fwk_recipe_active_target_temp') | float(15) %}
          {% set half = states('input_number.fwk_semiauto_target_half_span') | float(0.5) %}
          {{ (target + half) | round(1) }}

      - name: "FWK Suggested Chamber Range"
        unique_id: fwk_suggested_chamber_range_v2
        icon: mdi:target
        state: >
          {{ states('sensor.fwk_suggested_chamber_low') }} – {{ states('sensor.fwk_suggested_chamber_high') }} °C

      - name: "FWK Semiauto Recommendation"
        unique_id: fwk_semiauto_recommendation_v2
        icon: mdi:lightbulb-on-outline
        state: >
          {% set enabled = is_state('input_boolean.fwk_semiauto_enabled', 'on') %}
          {% set auto = is_state('input_boolean.fwk_auto_apply_bf_target', 'on') %}
          {% set climate_state = states('climate.fermentation_chamber') %}
          {% set source = states('sensor.recipe_runtime_source') %}
          {% set target = states('sensor.fwk_recipe_active_target_temp') | float(0) %}
          {% set delta = states('sensor.fwk_recipe_vs_chamber_delta') | float(0) %}
          {% set threshold = states('input_number.fwk_semiauto_apply_threshold') | float(0.5) %}
          {% if not enabled %}
            Semiauto disabled
          {% elif climate_state == 'off' %}
            Chamber off
          {% elif source != 'brewfather_all_batches_data' %}
            Waiting for Brewfather source
          {% elif target < 0 or target > 35 %}
            Recipe target outside safe range
          {% elif delta | abs <= threshold %}
            Chamber aligned
          {% elif auto %}
            Auto apply allowed
          {% else %}
            Apply Brewfather target recommended
          {% endif %}

  - binary_sensor:
      - name: "FWK Semiauto Apply Recommended"
        unique_id: fwk_semiauto_apply_recommended_v2
        state: >
          {% set delta = states('sensor.fwk_recipe_vs_chamber_delta') | float(0) %}
          {% set threshold = states('input_number.fwk_semiauto_apply_threshold') | float(0.5) %}
          {% set target = states('sensor.fwk_recipe_active_target_temp') | float(-99) %}
          {% set min_temp = state_attr('climate.fermentation_chamber', 'min_temp') | float(7) %}
          {% set max_temp = state_attr('climate.fermentation_chamber', 'max_temp') | float(35) %}
          {{
            is_state('input_boolean.fwk_semiauto_enabled', 'on')
            and states('climate.fermentation_chamber') != 'off'
            and states('sensor.recipe_runtime_source') == 'brewfather_all_batches_data'
            and target >= min_temp
            and target <= max_temp
            and (delta | abs > threshold)
          }}

      - name: "FWK Semiauto Cold Crash Apply Recommended"
        unique_id: fwk_semiauto_cold_crash_apply_recommended_v2
        state: >
          {{
            is_state('input_boolean.fwk_allow_cold_crash_semiauto', 'on')
            and is_state('binary_sensor.fwk_ready_for_cold_crash', 'on')
            and is_state('binary_sensor.fwk_semiauto_apply_recommended', 'on')
          }}

script:
  fwk_apply_brewfather_target:
    alias: FWK - Apply Brewfather Target to Chamber
    mode: single
    sequence:
      - variables:
          target: "{{ states('sensor.fwk_recipe_active_target_temp') | float(15) }}"
          half_span: "{{ states('input_number.fwk_semiauto_target_half_span') | float(0.5) }}"
          suggested_low: "{{ (target - half_span) | round(1) }}"
          suggested_high: "{{ (target + half_span) | round(1) }}"
          min_temp: "{{ state_attr('climate.fermentation_chamber', 'min_temp') | float(7) }}"
          max_temp: "{{ state_attr('climate.fermentation_chamber', 'max_temp') | float(35) }}"
      - condition: template
        value_template: >
          {{
            is_state('input_boolean.fwk_semiauto_enabled', 'on')
            and states('sensor.recipe_runtime_source') == 'brewfather_all_batches_data'
            and target >= min_temp
            and target <= max_temp
            and suggested_low < suggested_high
          }}
      - action: climate.set_temperature
        target:
          entity_id: climate.fermentation_chamber
        data:
          hvac_mode: heat_cool
          target_temp_low: "{{ suggested_low | float }}"
          target_temp_high: "{{ suggested_high | float }}"
      - action: persistent_notification.create
        data:
          title: "BrewAssistant"
          message: >
            Applied Brewfather target to fermentation chamber.
            New range: {{ suggested_low }}–{{ suggested_high }} °C.
            
  fwk_suggest_brewfather_target:
    alias: FWK - Suggest Brewfather Target
    mode: single
    sequence:
      - service: persistent_notification.create
        data:
          title: "BrewAssistant Suggestion"
          message: >
            Brewfather target does not match the chamber target.
            Suggested chamber range:
            {{ states('sensor.fwk_suggested_chamber_range') }}.
            Use the Apply BF Target button in the chamber card to apply it.

automation:
  # -------------------------
  # Suggest when recipe/chamber mismatch persists
  # -------------------------
  - alias: FWK Smart - Suggest Brewfather Target
    id: fwk_smart_suggest_brewfather_target
    trigger:
      - platform: state
        entity_id: binary_sensor.fwk_semiauto_apply_recommended
        to: "on"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.fwk_auto_apply_bf_target
        state: "off"
    action:
      - service: script.fwk_suggest_brewfather_target

  # -------------------------
  # Optional guarded auto-apply
  # Disabled by default via input_boolean.fwk_auto_apply_bf_target
  # -------------------------
  - alias: FWK Smart - Auto Apply Brewfather Target
    id: fwk_smart_auto_apply_brewfather_target
    trigger:
      - platform: state
        entity_id: binary_sensor.fwk_semiauto_apply_recommended
        to: "on"
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.fwk_auto_apply_bf_target
        state: "on"
      - condition: state
        entity_id: input_boolean.fwk_semiauto_enabled
        state: "on"
    action:
      - service: script.fwk_apply_brewfather_target

  # -------------------------
  # Cold crash suggestion
  # -------------------------
  - alias: FWK Smart - Suggest Cold Crash Target
    id: fwk_smart_suggest_cold_crash_target
    trigger:
      - platform: state
        entity_id: binary_sensor.fwk_ready_for_cold_crash
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.fwk_allow_cold_crash_semiauto
        state: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "BrewAssistant Cold Crash"
          message: >
            Batch appears ready for cold crash.
            Brewfather/runtime cold crash target:
            {{ states('sensor.recipe_runtime_cold_crash_temp') }} °C.
            Use Apply BF Target when you are ready to adjust the chamber.

  # -------------------------
  # Safety: disable auto-apply if chamber is turned off
  # -------------------------
  - alias: FWK Smart - Disable Auto Apply When Chamber Off
    id: fwk_smart_disable_auto_apply_when_chamber_off
    trigger:
      - platform: state
        entity_id: climate.fermentation_chamber
        to: "off"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.fwk_auto_apply_bf_target
      - service: persistent_notification.create
        data:
          title: "BrewAssistant Safety"
          message: >
            Fermentation chamber was turned off.
            Auto-apply Brewfather target has been disabled.
