###############################################################################
# BrewAssistant v4 - Brewfather Adapter
# Self-contained module package.
# Entity names are intentionally preserved from the uploaded v3 files.
# UI/dashboard YAML should live separately from packages.
###############################################################################

input_number:
  recipe_fallback_og:
    name: Recipe Fallback OG
    min: 0.99
    max: 1.2
    step: 0.001
    mode: box
  recipe_fallback_fg:
    name: Recipe Fallback FG
    min: 0.99
    max: 1.1
    step: 0.001
    mode: box
  recipe_fallback_primary_temp:
    name: Recipe Fallback Primary Temp
    min: 0
    max: 35
    step: 0.1
    unit_of_measurement: °C
  recipe_fallback_cold_crash_temp:
    name: Recipe Fallback Cold Crash Temp
    min: 0
    max: 10
    step: 0.1
    unit_of_measurement: °C
  recipe_fallback_cold_crash_days_min:
    name: Recipe Fallback Cold Crash Days Min
    min: 0
    max: 7
    step: 0.5
    unit_of_measurement: d
  recipe_fallback_spunding_after_hours:
    name: Recipe Fallback Spunding After Hours
    min: 0
    max: 240
    step: 1
    unit_of_measurement: h
  recipe_fallback_spunding_target_bar:
    name: Recipe Fallback Spunding Target Bar
    min: 0
    max: 3
    step: 0.05
    unit_of_measurement: bar
  recipe_fallback_transfer_pressure_bar:
    name: Recipe Fallback Transfer Pressure Bar
    min: 0
    max: 3
    step: 0.05
    unit_of_measurement: bar
  recipe_fallback_dry_hop_sg_low:
    name: Recipe Fallback Dry Hop SG Low
    min: 0.99
    max: 1.2
    step: 0.001
    mode: box
  recipe_fallback_dry_hop_sg_high:
    name: Recipe Fallback Dry Hop SG High
    min: 0.99
    max: 1.2
    step: 0.001
    mode: box
input_text:
  brewassistant_active_batch_id:
    name: BrewAssistant Active Batch ID
    icon: mdi:identifier
    max: 255
  brewassistant_active_batch_name:
    name: BrewAssistant Active Batch Name
    icon: mdi:beer
    max: 255
  brewassistant_active_recipe_name:
    name: BrewAssistant Active Recipe Name
    icon: mdi:file-document-outline
    max: 255
  brewassistant_effective_recipe_name:
    name: BrewAssistant Effective Recipe Name
    icon: mdi:file-document-check-outline
    max: 255
  fwk_recipe_source:
    name: FWK Recipe Source
    icon: mdi:source-branch
    max: 255
input_boolean:
  brewassistant_brewfather_adapter_enabled:
    name: BrewAssistant Brewfather Adapter Enabled
    icon: mdi:cloud-sync
    initial: true
template:
- sensor:
  - name: Recipe Runtime Target FG
    unique_id: recipe_runtime_target_fg
    icon: mdi:target
    unit_of_measurement: SG
    state: |
      {% set fg = states('input_number.brewassistant_fermentation_target_fg') | float(none) %}
      {% set fwk_fg = states('input_number.fwk_recipe_fg') | float(none) %}
      {% if fg is not none %}
        {{ fg | round(3) }}
      {% elif fwk_fg is not none %}
        {{ fwk_fg | round(3) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK SG Last Updated
    unique_id: fwk_sg_last_updated
    device_class: timestamp
    state: |
      {{ states.sensor.yellow_pill_gravity_2.last_updated.isoformat() }}
  - name: FWK Live SG
    unique_id: fwk_live_sg
    unit_of_measurement: SG
    state: |
      {% set sg = states('sensor.yellow_pill_gravity_2') %} {% if sg not in ['unknown', 'unavailable', 'none', ''] %}
        {{ sg | float(0) | round(3) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Live Temp
    unique_id: fwk_live_temp
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set temp = states('sensor.yellow_pill_temperature') %} {% if temp not in ['unknown', 'unavailable', 'none', ''] %}
        {{ temp | float(0) | round(1) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Batch Age Hours
    unique_id: fwk_batch_age_hours
    unit_of_measurement: h
    state: |
      {% set start = states('input_datetime.fwk_batch_start') %} {% if is_state('input_boolean.fwk_batch_active', 'on')
            and start not in ['unknown', 'unavailable', 'none', ''] %}
        {{ ((as_timestamp(now()) - as_timestamp(start)) / 3600) | round(1) }}
      {% else %}
        0
      {% endif %}
  - name: FWK Batch Age Days
    unique_id: fwk_batch_age_days
    unit_of_measurement: d
    state: |
      {% set hours = states('sensor.fwk_batch_age_hours') | float(0) %} {{ (hours / 24) | round(1) }}
  - name: FWK Cold Crash Days
    unique_id: fwk_cold_crash_days
    unit_of_measurement: d
    state: |
      {% if is_state('input_boolean.fwk_cold_crash_active', 'on') %}
        {% set start = states('input_datetime.fwk_cold_crash_start') %}
        {% if start not in ['unknown', 'unavailable', 'none', ''] %}
          {{ ((as_timestamp(now()) - as_timestamp(start)) / 86400) | round(1) }}
        {% else %}
          0
        {% endif %}
      {% else %}
        0
      {% endif %}
  - name: Recipe Runtime Name
    unique_id: recipe_runtime_name
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].name is defined %}
        {{ data[0].name }}
      {% else %}
        Manual / fallback recipe
      {% endif %}
  - name: Recipe Runtime Status
    unique_id: recipe_runtime_status
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].status is defined %}
        {{ data[0].status }}
      {% else %}
        unknown
      {% endif %}
  - name: Recipe Runtime Batch Number
    unique_id: recipe_runtime_batch_number
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].batchNo is defined %}
        {{ data[0].batchNo }}
      {% else %}
        unknown
      {% endif %}
  - name: Recipe Runtime Fermentation Start
    unique_id: recipe_runtime_fermentation_start
    device_class: timestamp
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].fermentingStart is defined and data[0].fermentingStart %}
        {{ as_local(as_datetime(data[0].fermentingStart)).isoformat() }}
      {% else %}
        {{ none }}
      {% endif %}
  - name: Recipe Runtime Fermenting End
    unique_id: recipe_runtime_fermenting_end
    device_class: timestamp
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].fermentingEnd is defined and data[0].fermentingEnd %}
        {{ as_local(as_datetime(data[0].fermentingEnd)).isoformat() }}
      {% else %}
        {{ none }}
      {% endif %}
  - name: Recipe Runtime Fermenting Days Left
    unique_id: recipe_runtime_fermenting_days_left
    unit_of_measurement: d
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 and data[0].fermentingLeft is defined and data[0].fermentingLeft is not none %}
        {{ data[0].fermentingLeft | float(0) | round(1) }}
      {% else %}
        0
      {% endif %}
  - name: Recipe Runtime Primary Temp
    unique_id: recipe_runtime_primary_temp
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence
            and data | count > 0
            and data[0].recipe is defined
            and data[0].recipe.fermentation is defined
            and data[0].recipe.fermentation.steps is defined
            and data[0].recipe.fermentation.steps | count > 0
            and data[0].recipe.fermentation.steps[0].stepTemp is defined %}
        {{ data[0].recipe.fermentation.steps[0].stepTemp | float(15) | round(1) }}
      {% else %}
        {{ states('input_number.recipe_fallback_primary_temp') | float(15) | round(1) }}
      {% endif %}
  - name: Recipe Runtime Primary Temp Low
    unique_id: recipe_runtime_primary_temp_low
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set primary = states('sensor.recipe_runtime_primary_temp') | float(15) %} {{ (primary - 1) | round(1) }}
  - name: Recipe Runtime Primary Temp High
    unique_id: recipe_runtime_primary_temp_high
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set primary = states('sensor.recipe_runtime_primary_temp') | float(15) %} {{ (primary + 1) | round(1) }}
  - name: Recipe Runtime Cold Crash Temp
    unique_id: recipe_runtime_cold_crash_temp
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence
            and data | count > 0
            and data[0].recipe is defined
            and data[0].recipe.fermentation is defined
            and data[0].recipe.fermentation.steps is defined
            and data[0].recipe.fermentation.steps | count > 0 %}
        {% set steps = data[0].recipe.fermentation.steps %}
        {{ steps[-1].stepTemp | float(states('input_number.recipe_fallback_cold_crash_temp')) | round(1) }}
      {% else %}
        {{ states('input_number.recipe_fallback_cold_crash_temp') | float(1) | round(1) }}
      {% endif %}
  - name: Recipe Runtime OG
    unique_id: recipe_runtime_og
    unit_of_measurement: SG
    state: |
      {{ states('input_number.recipe_fallback_og') | float(1.045) | round(3) }}
  - name: Recipe Runtime FG
    unique_id: recipe_runtime_fg
    unit_of_measurement: SG
    state: |
      {{ states('input_number.recipe_fallback_fg') | float(1.009) | round(3) }}
  - name: Recipe Runtime Dry Hop SG Low
    unique_id: recipe_runtime_dry_hop_sg_low
    unit_of_measurement: SG
    state: |
      {{ states('input_number.recipe_fallback_dry_hop_sg_low') | float(1.012) | round(3) }}
  - name: Recipe Runtime Dry Hop SG High
    unique_id: recipe_runtime_dry_hop_sg_high
    unit_of_measurement: SG
    state: |
      {{ states('input_number.recipe_fallback_dry_hop_sg_high') | float(1.014) | round(3) }}
  - name: Recipe Runtime Spunding After Hours
    unique_id: recipe_runtime_spunding_after_hours
    unit_of_measurement: h
    state: |
      {{ states('input_number.recipe_fallback_spunding_after_hours') | float(24) | round(0) }}
  - name: Recipe Runtime Spunding Target Bar
    unique_id: recipe_runtime_spunding_target_bar
    unit_of_measurement: bar
    state: |
      {{ states('input_number.recipe_fallback_spunding_target_bar') | float(0.8) | round(1) }}
  - name: Recipe Runtime Cold Crash Days Min
    unique_id: recipe_runtime_cold_crash_days_min
    unit_of_measurement: d
    state: |
      {{ states('input_number.recipe_fallback_cold_crash_days_min') | float(2) | round(0) }}
  - name: Recipe Runtime Transfer Pressure Bar
    unique_id: recipe_runtime_transfer_pressure_bar
    unit_of_measurement: bar
    state: |
      {{ states('input_number.recipe_fallback_transfer_pressure_bar') | float(0.2) | round(1) }}
  - name: Recipe Runtime Source
    unique_id: recipe_runtime_source
    state: |
      {% set data = state_attr('sensor.brewfather_all_batches_data', 'data') %} {% if data is sequence and data | count > 0 %}
        brewfather_all_batches_data
      {% else %}
        manual_fallback
      {% endif %}
  - name: FWK Attenuation
    unique_id: fwk_attenuation
    unit_of_measurement: '%'
    icon: mdi:percent
    state: |
      {% set og = states('sensor.recipe_runtime_og') | float(1.045) %} {% set fg = states('sensor.recipe_runtime_fg') | float(1.009) %} {% set sg = states('sensor.fwk_live_sg') | float(0) %} {% set denom = (og - fg) %} {% if sg > 0 and denom > 0 %}
        {{ (((og - sg) / denom) * 100) | round(0) }}
      {% else %}
        0
      {% endif %}

  - name: "FWK Gravity Points Left"
    unique_id: fwk_gravity_points_left
    unit_of_measurement: "SG"
    icon: mdi:chart-bell-curve-cumulative
    state: >
        {% set sg = states('sensor.fwk_live_sg') | float(0) %}
        {% set fg = states('sensor.recipe_runtime_fg') | float(1.009) %}
        {% if sg > 0 and fg > 0 %}
          {{ [sg - fg, 0] | max | round(3) }}
        {% else %}
          0
        {% endif %}
  - name: FWK Temperature Recommendation
    unique_id: fwk_temperature_recommendation
    state: |
      {% if is_state('input_boolean.fwk_cold_crash_active', 'on') %}
        Target about {{ states('sensor.recipe_runtime_cold_crash_temp') }} °C
      {% elif is_state('input_boolean.fwk_batch_active', 'on') %}
        Target {{ states('sensor.recipe_runtime_primary_temp_low') }}–{{ states('sensor.recipe_runtime_primary_temp_high') }} °C
      {% else %}
        No active batch
      {% endif %}
  - name: FWK Fermentation Pace
    unique_id: fwk_fermentation_pace
    icon: mdi:speedometer
    state: |
      {% set sg = states('sensor.fwk_live_sg') | float(0) %} {% set today = states('input_number.fwk_sg_today') | float(0) %} {% if sg == 0 or today == 0 %}
        Unknown
      {% else %}
        {% set delta = (today - sg) | round(3) %}
        {% if delta >= 0.008 %}
          Fast
        {% elif delta >= 0.004 %}
          Moderate
        {% elif delta > 0.001 %}
          Slow
        {% elif delta >= -0.001 %}
          Stable
        {% else %}
          Check sensor trend
        {% endif %}
      {% endif %}
- binary_sensor:
  - name: FWK Temperature Too High
    unique_id: fwk_temperature_too_high
    state: |
      {{
        is_state('input_boolean.fwk_batch_active', 'on')
        and is_state('input_boolean.fwk_cold_crash_active', 'off')
        and (states('sensor.fwk_live_temp') | float(0) >
             states('sensor.recipe_runtime_primary_temp_high') | float(16))
      }}
  - name: FWK Temperature Too Low
    unique_id: fwk_temperature_too_low
    state: |
      {{
        is_state('input_boolean.fwk_batch_active', 'on')
        and is_state('input_boolean.fwk_cold_crash_active', 'off')
        and (states('sensor.fwk_live_temp') | float(99) <
             states('sensor.recipe_runtime_primary_temp_low') | float(14))
      }}
  - name: FWK SG Stable 2 Days
    unique_id: fwk_sg_stable_2_days
    state: |
      {% set now_sg = states('sensor.fwk_live_sg') | float(0) %} {% set day1 = states('input_number.fwk_sg_today') | float(0) %} {% set day2 = states('input_number.fwk_sg_yesterday') | float(0) %} {% set day3 = states('input_number.fwk_sg_two_days_ago') | float(0) %} {% set fg = states('sensor.recipe_runtime_fg') | float(1.009) %} {{
        is_state('input_boolean.fwk_batch_active', 'on')
        and now_sg > 0
        and abs(now_sg - day1) <= 0.001
        and abs(day1 - day2) <= 0.001
        and abs(day2 - day3) <= 0.001
        and now_sg <= (fg + 0.001)
      }}
- sensor:
  - name: Brewing Brewfather Recipe Name
    unique_id: brewing_brewfather_recipe_name_mapped_v1
    icon: mdi:glass-mug
    state: |
      {% set v = states('sensor.brewfather_recipe_name') %} {{ v if v not in ['unknown', 'unavailable', '', none] else 'Manual / fallback recipe' }}
  - name: Brew Day Brewfather Recipe Name
    unique_id: brew_day_brewfather_recipe_name_mapped_v1
    icon: mdi:glass-mug
    state: |
      {% set v = states('sensor.brewfather_recipe_name') %} {{ v if v not in ['unknown', 'unavailable', '', none] else 'Manual / fallback recipe' }}
  - name: Brewing Brewfather Target Temp
    unique_id: brewing_brewfather_target_temp_mapped_v1
    icon: mdi:thermometer
    device_class: temperature
    unit_of_measurement: °C
    state: |
      {% set v = states('sensor.brewfather_target_temperature') %} {{ v | float(default=15.0) | round(1) }}
  - name: Brew Day Brewfather Target Temperature
    unique_id: brew_day_brewfather_target_temperature_mapped_v1
    icon: mdi:thermometer
    device_class: temperature
    unit_of_measurement: °C
    state: |
      {% set v = states('sensor.brewfather_target_temperature') %} {{ v | float(default=15.0) | round(1) }}
  - name: Brewing Brewfather Last Reading
    unique_id: brewing_brewfather_last_reading_mapped_v1
    icon: mdi:chart-line
    state: |
      {% set v = states('sensor.brewfather_last_reading') %} {{ v if v not in ['unknown', 'unavailable', '', none] else 'unknown' }}
  - name: Brewing Brewfather Fermentation Start
    unique_id: brewing_brewfather_fermentation_start_mapped_v1
    icon: mdi:clock
    device_class: timestamp
    state: |
      {% set v = states('sensor.brewfather_fermentation_start') %} {{ v if v not in ['unknown', 'unavailable', '', none] else none }}
  - name: Brewing Brewfather Summary
    unique_id: brewing_brewfather_summary_mapped_v1
    icon: mdi:beer
    state: |
      {% set recipe = states('sensor.brewfather_recipe_name') %} {% set target = states('sensor.brewfather_target_temperature') %} {% set sg = states('sensor.brewfather_last_reading') %} {% set status = states('sensor.brewfather_integration_status') %} {% if recipe not in ['unknown', 'unavailable', '', none] %}
        {{ recipe }} · {{ sg }} SG · {{ target }} °C · {{ status }}
      {% else %}
        Manual / fallback recipe
      {% endif %}
    attributes:
      recipe_name: '{{ states(''sensor.brewfather_recipe_name'') }}'
      target_temperature: '{{ states(''sensor.brewfather_target_temperature'') }}'
      upcoming_target_temperature: '{{ states(''sensor.brewfather_upcoming_target_temperature'') }}'
      upcoming_target_temperature_change: '{{ states(''sensor.brewfather_upcoming_target_temperature_change'') }}'
      last_reading: '{{ states(''sensor.brewfather_last_reading'') }}'
      fermentation_start: '{{ states(''sensor.brewfather_fermentation_start'') }}'
      integration_status: '{{ states(''sensor.brewfather_integration_status'') }}'
      api_connection: '{{ state_attr(''sensor.brewfather_integration_status'', ''api_connection'') }}'
      temperature_entity: '{{ state_attr(''sensor.brewfather_integration_status'', ''temperature_entity'') }}'
      gravity_entity: '{{ state_attr(''sensor.brewfather_integration_status'', ''gravity_entity'') }}'
      last_temperature: '{{ state_attr(''sensor.brewfather_integration_status'', ''last_temperature'') }}'
      last_gravity: '{{ state_attr(''sensor.brewfather_integration_status'', ''last_gravity'') }}'
  - name: Brew Day Brewfather Summary
    unique_id: brew_day_brewfather_summary_mapped_v1
    icon: mdi:beer
    state: |
      {% set recipe = states('sensor.brewfather_recipe_name') %} {% set target = states('sensor.brewfather_target_temperature') %} {% set sg = states('sensor.brewfather_last_reading') %} {% if recipe not in ['unknown', 'unavailable', '', none] %}
        {{ recipe }} · SG {{ sg }} · Target {{ target }} °C
      {% else %}
        Manual / fallback recipe
      {% endif %}
    attributes:
      recipe_name: '{{ states(''sensor.brewfather_recipe_name'') }}'
      target_temperature: '{{ states(''sensor.brewfather_target_temperature'') }}'
      last_reading: '{{ states(''sensor.brewfather_last_reading'') }}'
      fermentation_start: '{{ states(''sensor.brewfather_fermentation_start'') }}'
  - name: Brew Day Brewfather Current Step
    unique_id: brew_day_brewfather_current_step_mapped_v1
    icon: mdi:timeline-clock
    state: |
      {% set status = states('sensor.brewfather_integration_status') %} {% set upcoming = states('sensor.brewfather_upcoming_target_temperature_change') %} {% if status == 'monitoring' %}
        Monitor fermentation
      {% elif status not in ['unknown', 'unavailable', '', none] %}
        {{ status }}
      {% else %}
        unknown
      {% endif %}
    attributes:
      upcoming_target_temperature: '{{ states(''sensor.brewfather_upcoming_target_temperature'') }}'
      upcoming_target_temperature_change: '{{ states(''sensor.brewfather_upcoming_target_temperature_change'') }}'
  - name: Brew Day Brewfather Guidance
    unique_id: brew_day_brewfather_guidance_mapped_v1
    icon: mdi:information-outline
    state: |
      {% set target = states('sensor.brewfather_target_temperature') %} {% set upcoming = states('sensor.brewfather_upcoming_target_temperature') %} {% set change = states('sensor.brewfather_upcoming_target_temperature_change') %} {% if target not in ['unknown', 'unavailable', '', none] %}
        Håll jäsningen runt {{ target }} °C. Nästa target är {{ upcoming }} °C.
      {% else %}
        Ingen Brewfather-guidance tillgänglig.
      {% endif %}
    attributes:
      target_temperature: '{{ states(''sensor.brewfather_target_temperature'') }}'
      upcoming_target_temperature: '{{ states(''sensor.brewfather_upcoming_target_temperature'') }}'
      upcoming_change: '{{ states(''sensor.brewfather_upcoming_target_temperature_change'') }}'
- sensor:
  - name: Brewfather Next Event
    unique_id: brewfather_next_event_mapped_v1
    icon: mdi:calendar-clock
    state: |
      {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
        | selectattr('active', 'eq', true)
        | selectattr('time_ms', 'gt', now_ms)
        | sort(attribute='time_ms')
        | list %}
      {% if future | count > 0 %}
        {{ future[0].title }}
      {% else %}
        Inga kommande Brewfather-events
      {% endif %}
    attributes:
      description: |
        {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
          | selectattr('active', 'eq', true)
          | selectattr('time_ms', 'gt', now_ms)
          | sort(attribute='time_ms')
          | list %}
        {{ future[0].description if future | count > 0 else '' }}
      event_type: |
        {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
          | selectattr('active', 'eq', true)
          | selectattr('time_ms', 'gt', now_ms)
          | sort(attribute='time_ms')
          | list %}
        {{ future[0].event_type if future | count > 0 else '' }}
      time: |
        {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
          | selectattr('active', 'eq', true)
          | selectattr('time_ms', 'gt', now_ms)
          | sort(attribute='time_ms')
          | list %}
        {{ future[0].time if future | count > 0 else '' }}
  - name: Brewfather Next Fermentation Step
    unique_id: brewfather_next_fermentation_step_mapped_v1
    icon: mdi:timeline-clock
    state: |
      {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
        | selectattr('active', 'eq', true)
        | selectattr('event_type', 'eq', 'event-batch-ferm-step')
        | selectattr('time_ms', 'gt', now_ms)
        | sort(attribute='time_ms')
        | list %}
      {% if future | count > 0 %}
        {{ future[0].description | replace('Steg i jässchema: ', '') }}
      {% else %}
        Inget kommande jässchema-steg
      {% endif %}
    attributes:
      title: |
        {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
          | selectattr('active', 'eq', true)
          | selectattr('event_type', 'eq', 'event-batch-ferm-step')
          | selectattr('time_ms', 'gt', now_ms)
          | sort(attribute='time_ms')
          | list %}
        {{ future[0].title if future | count > 0 else '' }}
      description: |
        {% set events = state_attr('sensor.brewfather_events', 'events') | default([], true) %} {% set now_ms = (as_timestamp(now()) * 1000) | int %} {% set future = events
