###############################################################################
# BrewAssistant v4.1 - Notifications
# Module-aware notification package
#
# Mobile target:
#   notify.mobile_app_dn2103
#
# Design:
# - Global notification master
# - Separate warnings switch
# - Optional persistent notifications
# - Module-aware guards
# - No global notify lock
# - Mobile notifications + optional persistent dashboard notifications
###############################################################################

input_boolean:

  brewassistant_notifications_enabled:
    name: BrewAssistant Notifications Enabled
    icon: mdi:bell
    initial: true

  brewassistant_warnings_enabled:
    name: BrewAssistant Warnings Enabled
    icon: mdi:alert-circle
    initial: true

  brewassistant_persistent_notifications_enabled:
    name: BrewAssistant Persistent Notifications Enabled
    icon: mdi:message-alert
    initial: true

  brewassistant_chamber_module_active:
    name: BrewAssistant Chamber Module Active
    icon: mdi:snowflake-thermometer
    initial: false

  brewassistant_fermentation_module_active:
    name: BrewAssistant Fermentation Module Active
    icon: mdi:beer
    initial: false

  brewassistant_serving_module_active:
    name: BrewAssistant Serving Module Active
    icon: mdi:glass-mug
    initial: false

  brewassistant_hot_side_module_active:
    name: BrewAssistant Hot Side Module Active
    icon: mdi:kettle-steam
    initial: false


###############################################################################
# Scripts
###############################################################################

script:

  brewassistant_notify_mobile:
    alias: BrewAssistant - Notify Mobile
    mode: queued
    fields:
      title:
        description: Notification title
      message:
        description: Notification message
      tag:
        description: Notification tag
    sequence:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"

      - service: notify.mobile_app_dn2103
        data:
          title: "{{ title | default('BrewAssistant') }}"
          message: "{{ message | default('No message provided.') }}"
          data:
            tag: "{{ tag | default('brewassistant') }}"
            group: "brewassistant"


  brewassistant_notify_warning:
    alias: BrewAssistant - Notify Warning
    mode: queued
    fields:
      title:
        description: Warning title
      message:
        description: Warning message
      tag:
        description: Notification tag
    sequence:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"

      - service: notify.mobile_app_dn2103
        data:
          title: "{{ title | default('BrewAssistant Warning') }}"
          message: "{{ message | default('Warning triggered.') }}"
          data:
            tag: "{{ tag | default('brewassistant_warning') }}"
            group: "brewassistant"
            importance: high
            priority: high


  brewassistant_notify_persistent:
    alias: BrewAssistant - Notify Persistent
    mode: queued
    fields:
      title:
        description: Persistent notification title
      message:
        description: Persistent notification message
      notification_id:
        description: Optional persistent notification id
    sequence:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"

      - condition: state
        entity_id: input_boolean.brewassistant_persistent_notifications_enabled
        state: "on"

      - service: persistent_notification.create
        data:
          title: "{{ title | default('BrewAssistant') }}"
          message: "{{ message | default('No message provided.') }}"
          notification_id: "{{ notification_id | default('brewassistant') }}"


###############################################################################
# Module state automation
###############################################################################

automation:

  - alias: BrewAssistant - Module State - Fermentation Active
    id: brew_notify_module_state_fermentation_active
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_boolean.brew_batch_active
          - input_boolean.brew_transferred_to_keg
          - input_boolean.brew_cold_crash_active
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.brew_batch_active
                state: "on"
              - condition: state
                entity_id: input_boolean.brew_transferred_to_keg
                state: "off"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.brewassistant_fermentation_module_active
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.brewassistant_fermentation_module_active


  - alias: BrewAssistant - Module State - Chamber Active
    id: brewassistant_module_state_chamber_active
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_boolean.brew_batch_active
          - input_boolean.brew_cold_crash_active
          - input_boolean.brew_transferred_to_keg
    action:
      - choose:
          - conditions:
              - condition: or
                conditions:
                  - condition: state
                    entity_id: input_boolean.brew_batch_active
                    state: "on"
                  - condition: state
                    entity_id: input_boolean.brew_cold_crash_active
                    state: "on"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.brewassistant_chamber_module_active
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.brewassistant_chamber_module_active


  - alias: BrewAssistant - Module State - Serving Active
    id: brewassistant_module_state_serving_active
    mode: restart
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - input_boolean.brew_transferred_to_keg
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.brew_transferred_to_keg
                state: "on"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.brewassistant_serving_module_active
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.brewassistant_serving_module_active


###############################################################################
# Fermentation workflow notifications
###############################################################################

  - alias: Brew Notify - Batch Started
    id: brew_notify_batch_started
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.brew_batch_active
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "🍺 BrewAssistant"
          message: >
            Batch started.
            Recipe source: {{ states('sensor.recipe_runtime_source') }}.
            OG target: {{ states('sensor.recipe_runtime_og') }}.
            FG target: {{ states('sensor.recipe_runtime_fg') }}.
          tag: "brewassistant_batch_started"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant"
          message: >
            Batch started.

            Recipe source: {{ states('sensor.recipe_runtime_source') }}

            OG target: {{ states('sensor.recipe_runtime_og') }}

            FG target: {{ states('sensor.recipe_runtime_fg') }}
          notification_id: "brewassistant_batch_started"


  - alias: Brew Notify - Dry Hop
    id: brew_notify_dry_hop
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_dry_hop_active
        to: "on"
        for: "00:02:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
      - condition: state
        entity_id: input_boolean.brew_dry_hop_added
        state: "off"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "🍺 Dry Hop"
          message: >
            Dry hop window is active.
            Add the planned dry hop charge for the current recipe.
          tag: "brewassistant_dry_hop"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant - Dry Hop"
          message: >
            Dry hop window is now active.

            Add the planned dry hop charge for the current recipe.
          notification_id: "brewassistant_dry_hop"


  - alias: Brew Notify - Dry Hop Preview
    id: brew_notify_dry_hop_preview
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_dry_hop_preview
        to: "on"
        for: "00:02:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
      - condition: state
        entity_id: input_boolean.brew_dry_hop_added
        state: "off"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "🍺 Dry Hop Preview"
          message: >
            Dry hop window is approaching.
            Current SG: {{ states('sensor.brew_fermentation_live_sg') }}.
          tag: "brewassistant_dry_hop_preview"


  - alias: Brew Notify - Spunding
    id: brew_notify_spunding
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_spunding_active
        to: "on"
        for: "00:02:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
      - condition: state
        entity_id: input_boolean.brew_spunding_installed
        state: "off"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "⚙️ Spunding"
          message: >
            Time to install the spunding valve.
            Suggested target: {{ states('sensor.recipe_runtime_spunding_target_bar') }} bar.
          tag: "brewassistant_spunding"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant - Spunding"
          message: >
            Spunding is now due.

            Install the spunding valve and set target pressure to about
            {{ states('sensor.recipe_runtime_spunding_target_bar') }} bar.
          notification_id: "brewassistant_spunding"


  - alias: Brew Notify - Spunding Preview
    id: brew_notify_spunding_preview
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_spunding_preview
        to: "on"
        for: "00:02:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
      - condition: state
        entity_id: input_boolean.brew_spunding_installed
        state: "off"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "⚙️ Spunding Preview"
          message: "Spunding is approaching. Prepare your spunding setup soon."
          tag: "brewassistant_spunding_preview"


  - alias: Brew Notify - Cold Crash Ready
    id: brew_notify_cold_crash_ready
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_ready_for_cold_crash
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "❄️ Cold Crash"
          message: >
            Fermentation appears ready for cold crash.
            Recommended cold crash target:
            {{ states('sensor.recipe_runtime_cold_crash_temp') }} °C.
          tag: "brewassistant_cold_crash_ready"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant - Cold Crash Ready"
          message: >
            Fermentation appears ready for cold crash.

            SG is stable and close to target FG.

            Recommended cold crash target:
            {{ states('sensor.recipe_runtime_cold_crash_temp') }} °C.
          notification_id: "brewassistant_cold_crash_ready"


  - alias: Brew Notify - Transfer Ready
    id: brew_notify_transfer_ready
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_process_ready_for_transfer
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "🍺 Transfer"
          message: >
            Cold crash appears complete.
            Batch may be ready for closed transfer to keg.
            Recommended transfer pressure:
            {{ states('sensor.recipe_runtime_transfer_pressure_bar') }} bar.
          tag: "brewassistant_transfer_ready"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant - Transfer Ready"
          message: >
            Transfer is now ready.

            Cold crash minimum duration has been reached.

            Recommended transfer pressure:
            {{ states('sensor.recipe_runtime_transfer_pressure_bar') }} bar.
          notification_id: "brewassistant_transfer_ready"


  - alias: Brew Notify - Batch Completed
    id: brew_notify_batch_completed
    mode: single
    trigger:
      - platform: state
        entity_id: input_boolean.brew_transferred_to_keg
        to: "on"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_notifications_enabled
        state: "on"
    action:
      - service: script.brewassistant_notify_mobile
        data:
          title: "✅ BrewAssistant"
          message: "Batch marked as transferred to keg. Workflow complete."
          tag: "brewassistant_batch_completed"

      - service: script.brewassistant_notify_persistent
        data:
          title: "BrewAssistant"
          message: >
            Batch marked as transferred to keg.

            BrewAssistant workflow for this batch is complete.
          notification_id: "brewassistant_batch_completed"


###############################################################################
# Chamber / fermentation warnings
###############################################################################

  - alias: Brew Warning - Chamber Too Warm
    id: brew_warning_chamber_warm
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_chamber_running_too_warm
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_chamber_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_warning
        data:
          title: "🔥 Chamber Warning"
          message: "Chamber target is warmer than recipe."
          tag: "brewassistant_chamber_warm"


  - alias: Brew Warning - Chamber Too Cold
    id: brew_warning_chamber_cold
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_chamber_running_too_cold
        to: "on"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_chamber_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_warning
        data:
          title: "❄️ Chamber Warning"
          message: "Chamber target is colder than recipe."
          tag: "brewassistant_chamber_cold"


  - alias: Brew Warning - Temp Drift
    id: brew_warning_temp_drift
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.brew_chamber_live_vs_recipe_delta
        above: 1.5
        for: "00:10:00"
      - platform: numeric_state
        entity_id: sensor.brew_chamber_live_vs_recipe_delta
        below: -1.5
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_warning
        data:
          title: "🌡️ Temp Drift"
          message: >
            Fermentation temperature deviates from recipe target.
            Delta: {{ states('sensor.brew_chamber_live_vs_recipe_delta') }} °C.
          tag: "brewassistant_temp_drift"


  - alias: Brew Warning - Temperature High
    id: brew_warning_temperature_high
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_fermentation_temperature_too_high
        to: "on"
        for: "00:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_warning
        data:
          title: "🔥 Fermentation Warning"
          message: >
            Fermentation temperature is above the recommended range.
            Live temp: {{ states('sensor.brew_fermentation_live_temp') }} °C.
            Recommended max: {{ states('sensor.recipe_runtime_primary_temp_high') }} °C.
          tag: "brewassistant_fermentation_temp_high"


  - alias: Brew Warning - Temperature Low
    id: brew_warning_temperature_low
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.brew_fermentation_temperature_too_low
        to: "on"
        for: "00:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.brewassistant_warnings_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.brewassistant_fermentation_module_active
        state: "on"
    action:
      - service: script.brewassistant_notify_warning
        data:
          title: "❄️ Fermentation Warning"
          message: >
            Fermentation temperature is below the recommended range.
            Live temp: {{ states('sensor.brew_fermentation_live_temp') }} °C.
            Recommended min: {{ states('sensor.recipe_runtime_primary_temp_low') }} °C.
          tag: "brewassistant_fermentation_temp_low"
