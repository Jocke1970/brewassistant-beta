        state: >
          {% set others = state_attr('sensor.brewfather_recipe_name', 'other_batches') or [] %}
          {% if others | count > 1 %}
            {{ others[1].state | default('Unknown', true) }}
          {% else %}
            Empty
          {% endif %}
        attributes:
          slot: 3
          source_type: other_batches[1]
          batch_id: >
            {% set others = state_attr('sensor.brewfather_recipe_name', 'other_batches') or [] %}
            {% if others | count > 1 %}
              {{ others[1].batch_id | default('', true) }}
