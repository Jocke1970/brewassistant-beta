###############################################################################
# BrewAssistant - Brewfather Multiple Batches Binary Health Sensors
###############################################################################
  - binary_sensor:

      - name: BrewAssistant BF Selected Batch Ready
        unique_id: brewassistant_bf_selected_batch_ready
        icon: mdi:check-circle-outline
        state: >
          {{ states('sensor.brewassistant_bf_selected_batch_health')
             in ['Auto selected active batch', 'Manual slot selected'] }}
        attributes:
          health: >
            {{ states('sensor.brewassistant_bf_selected_batch_health') }}
          mode: >
            {{ states('input_select.brewassistant_bf_active_batch_slot') }}
          resolved_slot: >
            {{ states('sensor.brewassistant_bf_selected_batch_slot') }}
          selected_batch: >
            {{ states('sensor.brewassistant_bf_selected_batch_name') }}
          selected_batch_id: >
            {{ states('sensor.brewassistant_bf_selected_batch_id') }}

      - name: BrewAssistant BF Selected Batch Manual Slot Empty
        unique_id: brewassistant_bf_selected_batch_manual_slot_empty
        icon: mdi:database-alert-outline
        state: >
          {{ states('sensor.brewassistant_bf_selected_batch_health') == 'Manual slot empty' }}
        attributes:
          mode: >
            {{ states('input_select.brewassistant_bf_active_batch_slot') }}
          resolved_slot: >
            {{ states('sensor.brewassistant_bf_selected_batch_slot') }}
          summary: >
            {{ state_attr('sensor.brewassistant_bf_selected_batch_health', 'summary') }}

      - name: BrewAssistant BF Selected Batch Auto No Data
        unique_id: brewassistant_bf_selected_batch_auto_no_data
        icon: mdi:database-off-outline
        state: >
          {{ states('sensor.brewassistant_bf_selected_batch_health') == 'No batch data' }}
        attributes:
          mode: >
            {{ states('input_select.brewassistant_bf_active_batch_slot') }}
          resolved_slot: >
            {{ states('sensor.brewassistant_bf_selected_batch_slot') }}
          summary: >
            {{ state_attr('sensor.brewassistant_bf_selected_batch_health', 'summary') }}

      - name: BrewAssistant BF Selected Batch Invalid
        unique_id: brewassistant_bf_selected_batch_invalid
        icon: mdi:alert-circle-outline
        state: >
          {{ states('sensor.brewassistant_bf_selected_batch_health') == 'Invalid selection' }}
        attributes:
          mode: >
            {{ states('input_select.brewassistant_bf_active_batch_slot') }}
          resolved_slot: >
            {{ states('sensor.brewassistant_bf_selected_batch_slot') }}
          summary: >
            {{ state_attr('sensor.brewassistant_bf_selected_batch_health', 'summary') }}


      #########################################################################
      # Runtime Bridge Ready
      #########################################################################

      - name: BrewAssistant BF Runtime Bridge Ready
        unique_id: brewassistant_bf_runtime_bridge_ready
        icon: mdi:bridge
        state: >
          {{
            is_state('input_boolean.brewassistant_bf_runtime_bridge_enabled', 'on')
            and is_state('binary_sensor.brewassistant_bf_selected_batch_ready', 'on')
          }}
        attributes:
          bridge_enabled: >
            {{ states('input_boolean.brewassistant_bf_runtime_bridge_enabled') }}
          selected_batch_ready: >
            {{ states('binary_sensor.brewassistant_bf_selected_batch_ready') }}
          selected_slot: >
            {{ states('sensor.brewassistant_bf_selected_batch_slot') }}
          selected_batch: >
            {{ states('sensor.brewassistant_bf_selected_batch_name') }}
          selected_batch_id: >
            {{ states('sensor.brewassistant_bf_selected_batch_id') }}
          health: >
            {{ states('sensor.brewassistant_bf_selected_batch_health') }}
          summary: >
            {% if is_state('input_boolean.brewassistant_bf_runtime_bridge_enabled', 'off') %}
              Runtime bridge is disabled. Existing recipe_runtime sensors should remain in control.
            {% elif is_state('binary_sensor.brewassistant_bf_selected_batch_ready', 'on') %}
              Runtime bridge is enabled and selected Brewfather batch is ready.
            {% else %}
              Runtime bridge is enabled, but selected batch is not ready.
            {% endif %}

      - name: BrewAssistant BF Runtime Bridge Blocked
        unique_id: brewassistant_bf_runtime_bridge_blocked
        icon: mdi:bridge-off
        state: >
          {{
            is_state('input_boolean.brewassistant_bf_runtime_bridge_enabled', 'on')
            and is_state('binary_sensor.brewassistant_bf_selected_batch_ready', 'off')
          }}
        attributes:
          bridge_enabled: >
            {{ states('input_boolean.brewassistant_bf_runtime_bridge_enabled') }}
          selected_batch_ready: >
            {{ states('binary_sensor.brewassistant_bf_selected_batch_ready') }}
          health: >
            {{ states('sensor.brewassistant_bf_selected_batch_health') }}
          summary: >
            {{ state_attr('sensor.brewassistant_bf_selected_batch_health', 'summary') }}

###############################################################################
# BrewAssistant - Brewfather Runtime Bridge Control
###############################################################################

input_boolean:
  brewassistant_bf_runtime_bridge_enabled:
    name: BrewAssistant BF Runtime Bridge Enabled
    icon: mdi:bridge
    initial: false

