###############################################################################
# BrewAssistant v4 - Kegerator
# Self-contained module package.
# Entity names are intentionally preserved from the uploaded v3 files.
# UI/dashboard YAML should live separately from packages.
###############################################################################
template:
- binary_sensor:
  - name: Kegerator Compressor Active
    unique_id: kegerator_compressor_active
    icon: mdi:engine
    state: |
      {% set p = states('sensor.extra_koksmaskin_switch_0_power') | float(0) %}
      {{ p > 20 }}
      
input_boolean:
  kegerator_enabled:
    name: Kegerator Enabled
    icon: mdi:fridge-industrial
  kegerator_fan_auto:
    name: Kegerator Fan Auto
    icon: mdi:fan-auto
  kegerator_fan_force_on:
    name: Kegerator Fan Force On
    icon: mdi:fan
  kegerator_fan_force_off:
    name: Kegerator Fan Force Off
    icon: mdi:fan-off
  kegerator_service_mode:
    name: Kegerator Service Mode
    icon: mdi:fridge-alert-outline
  kegerator_door_open_acknowledged:
    name: Kegerator Door Open Acknowledged
    icon: mdi:door-open
  brewassistant_kegerator_enabled:
    name: BrewAssistant Kegerator Enabled
    icon: mdi:fridge-industrial
    initial: true
input_number:
  kegerator_fan_min_runtime:
    name: Kegerator Fan Min Runtime
    icon: mdi:timer-outline
    min: 0
    max: 60
    step: 1
    mode: box
    unit_of_measurement: min
  kegerator_fan_after_compressor_minutes:
    name: Kegerator Fan After Compressor
    icon: mdi:fan-clock
    min: 0
    max: 120
    step: 1
    mode: box
    unit_of_measurement: min
  kegerator_fan_cycle_on_minutes:
    name: Kegerator Fan Cycle On
    icon: mdi:fan
    min: 0
    max: 60
    step: 1
    mode: box
    unit_of_measurement: min
  kegerator_fan_cycle_off_minutes:
    name: Kegerator Fan Cycle Off
    icon: mdi:fan-off
    min: 0
    max: 240
    step: 1
    mode: box
    unit_of_measurement: min
  kegerator_temp_delta_fan_threshold:
    name: Kegerator Temp Delta Fan Threshold
    icon: mdi:delta
    min: 0.0
    max: 10.0
    step: 0.1
    mode: box
    unit_of_measurement: °C
input_select:
  kegerator_fan_mode:
    name: Kegerator Fan Mode
    icon: mdi:fan-auto
    options:
    - Auto
    - Always on
    - Always off
    - Compressor follow
    - Cycle
    - Service
  kegerator_card_section:
    name: Kegerator Card Section
    icon: mdi:view-dashboard-outline
    options:
    - none
    - temps
    - status
    - fan
    - settings
timer:
  kegerator_fan_afterrun_timer:
    name: Kegerator Fan Afterrun Timer
    icon: mdi:fan-clock
    duration: 00:15:00
script:
  brewassistant_kegerator_fan_evaluate:
    alias: BrewAssistant - Kegerator Fan - Evaluate
    mode: restart
    sequence:
    - variables:
        fan_entity: switch.kegerator_fan
        climate_entity: climate.kegerator_kylskap
        compressor_entity: binary_sensor.kegerator_compressor_active
        external_temp_entity: sensor.kyl_temperatur_4
        mode: '{{ states(''input_select.kegerator_fan_mode'') }}'
        hvac_state: '{{ states(climate_entity) }}'
        hvac_action: '{{ state_attr(climate_entity, ''hvac_action'') }}'
        compressor_active: '{{ is_state(compressor_entity, ''on'') }}'
        climate_current: '{{ state_attr(climate_entity, ''current_temperature'') }}'
        external_current: '{{ states(external_temp_entity) }}'
        target_temp: '{{ state_attr(climate_entity, ''temperature'') }}'
        current_temp: |
          {% set c = state_attr(climate_entity, 'current_temperature') %} {% set e = states(external_temp_entity) %} {% if c is number %}
            {{ c | float }}
          {% elif is_number(e) %}
            {{ e | float }}
          {% else %}
            unknown
          {% endif %}
        delta: |
          {% set c = state_attr(climate_entity, 'current_temperature') %} {% set e = states(external_temp_entity) %} {% set t = state_attr(climate_entity, 'temperature') %} {% set current = c if c is number else e %} {% if is_number(current) and t is number %}
            {{ (current | float - t | float) | round(2) }}
          {% else %}
            unknown
          {% endif %}
        delta_threshold: |
          {% set v = states('input_number.kegerator_temp_delta_fan_threshold') %} {% if is_number(v) %}
            {{ v | float }}
          {% else %}
            0.6
          {% endif %}
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Service'' }}'
        sequence:
        - stop: Kegerator fan is in service mode.
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Always on'' }}'
        sequence:
        - service: switch.turn_on
          target:
            entity_id: switch.kegerator_fan
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Always off'' }}'
        sequence:
        - service: switch.turn_off
          target:
            entity_id: switch.kegerator_fan
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Compressor follow'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ compressor_active }}'
            sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.kegerator_fan
          default:
          - service: switch.turn_off
            target:
              entity_id: switch.kegerator_fan
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Auto'' }}'
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: |
                {{
                  hvac_state not in ['off', 'unknown', 'unavailable']
                  and (
                    compressor_active
                    or hvac_action == 'cooling'
                    or (
                      delta != 'unknown'
                      and delta | float > delta_threshold | float
                    )
                  )
                }}
            sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.kegerator_fan
          default:
          - service: switch.turn_off
            target:
              entity_id: switch.kegerator_fan
      - conditions:
        - condition: template
          value_template: '{{ mode == ''Cycle'' }}'
        sequence:
        - stop: Kegerator fan cycle mode is handled by cycle automation.
      default:
      - service: switch.turn_off
        target:
          entity_id: switch.kegerator_fan
  brewassistant_kegerator_fan_afterrun:
    alias: BrewAssistant - Kegerator Fan - Afterrun
    mode: restart
    sequence:
    - variables:
        afterrun_minutes: |
          {% set v = states('input_number.kegerator_fan_after_compressor_minutes') %} {% if is_number(v) %}
            {{ v | int }}
          {% else %}
            10
          {% endif %}
    - service: switch.turn_on
      target:
        entity_id: switch.kegerator_fan
    - delay:
        minutes: '{{ afterrun_minutes }}'
    - condition: template
      value_template: |
        {{
          states('input_select.kegerator_fan_mode') in ['Auto', 'Compressor follow']
          and is_state('binary_sensor.kegerator_compressor_active', 'off')
        }}
    - service: switch.turn_off
      target:
        entity_id: switch.kegerator_fan
automation:
- id: brewassistant_kegerator_fan_evaluate_on_change
  alias: BrewAssistant - Kegerator Fan - Evaluate On Change
  mode: restart
  trigger:
  - platform: state
    entity_id:
    - input_select.kegerator_fan_mode
    - climate.kegerator_kylskap
    - binary_sensor.kegerator_compressor_active
    - sensor.kyl_temperatur_4
  - platform: state
    entity_id: climate.kegerator_kylskap
    attribute: hvac_action
  - platform: state
    entity_id: climate.kegerator_kylskap
    attribute: temperature
  - platform: state
    entity_id: input_number.kegerator_temp_delta_fan_threshold
  action:
  - service: script.brewassistant_kegerator_fan_evaluate
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_kegerator_enabled
    state: 'on'
- id: brewassistant_kegerator_fan_afterrun_when_compressor_stops
  alias: BrewAssistant - Kegerator Fan - Afterrun When Compressor Stops
  mode: restart
  trigger:
  - platform: state
    entity_id: binary_sensor.kegerator_compressor_active
    from: 'on'
    to: 'off'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_kegerator_enabled
    state: 'on'
  - condition: template
    value_template: |
      {{ states('input_select.kegerator_fan_mode') in ['Auto', 'Compressor follow'] }}
  action:
  - service: script.brewassistant_kegerator_fan_afterrun
- id: brewassistant_kegerator_fan_on_when_compressor_starts
  alias: BrewAssistant - Kegerator Fan - On When Compressor Starts
  mode: restart
  trigger:
  - platform: state
    entity_id: binary_sensor.kegerator_compressor_active
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_kegerator_enabled
    state: 'on'
  - condition: template
    value_template: |
      {{ states('input_select.kegerator_fan_mode') in ['Auto', 'Compressor follow'] }}
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.kegerator_fan
- id: brewassistant_kegerator_fan_cycle_mode
  alias: BrewAssistant - Kegerator Fan - Cycle Mode
  mode: restart
  trigger:
  - platform: state
    entity_id: input_select.kegerator_fan_mode
    to: Cycle
  - platform: homeassistant
    event: start
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_kegerator_enabled
    state: 'on'
  - condition: template
    value_template: '{{ is_state(''input_select.kegerator_fan_mode'', ''Cycle'') }}'
  action:
  - repeat:
      while:
      - condition: template
        value_template: '{{ is_state(''input_select.kegerator_fan_mode'', ''Cycle'') }}'
      sequence:
      - variables:
          on_minutes: |
            {% set v = states('input_number.kegerator_fan_cycle_on_minutes') %} {% if is_number(v) %}
              {{ v | int }}
            {% else %}
              5
            {% endif %}
          off_minutes: |
            {% set v = states('input_number.kegerator_fan_cycle_off_minutes') %} {% if is_number(v) %}
              {{ v | int }}
            {% else %}
              25
            {% endif %}
      - service: switch.turn_on
        target:
          entity_id: switch.kegerator_fan
      - delay:
          minutes: '{{ on_minutes }}'
      - condition: template
        value_template: '{{ is_state(''input_select.kegerator_fan_mode'', ''Cycle'') }}'
      - service: switch.turn_off
        target:
          entity_id: switch.kegerator_fan
      - delay:
          minutes: '{{ off_minutes }}'
- id: brewassistant_kegerator_fan_off_when_kegerator_off
  alias: BrewAssistant - Kegerator Fan - Off When Kegerator Off
  mode: single
  trigger:
  - platform: state
    entity_id: climate.kegerator_kylskap
    to: 'off'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_kegerator_enabled
    state: 'on'
  - condition: template
    value_template: |
      {{ states('input_select.kegerator_fan_mode') not in ['Always on', 'Service'] }}
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.kegerator_fan
