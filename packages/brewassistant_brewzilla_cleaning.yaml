###############################################################################
# BrewAssistant - BrewZilla Cleaning Workflow v0.1
#
# Safe/semi-manual cleaning process after brewday.
# This package tracks the cleaning stage and shows clear instructions.
# It does NOT automatically control BrewZilla heater or pump in v0.1.
###############################################################################

input_boolean:
  brewassistant_brewzilla_cleaning_active:
    name: BrewAssistant BrewZilla Cleaning Active
    icon: mdi:spray-bottle

input_select:
  brewassistant_brewzilla_cleaning_stage:
    name: BrewAssistant BrewZilla Cleaning Stage
    icon: mdi:playlist-check
    options:
      - Idle
      - Rinse
      - PBW / Cleaner soak
      - Recirculate
      - Scrub
      - Final rinse
      - Dry
      - Complete
    initial: Idle

input_datetime:
  brewassistant_brewzilla_cleaning_started_at:
    name: BrewAssistant BrewZilla Cleaning Started At
    has_date: true
    has_time: true

input_text:
  brewassistant_brewzilla_cleaning_notes:
    name: BrewAssistant BrewZilla Cleaning Notes
    max: 255
    initial: ""

script:
  brewassistant_brewzilla_cleaning_start:
    alias: BrewAssistant BrewZilla Cleaning - Start
    mode: single
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.brewassistant_brewzilla_cleaning_active
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_brewzilla_cleaning_stage
        data:
          option: Rinse
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.brewassistant_brewzilla_cleaning_started_at
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.brewassistant_brewzilla_cleaning_notes
        data:
          value: "Started cleaning workflow"
      - service: persistent_notification.create
        data:
          title: BrewZilla cleaning started
          message: >-
            Step 1: Empty kettle and rinse loose grain/hop material with warm water.
            Keep BrewZilla powered safely and do not dry-fire the elements.

  brewassistant_brewzilla_cleaning_next:
    alias: BrewAssistant BrewZilla Cleaning - Next Step
    mode: single
    sequence:
      - variables:
          current: "{{ states('input_select.brewassistant_brewzilla_cleaning_stage') }}"
          next_stage: >-
            {% set order = ['Idle','Rinse','PBW / Cleaner soak','Recirculate','Scrub','Final rinse','Dry','Complete'] %}
            {% set idx = order.index(current) if current in order else 0 %}
            {{ order[[idx + 1, order | count - 1] | min] }}
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_brewzilla_cleaning_stage
        data:
          option: "{{ next_stage }}"
      - service: persistent_notification.create
        data:
          title: "BrewZilla cleaning: {{ next_stage }}"
          message: >-
            {% if next_stage == 'PBW / Cleaner soak' %}
              Add warm water and brewery cleaner according to the cleaner label. Let it soak before recirculation.
            {% elif next_stage == 'Recirculate' %}
              Recirculate cleaner through pump, pipework and chiller connections if used. Verify flow manually.
            {% elif next_stage == 'Scrub' %}
              Scrub malt pipe, bottom screen, false bottom, pump inlet and visible residue. Avoid abrasive damage.
            {% elif next_stage == 'Final rinse' %}
              Drain cleaner and rinse thoroughly until no cleaner residue remains.
            {% elif next_stage == 'Dry' %}
              Drain fully, leave lid open, and let parts dry before storage.
            {% elif next_stage == 'Complete' %}
              Cleaning completed. Power down and store BrewZilla dry.
            {% else %}
              Continue the cleaning workflow.
            {% endif %}

  brewassistant_brewzilla_cleaning_finish:
    alias: BrewAssistant BrewZilla Cleaning - Finish
    mode: single
    sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_brewzilla_cleaning_stage
        data:
          option: Complete
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.brewassistant_brewzilla_cleaning_active
      - service: input_text.set_value
        target:
          entity_id: input_text.brewassistant_brewzilla_cleaning_notes
        data:
          value: "Cleaning completed"
      - service: persistent_notification.create
        data:
          title: BrewZilla cleaning complete
          message: Cleaning workflow marked as complete. Store BrewZilla dry.

  brewassistant_brewzilla_cleaning_reset:
    alias: BrewAssistant BrewZilla Cleaning - Reset
    mode: single
    sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.brewassistant_brewzilla_cleaning_active
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_brewzilla_cleaning_stage
        data:
          option: Idle
      - service: input_text.set_value
        target:
          entity_id: input_text.brewassistant_brewzilla_cleaning_notes
        data:
          value: ""

template:
  - sensor:
      - name: BrewAssistant BrewZilla Cleaning Instruction
        unique_id: brewassistant_brewzilla_cleaning_instruction
        icon: mdi:clipboard-text-outline
        state: >-
          {% set stage = states('input_select.brewassistant_brewzilla_cleaning_stage') %}
          {% if stage == 'Rinse' %}
            Rinse loose grain and hop material
          {% elif stage == 'PBW / Cleaner soak' %}
            Soak with warm brewery cleaner
          {% elif stage == 'Recirculate' %}
            Recirculate cleaner through pump and pipework
          {% elif stage == 'Scrub' %}
            Scrub screens, malt pipe and residue zones
          {% elif stage == 'Final rinse' %}
            Rinse thoroughly with clean water
          {% elif stage == 'Dry' %}
            Drain and dry before storage
          {% elif stage == 'Complete' %}
            Cleaning complete
          {% else %}
            Idle
          {% endif %}
        attributes:
          stage: "{{ states('input_select.brewassistant_brewzilla_cleaning_stage') }}"
          active: "{{ is_state('input_boolean.brewassistant_brewzilla_cleaning_active', 'on') }}"
          started_at: "{{ states('input_datetime.brewassistant_brewzilla_cleaning_started_at') }}"
          safety_note: "Do not dry-fire heating elements. Verify cleaner concentration and rinse thoroughly."
          details: >-
            {% set stage = states('input_select.brewassistant_brewzilla_cleaning_stage') %}
            {% if stage == 'Rinse' %}
              Empty kettle. Rinse warm water through kettle, malt pipe, screens and valve. Remove visible grain/hop material.
            {% elif stage == 'PBW / Cleaner soak' %}
              Fill with warm water and brewery cleaner according to the cleaner label. Soak dirty parts before recirculation.
            {% elif stage == 'Recirculate' %}
              Manually start pump if desired and safe. Recirculate cleaner through pump, pipework and chiller path if used.
            {% elif stage == 'Scrub' %}
              Scrub bottom screen, malt pipe, overflow pipe, false bottom, tap/valve area and pump inlet.
            {% elif stage == 'Final rinse' %}
              Drain cleaner completely and rinse until no cleaner residue remains.
            {% elif stage == 'Dry' %}
              Drain fully, leave lid open, dry loose parts separately and store dry.
            {% elif stage == 'Complete' %}
              Cleaning workflow is complete.
            {% else %}
              Start cleaning after brewday.
            {% endif %}
