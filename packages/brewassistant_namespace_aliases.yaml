###############################################################################
# BrewAssistant v4 - Namespace Aliases
# Transitional compatibility layer for migrating from fwk_* to v4 namespaces.
#
# Purpose:
# - Expose new brew_* / brew_process_* / brew_batch_* / brew_recipe_* names.
# - Keep old fwk_* backend logic working during migration.
# - Allow dashboard YAML to move to new names before old helpers are removed.
#
# Remove this file only after the real backend helpers/templates/scripts have been
# renamed and Home Assistant has been restarted and verified.
###############################################################################

input_boolean:
  brew_process_card_enabled:
    name: Brew Process Card Enabled
    icon: mdi:power

automation:
  - alias: BrewAssistant Namespace Alias - Sync Process Card New To Legacy
    id: brewassistant_namespace_alias_sync_process_card_new_to_legacy
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.brew_process_card_enabled
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_process_card_enabled') != states('input_boolean.brew_process_card_enabled') }}
    action:
      - service: >
          {% if is_state('input_boolean.brew_process_card_enabled', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.fwk_process_card_enabled

  - alias: BrewAssistant Namespace Alias - Sync Process Card Legacy To New
    id: brewassistant_namespace_alias_sync_process_card_legacy_to_new
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.fwk_process_card_enabled
      - platform: homeassistant
        event: start
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_process_card_enabled') != states('input_boolean.brew_process_card_enabled') }}
    action:
      - service: >
          {% if is_state('input_boolean.fwk_process_card_enabled', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.brew_process_card_enabled

template:
  - sensor:
      - name: Brew Process Status
        unique_id: brew_process_status
        icon: mdi:list-status
        state: "{{ states('sensor.fwk_process_status') }}"

      - name: Brew Process Next Step
        unique_id: brew_process_next_step
        icon: mdi:timeline-text
        state: "{{ states('sensor.fwk_next_step') }}"

      - name: Brew Process Planned Summary
        unique_id: brew_process_planned_summary
        icon: mdi:clipboard-text
        state: "{{ states('sensor.fwk_planned_summary') }}"

      - name: Brew Process Current Action Stage
        unique_id: brew_process_current_action_stage
        icon: mdi:timeline-clock-outline
        state: "{{ states('sensor.fwk_current_action_stage') }}"

      - name: Brew Process Next Action Stage
        unique_id: brew_process_next_action_stage
        icon: mdi:timeline-clock
        state: "{{ states('sensor.fwk_next_action_stage') }}"

      - name: Brew Batch Age Days
        unique_id: brew_batch_age_days
        icon: mdi:calendar-clock
        unit_of_measurement: d
        state: "{{ states('sensor.fwk_batch_age_days') }}"

      - name: Brew Batch Age Hours
        unique_id: brew_batch_age_hours
        icon: mdi:clock-outline
        unit_of_measurement: h
        state: "{{ states('sensor.fwk_batch_age_hours') }}"

      - name: Brew Fermentation Live SG
        unique_id: brew_fermentation_live_sg
        icon: mdi:hydrometer
        unit_of_measurement: SG
        state: "{{ states('sensor.fwk_live_sg') }}"

      - name: Brew Fermentation Live Temp
        unique_id: brew_fermentation_live_temp
        icon: mdi:thermometer-water
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_live_temp') }}"

      - name: Brew Fermentation Attenuation
        unique_id: brew_fermentation_attenuation
        icon: mdi:percent-outline
        unit_of_measurement: "%"
        state: "{{ states('sensor.fwk_attenuation') }}"

      - name: Brew Fermentation Gravity Points Left
        unique_id: brew_fermentation_gravity_points_left
        icon: mdi:water-percent
        unit_of_measurement: SG
        state: "{{ states('sensor.fwk_gravity_points_left') }}"

      - name: Brew Fermentation SG Last Updated
        unique_id: brew_fermentation_sg_last_updated
        icon: mdi:clock
        device_class: timestamp
        state: "{{ states('sensor.fwk_sg_last_updated') }}"

      - name: Brew Recipe Active Target Temp
        unique_id: brew_recipe_active_target_temp
        icon: mdi:target
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_recipe_active_target_temp') }}"

      - name: Brew Chamber Target Midpoint
        unique_id: brew_chamber_target_midpoint
        icon: mdi:thermometer
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_chamber_target_midpoint') }}"

      - name: Brew Chamber Target Span
        unique_id: brew_chamber_target_span
        icon: mdi:arrow-expand-horizontal
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_chamber_target_span') }}"

      - name: Brew Chamber Recipe Delta
        unique_id: brew_chamber_recipe_delta
        icon: mdi:delta
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_recipe_vs_chamber_delta') }}"

      - name: Brew Chamber Live Vs Recipe Delta
        unique_id: brew_chamber_live_vs_recipe_delta
        icon: mdi:delta
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_live_vs_recipe_delta') }}"

      - name: Brew Chamber Action
        unique_id: brew_chamber_action
        icon: mdi:thermostat
        state: "{{ states('sensor.fwk_chamber_action') }}"

      - name: Brew Chamber Summary
        unique_id: brew_chamber_summary
        icon: mdi:clipboard-text
        state: "{{ states('sensor.fwk_chamber_summary') }}"

      - name: Brew Chamber Suggested Range
        unique_id: brew_chamber_suggested_range
        icon: mdi:thermometer-lines
        state: "{{ states('sensor.fwk_suggested_chamber_range') }}"

  - binary_sensor:
      - name: Brew Process Ready For Cold Crash
        unique_id: brew_process_ready_for_cold_crash
        icon: mdi:snowflake-alert
        state: "{{ is_state('binary_sensor.fwk_ready_for_cold_crash', 'on') }}"

      - name: Brew Process Ready For Transfer
        unique_id: brew_process_ready_for_transfer
        icon: mdi:transfer-right
        state: "{{ is_state('binary_sensor.fwk_ready_for_transfer', 'on') }}"

      - name: Brew Process Dry Hop Preview
        unique_id: brew_process_dry_hop_preview
        icon: mdi:leaf-clock
        state: "{{ is_state('binary_sensor.fwk_dry_hop_preview', 'on') }}"

      - name: Brew Process Dry Hop Active
        unique_id: brew_process_dry_hop_active
        icon: mdi:leaf
        state: "{{ is_state('binary_sensor.fwk_dry_hop_active', 'on') }}"

      - name: Brew Process Spunding Preview
        unique_id: brew_process_spunding_preview
        icon: mdi:gauge-low
        state: "{{ is_state('binary_sensor.fwk_spunding_preview', 'on') }}"

      - name: Brew Process Spunding Active
        unique_id: brew_process_spunding_active
        icon: mdi:gauge
        state: "{{ is_state('binary_sensor.fwk_spunding_active', 'on') }}"

      - name: Brew Process Cold Crash Preview
        unique_id: brew_process_cold_crash_preview
        icon: mdi:snowflake-clock
        state: "{{ is_state('binary_sensor.fwk_cold_crash_preview', 'on') }}"

      - name: Brew Process Cold Crash Active Card
        unique_id: brew_process_cold_crash_active_card
        icon: mdi:snowflake
        state: "{{ is_state('binary_sensor.fwk_cold_crash_active_card', 'on') }}"

      - name: Brew Process Transfer Preview
        unique_id: brew_process_transfer_preview
        icon: mdi:transfer
        state: "{{ is_state('binary_sensor.fwk_transfer_preview', 'on') }}"

      - name: Brew Process Transfer Active
        unique_id: brew_process_transfer_active
        icon: mdi:transfer-right
        state: "{{ is_state('binary_sensor.fwk_transfer_active', 'on') }}"

      - name: Brew Chamber On Recipe
        unique_id: brew_chamber_on_recipe
        icon: mdi:target
        state: "{{ is_state('binary_sensor.fwk_chamber_on_recipe', 'on') }}"

      - name: Brew Chamber Running Too Warm
        unique_id: brew_chamber_running_too_warm
        icon: mdi:thermometer-high
        state: "{{ is_state('binary_sensor.fwk_chamber_running_too_warm', 'on') }}"

      - name: Brew Chamber Running Too Cold
        unique_id: brew_chamber_running_too_cold
        icon: mdi:thermometer-low
        state: "{{ is_state('binary_sensor.fwk_chamber_running_too_cold', 'on') }}"

script:
  brew_batch_start:
    alias: BrewAssistant - Batch Start
    mode: single
    sequence:
      - service: script.fwk_start_batch

  brew_process_mark_spunding_installed:
    alias: BrewAssistant - Mark Spunding Installed
    mode: single
    sequence:
      - service: script.fwk_mark_spunding_installed

  brew_process_mark_dry_hop_added:
    alias: BrewAssistant - Mark Dry Hop Added
    mode: single
    sequence:
      - service: script.fwk_mark_dry_hop_added

  brew_cold_crash_start:
    alias: BrewAssistant - Start Cold Crash
    mode: single
    sequence:
      - service: script.fwk_start_cold_crash

  brew_process_mark_transferred_to_keg:
    alias: BrewAssistant - Mark Transferred To Keg
    mode: single
    sequence:
      - service: script.fwk_mark_transferred_to_keg

  brew_chamber_apply_brewfather_target:
    alias: BrewAssistant - Chamber Apply Brewfather Target
    mode: single
    sequence:
      - service: script.fwk_apply_brewfather_target
