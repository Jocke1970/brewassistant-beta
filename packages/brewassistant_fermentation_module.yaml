template:
- sensor:
  - name: BrewAssistant Current Gravity
    unique_id: brewassistant_current_gravity
    unit_of_measurement: SG
    state: >
      {% set e = states('input_text.brewassistant_smart_gravity_entity') %}
      {% set v = states(e) %}
      {% if v not in ['unknown', 'unavailable', 'none', ''] %}
        {{ v | float | round(3) }}
      {% else %}
        unknown
      {% endif %}
  - name: Brew Process Status
    unique_id: brew_process_status
    icon: |
      {% if is_state('input_boolean.brew_transferred_to_keg', 'on') %}
        mdi:check-circle
      {% elif is_state('input_boolean.brew_cold_crash_active', 'on') %}
        mdi:snowflake
      {% elif is_state('binary_sensor.brew_process_ready_for_transfer', 'on') %}
        mdi:transfer-right
      {% elif is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on') %}
        mdi:thermometer-chevron-down
      {% elif is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        mdi:leaf-circle
      {% elif is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        mdi:gauge
      {% elif is_state('input_boolean.brew_batch_active', 'on') %}
        mdi:beer
      {% elif states('sensor.recipe_runtime_status') not in ['unknown', 'unavailable', 'none', ''] %}
        mdi:clipboard-text-clock
      {% else %}
        mdi:beer-outline
      {% endif %}
    state: |
      {% set bf_status = states('sensor.recipe_runtime_status') %}
      {% set batch_active = is_state('input_boolean.brew_batch_active', 'on') %}

      {% if is_state('input_boolean.brew_process_card_enabled', 'off') %}
       Off
      {% elif is_state('input_boolean.brew_transferred_to_keg', 'on') %}
        Finished / transferred to keg
      {% elif not batch_active %}
        Idle
      {% elif is_state('input_boolean.brew_cold_crash_active', 'on') %}
        Cold crash
      {% elif is_state('binary_sensor.brew_process_ready_for_transfer', 'on') %}
        Ready for transfer
      {% elif is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on') %}
        Ready for cold crash
      {% elif is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        Dry hop now
      {% elif is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        Install spunding
      {% elif batch_active %}
        Primary fermentation
      {% elif bf_status not in ['unknown', 'unavailable', 'none', ''] %}
        {{ bf_status }}
      {% else %}
        Idle
      {% endif %}
  - name: Brew Next Step
    unique_id: brew_next_step
    icon: mdi:timeline-text
    state: |
      {% set bf_status = states('sensor.recipe_runtime_status') %} {% set bf_days_left = states('sensor.recipe_runtime_fermenting_days_left') | float(0) %} {% if is_state('input_boolean.brew_transferred_to_keg', 'on') %}
        Batch completed
      {% elif is_state('binary_sensor.brew_process_ready_for_transfer', 'on') %}
        Perform closed transfer to keg
      {% elif is_state('input_boolean.brew_cold_crash_active', 'on') %}
        Maintain cold crash and positive pressure
      {% elif is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on') %}
        Start cold crash
      {% elif is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        Add dry hop charge
      {% elif is_state('binary_sensor.brew_process_dry_hop_preview', 'on') %}
        Prepare dry hop
      {% elif is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        Install spunding valve
      {% elif is_state('binary_sensor.brew_process_spunding_preview', 'on') %}
        Prepare spunding setup
      {% elif is_state('input_boolean.brew_batch_active', 'on') %}
        Monitor fermentation
      {% elif bf_status == 'Fermenting' and bf_days_left > 0 %}
        Follow Brewfather fermentation plan
      {% elif bf_status not in ['unknown', 'unavailable', 'none', ''] %}
        Check Brewfather batch status
      {% else %}
        Start a new batch
      {% endif %}
  - name: Brew Next Step Clean
    unique_id: brew_next_step_clean
    icon: mdi:timeline-text
    state: |
      {% if is_state('input_boolean.brew_transferred_to_keg', 'on') %}
        Batch completed
      {% elif is_state('binary_sensor.brew_process_ready_for_transfer', 'on') %}
        Perform closed transfer to keg
      {% elif is_state('input_boolean.brew_cold_crash_active', 'on') %}
        Maintain cold crash and positive pressure
      {% elif is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on') %}
        Start cold crash
      {% elif is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        Add dry hop charge
      {% elif is_state('binary_sensor.brew_process_dry_hop_preview', 'on') %}
        Prepare dry hop
      {% elif is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        Install spunding valve
      {% elif is_state('binary_sensor.brew_process_spunding_preview', 'on') %}
        Prepare spunding setup
      {% elif is_state('input_boolean.brew_batch_active', 'on') %}
        Monitor fermentation
      {% else %}
        Start a new batch
      {% endif %}
  - name: Brew Current Action Stage
    unique_id: brew_current_action_stage
    state: |
      {% if is_state('binary_sensor.brew_process_transfer_active', 'on') %}
        transfer
      {% elif is_state('binary_sensor.brew_process_cold_crash_active_card', 'on') %}
        cold_crash
      {% elif is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        dry_hop
      {% elif is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        spunding
      {% else %}
        none
      {% endif %}
  - name: Brew Next Action Stage
    unique_id: brew_next_action_stage
    state: |
      {% if is_state('binary_sensor.brew_process_transfer_preview', 'on')
            and not is_state('binary_sensor.brew_process_transfer_active', 'on') %}
        transfer
      {% elif is_state('binary_sensor.brew_process_cold_crash_preview', 'on')
            and not is_state('binary_sensor.brew_process_cold_crash_active_card', 'on') %}
        cold_crash
      {% elif is_state('binary_sensor.brew_process_dry_hop_preview', 'on')
            and not is_state('binary_sensor.brew_process_dry_hop_active', 'on') %}
        dry_hop
      {% elif is_state('binary_sensor.brew_process_spunding_preview', 'on')
            and not is_state('binary_sensor.brew_process_spunding_active', 'on') %}
        spunding
      {% else %}
        none
      {% endif %}
  - name: Brew Planned Summary
    unique_id: brew_planned_summary
    state: |
      {% set recipe = states('sensor.recipe_runtime_name') %} {% set status = states('sensor.recipe_runtime_status') %} {% set primary = states('sensor.recipe_runtime_primary_temp') %} {% set crash = states('sensor.recipe_runtime_cold_crash_temp') %} {% set left = states('sensor.recipe_runtime_fermenting_days_left') %} {% if recipe not in ['unknown', 'unavailable', 'none', ''] %}
        {{ recipe }} | {{ status }} | {{ primary }} °C -> {{ crash }} °C | {{ left }} d left
      {% else %}
        No Brewfather recipe context
      {% endif %}
- binary_sensor:
  - name: Brew Ready For Cold Crash
    unique_id: brew_ready_for_cold_crash
    state: |
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and is_state('input_boolean.brew_transferred_to_keg', 'off')
        and is_state('binary_sensor.brew_sg_stable_2_days', 'on')
        and (states('sensor.brew_fermentation_gravity_points_left') | float(99) <= 0.002)
      }}
  - name: Brew Ready For Transfer
    unique_id: brew_ready_for_transfer
    state: |
      {{
        is_state('input_boolean.brew_cold_crash_active', 'on')
        and is_state('input_boolean.brew_transferred_to_keg', 'off')
        and (states('sensor.brew_cold_crash_days') | float(0) >=
             states('sensor.recipe_runtime_cold_crash_days_min') | float(2))
      }}
  - name: Brew Spunding Preview
    unique_id: brew_spunding_preview
    state: |
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_spunding_installed', 'off')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and (states('sensor.brew_batch_age_hours') | float(0) >=
             (states('sensor.recipe_runtime_spunding_after_hours') | float(24) - 6))
        and (states('sensor.brew_batch_age_hours') | float(0) <
             states('sensor.recipe_runtime_spunding_after_hours') | float(24))
      }}
  - name: Brew Spunding Active
    unique_id: brew_spunding_active
    state: |
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_spunding_installed', 'off')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and (states('sensor.brew_batch_age_hours') | float(0) >=
             states('sensor.recipe_runtime_spunding_after_hours') | float(24))
      }}
  - name: Brew Dry Hop Preview
    unique_id: brew_dry_hop_preview
    state: |
      {% set sg = states('sensor.brew_fermentation_live_sg') | float(0) %} {% set high = states('sensor.recipe_runtime_dry_hop_sg_high') | float(1.014) %} {% set low = states('sensor.recipe_runtime_dry_hop_sg_low') | float(1.012) %} {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_dry_hop_added', 'off')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and sg > high
        and sg <= (high + 0.002)
        and sg >= low
      }}
  - name: Brew Dry Hop Active
    unique_id: brew_dry_hop_active
    state: |
      {% set sg = states('sensor.brew_fermentation_live_sg') | float(0) %} {% set high = states('sensor.recipe_runtime_dry_hop_sg_high') | float(1.014) %} {% set low = states('sensor.recipe_runtime_dry_hop_sg_low') | float(1.012) %} {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_dry_hop_added', 'off')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and sg <= high
        and sg >= low
      }}
  - name: Brew Cold Crash Preview
    unique_id: brew_cold_crash_preview
    state: |
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_cold_crash_active', 'off')
        and is_state('input_boolean.brew_transferred_to_keg', 'off')
        and (states('sensor.brew_fermentation_gravity_points_left') | float(99) <= 0.004)
        and is_state('binary_sensor.brew_process_ready_for_cold_crash', 'off')
      }}
  - name: Brew Cold Crash Active Card
    unique_id: brew_cold_crash_active_card
    state: |
      {{
        is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on')
      }}
  - name: Brew Transfer Preview
    unique_id: brew_transfer_preview
    state: |
      {{
        is_state('input_boolean.brew_cold_crash_active', 'on')
        and is_state('input_boolean.brew_transferred_to_keg', 'off')
        and (states('sensor.brew_cold_crash_days') | float(0) > 0)
        and (states('sensor.brew_cold_crash_days') | float(0) <
             states('sensor.recipe_runtime_cold_crash_days_min') | float(2))
      }}
  - name: Brew Transfer Active
    unique_id: brew_transfer_active
    state: |
      {{
        is_state('binary_sensor.brew_process_ready_for_transfer', 'on')
      }}
- sensor:
  - name: BrewAssistant Smart Liquid Temp
    unique_id: brewassistant_smart_liquid_temp
    icon: mdi:thermometer-water
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set e = states('input_text.brewassistant_smart_liquid_temp_entity') %} {% set v = states(e) if e not in ['unknown','unavailable',''] else 'unknown' %} {% if is_number(v) %}
        {{ v | float | round(2) }}
      {% else %}
        unavailable
      {% endif %}
  - name: BrewAssistant Smart Chamber Temp
    unique_id: brewassistant_smart_chamber_temp
    icon: mdi:thermometer
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set e = states('input_text.brewassistant_smart_chamber_temp_entity') %} {% set v = states(e) if e not in ['unknown','unavailable',''] else 'unknown' %} {% if is_number(v) %}
        {{ v | float | round(2) }}
      {% else %}
        unavailable
      {% endif %}
  - name: BrewAssistant Smart Target Temp
    unique_id: brewassistant_smart_target_temp
    icon: mdi:target
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set target_entity = states('input_text.brewassistant_smart_recipe_target_entity') %} {% set recipe_target = states(target_entity) if target_entity not in ['unknown','unavailable',''] else 'unknown' %} {% set fallback = states('input_number.brewassistant_smart_target_temp_fallback') %} {% if is_number(recipe_target) %}
        {{ recipe_target | float | round(2) }}
      {% elif is_number(fallback) %}
        {{ fallback | float | round(2) }}
      {% else %}
        15.0
      {% endif %}
  - name: BrewAssistant Smart Temp Delta
    unique_id: brewassistant_smart_temp_delta
    icon: mdi:delta
    unit_of_measurement: °C
    state: |
      {% set temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% if is_number(temp) and is_number(target) %}
        {{ (temp | float - target | float) | round(2) }}
      {% else %}
        unavailable
      {% endif %}
  - name: BrewAssistant Smart Temp Rate
    unique_id: brewassistant_smart_temp_rate
    icon: mdi:chart-line
    unit_of_measurement: °C/h
    state: |
      {% set now_temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set old_temp = states('input_number.brewassistant_smart_temp_snapshot_30min') %} {% if is_number(now_temp) and is_number(old_temp) %}
        {{ ((now_temp | float - old_temp | float) * 2) | round(2) }}
      {% else %}
        0
      {% endif %}
  - name: BrewAssistant Smart Heat Pulse Minutes
    unique_id: brewassistant_smart_heat_pulse_minutes
    icon: mdi:timer
    unit_of_measurement: min
    state: |
      {% set delta = states('sensor.brewassistant_smart_temp_delta') | float(0) %} {% set below = 0 - delta %} {% set volume = states('input_number.brewassistant_smart_batch_volume_l') | float(23) %} {% set min_pulse = states('input_number.brewassistant_smart_min_heat_pulse_min') | int(3) %} {% set max_pulse = states('input_number.brewassistant_smart_max_heat_pulse_min') | int(10) %}
      {% if below <= 0 %}
        0
      {% else %}
        {# Base pulse from temp error #}
        {% if below >= 1.0 %}
          {% set base = 8 %}
        {% elif below >= 0.7 %}
          {% set base = 6 %}
        {% elif below >= 0.4 %}
          {% set base = 5 %}
        {% else %}
          {% set base = 3 %}
        {% endif %}

        {# Volume correction #}
        {% if volume >= 23 %}
          {% set vol_add = 2 %}
        {% elif volume >= 18 %}
          {% set vol_add = 1 %}
        {% elif volume <= 10 %}
          {% set vol_add = -1 %}
        {% else %}
          {% set vol_add = 0 %}
        {% endif %}

        {% set pulse = base + vol_add %}
        {% if pulse < min_pulse %}
          {{ min_pulse }}
        {% elif pulse > max_pulse %}
          {{ max_pulse }}
        {% else %}
          {{ pulse }}
        {% endif %}
      {% endif %}
  - name: BrewAssistant Smart Fermentation Status
    unique_id: brewassistant_smart_fermentation_status
    icon: mdi:beer
    state: |
      {% set enabled = is_state('input_boolean.brewassistant_smart_fermentation_enabled', 'on') %} {% set mode = states('input_select.brewassistant_smart_fermentation_mode') %} {% set temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% set delta = states('sensor.brewassistant_smart_temp_delta') %} {% set rate = states('sensor.brewassistant_smart_temp_rate') | float(0) %} {% set heat_needed = is_state('binary_sensor.brewassistant_smart_heat_needed', 'on') %} {% set heat_allowed = is_state('binary_sensor.brewassistant_smart_heat_permitted', 'on') %} {% set cooldown = states('timer.brewassistant_smart_heat_cooldown') %}
      {% if not enabled or mode == 'Off' %}
        Off
      {% elif mode == 'Monitor only' %}
        Monitor only · {{ temp }} °C / {{ target }} °C
      {% elif not is_number(temp) %}
        Missing liquid temp
      {% elif heat_needed and heat_allowed %}
        Heat ready · {{ temp }} °C / {{ target }} °C · {{ rate }} °C/h
      {% elif heat_needed and cooldown == 'active' %}
        Waiting cooldown · {{ temp }} °C / {{ target }} °C
      {% elif heat_needed %}
        Heat blocked · {{ temp }} °C / {{ target }} °C
      {% else %}
        Stable · {{ temp }} °C / {{ target }} °C · Δ {{ delta }} °C
      {% endif %}
  - name: BrewAssistant Smart Fermentation Debug
    unique_id: brewassistant_smart_fermentation_debug
    icon: mdi:bug
    state: |
      {% set temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% set chamber = states('sensor.brewassistant_smart_chamber_temp') %} {% set delta = states('sensor.brewassistant_smart_temp_delta') %} {% set rate = states('sensor.brewassistant_smart_temp_rate') %} {% set pulse = states('sensor.brewassistant_smart_heat_pulse_minutes') %} {% set volume = states('input_number.brewassistant_smart_batch_volume_l') %} T={{ temp }} Target={{ target }} Δ={{ delta }} Rate={{ rate }}/h Chamber={{ chamber }} Volume={{ volume }}L Pulse={{ pulse }}m
- binary_sensor:
  - name: BrewAssistant Smart Heat Needed
    unique_id: brewassistant_smart_heat_needed
    icon: mdi:heat-wave
    state: |
      {% set temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% set deadband = states('input_number.brewassistant_smart_deadband_low') | float(0.25) %} {% if is_number(temp) and is_number(target) %}
        {{ temp | float < target | float - deadband }}
      {% else %}
        false
      {% endif %}
  - name: BrewAssistant Smart Heat Stop Recommended
    unique_id: brewassistant_smart_heat_stop_recommended
    icon: mdi:stop-circle
    state: |
      {% set temp = states('sensor.brewassistant_smart_liquid_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% set stop_margin = states('input_number.brewassistant_smart_heat_stop_margin') | float(0.10) %} {% if is_number(temp) and is_number(target) %}
        {{ temp | float >= target | float - stop_margin }}
      {% else %}
        true
      {% endif %}
  - name: BrewAssistant Smart Rising Too Fast
    unique_id: brewassistant_smart_rising_too_fast
    icon: mdi:trending-up
    state: |
      {% set rate = states('sensor.brewassistant_smart_temp_rate') | float(0) %} {% set max_rate = states('input_number.brewassistant_smart_max_rising_rate') | float(0.25) %} {{ rate >= max_rate }}
  - name: BrewAssistant Smart Chamber Too Warm For Heat
    unique_id: brewassistant_smart_chamber_too_warm_for_heat
    icon: mdi:shield-alert
    state: |
      {% set chamber = states('sensor.brewassistant_smart_chamber_temp') %} {% set target = states('sensor.brewassistant_smart_target_temp') %} {% set offset = states('input_number.brewassistant_smart_chamber_heat_safety_offset') | float(2.0) %} {% if is_number(chamber) and is_number(target) %}
        {{ chamber | float > target | float + offset }}
      {% else %}
        false
      {% endif %}
  - name: BrewAssistant Smart Heat Permitted
    unique_id: brewassistant_smart_heat_permitted
    icon: mdi:check-decagram
    state: |
      {% set enabled = is_state('input_boolean.brewassistant_smart_fermentation_enabled', 'on') %} {% set heat_allowed = is_state('input_boolean.brewassistant_smart_heat_allowed', 'on') %} {% set mode = states('input_select.brewassistant_smart_fermentation_mode') %} {% set cooldown_idle = is_state('timer.brewassistant_smart_heat_cooldown', 'idle') %} {% set heat_needed = is_state('binary_sensor.brewassistant_smart_heat_needed', 'on') %} {% set stop = is_state('binary_sensor.brewassistant_smart_heat_stop_recommended', 'on') %} {% set rising_fast = is_state('binary_sensor.brewassistant_smart_rising_too_fast', 'on') %} {% set chamber_warm = is_state('binary_sensor.brewassistant_smart_chamber_too_warm_for_heat', 'on') %} {% set valid_pulse = states('sensor.brewassistant_smart_heat_pulse_minutes') | int(0) > 0 %} {{
        enabled
        and heat_allowed
        and mode in ['Heat only', 'Auto heat+cool']
        and cooldown_idle
        and heat_needed
        and not stop
        and not rising_fast
        and not chamber_warm
        and valid_pulse
      }}
script:
  brew_start_batch:
    alias: Brew - Start Batch
    sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.brew_batch_active
    - action: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.brew_spunding_installed
        - input_boolean.brew_dry_hop_added
        - input_boolean.brew_cold_crash_active
        - input_boolean.brew_transferred_to_keg
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.brew_batch_start
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.brew_cold_crash_start
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - action: input_number.set_value
      target:
        entity_id:
        - input_number.brew_sg_today
        - input_number.brew_sg_yesterday
        - input_number.brew_sg_two_days_ago
      data:
        value: |
          {% set sg = states('sensor.brew_live_sg') | float(1.045) %} {{ [1.200, [1.000, sg] | max] | min }}
  brew_mark_spunding_installed:
    alias: Brew - Mark Spunding Installed
    sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.brew_spunding_installed
  brew_mark_dry_hop_added:
    alias: Brew - Mark Dry Hop Added
    sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.brew_dry_hop_added
  brew_start_cold_crash:
    alias: Brew - Start Cold Crash
    sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.brew_cold_crash_active
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.brew_cold_crash_start
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  brew_mark_transferred_to_keg:
    alias: Brew - Mark Transferred To Keg
    sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.brew_transferred_to_keg
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.brew_batch_active
  brew_reset_batch:
    alias: Brew - Reset Batch
    sequence:
    - action: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.brew_batch_active
        - input_boolean.brew_spunding_installed
        - input_boolean.brew_dry_hop_added
        - input_boolean.brew_cold_crash_active
        - input_boolean.brew_transferred_to_keg
        - input_boolean.brew_notify_lock
automation:
- alias: Brew - Save Daily SG Snapshot
  id: brew_save_daily_sg_snapshot
  trigger:
  - platform: time
    at: '12:00:00'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_batch_active
    state: 'on'
  action:
  - action: input_number.set_value
    target:
      entity_id: input_number.brew_sg_two_days_ago
    data:
      value: '{{ states(''input_number.brew_sg_yesterday'') | float(1.009) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.brew_sg_yesterday
    data:
      value: '{{ states(''input_number.brew_sg_today'') | float(1.009) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.brew_sg_today
    data:
      value: |
        {% set sg = states('sensor.brew_live_sg') | float(1.009) %} {{ [1.200, [1.000, sg] | max] | min }}
- alias: Brew - Auto Start Batch From Brewfather
  id: brew_auto_start_batch_from_brewfather
  trigger:
  - platform: state
    entity_id: sensor.recipe_runtime_status
    to: Fermenting
  - platform: state
    entity_id: sensor.recipe_runtime_source
    to: brewfather_all_batches_data
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_batch_active
    state: 'off'
  - condition: state
    entity_id: sensor.recipe_runtime_source
    state: brewfather_all_batches_data
  - condition: state
    entity_id: sensor.recipe_runtime_status
    state: Fermenting
  action:
  - service: script.brew_batch_start
- alias: Brew - Auto Reset After Batch Completed
  id: brew_auto_reset_after_batch_completed
  trigger:
  - platform: state
    entity_id: input_boolean.brew_transferred_to_keg
    to: 'on'
    for: '12:00:00'
  action:
  - service: script.brew_batch_reset
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
- alias: BrewAssistant Smart Fermentation - Initialize
  id: brewassistant_smart_fermentation_initialize
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  action:
  - service: input_boolean.turn_on
    target:
      entity_id:
      - input_boolean.brewassistant_smart_heat_allowed
  - service: input_select.select_option
    target:
      entity_id: input_select.brewassistant_smart_fermentation_mode
    data:
      option: Heat only
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
- alias: BrewAssistant Smart Fermentation - Store Temp Snapshot 30 Min
  id: brewassistant_smart_fermentation_store_temp_snapshot_30min
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /30
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: template
    value_template: |
      {{ is_number(states('sensor.brewassistant_smart_liquid_temp')) }}
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.brewassistant_smart_temp_snapshot_30min
    data:
      value: '{{ states(''sensor.brewassistant_smart_liquid_temp'') | float }}'
- alias: BrewAssistant Smart Fermentation - Heat Pulse
  id: brewassistant_smart_fermentation_heat_pulse
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /10
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: state
    entity_id: binary_sensor.brewassistant_smart_heat_permitted
    state: 'on'
  - condition: template
    value_template: |
      {% set heat_entity = states('input_text.brewassistant_smart_heat_switch_entity') %} {{ heat_entity not in ['unknown', 'unavailable', '', none] }}
  action:
  - variables:
      heat_entity: '{{ states(''input_text.brewassistant_smart_heat_switch_entity'') }}'
      heat_minutes: '{{ states(''sensor.brewassistant_smart_heat_pulse_minutes'') | int(3) }}'
      cooldown_minutes: '{{ states(''input_number.brewassistant_smart_heat_cooldown_min'') | int(12) }}'
  - service: switch.turn_on
    data:
      entity_id: '{{ heat_entity }}'
  - delay:
      minutes: '{{ heat_minutes }}'
  - service: switch.turn_off
    data:
      entity_id: '{{ heat_entity }}'
  - service: timer.start
    target:
      entity_id: timer.brewassistant_smart_heat_cooldown
    data:
      duration: |
        00:{{ '%02d' | format(cooldown_minutes) }}:00
- alias: BrewAssistant Smart Fermentation - Safety Stop Heat At Target
  id: brewassistant_smart_fermentation_safety_stop_heat_at_target
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.brewassistant_smart_heat_stop_recommended
    to: 'on'
  - platform: state
    entity_id: binary_sensor.brewassistant_smart_rising_too_fast
    to: 'on'
  - platform: state
    entity_id: binary_sensor.brewassistant_smart_chamber_too_warm_for_heat
    to: 'on'
  - platform: state
    entity_id: input_boolean.brewassistant_smart_fermentation_enabled
    to: 'off'
  - platform: state
    entity_id: input_boolean.brewassistant_smart_heat_allowed
    to: 'off'
  - platform: state
    entity_id: input_select.brewassistant_smart_fermentation_mode
    to: 'Off'
  - platform: state
    entity_id: input_select.brewassistant_smart_fermentation_mode
    to: Monitor only
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: template
    value_template: |
      {% set heat_entity = states('input_text.brewassistant_smart_heat_switch_entity') %} {{ heat_entity not in ['unknown', 'unavailable', '', none] }}
  action:
  - variables:
      heat_entity: '{{ states(''input_text.brewassistant_smart_heat_switch_entity'') }}'
  - service: switch.turn_off
    data:
      entity_id: '{{ heat_entity }}'
- alias: BrewAssistant Smart Fermentation - Debug Heat Blocked
  id: brewassistant_smart_fermentation_debug_heat_blocked
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /30
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_fermentation_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brewassistant_smart_debug
    state: 'on'
  - condition: state
    entity_id: binary_sensor.brewassistant_smart_heat_needed
    state: 'on'
  - condition: state
    entity_id: binary_sensor.brewassistant_smart_heat_permitted
    state: 'off'
  action:
  - service: persistent_notification.create
    data:
      title: BrewAssistant Smart Fermentation
      message: |
        Heat is needed but currently blocked.
        Status: {{ states('sensor.brewassistant_smart_fermentation_debug') }}
        Checks: Enabled: {{ states('input_boolean.brewassistant_smart_fermentation_enabled') }} Heat allowed: {{ states('input_boolean.brewassistant_smart_heat_allowed') }} Mode: {{ states('input_select.brewassistant_smart_fermentation_mode') }} Cooldown: {{ states('timer.brewassistant_smart_heat_cooldown') }} Stop recommended: {{ states('binary_sensor.brewassistant_smart_heat_stop_recommended') }} Rising too fast: {{ states('binary_sensor.brewassistant_smart_rising_too_fast') }} Chamber too warm: {{ states('binary_sensor.brewassistant_smart_chamber_too_warm_for_heat') }}
