template:
  - binary_sensor:
      - name: Brew Fermentation Temperature Too High
        unique_id: brew_fermentation_temperature_too_high
        icon: mdi:thermometer-high
        state: "{{ is_state('binary_sensor.fwk_temperature_too_high', 'on') }}"

      - name: Brew Fermentation Temperature Too Low
        unique_id: brew_fermentation_temperature_too_low
        icon: mdi:thermometer-low
        state: "{{ is_state('binary_sensor.fwk_temperature_too_low', 'on') }}"
