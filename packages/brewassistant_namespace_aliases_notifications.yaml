###############################################################################
# BrewAssistant v4 - Notification Aliases
# Transitional aliases needed before migrating brewassistant_notifications_module
# away from remaining fwk_* helper/entity references.
#
# Keep this file while fwk_* remains backend/source of truth.
###############################################################################

input_boolean:
  brew_cold_crash_active:
    name: Brew Cold Crash Active
    icon: mdi:snowflake

  brew_dry_hop_added:
    name: Brew Dry Hop Added
    icon: mdi:leaf-check

  brew_spunding_installed:
    name: Brew Spunding Installed
    icon: mdi:gauge

automation:
  - alias: BrewAssistant Namespace Alias - Sync Cold Crash Active New To Legacy
    id: brewassistant_namespace_alias_sync_cold_crash_active_new_to_legacy
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.brew_cold_crash_active
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_cold_crash_active') != states('input_boolean.brew_cold_crash_active') }}
    action:
      - service: >
          {% if is_state('input_boolean.brew_cold_crash_active', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.fwk_cold_crash_active

  - alias: BrewAssistant Namespace Alias - Sync Cold Crash Active Legacy To New
    id: brewassistant_namespace_alias_sync_cold_crash_active_legacy_to_new
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.fwk_cold_crash_active
      - platform: homeassistant
        event: start
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_cold_crash_active') != states('input_boolean.brew_cold_crash_active') }}
    action:
      - service: >
          {% if is_state('input_boolean.fwk_cold_crash_active', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.brew_cold_crash_active

