# Temporary BrewAssistant test helper: silence Brewday Advice persistent notifications.
#
# Usage:
# - Copy/include this package in Home Assistant while running quiet BrewZilla tests.
# - Turn input_boolean.brewassistant_advice_quiet_mode on to dismiss Brewday Advice notifications.
# - Remove this package when the Python backend gate is merged.

input_boolean:
  brewassistant_advice_quiet_mode:
    name: BrewAssistant Advice Quiet Mode
    icon: mdi:bell-off-outline

script:
  brewassistant_dismiss_brewday_advice_notification:
    alias: BrewAssistant dismiss Brewday Advice notification
    mode: restart
    sequence:
      - service: persistent_notification.dismiss
        data:
          notification_id: brewassistant_brewday_advice_pending

automation:
  - id: brewassistant_quiet_brewday_advice_notifications
    alias: BrewAssistant quiet Brewday Advice notifications
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_boolean.brewassistant_advice_quiet_mode
        to: "on"
      - trigger: event
        event_type: call_service
        event_data:
          domain: persistent_notification
          service: create
    conditions:
      - condition: state
        entity_id: input_boolean.brewassistant_advice_quiet_mode
        state: "on"
    actions:
      - delay: "00:00:01"
      - action: script.brewassistant_dismiss_brewday_advice_notification
