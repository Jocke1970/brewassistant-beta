###############################################################################
# BrewAssistant v4 - Main Card Helper Aliases
# Transitional aliases needed before migrating brewassistant_main_card.yaml fully
# away from fwk_* helper/entity references.
#
# These helpers mirror the remaining legacy fwk_* helpers/sensors used by the
# main card. They can be removed after backend helpers are renamed for real.
###############################################################################

input_boolean:
  brew_batch_active:
    name: Brew Batch Active
    icon: mdi:beer

  brew_transferred_to_keg:
    name: Brew Transferred To Keg
    icon: mdi:keg

  brew_show_details:
    name: Brew Show Details
    icon: mdi:tune-variant

automation:
  - alias: BrewAssistant Namespace Alias - Sync Batch Active New To Legacy
    id: brewassistant_namespace_alias_sync_batch_active_new_to_legacy
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.brew_batch_active
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_batch_active') != states('input_boolean.brew_batch_active') }}
    action:
      - service: >
          {% if is_state('input_boolean.brew_batch_active', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.fwk_batch_active

  - alias: BrewAssistant Namespace Alias - Sync Batch Active Legacy To New
    id: brewassistant_namespace_alias_sync_batch_active_legacy_to_new
