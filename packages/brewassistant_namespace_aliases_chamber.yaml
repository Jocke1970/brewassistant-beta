template:
  - sensor:
      - name: Brew Chamber Suggested Low
        unique_id: brew_chamber_suggested_low
        icon: mdi:thermometer-low
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_suggested_chamber_low') }}"

      - name: Brew Chamber Suggested High
        unique_id: brew_chamber_suggested_high
        icon: mdi:thermometer-high
        unit_of_measurement: °C
        device_class: temperature
        state: "{{ states('sensor.fwk_suggested_chamber_high') }}"

      - name: Brew Chamber Semiauto Recommendation
        unique_id: brew_chamber_semiauto_recommendation
        icon: mdi:lightbulb-on-outline
        state: "{{ states('sensor.fwk_semiauto_recommendation') }}"

      - name: Brew Chamber Span Status
        unique_id: brew_chamber_span_status
        icon: mdi:arrow-expand-horizontal
        state: "{{ states('sensor.fwk_chamber_span_status') }}"

      - name: Brew Chamber Alignment Status
        unique_id: brew_chamber_alignment_status
        icon: mdi:target
        state: "{{ states('sensor.fwk_chamber_alignment_status') }}"

  - binary_sensor:
      - name: Brew Chamber Semiauto Apply Recommended
        unique_id: brew_chamber_semiauto_apply_recommended
        icon: mdi:crosshairs-gps
        state: "{{ is_state('binary_sensor.fwk_semiauto_apply_recommended', 'on') }}"

      - name: Brew Chamber Semiauto Cold Crash Apply Recommended
        unique_id: brew_chamber_semiauto_cold_crash_apply_recommended
        icon: mdi:snowflake-thermometer
        state: "{{ is_state('binary_sensor.fwk_semiauto_cold_crash_apply_recommended', 'on') }}"

      - name: Brew Chamber Preset Unsafe
        unique_id: brew_chamber_preset_unsafe
        icon: mdi:alert-octagon
        state: "{{ is_state('binary_sensor.fwk_chamber_preset_unsafe', 'on') }}"

      - name: Brew Chamber Target Span Too Wide
        unique_id: brew_chamber_target_span_too_wide
        icon: mdi:arrow-expand-horizontal
        state: "{{ is_state('binary_sensor.fwk_chamber_target_span_too_wide', 'on') }}"

      - name: Brew Chamber Locked
        unique_id: brew_chamber_locked
        icon: mdi:lock
        state: "{{ is_state('binary_sensor.fwk_chamber_locked', 'on') }}"
