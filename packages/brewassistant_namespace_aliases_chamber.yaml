###############################################################################
# BrewAssistant v4 - Chamber Aliases
# Transitional aliases needed before migrating brewassistant_chamber_module.yaml
# away from remaining fwk_* helper/entity references.
#
# Keep this file while fwk_* remains backend/source of truth.
###############################################################################

input_boolean:
  brew_chamber_semiauto_enabled:
    name: Brew Chamber Semiauto Enabled
    icon: mdi:tune-variant

  brew_chamber_auto_apply_brewfather_target:
    name: Brew Chamber Auto Apply Brewfather Target
    icon: mdi:crosshairs-gps

  brew_chamber_allow_cold_crash_semiauto:
    name: Brew Chamber Allow Cold Crash Semiauto
    icon: mdi:snowflake-thermometer

  brew_chamber_lock_fermentation_chamber:
    name: Brew Chamber Lock Fermentation Chamber
    icon: mdi:lock

input_number:
  brew_chamber_semiauto_target_half_span:
    name: Brew Chamber Semiauto Target Half Span
    min: 0.1
    max: 2.0
    step: 0.1
    unit_of_measurement: °C
    icon: mdi:arrow-expand-horizontal

  brew_chamber_semiauto_apply_threshold:
    name: Brew Chamber Semiauto Apply Threshold
    min: 0.1
    max: 5.0
    step: 0.1
    unit_of_measurement: °C
    icon: mdi:delta

  brew_chamber_semiauto_max_target_jump:
    name: Brew Chamber Semiauto Max Target Jump
    min: 0.5
    max: 10.0
    step: 0.5
    unit_of_measurement: °C
    icon: mdi:swap-vertical

automation:
  - alias: BrewAssistant Namespace Alias - Sync Chamber Semiauto Enabled New To Legacy
    id: brewassistant_namespace_alias_sync_chamber_semiauto_enabled_new_to_legacy
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.brew_chamber_semiauto_enabled
    condition:
      - condition: template
        value_template: >
          {{ states('input_boolean.fwk_semiauto_enabled') != states('input_boolean.brew_chamber_semiauto_enabled') }}
    action:
      - service: >
          {% if is_state('input_boolean.brew_chamber_semiauto_enabled', 'on') %}
            input_boolean.turn_on
          {% else %}
            input_boolean.turn_off
          {% endif %}
        target:
          entity_id: input_boolean.fwk_semiauto_enabled

