###############################################################################
# BrewAssistant v4 - Chamber
# Self-contained module package.
# Entity names are intentionally preserved from the uploaded v3 files.
# UI/dashboard YAML should live separately from packages.
###############################################################################

input_boolean:
  brewassistant_chamber_enabled:
    name: BrewAssistant Chamber Enabled
    icon: mdi:fridge-outline
    initial: true
  fwk_semiauto_enabled:
    name: FWK Semiauto Enabled
    icon: mdi:robot-outline
    initial: true
  fwk_auto_apply_bf_target:
    name: FWK Auto Apply Brewfather Target
    icon: mdi:robot
    initial: false
  fwk_allow_cold_crash_semiauto:
    name: FWK Allow Cold Crash Semiauto
    icon: mdi:snowflake-check
    initial: true
  fwk_lock_fermentation_chamber:
    name: FWK Lock Fermentation Chamber
    icon: mdi:lock-check
    initial: true

template:
- sensor:
  - name: BrewAssistant Chamber Status
    unique_id: brewassistant_chamber_status
    icon: mdi:thermostat
    state: |
      {% if is_state('input_boolean.brewassistant_chamber_enabled', 'off') %}
        Disabled
      {% elif states('climate.fermentation_chamber') in ['unknown', 'unavailable'] %}
        Climate unavailable
      {% else %}
        {{ state_attr('climate.fermentation_chamber', 'hvac_action') | default('idle', true) | title }}
      {% endif %}
  - name: BrewAssistant Chamber Alignment
    unique_id: brewassistant_chamber_alignment
    icon: mdi:target
    state: |
      {% set liquid = states('sensor.yellow_pill_temperature') | float(none) %}
      {% set target = states('input_number.brewassistant_fermentation_primary_temp') | float(none) %}
      {% if is_state('input_boolean.brewassistant_chamber_enabled', 'off') %}
        Disabled
      {% elif liquid is none or target is none %}
        Waiting for data
      {% else %}
        {% set delta = liquid - target %}
        {% if delta > 0.5 %}
          Too warm
        {% elif delta < -0.5 %}
          Too cold
        {% else %}
          Aligned
        {% endif %}
      {% endif %}

- sensor:
  - name: FWK Chamber Target Midpoint
    unique_id: fwk_chamber_target_midpoint
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set low = state_attr('climate.fermentation_chamber', 'target_temp_low') %}
      {% set high = state_attr('climate.fermentation_chamber', 'target_temp_high') %}
      {% if low is not none and high is not none %}
        {{ ((low | float(0) + high | float(0)) / 2) | round(1) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Chamber Target Span
    unique_id: fwk_chamber_target_span
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set low = state_attr('climate.fermentation_chamber', 'target_temp_low') %}
      {% set high = state_attr('climate.fermentation_chamber', 'target_temp_high') %}
      {% if low is not none and high is not none %}
        {{ (high | float(0) - low | float(0)) | round(1) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Recipe Active Target Temp
    unique_id: fwk_recipe_active_target_temp
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% if is_state('input_boolean.brew_cold_crash_active', 'on') %}
        {{ states('sensor.recipe_runtime_cold_crash_temp') | float(1) | round(1) }}
      {% else %}
        {{ states('sensor.recipe_runtime_primary_temp') | float(15) | round(1) }}
      {% endif %}
  - name: FWK Recipe vs Chamber Delta
    unique_id: fwk_recipe_vs_chamber_delta
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set recipe = states('sensor.brew_recipe_active_target_temp') %}
      {% set chamber = states('sensor.brew_chamber_target_midpoint') %}
      {% if recipe not in ['unknown', 'unavailable', 'none', ''] and chamber not in ['unknown', 'unavailable', 'none', ''] %}
        {{ (chamber | float(0) - recipe | float(0)) | round(1) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Live vs Recipe Delta
    unique_id: fwk_live_vs_recipe_delta
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set recipe = states('sensor.brew_recipe_active_target_temp') %}
      {% set live = states('sensor.brew_fermentation_live_temp') %}
      {% if recipe not in ['unknown', 'unavailable', 'none', ''] and live not in ['unknown', 'unavailable', 'none', ''] %}
        {{ (live | float(0) - recipe | float(0)) | round(1) }}
      {% else %}
        unknown
      {% endif %}
  - name: FWK Chamber Action
    unique_id: fwk_chamber_action
    state: |
      {% set climate_state = states('climate.fermentation_chamber') %}
      {% set hvac = state_attr('climate.fermentation_chamber', 'hvac_action') %}
      {% if climate_state == 'off' %}
        Off
      {% elif hvac in ['heating', 'heat'] %}
        Heating
      {% elif hvac in ['cooling', 'cool'] %}
        Cooling
      {% elif hvac in ['idle'] %}
        Idle
      {% else %}
        Waiting
      {% endif %}
  - name: FWK Chamber Summary
    unique_id: fwk_chamber_summary
    state: |
      {% set recipe = states('sensor.brew_recipe_active_target_temp') %}
      {% set live = states('sensor.brew_fermentation_live_temp') %}
      {% set mid = states('sensor.brew_chamber_target_midpoint') %}
      {% set span = states('sensor.brew_chamber_target_span') %}
      {% set action = states('sensor.brew_chamber_action') %}
      {% if recipe not in ['unknown', 'unavailable', 'none', ''] and mid not in ['unknown', 'unavailable', 'none', ''] %}
        Recipe {{ recipe }} °C | Chamber {{ mid }} °C (span {{ span }} °C) | Live {{ live }} °C | {{ action }}
      {% else %}
        Chamber summary unavailable
      {% endif %}
  - name: FWK Suggested Chamber Range
    unique_id: fwk_suggested_chamber_range
    state: |
      {% set target = states('sensor.brew_recipe_active_target_temp') | float(15) %}
      {{ (target - 0.5) | round(1) }} – {{ (target + 0.5) | round(1) }} °C

- binary_sensor:
  - name: FWK Chamber On Recipe
    unique_id: fwk_chamber_on_recipe
    state: |
      {% set climate_state = states('climate.fermentation_chamber') %}
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(99) %}
      {{
        climate_state != 'off'
        and (delta | abs <= 0.5)
      }}
  - name: FWK Chamber Running Too Warm
    unique_id: fwk_chamber_running_too_warm
    state: |
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(-99) %}
      {{
        states('climate.fermentation_chamber') != 'off'
        and delta > 0.5
      }}
  - name: FWK Chamber Running Too Cold
    unique_id: fwk_chamber_running_too_cold
    state: |
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(99) %}
      {{
        states('climate.fermentation_chamber') != 'off'
        and delta < -0.5
      }}
  - name: FWK Live Temp Above Recipe
    unique_id: fwk_live_temp_above_recipe
    state: |
      {% set delta = states('sensor.brew_chamber_live_vs_recipe_delta') | float(-99) %}
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and delta > 0.5
      }}
  - name: FWK Live Temp Below Recipe
    unique_id: fwk_live_temp_below_recipe
    state: |
      {% set delta = states('sensor.brew_chamber_live_vs_recipe_delta') | float(99) %}
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and delta < -0.5
      }}

- sensor:
  - name: FWK Suggested Chamber Low
    unique_id: fwk_suggested_chamber_low_v2
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set target = states('sensor.brew_recipe_active_target_temp') | float(15) %}
      {% set half = states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5) %}
      {{ (target - half) | round(1) }}
  - name: FWK Suggested Chamber High
    unique_id: fwk_suggested_chamber_high_v2
    unit_of_measurement: °C
    device_class: temperature
    state: |
      {% set target = states('sensor.brew_recipe_active_target_temp') | float(15) %}
      {% set half = states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5) %}
      {{ (target + half) | round(1) }}
  - name: FWK Suggested Chamber Range
    unique_id: fwk_suggested_chamber_range_v2
    icon: mdi:target
    state: |
      {{ states('sensor.brew_chamber_suggested_low') }} – {{ states('sensor.brew_chamber_suggested_high') }} °C
  - name: FWK Semiauto Recommendation
    unique_id: fwk_semiauto_recommendation_v2
    icon: mdi:lightbulb-on-outline
    state: |
      {% set enabled = is_state('input_boolean.brew_chamber_semiauto_enabled', 'on') %}
      {% set auto = is_state('input_boolean.brew_chamber_auto_apply_brewfather_target', 'on') %}
      {% set climate_state = states('climate.fermentation_chamber') %}
      {% set source = states('sensor.recipe_runtime_source') %}
      {% set target = states('sensor.brew_recipe_active_target_temp') | float(0) %}
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(0) %}
      {% set threshold = states('input_number.brew_chamber_semiauto_apply_threshold') | float(0.5) %}
      {% if not enabled %}
        Semiauto disabled
      {% elif climate_state == 'off' %}
        Chamber off
      {% elif source != 'brewfather_all_batches_data' %}
        Waiting for Brewfather source
      {% elif target < 0 or target > 35 %}
        Recipe target outside safe range
      {% elif delta | abs <= threshold %}
        Chamber aligned
      {% elif auto %}
        Auto apply allowed
      {% else %}
        Apply Brewfather target recommended
      {% endif %}

- binary_sensor:
  - name: FWK Semiauto Apply Recommended
    unique_id: fwk_semiauto_apply_recommended_v2
    state: |
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(0) %}
      {% set threshold = states('input_number.brew_chamber_semiauto_apply_threshold') | float(0.5) %}
      {% set target = states('sensor.brew_recipe_active_target_temp') | float(-99) %}
      {% set min_temp = state_attr('climate.fermentation_chamber', 'min_temp') | float(7) %}
      {% set max_temp = state_attr('climate.fermentation_chamber', 'max_temp') | float(35) %}
      {{
        is_state('input_boolean.brew_chamber_semiauto_enabled', 'on')
        and states('climate.fermentation_chamber') != 'off'
        and states('sensor.recipe_runtime_source') == 'brewfather_all_batches_data'
        and target >= min_temp
        and target <= max_temp
        and (delta | abs > threshold)
      }}
  - name: FWK Semiauto Cold Crash Apply Recommended
    unique_id: fwk_semiauto_cold_crash_apply_recommended_v2
    state: |
      {{
        is_state('input_boolean.brew_chamber_allow_cold_crash_semiauto', 'on')
        and is_state('binary_sensor.brew_process_ready_for_cold_crash', 'on')
        and is_state('binary_sensor.brew_chamber_semiauto_apply_recommended', 'on')
      }}

- sensor:
  - name: FWK Chamber Span Status
    unique_id: fwk_chamber_span_status
    icon: |
      {% set span = states('sensor.brew_chamber_target_span') | float(99) %}
      {% set wanted_span = (states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5)) * 2 %}
      {% if span <= wanted_span + 0.2 %}
        mdi:check-circle
      {% else %}
        mdi:arrow-expand-horizontal
      {% endif %}
    state: |
      {% set span = states('sensor.brew_chamber_target_span') | float(99) %}
      {% set wanted_span = (states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5)) * 2 %}
      {% if span <= wanted_span + 0.2 %}
        Span OK
      {% else %}
        Target span too wide
      {% endif %}
  - name: FWK Chamber Alignment Status
    unique_id: fwk_chamber_alignment_status
    icon: |
      {% set climate_state = states('climate.fermentation_chamber') %}
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(99) %}
      {% set span = states('sensor.brew_chamber_target_span') | float(99) %}
      {% set wanted_span = (states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5)) * 2 %}
      {% if climate_state == 'off' %}
        mdi:power
      {% elif delta | abs <= 0.5 and span <= (wanted_span + 0.2) %}
        mdi:check-circle
      {% elif delta | abs <= 0.5 and span > (wanted_span + 0.2) %}
        mdi:arrow-expand-horizontal
      {% elif delta > 0.5 %}
        mdi:thermometer-high
      {% elif delta < -0.5 %}
        mdi:thermometer-low
      {% else %}
        mdi:help-circle
      {% endif %}
    state: |
      {% set climate_state = states('climate.fermentation_chamber') %}
      {% set delta = states('sensor.brew_chamber_recipe_delta') | float(99) %}
      {% set span = states('sensor.brew_chamber_target_span') | float(99) %}
      {% set wanted_span = (states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5)) * 2 %}
      {% if climate_state == 'off' %}
        Chamber off
      {% elif delta | abs <= 0.5 and span <= (wanted_span + 0.2) %}
        On recipe
      {% elif delta | abs <= 0.5 and span > (wanted_span + 0.2) %}
        Target span too wide
      {% elif delta > 0.5 %}
        Chamber target warmer than recipe
      {% elif delta < -0.5 %}
        Chamber target colder than recipe
      {% else %}
        Unknown
      {% endif %}

- binary_sensor:
  - name: FWK Chamber Preset Unsafe
    unique_id: fwk_chamber_preset_unsafe
    state: |
      {% set preset = state_attr('climate.fermentation_chamber', 'preset_mode') %}
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_chamber_lock_fermentation_chamber', 'on')
        and preset not in ['none', None, 'unknown', 'unavailable']
      }}
  - name: FWK Chamber Target Span Too Wide
    unique_id: fwk_chamber_target_span_too_wide
    state: |
      {% set span = states('sensor.brew_chamber_target_span') | float(99) %}
      {% set wanted_span = (states('input_number.brew_chamber_semiauto_target_half_span') | float(0.5)) * 2 %}
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and span > wanted_span + 0.2
      }}
  - name: FWK Chamber Locked
    unique_id: fwk_chamber_locked
    icon: mdi:lock-check
    state: |
      {{
        is_state('input_boolean.brew_batch_active', 'on')
        and is_state('input_boolean.brew_chamber_lock_fermentation_chamber', 'on')
      }}

input_number:
  fwk_semiauto_target_half_span:
    name: FWK Semiauto Target Half Span
    min: 0.2
    max: 2.0
    step: 0.1
    mode: box
    unit_of_measurement: °C
    icon: mdi:arrow-expand-vertical
    initial: 0.5
  fwk_semiauto_apply_threshold:
    name: FWK Semiauto Apply Threshold
    min: 0.2
    max: 5.0
    step: 0.1
    mode: box
    unit_of_measurement: °C
    icon: mdi:delta
    initial: 0.5
  fwk_semiauto_max_target_jump:
    name: FWK Semiauto Max Target Jump
    min: 1
    max: 20
    step: 0.5
    mode: box
    unit_of_measurement: °C
    icon: mdi:shield-alert
    initial: 10

script:
  fwk_apply_brewfather_target:
    alias: FWK - Apply Brewfather Target to Chamber
    mode: single
    sequence:
    - variables:
        target: '{{ states(''sensor.brew_recipe_active_target_temp'') | float(15) }}'
        half_span: '{{ states(''input_number.brew_chamber_semiauto_target_half_span'') | float(0.5) }}'
        suggested_low: '{{ (target - half_span) | round(1) }}'
        suggested_high: '{{ (target + half_span) | round(1) }}'
        min_temp: '{{ state_attr(''climate.fermentation_chamber'', ''min_temp'') | float(7) }}'
        max_temp: '{{ state_attr(''climate.fermentation_chamber'', ''max_temp'') | float(35) }}'
        chamber_mid: '{{ states(''sensor.brew_chamber_target_midpoint'') | float(target) }}'
        jump: '{{ (target - chamber_mid) | abs }}'
        max_jump: '{{ states(''input_number.brew_chamber_semiauto_max_target_jump'') | float(10) }}'
    - condition: template
      value_template: |
        {{
          is_state('input_boolean.brew_chamber_semiauto_enabled', 'on')
          and states('sensor.recipe_runtime_source') == 'brewfather_all_batches_data'
          and target >= min_temp
          and target <= max_temp
          and suggested_low < suggested_high
          and jump <= max_jump
        }}
    - service: climate.set_preset_mode
      continue_on_error: true
      target:
        entity_id: climate.fermentation_chamber
      data:
        preset_mode: none
    - service: climate.turn_on
      continue_on_error: true
      target:
        entity_id: climate.fermentation_chamber
    - service: climate.set_temperature
      target:
        entity_id: climate.fermentation_chamber
      data:
        hvac_mode: heat_cool
        target_temp_low: '{{ suggested_low | float }}'
        target_temp_high: '{{ suggested_high | float }}'
    - delay: 00:00:02
    - service: climate.set_preset_mode
      continue_on_error: true
      target:
        entity_id: climate.fermentation_chamber
      data:
        preset_mode: none
    - service: climate.set_temperature
      target:
        entity_id: climate.fermentation_chamber
      data:
        hvac_mode: heat_cool
        target_temp_low: '{{ suggested_low | float }}'
        target_temp_high: '{{ suggested_high | float }}'
    - service: persistent_notification.create
      data:
        title: BrewAssistant
        message: |
          Applied Brewfather target to fermentation chamber. Preset locked to none. New range: {{ suggested_low }}–{{ suggested_high }} °C.

  fwk_suggest_brewfather_target:
    alias: FWK - Suggest Brewfather Target
    mode: single
    sequence:
    - service: persistent_notification.create
      data:
        title: BrewAssistant Suggestion
        message: |
          Brewfather target does not match the chamber target. Suggested chamber range: {{ states('sensor.brew_chamber_suggested_range') }}. Use the Apply BF Target button in the chamber card to apply it.

automation:
- alias: FWK Smart - Suggest Brewfather Target
  id: fwk_smart_suggest_brewfather_target
  trigger:
  - platform: state
    entity_id: binary_sensor.brew_chamber_semiauto_apply_recommended
    to: 'on'
    for: 00:05:00
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_auto_apply_brewfather_target
    state: 'off'
  action:
  - service: script.fwk_suggest_brewfather_target

- alias: FWK Smart - Auto Apply Brewfather Target
  id: fwk_smart_auto_apply_brewfather_target
  trigger:
  - platform: state
    entity_id: binary_sensor.brew_chamber_semiauto_apply_recommended
    to: 'on'
    for: 00:05:00
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_auto_apply_brewfather_target
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_semiauto_enabled
    state: 'on'
  action:
  - service: script.brew_chamber_apply_brewfather_target

- alias: FWK Smart - Suggest Cold Crash Target
  id: fwk_smart_suggest_cold_crash_target
  trigger:
  - platform: state
    entity_id: binary_sensor.brew_process_ready_for_cold_crash
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_allow_cold_crash_semiauto
    state: 'on'
  action:
  - service: persistent_notification.create
    data:
      title: BrewAssistant Cold Crash
      message: |
        Batch appears ready for cold crash. Brewfather/runtime cold crash target: {{ states('sensor.recipe_runtime_cold_crash_temp') }} °C. Use Apply BF Target when you are ready to adjust the chamber.

- alias: FWK Smart - Disable Auto Apply When Chamber Off
  id: fwk_smart_disable_auto_apply_when_chamber_off
  trigger:
  - platform: state
    entity_id: climate.fermentation_chamber
    to: 'off'
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.brew_chamber_auto_apply_brewfather_target
  - service: persistent_notification.create
    data:
      title: BrewAssistant Safety
      message: |
        Fermentation chamber was turned off. Auto-apply Brewfather target has been disabled.
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'

- alias: FWK Guard - Prevent Fermentation Preset Override
  id: fwk_guard_prevent_fermentation_preset_override
  mode: restart
  trigger:
  - platform: state
    entity_id: climate.fermentation_chamber
    attribute: preset_mode
  - platform: state
    entity_id: input_boolean.brew_batch_active
    to: 'on'
  - platform: state
    entity_id: input_boolean.brew_chamber_lock_fermentation_chamber
    to: 'on'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_batch_active
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_lock_fermentation_chamber
    state: 'on'
  action:
  - service: climate.set_preset_mode
    continue_on_error: true
    target:
      entity_id: climate.fermentation_chamber
    data:
      preset_mode: none

- alias: FWK Guard - Reapply Target If Span Too Wide
  id: fwk_guard_reapply_target_if_span_too_wide
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.brew_chamber_target_span_too_wide
    to: 'on'
    for: 00:02:00
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_batch_active
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_lock_fermentation_chamber
    state: 'on'
  - condition: state
    entity_id: input_boolean.brew_chamber_semiauto_enabled
    state: 'on'
  action:
  - service: script.brew_chamber_apply_brewfather_target
  - service: persistent_notification.create
    data:
      title: BrewAssistant Guard
      message: |
        Fermentation chamber target span became too wide during active batch. BrewAssistant re-applied the Brewfather target range: {{ states('sensor.brew_chamber_suggested_range') }}.

- alias: FWK Guard - Warn On Unsafe Preset
  id: fwk_guard_warn_on_unsafe_preset
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.brew_chamber_preset_unsafe
    to: 'on'
    for: 00:00:20
  action:
  - service: persistent_notification.create
    data:
      title: BrewAssistant Guard
      message: |
        Fermentation chamber preset was changed while a batch is active. BrewAssistant restored preset mode to none to protect recipe control.
  - service: climate.set_preset_mode
    continue_on_error: true
    target:
      entity_id: climate.fermentation_chamber
    data:
      preset_mode: none
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'

- alias: FWK Guard - Suggest Chamber Target When Fermenting Starts
  id: fwk_guard_suggest_chamber_target_when_fermenting_starts
  trigger:
  - platform: state
    entity_id: sensor.recipe_runtime_status
    to: Fermenting
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_chamber_enabled
    state: 'on'
  - condition: state
    entity_id: sensor.recipe_runtime_source
    state: brewfather_all_batches_data
  - condition: state
    entity_id: input_boolean.brew_chamber_semiauto_enabled
    state: 'on'
  action:
  - service: script.fwk_suggest_brewfather_target
