###############################################################################
# BrewAssistant v4 - Hot Side
# Self-contained module package.
# Entity names are intentionally preserved from the uploaded v3 files.
# UI/dashboard YAML should live separately from packages.
###############################################################################

input_boolean:
  brewassistant_brew_day_active:
    name: BrewAssistant Brew Day Active
    icon: mdi:kettle
  brewassistant_hot_side_enabled:
    name: BrewAssistant Hot Side Enabled
    icon: mdi:kettle-steam
    initial: true
  brewassistant_hot_side_active:
    name: BrewAssistant Hot Side Active
    icon: mdi:kettle-steam
  brewassistant_hot_side_paused:
    name: BrewAssistant Hot Side Paused
    icon: mdi:pause-circle
  brewassistant_hot_side_auto_start_timers:
    name: BrewAssistant Hot Side Auto Start Timers
    icon: mdi:timer-play
    initial: true
  brewassistant_hot_side_notifications:
    name: BrewAssistant Hot Side Notifications
    icon: mdi:bell-ring
    initial: true
  brewassistant_hot_side_show_settings:
    name: BrewAssistant Hot Side Show Settings
    icon: mdi:tune-variant
input_select:
  brewassistant_mode:
    name: BrewAssistant Mode
    icon: mdi:tune-variant
    options:
    - Idle
    - Brew Day
    - Fermentation
    - Cold Crash
    - Packaging
    - Cleaning
    - Maintenance
  brewassistant_hot_side_phase:
    name: BrewAssistant Hot Side Phase
    icon: mdi:timeline-clock
    options:
    - Idle
    - Preparation
    - Heat Strike Water
    - Mash In
    - Mash Rest
    - Mash Out
    - Sparge / Drain
    - Heat To Boil
    - Boil
    - Whirlpool
    - Chill
    - Transfer To Fermenter
    - Done
input_button:
  brewassistant_reset_runtime:
    name: BrewAssistant Reset Runtime
    icon: mdi:restart
  brewassistant_hot_side_start:
    name: Start Hot Side Workflow
    icon: mdi:play-circle
  brewassistant_hot_side_next:
    name: Next Hot Side Step
    icon: mdi:skip-next-circle
  brewassistant_hot_side_previous:
    name: Previous Hot Side Step
    icon: mdi:skip-previous-circle
  brewassistant_hot_side_pause_resume:
    name: Pause / Resume Hot Side Workflow
    icon: mdi:pause-circle
  brewassistant_hot_side_reset:
    name: Reset Hot Side Workflow
    icon: mdi:restart
  brewassistant_hot_side_start_timer:
    name: Start Hot Side Timer
    icon: mdi:timer-play
  brewassistant_hot_side_cancel_timer:
    name: Cancel Hot Side Timer
    icon: mdi:timer-cancel
input_number:
  brewassistant_hot_side_mash_minutes:
    name: Hot Side Mash Minutes
    icon: mdi:timer-sand
    min: 10
    max: 180
    step: 5
    unit_of_measurement: min
    mode: box
    initial: 60
  brewassistant_hot_side_mashout_minutes:
    name: Hot Side Mash Out Minutes
    icon: mdi:timer-sand
    min: 0
    max: 60
    step: 5
    unit_of_measurement: min
    mode: box
    initial: 10
  brewassistant_hot_side_boil_minutes:
    name: Hot Side Boil Minutes
    icon: mdi:timer
    min: 15
    max: 180
    step: 5
    unit_of_measurement: min
    mode: box
    initial: 60
  brewassistant_hot_side_whirlpool_minutes:
    name: Hot Side Whirlpool Minutes
    icon: mdi:weather-tornado
    min: 0
    max: 60
    step: 5
    unit_of_measurement: min
    mode: box
    initial: 15
  brewassistant_hot_side_chill_target_temp:
    name: Hot Side Chill Target Temp
    icon: mdi:thermometer-low
    min: 0
    max: 30
    step: 0.5
    unit_of_measurement: °C
    mode: box
    initial: 18
  brewassistant_hot_side_strike_water_temp:
    name: Hot Side Strike Water Temp
    icon: mdi:thermometer-chevron-up
    min: 40
    max: 85
    step: 0.5
    unit_of_measurement: °C
    mode: box
    initial: 72
  brewassistant_hot_side_mash_target_temp:
    name: Hot Side Mash Target Temp
    icon: mdi:thermometer-water
    min: 50
    max: 75
    step: 0.5
    unit_of_measurement: °C
    mode: box
    initial: 67
input_datetime:
  brewassistant_hot_side_started:
    name: Hot Side Started
    has_date: true
    has_time: true
  brewassistant_hot_side_phase_started:
    name: Hot Side Phase Started
    has_date: true
    has_time: true
  brewassistant_hot_side_completed:
    name: Hot Side Completed
    has_date: true
    has_time: true
input_text:
  brewassistant_hot_side_note:
    name: Hot Side Note
    icon: mdi:note-text
    max: 255
  brewassistant_hot_side_manual_recipe_name:
    name: Hot Side Manual Recipe Name
    icon: mdi:beer
    max: 120
  brewassistant_hot_side_manual_batch_name:
    name: Hot Side Manual Batch Name
    icon: mdi:clipboard-text
    max: 120
timer:
  brewassistant_hot_side_timer:
    name: BrewAssistant Hot Side Timer
    icon: mdi:timer-outline
    restore: true
template:
- sensor:
  - name: BrewAssistant Hot Side Recipe Name
    unique_id: brewassistant_hot_side_recipe_name
    icon: mdi:beer
    state: |
      {% set manual = states('input_text.brewassistant_hot_side_manual_recipe_name') %} {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'recipe_name'),
        state_attr('sensor.brewfather_current_batch', 'recipe'),
        state_attr('sensor.brewfather_current_batch', 'name'),
        state_attr('sensor.brewfather_active_batch', 'recipe_name'),
        state_attr('sensor.brewfather_active_batch', 'recipe'),
        state_attr('sensor.brewfather_active_batch', 'name'),
        states('sensor.brewfather_recipe_name'),
        states('sensor.brewfather_current_recipe')
      ] %} {% if manual not in ['unknown', 'unavailable', '', none] %}
        {{ manual }}
      {% else %}
        {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %}
        {{ value if value is defined else 'Unknown recipe' }}
      {% endif %}
  - name: BrewAssistant Hot Side Batch Name
    unique_id: brewassistant_hot_side_batch_name
    icon: mdi:clipboard-text
    state: |
      {% set manual = states('input_text.brewassistant_hot_side_manual_batch_name') %} {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'batch_name'),
        state_attr('sensor.brewfather_current_batch', 'name'),
        state_attr('sensor.brewfather_active_batch', 'batch_name'),
        state_attr('sensor.brewfather_active_batch', 'name'),
        states('sensor.brewfather_batch_name'),
        states('sensor.brewfather_current_batch')
      ] %} {% if manual not in ['unknown', 'unavailable', '', none] %}
        {{ manual }}
      {% else %}
        {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %}
        {{ value if value is defined else 'Unknown batch' }}
      {% endif %}
  - name: BrewAssistant Hot Side Brewfather Mash Temp
    unique_id: brewassistant_hot_side_brewfather_mash_temp
    icon: mdi:thermometer-water
    unit_of_measurement: °C
    state: |
      {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'mash_temp'),
        state_attr('sensor.brewfather_current_batch', 'mash_temperature'),
        state_attr('sensor.brewfather_active_batch', 'mash_temp'),
        state_attr('sensor.brewfather_active_batch', 'mash_temperature'),
        states('sensor.brewfather_mash_temp'),
        states('sensor.brewfather_mash_temperature')
      ] %} {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %} {{ value | float(default=states('input_number.brewassistant_hot_side_mash_target_temp') | float) | round(1) }}
  - name: BrewAssistant Hot Side Brewfather Boil Time
    unique_id: brewassistant_hot_side_brewfather_boil_time
    icon: mdi:timer
    unit_of_measurement: min
    state: |
      {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'boil_time'),
        state_attr('sensor.brewfather_current_batch', 'boilTime'),
        state_attr('sensor.brewfather_active_batch', 'boil_time'),
        state_attr('sensor.brewfather_active_batch', 'boilTime'),
        states('sensor.brewfather_boil_time')
      ] %} {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %} {{ value | int(default=states('input_number.brewassistant_hot_side_boil_minutes') | int) }}
  - name: BrewAssistant Hot Side Brewfather Batch Volume
    unique_id: brewassistant_hot_side_brewfather_batch_volume
    icon: mdi:cup-water
    unit_of_measurement: L
    state: |
      {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'batch_volume'),
        state_attr('sensor.brewfather_current_batch', 'batchVolume'),
        state_attr('sensor.brewfather_current_batch', 'volume'),
        state_attr('sensor.brewfather_active_batch', 'batch_volume'),
        state_attr('sensor.brewfather_active_batch', 'batchVolume'),
        state_attr('sensor.brewfather_active_batch', 'volume'),
        states('sensor.brewfather_batch_volume')
      ] %} {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %} {{ value | float(default=0) | round(1) }}
  - name: BrewAssistant Hot Side Brewfather OG
    unique_id: brewassistant_hot_side_brewfather_og
    icon: mdi:water-percent
    state: |
      {% set candidates = [
        state_attr('sensor.brewfather_current_batch', 'og'),
        state_attr('sensor.brewfather_current_batch', 'estimated_og'),
        state_attr('sensor.brewfather_current_batch', 'estimatedOg'),
        state_attr('sensor.brewfather_active_batch', 'og'),
        state_attr('sensor.brewfather_active_batch', 'estimated_og'),
        state_attr('sensor.brewfather_active_batch', 'estimatedOg'),
        states('sensor.brewfather_og'),
        states('sensor.brewfather_estimated_og')
      ] %} {% set value = candidates | reject('in', ['unknown', 'unavailable', '', none]) | list | first %} {{ value if value is defined else 'unknown' }}
  - name: BrewAssistant Hot Side Status
    unique_id: brewassistant_hot_side_status
    icon: mdi:kettle-steam
    state: |
      {% set active = is_state('input_boolean.brewassistant_hot_side_active', 'on') %} {% set paused = is_state('input_boolean.brewassistant_hot_side_paused', 'on') %} {% set phase = states('input_select.brewassistant_hot_side_phase') %} {% if not active and phase == 'Idle' %}
        Idle
      {% elif paused %}
        Paused
      {% elif phase == 'Done' %}
        Done
      {% elif active %}
        Active
      {% else %}
        Idle
      {% endif %}
    attributes:
      phase: '{{ states(''input_select.brewassistant_hot_side_phase'') }}'
      recipe: '{{ states(''sensor.brewassistant_hot_side_recipe_name'') }}'
      batch: '{{ states(''sensor.brewassistant_hot_side_batch_name'') }}'
      timer: '{{ states(''timer.brewassistant_hot_side_timer'') }}'
      note: '{{ states(''input_text.brewassistant_hot_side_note'') }}'
  - name: BrewAssistant Hot Side Phase Index
    unique_id: brewassistant_hot_side_phase_index
    icon: mdi:counter
    state: |
      {% set phases = [
        'Idle',
        'Preparation',
        'Heat Strike Water',
        'Mash In',
        'Mash Rest',
        'Mash Out',
        'Sparge / Drain',
        'Heat To Boil',
        'Boil',
        'Whirlpool',
        'Chill',
        'Transfer To Fermenter',
        'Done'
      ] %} {% set phase = states('input_select.brewassistant_hot_side_phase') %} {{ phases.index(phase) if phase in phases else 0 }}
  - name: BrewAssistant Hot Side Progress
    unique_id: brewassistant_hot_side_progress
    icon: mdi:progress-clock
    unit_of_measurement: '%'
    state: |
      {% set idx = states('sensor.brewassistant_hot_side_phase_index') | int(0) %} {% set total = 12 %} {{ ((idx / total) * 100) | round(0) }}
  - name: BrewAssistant Hot Side Current Timer Minutes
    unique_id: brewassistant_hot_side_current_timer_minutes
    icon: mdi:timer-cog
    unit_of_measurement: min
    state: |
      {% set phase = states('input_select.brewassistant_hot_side_phase') %} {% if phase == 'Mash Rest' %}
        {{ states('input_number.brewassistant_hot_side_mash_minutes') | int(60) }}
      {% elif phase == 'Mash Out' %}
        {{ states('input_number.brewassistant_hot_side_mashout_minutes') | int(10) }}
      {% elif phase == 'Boil' %}
        {{ states('input_number.brewassistant_hot_side_boil_minutes') | int(60) }}
      {% elif phase == 'Whirlpool' %}
        {{ states('input_number.brewassistant_hot_side_whirlpool_minutes') | int(15) }}
      {% else %}
        0
      {% endif %}
  - name: BrewAssistant Hot Side Timer Display
    unique_id: brewassistant_hot_side_timer_display
    icon: mdi:timer-outline
    state: |
      {% set remaining = state_attr('timer.brewassistant_hot_side_timer', 'remaining') %} {% if is_state('timer.brewassistant_hot_side_timer', 'active') and remaining %}
        {{ remaining }}
      {% elif is_state('timer.brewassistant_hot_side_timer', 'paused') and remaining %}
        Paused: {{ remaining }}
      {% else %}
        No active timer
      {% endif %}
  - name: BrewAssistant Hot Side Next Phase
    unique_id: brewassistant_hot_side_next_phase
    icon: mdi:skip-next
    state: |
      {% set phases = [
        'Idle',
        'Preparation',
        'Heat Strike Water',
        'Mash In',
        'Mash Rest',
        'Mash Out',
        'Sparge / Drain',
        'Heat To Boil',
        'Boil',
        'Whirlpool',
        'Chill',
        'Transfer To Fermenter',
        'Done'
      ] %} {% set phase = states('input_select.brewassistant_hot_side_phase') %} {% if phase in phases %}
        {% set idx = phases.index(phase) %}
        {{ phases[idx + 1] if idx + 1 < phases | length else 'Done' }}
      {% else %}
        Preparation
      {% endif %}
  - name: BrewAssistant Hot Side Instruction
    unique_id: brewassistant_hot_side_instruction
    icon: mdi:information-outline
    state: |
      {% set phase = states('input_select.brewassistant_hot_side_phase') %} {% set mash_temp = states('input_number.brewassistant_hot_side_mash_target_temp') %} {% set strike_temp = states('input_number.brewassistant_hot_side_strike_water_temp') %} {% set chill_temp = states('input_number.brewassistant_hot_side_chill_target_temp') %} {% if phase == 'Idle' %}
        Redo att starta bryggdagen.
      {% elif phase == 'Preparation' %}
        Förbered utrustning, vatten, malt, humle, jäst och rengörda slangar/kärl.
      {% elif phase == 'Heat Strike Water' %}
        Värm mäskvattnet till cirka {{ strike_temp }} °C.
      {% elif phase == 'Mash In' %}
        Mäska in långsamt, rör om ordentligt och sikta på cirka {{ mash_temp }} °C.
      {% elif phase == 'Mash Rest' %}
        Håll mäsktemperaturen stabil. Rör försiktigt vid behov.
      {% elif phase == 'Mash Out' %}
        Höj temperaturen för mash-out om receptet kräver det.
      {% elif phase == 'Sparge / Drain' %}
        Lyft/rinna av maltpåse eller laka enligt din metod. Undvik onödigt spill och syreplask.
      {% elif phase == 'Heat To Boil' %}
        Värm upp vörten till kok. Håll koll på skum och risk för överkok.
      {% elif phase == 'Boil' %}
        Koka enligt recept. Lägg humlegivor manuellt enligt Brewfather.
      {% elif phase == 'Whirlpool' %}
        Stäng av värmen, tillsätt eventuell flameout/whirlpool-humle och skapa virvel.
      {% elif phase == 'Chill' %}
        Kyl vörten till cirka {{ chill_temp }} °C eller till jästens pitch-temperatur.
      {% elif phase == 'Transfer To Fermenter' %}
        Överför till jäskärl, syresätt vid behov och förbered pitch.
      {% elif phase == 'Done' %}
        Hot side är klar. Fermenteringsflödet kan ta över.
      {% else %}
        Okänt steg.
      {% endif %}
- sensor:
  - name: BrewAssistant Hot Side Next Action
    unique_id: brewassistant_hot_side_next_action
    icon: mdi:arrow-decision
    state: |
      {% set phase = states('input_select.brewassistant_hot_side_phase') %} {% set next = states('sensor.brewassistant_hot_side_next_phase') %} {% if phase == 'Idle' %}
        Starta Hot Side Workflow när bryggdagen börjar.
      {% elif phase == 'Preparation' %}
        Kontrollera utrustning, vatten, malt, humle och rengjorda kärl. Gå sedan till mäskvatten.
      {% elif phase == 'Heat Strike Water' %}
        När vattnet nått strike-temp, gå vidare till inmäskning.
      {% elif phase == 'Mash In' %}
        När malten är ordentligt inrörd och temperaturen stabil, starta mäskrast.
      {% elif phase == 'Mash Rest' %}
        När mäsk-timern är klar, gå vidare till mash-out eller lakning.
      {% elif phase == 'Mash Out' %}
        När mash-out är klar, gå vidare till lakning / avrinning.
      {% elif phase == 'Sparge / Drain' %}
        När vörten är samlad i kokkärlet, börja värma mot kok.
      {% elif phase == 'Heat To Boil' %}
        När vörten kokar stabilt, starta koksteget.
      {% elif phase == 'Boil' %}
        Följ humlegivorna i Brewfather. När koktimern är klar, gå vidare till whirlpool/flameout.
      {% elif phase == 'Whirlpool' %}
        När whirlpool är klar, börja kylning.
      {% elif phase == 'Chill' %}
        När vörten nått pitch-temperatur, överför till jäskärl.
      {% elif phase == 'Transfer To Fermenter' %}
        Mät OG, pitcha jäst och låt fermenteringsflödet ta över.
      {% elif phase == 'Done' %}
        Hot Side är klar. Nästa steg är fermentering.
      {% else %}
        Nästa steg: {{ next }}
      {% endif %}
script:
  brewassistant_hot_side_set_phase:
    alias: BrewAssistant Hot Side - Set Phase
    mode: restart
    fields:
      phase:
        name: Phase
        required: true
        selector:
          select:
            options:
            - Idle
            - Preparation
            - Heat Strike Water
            - Mash In
            - Mash Rest
            - Mash Out
            - Sparge / Drain
            - Heat To Boil
            - Boil
            - Whirlpool
            - Chill
            - Transfer To Fermenter
            - Done
    sequence:
    - service: input_select.select_option
      target:
        entity_id: input_select.brewassistant_hot_side_phase
      data:
        option: '{{ phase }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.brewassistant_hot_side_phase_started
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.brewassistant_hot_side_note
      data:
        value: |
          {{ phase }} started at {{ now().strftime('%H:%M') }}
    - if:
      - condition: template
        value_template: '{{ phase == ''Done'' }}'
      then:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.brewassistant_hot_side_completed
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - service: script.brewassistant_hot_side_maybe_start_timer
    - if:
      - condition: state
        entity_id: input_boolean.brewassistant_hot_side_notifications
        state: 'on'
      then:
      - service: persistent_notification.create
        data:
          title: BrewAssistant Hot Side
          message: |
            Steg: {{ phase }}
            {{ states('sensor.brewassistant_hot_side_instruction') }}
  brewassistant_hot_side_start:
    alias: BrewAssistant Hot Side - Start Workflow
    mode: restart
    sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.brewassistant_hot_side_active
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.brewassistant_hot_side_paused
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.brewassistant_hot_side_started
      data:
        datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    - service: timer.cancel
      target:
        entity_id: timer.brewassistant_hot_side_timer
    - service: script.brewassistant_hot_side_set_phase
      data:
        phase: Preparation
  brewassistant_hot_side_reset:
    alias: BrewAssistant Hot Side - Reset Workflow
    mode: restart
    sequence:
    - service: timer.cancel
      target:
        entity_id: timer.brewassistant_hot_side_timer
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.brewassistant_hot_side_active
        - input_boolean.brewassistant_hot_side_paused
    - service: input_select.select_option
      target:
        entity_id: input_select.brewassistant_hot_side_phase
      data:
        option: Idle
    - service: input_text.set_value
      target:
        entity_id: input_text.brewassistant_hot_side_note
      data:
        value: Workflow reset
  brewassistant_hot_side_pause_resume:
    alias: BrewAssistant Hot Side - Pause Resume
    mode: restart
    sequence:
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.brewassistant_hot_side_paused
          state: 'off'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.brewassistant_hot_side_paused
        - service: timer.pause
          target:
            entity_id: timer.brewassistant_hot_side_timer
        - service: input_text.set_value
          target:
            entity_id: input_text.brewassistant_hot_side_note
          data:
            value: Workflow paused
      - conditions:
        - condition: state
          entity_id: input_boolean.brewassistant_hot_side_paused
          state: 'on'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.brewassistant_hot_side_paused
        - service: timer.start
          target:
            entity_id: timer.brewassistant_hot_side_timer
        - service: input_text.set_value
          target:
            entity_id: input_text.brewassistant_hot_side_note
          data:
            value: Workflow resumed
  brewassistant_hot_side_next:
    alias: BrewAssistant Hot Side - Next Phase
    mode: restart
    sequence:
    - variables:
        phases:
        - Idle
        - Preparation
        - Heat Strike Water
        - Mash In
        - Mash Rest
        - Mash Out
        - Sparge / Drain
        - Heat To Boil
        - Boil
        - Whirlpool
        - Chill
        - Transfer To Fermenter
        - Done
        current: '{{ states(''input_select.brewassistant_hot_side_phase'') }}'
        idx: |
          {% if current in phases %}
            {{ phases.index(current) }}
          {% else %}
            0
          {% endif %}
        next_phase: |
          {% set i = idx | int %} {{ phases[i + 1] if i + 1 < phases | length else 'Done' }}
    - service: script.brewassistant_hot_side_set_phase
      data:
        phase: '{{ next_phase }}'
    - if:
      - condition: template
        value_template: '{{ next_phase == ''Done'' }}'
      then:
      - service: script.brewassistant_hot_side_handover_to_fermentation
  brewassistant_hot_side_previous:
    alias: BrewAssistant Hot Side - Previous Phase
    mode: restart
    sequence:
    - variables:
        phases:
        - Idle
        - Preparation
        - Heat Strike Water
        - Mash In
        - Mash Rest
        - Mash Out
        - Sparge / Drain
        - Heat To Boil
        - Boil
        - Whirlpool
        - Chill
        - Transfer To Fermenter
        - Done
        current: '{{ states(''input_select.brewassistant_hot_side_phase'') }}'
        idx: |
          {% if current in phases %}
            {{ phases.index(current) }}
          {% else %}
            0
          {% endif %}
        previous_phase: |
          {% set i = idx | int %} {{ phases[i - 1] if i > 0 else 'Idle' }}
    - service: script.brewassistant_hot_side_set_phase
      data:
        phase: '{{ previous_phase }}'
  brewassistant_hot_side_start_timer:
    alias: BrewAssistant Hot Side - Start Timer
    mode: restart
    sequence:
    - variables:
        minutes: '{{ states(''sensor.brewassistant_hot_side_current_timer_minutes'') | int(0) }}'
        hours: '{{ (minutes | int // 60) }}'
        mins: '{{ (minutes | int % 60) }}'
        duration: '{{ ''%02d:%02d:%02d'' | format(hours | int, mins | int, 0) }}'
    - if:
      - condition: template
        value_template: '{{ minutes | int > 0 }}'
      then:
      - service: timer.start
        target:
          entity_id: timer.brewassistant_hot_side_timer
        data:
          duration: '{{ duration }}'
      - service: input_text.set_value
        target:
          entity_id: input_text.brewassistant_hot_side_note
        data:
          value: 'Timer started: {{ duration }}'
  brewassistant_hot_side_cancel_timer:
    alias: BrewAssistant Hot Side - Cancel Timer
    mode: restart
    sequence:
    - service: timer.cancel
      target:
        entity_id: timer.brewassistant_hot_side_timer
    - service: input_text.set_value
      target:
        entity_id: input_text.brewassistant_hot_side_note
      data:
        value: Timer cancelled
  brewassistant_hot_side_maybe_start_timer:
    alias: BrewAssistant Hot Side - Maybe Start Timer
    mode: restart
    sequence:
    - variables:
        phase: '{{ states(''input_select.brewassistant_hot_side_phase'') }}'
        minutes: '{{ states(''sensor.brewassistant_hot_side_current_timer_minutes'') | int(0) }}'
        hours: '{{ (minutes | int // 60) }}'
        mins: '{{ (minutes | int % 60) }}'
        duration: '{{ ''%02d:%02d:%02d'' | format(hours | int, mins | int, 0) }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.brewassistant_hot_side_auto_start_timers
          state: 'on'
        - condition: template
          value_template: '{{ minutes | int > 0 }}'
        - condition: template
          value_template: |
            {{ phase in ['Mash Rest', 'Mash Out', 'Boil', 'Whirlpool'] }}
        sequence:
        - service: timer.cancel
          target:
            entity_id: timer.brewassistant_hot_side_timer
        - service: timer.start
          target:
            entity_id: timer.brewassistant_hot_side_timer
          data:
            duration: '{{ duration }}'
      default:
      - service: timer.cancel
        target:
          entity_id: timer.brewassistant_hot_side_timer
  brewassistant_hot_side_handover_to_fermentation:
    alias: BrewAssistant Hot Side - Handover To Fermentation
    mode: single
    sequence:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.brewassistant_hot_side_active
    - service: timer.cancel
      target:
        entity_id: timer.brewassistant_hot_side_timer
    - service: input_text.set_value
      target:
        entity_id: input_text.brewassistant_hot_side_note
      data:
        value: Hot side done. Ready for fermentation workflow.
    - if:
      - condition: template
        value_template: |
          {{ states('input_select.brewing_phase') not in ['unknown', 'unavailable']
             and 'Fermentation' in (state_attr('input_select.brewing_phase', 'options') | default([], true)) }}
      then:
      - service: input_select.select_option
        target:
          entity_id: input_select.brewing_phase
        data:
          option: Fermentation
    - if:
      - condition: template
        value_template: |
          {{ states('input_select.brewassistant_phase') not in ['unknown', 'unavailable']
             and 'Fermentation' in (state_attr('input_select.brewassistant_phase', 'options') | default([], true)) }}
      then:
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_phase
        data:
          option: Fermentation
    - service: persistent_notification.create
      data:
        title: 'BrewAssistant: Hot Side klar'
        message: |
          Hot side workflow är klart.
          Nästa steg: - Kontrollera OG - Överför till jäskärl - Pitcha jäst - Starta/fortsätt fermenteringsflödet
          Recept: {{ states('sensor.brewassistant_hot_side_recipe_name') }} Batch: {{ states('sensor.brewassistant_hot_side_batch_name') }}
automation:
- id: brewassistant_hot_side_button_start
  alias: BrewAssistant Hot Side - Button Start
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_start
  action:
  - service: script.brewassistant_hot_side_start
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_next
  alias: BrewAssistant Hot Side - Button Next
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_next
  action:
  - service: script.brewassistant_hot_side_next
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_previous
  alias: BrewAssistant Hot Side - Button Previous
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_previous
  action:
  - service: script.brewassistant_hot_side_previous
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_pause_resume
  alias: BrewAssistant Hot Side - Button Pause Resume
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_pause_resume
  action:
  - service: script.brewassistant_hot_side_pause_resume
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_reset
  alias: BrewAssistant Hot Side - Button Reset
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_reset
  action:
  - service: script.brewassistant_hot_side_reset
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_start_timer
  alias: BrewAssistant Hot Side - Button Start Timer
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_start_timer
  action:
  - service: script.brewassistant_hot_side_start_timer
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_button_cancel_timer
  alias: BrewAssistant Hot Side - Button Cancel Timer
  mode: single
  trigger:
  - platform: state
    entity_id: input_button.brewassistant_hot_side_cancel_timer
  action:
  - service: script.brewassistant_hot_side_cancel_timer
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_timer_finished
  alias: BrewAssistant Hot Side - Timer Finished
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.brewassistant_hot_side_timer
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_notifications
    state: 'on'
  action:
  - service: persistent_notification.create
    data:
      title: BrewAssistant Hot Side Timer
      message: |
        Timern är klar för steget: {{ states('input_select.brewassistant_hot_side_phase') }}
        Nästa steg: {{ states('sensor.brewassistant_hot_side_next_phase') }}
  - service: input_text.set_value
    target:
      entity_id: input_text.brewassistant_hot_side_note
    data:
      value: |
        Timer finished for {{ states('input_select.brewassistant_hot_side_phase') }}
- id: brewassistant_hot_side_phase_changed
  alias: BrewAssistant Hot Side - Phase Changed Bookkeeping
  mode: restart
  trigger:
  - platform: state
    entity_id: input_select.brewassistant_hot_side_phase
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.brewassistant_hot_side_phase_started
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_idle_cleanup
  alias: BrewAssistant Hot Side - Idle Cleanup
  mode: single
  trigger:
  - platform: state
    entity_id: input_select.brewassistant_hot_side_phase
    to: Idle
  action:
  - service: timer.cancel
    target:
      entity_id: timer.brewassistant_hot_side_timer
  - service: input_boolean.turn_off
    target:
      entity_id:
      - input_boolean.brewassistant_hot_side_active
      - input_boolean.brewassistant_hot_side_paused
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
- id: brewassistant_hot_side_done_handover
  alias: BrewAssistant Hot Side - Done Handover
  mode: single
  trigger:
  - platform: state
    entity_id: input_select.brewassistant_hot_side_phase
    to: Done
  action:
  - service: script.brewassistant_hot_side_handover_to_fermentation
  condition:
  - condition: state
    entity_id: input_boolean.brewassistant_hot_side_enabled
    state: 'on'
