###############################################################################
# BrewAssistant Manual Mode
# File: /config/packages/brewassistant_manual_mode.yaml
#
# Purpose:
# - Standalone manual fermentation tracker
# - Designed for hydrometer/manual SG readings
# - Can run in parallel with automated BrewAssistant/RAPT/Brewfather batches
#
# Install:
# 1. Save as: /config/packages/brewassistant_manual_mode.yaml
# 2. Make sure packages are enabled in configuration.yaml:
#
#    homeassistant:
#      packages: !include_dir_named packages
#
# 3. Restart Home Assistant
###############################################################################

input_boolean:
  manual_batch_active:
    name: Manual Batch Active
    icon: mdi:flask

  manual_batch_packaged:
    name: Manual Batch Packaged
    icon: mdi:bottle-wine-outline

  manual_batch_warnings_enabled:
    name: Manual Batch Warnings Enabled
    icon: mdi:alert-circle-outline
    initial: true

input_text:
  manual_batch_name:
    name: Manual Batch Name
    icon: mdi:beer-outline
    max: 80
    initial: "Enter Batch-name"

input_select:
  manual_batch_type:
    name: Manual Batch Type
    icon: mdi:glass-mug-variant
    options:
      - Cider
      - Beer
      - FWK
      - Mead
      - Wine
      - Other
    initial: Cider

input_number:
  manual_batch_batch_volume_l:
    name: Manual Batch Volume
    icon: mdi:cup-water
    min: 1
    max: 60
    step: 0.5
    mode: box
    unit_of_measurement: L
    initial: 23

  manual_batch_packaged_volume_l:
    name: Manual Packaged Volume
    icon: mdi:keg
    min: 0
    max: 60
    step: 0.5
    mode: box
    unit_of_measurement: L
    initial: 20

  manual_batch_og:
    name: Manual Batch OG
    icon: mdi:hydrometer
    min: 0.990
    max: 1.200
    step: 0.001
    mode: box
    initial: 1.043

  manual_batch_expected_fg:
    name: Manual Batch Expected FG
    icon: mdi:target
    min: 0.990
    max: 1.100
    step: 0.001
    mode: box
    initial: 1.006

  manual_batch_sg_previous:
    name: Manual Batch Previous SG
    icon: mdi:chart-line
    min: 0.990
    max: 1.200
    step: 0.001
    mode: box
    initial: 1.043

  manual_batch_sg_current:
    name: Manual Batch Current SG
    icon: mdi:chart-line-variant
    min: 0.990
    max: 1.200
    step: 0.001
    mode: box
    initial: 1.043

  manual_batch_sg_new:
    name: Manual Batch New SG Reading
    icon: mdi:eyedropper
    min: 0.990
    max: 1.200
    step: 0.001
    mode: box
    initial: 1.043

  manual_batch_temperature:
    name: Manual Batch Reading Temperature
    icon: mdi:thermometer
    min: 0
    max: 35
    step: 0.1
    mode: box
    unit_of_measurement: °C
    initial: 20

  manual_batch_stable_threshold:
    name: Manual Stable SG Threshold
    icon: mdi:approximately-equal
    min: 0.000
    max: 0.010
    step: 0.001
    mode: box
    initial: 0.002

  manual_batch_fg_margin:
    name: Manual FG Margin
    icon: mdi:target-variant
    min: 0.000
    max: 0.020
    step: 0.001
    mode: box
    initial: 0.004

  manual_batch_temp_min:
    name: Manual Batch Temp Min
    icon: mdi:thermometer-low
    min: 0
    max: 30
    step: 0.5
    mode: box
    unit_of_measurement: °C
    initial: 18
    
  manual_batch_temp_max:
    name: Manual Batch Temp Max
    icon: mdi:thermometer-high
    min: 0
    max: 35
    step: 0.5
    mode: box
    unit_of_measurement: °C
    initial: 24

  manual_batch_reading_overdue_hours:
    name: Manual Batch Reading Overdue Hours
    icon: mdi:timer-alert-outline
    min: 6
    max: 96
    step: 1
    mode: box
    unit_of_measurement: h
    initial: 36

  manual_batch_first_sg_check_days:
    name: Manual First SG Check After
    icon: mdi:calendar-search
    min: 1
    max: 21
    step: 1
    mode: box
    unit_of_measurement: d
    initial: 6
    
input_datetime:
  manual_batch_start:
    name: Manual Batch Start
    icon: mdi:calendar-start
    has_date: true
    has_time: true

  manual_batch_last_reading:
    name: Manual Batch Last Reading
    icon: mdi:calendar-clock
    has_date: true
    has_time: true

template:
  - sensor:
      - name: Manual Batch Name Display
        unique_id: manual_batch_name_display
        icon: mdi:beer-outline
        state: >
          {% set name = states('input_text.manual_batch_name') %}
          {{ name if name not in ['unknown', 'unavailable', 'none', 'None', ''] else 'Manual Batch' }}

      - name: Manual Batch ABV Current
        unique_id: manual_batch_abv_current
        icon: mdi:percent
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set sg = states('input_number.manual_batch_sg_current') | float(0) %}
          {% if og > 0 and sg > 0 and og >= sg %}
            {{ '%.2f' | format((og - sg) * 131.25) }}
          {% else %}
            0.00
          {% endif %}

      - name: Manual Batch Expected ABV
        unique_id: manual_batch_expected_abv
        icon: mdi:percent-outline
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {% if og > 0 and fg > 0 and og >= fg %}
            {{ '%.2f' | format((og - fg) * 131.25) }}
          {% else %}
            0.00
          {% endif %}

      - name: Manual Batch Attenuation
        unique_id: manual_batch_attenuation
        icon: mdi:chart-bell-curve
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set sg = states('input_number.manual_batch_sg_current') | float(0) %}
          {% if og > 1 and sg > 0 and og > sg %}
            {{ '%.1f' | format(((og - sg) / (og - 1)) * 100) }}
          {% else %}
            0.0
          {% endif %}

      - name: Manual Batch SG Delta
        unique_id: manual_batch_sg_delta
        icon: mdi:delta
        state: >
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {{ '%.3f' | format(previous - current) }}

      - name: Manual Batch Points Dropped
        unique_id: manual_batch_points_dropped
        icon: mdi:arrow-down-bold
        unit_of_measurement: "points"
        state_class: measurement
        state: >
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set sg = states('input_number.manual_batch_sg_current') | float(0) %}
          {% if og > 0 and sg > 0 and og >= sg %}
            {{ ((og - sg) * 1000) | round(0) | int }}
          {% else %}
            0
          {% endif %}

      - name: Manual Batch Days Active
        unique_id: manual_batch_days_active
        icon: mdi:calendar-range
        unit_of_measurement: "d"
        state_class: measurement
        state: >
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set start = states('input_datetime.manual_batch_start') %}
          {% if active and start not in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set ts = as_timestamp(start, none) %}
            {% if ts is not none %}
              {{ '%.1f' | format((as_timestamp(now()) - ts) / 86400) }}
            {% else %}
              0.0
            {% endif %}
          {% else %}
            0.0
          {% endif %}

      - name: Manual Batch Hours Since Reading
        unique_id: manual_batch_hours_since_reading
        icon: mdi:timer-outline
        unit_of_measurement: "h"
        state_class: measurement
        state: >
          {% set last = states('input_datetime.manual_batch_last_reading') %}
          {% if last not in ['unknown', 'unavailable', 'none', 'None', ''] %}
            {% set ts = as_timestamp(last, none) %}
            {% if ts is not none %}
              {{ '%.1f' | format((as_timestamp(now()) - ts) / 3600) }}
            {% else %}
              0.0
            {% endif %}
          {% else %}
            0.0
          {% endif %}

      - name: Manual Batch FG Distance
        unique_id: manual_batch_fg_distance
        icon: mdi:target-arrow
        state: >
          {% set sg = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {{ '%.3f' | format(sg - fg) }}

      - name: Manual Batch Status
        unique_id: manual_batch_status
        icon: mdi:flask
        state: >
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set packaged = is_state('input_boolean.manual_batch_packaged', 'on') %}
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set expected_fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {% set stable_threshold = states('input_number.manual_batch_stable_threshold') | float(0.002) %}
          {% set fg_margin = states('input_number.manual_batch_fg_margin') | float(0.004) %}
          {% set delta = previous - current %}
          {% set fg_distance = current - expected_fg %}
          {% set last = states('input_datetime.manual_batch_last_reading') %}
          {% set last_ts = as_timestamp(last, none) if last not in ['unknown', 'unavailable', 'none', 'None', ''] else none %}
          {% set hours = ((as_timestamp(now()) - last_ts) / 3600) if last_ts is not none else 0 %}

          {% if packaged %}
            Packaged
          {% elif not active %}
            Idle
          {% elif og <= 1.000 %}
            Missing OG
          {% elif current <= 1.000 or current >= og %}
            Started
          {% elif delta > stable_threshold %}
            Active fermentation
          {% elif delta > 0.000 and delta <= stable_threshold %}
            Slowing down
          {% elif (delta | abs) <= stable_threshold and fg_distance <= fg_margin and hours >= 24 %}
            Ready for packaging
          {% elif (delta | abs) <= stable_threshold and fg_distance <= fg_margin %}
            Stable / verifying
          {% elif (delta | abs) <= stable_threshold and fg_distance > fg_margin and hours >= 24 %}
            Possibly stalled
          {% else %}
            Monitoring
          {% endif %}

      - name: Manual Batch Next Action
        unique_id: manual_batch_next_action
        icon: mdi:clipboard-text-clock
        state: >
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set packaged = is_state('input_boolean.manual_batch_packaged', 'on') %}
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set expected_fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {% set stable_threshold = states('input_number.manual_batch_stable_threshold') | float(0.002) %}
          {% set fg_margin = states('input_number.manual_batch_fg_margin') | float(0.004) %}
          {% set delta = previous - current %}
          {% set fg_distance = current - expected_fg %}
          {% set last = states('input_datetime.manual_batch_last_reading') %}
          {% set last_ts = as_timestamp(last, none) if last not in ['unknown', 'unavailable', 'none', 'None', ''] else none %}
          {% set hours = ((as_timestamp(now()) - last_ts) / 3600) if last_ts is not none else 0 %}

          {% if packaged %}
            Batch markerad som förpackad.
          {% elif not active %}
            Starta batch och ange OG.
          {% elif og <= 1.000 %}
            Ange ett korrekt OG-värde.
          {% elif current <= 1.000 or current >= og %}
            Låt jäsa ostört och mät SG efter några dagar.
          {% elif delta > stable_threshold %}
            Jäsningen är aktiv. Vänta och mät igen senare.
          {% elif delta > 0.000 and delta <= stable_threshold %}
            Jäsningen avtar. Mät igen om 24 timmar.
          {% elif (delta | abs) <= stable_threshold and fg_distance <= fg_margin and hours >= 24 %}
            SG är stabilt nära FG. Klar för smakpåse / fat / flaskning.
          {% elif (delta | abs) <= stable_threshold and fg_distance <= fg_margin %}
            SG verkar stabilt. Bekräfta med ny mätning inom 24 timmar.
          {% elif (delta | abs) <= stable_threshold and fg_distance > fg_margin and hours >= 24 %}
            SG är stabilt men ligger fortfarande högt. Vänta, kontrollera temperatur och mät igen.
          {% else %}
            Fortsätt följa SG-trenden.
          {% endif %}

      - name: Manual Batch Summary
        unique_id: manual_batch_summary
        icon: mdi:clipboard-text
        state: >
          {% set name = states('input_text.manual_batch_name') %}
          {% set status = states('sensor.manual_batch_status') %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set abv = states('sensor.manual_batch_abv_current') | float(0) %}
          {{ name }} · {{ status }} · SG {{ '%.3f' | format(current) }} · {{ '%.1f' | format(abv) }} %

      - name: Manual Batch Warning Level
        unique_id: manual_batch_warning_level
        icon: mdi:alert
        state: >
          {% set temp_low = is_state('binary_sensor.manual_batch_temp_low_warning', 'on') %}
          {% set temp_high = is_state('binary_sensor.manual_batch_temp_high_warning', 'on') %}
          {% set sg_rising = is_state('binary_sensor.manual_batch_sg_rising_warning', 'on') %}
          {% set overdue = is_state('binary_sensor.manual_batch_reading_overdue_warning', 'on') %}
          {% set stall = is_state('binary_sensor.manual_batch_possible_stall_warning', 'on') %}
          {% set ready = is_state('binary_sensor.manual_batch_ready_warning', 'on') %}
          {% set first_sg = is_state('binary_sensor.manual_batch_first_sg_check_warning', 'on') %}

          {% if temp_high or sg_rising or stall %}
            critical
          {% elif temp_low or overdue or first_sg %}
            warning
          {% elif ready %}
            ready
          {% else %}
            ok
          {% endif %}

      - name: Manual Batch Warning Summary
        unique_id: manual_batch_warning_summary
        icon: mdi:clipboard-alert-outline
        state: >
          {% set items = [] %}

          {% if is_state('binary_sensor.manual_batch_temp_low_warning', 'on') %}
            {% set items = items + ['Temperaturen är låg'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_temp_high_warning', 'on') %}
            {% set items = items + ['Temperaturen är hög'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_sg_rising_warning', 'on') %}
            {% set items = items + ['SG har ökat sedan förra mätningen'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_reading_overdue_warning', 'on') %}
            {% set items = items + ['Dags att uppdatera mätvärden'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_possible_stall_warning', 'on') %}
            {% set items = items + ['Möjlig avstannad jäsning'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_ready_warning', 'on') %}
            {% set items = items + ['SG stabil nära FG'] %}
          {% endif %}

          {% if is_state('binary_sensor.manual_batch_first_sg_check_warning', 'on') %}
            {% set items = items + ['Dags för första SG-kontroll'] %}
          {% endif %}

          {{ items | join(' · ') if items | count > 0 else 'Inga varningar' }}

  - binary_sensor:
      - name: Manual Batch Temp Low Warning
        unique_id: manual_batch_temp_low_warning
        icon: mdi:thermometer-low
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set temp = states('input_number.manual_batch_temperature') | float(0) %}
          {% set min_temp = states('input_number.manual_batch_temp_min') | float(18) %}
          {{ enabled and active and temp > 0 and temp < min_temp }}

      - name: Manual Batch Temp High Warning
        unique_id: manual_batch_temp_high_warning
        icon: mdi:thermometer-high
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set temp = states('input_number.manual_batch_temperature') | float(0) %}
          {% set max_temp = states('input_number.manual_batch_temp_max') | float(24) %}
          {{ enabled and active and temp > max_temp }}

      - name: Manual Batch SG Rising Warning
        unique_id: manual_batch_sg_rising_warning
        icon: mdi:arrow-up-bold-circle
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {{ enabled and active and previous > 0 and current > previous }}

      - name: Manual Batch Reading Overdue Warning
        unique_id: manual_batch_reading_overdue_warning
        icon: mdi:timer-alert-outline
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set last = states('input_datetime.manual_batch_last_reading') %}
          {% set overdue = states('input_number.manual_batch_reading_overdue_hours') | float(36) %}
          {% if not enabled or not active or last in ['unknown', 'unavailable', 'none', 'None', ''] %}
            false
          {% else %}
            {% set ts = as_timestamp(last, none) %}
            {% if ts is none %}
              false
            {% else %}
              {{ ((as_timestamp(now()) - ts) / 3600) > overdue }}
            {% endif %}
          {% endif %}

      - name: Manual Batch Possible Stall Warning
        unique_id: manual_batch_possible_stall_warning
        icon: mdi:alert-circle
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {% set stable = states('input_number.manual_batch_stable_threshold') | float(0.002) %}
          {% set margin = states('input_number.manual_batch_fg_margin') | float(0.004) %}
          {% set delta = previous - current %}
          {% set last = states('input_datetime.manual_batch_last_reading') %}
          {% set ts = as_timestamp(last, none) if last not in ['unknown', 'unavailable', 'none', 'None', ''] else none %}
          {% set hours = ((as_timestamp(now()) - ts) / 3600) if ts is not none else 0 %}
          {{ enabled and active and current > 0 and fg > 0 and (delta | abs) <= stable and current > (fg + margin) and hours >= 24 }}

      - name: Manual Batch Ready Warning
        unique_id: manual_batch_ready_warning
        icon: mdi:check-decagram
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set previous = states('input_number.manual_batch_sg_previous') | float(0) %}
          {% set fg = states('input_number.manual_batch_expected_fg') | float(0) %}
          {% set stable = states('input_number.manual_batch_stable_threshold') | float(0.002) %}
          {% set margin = states('input_number.manual_batch_fg_margin') | float(0.004) %}
          {% set delta = previous - current %}
          {{ enabled and active and current > 0 and fg > 0 and (delta | abs) <= stable and current <= (fg + margin) }}

      - name: Manual Batch First SG Check Due
        unique_id: manual_batch_first_sg_check_due
        icon: mdi:calendar-search
        state: >
          {% set active = is_state('input_boolean.manual_batch_active', 'on') %}
          {% set og = states('input_number.manual_batch_og') | float(0) %}
          {% set current = states('input_number.manual_batch_sg_current') | float(0) %}
          {% set check_days = states('input_number.manual_batch_first_sg_check_days') | float(6) %}
          {% set start = states('input_datetime.manual_batch_start') %}
          {% set start_ts = as_timestamp(start, none) if start not in ['unknown', 'unavailable', 'none', 'None', ''] else none %}
          {% set days = ((as_timestamp(now()) - start_ts) / 86400) if start_ts is not none else 0 %}

          {{
            active
            and og > 1.000
            and current >= og
            and days >= check_days
          }}

      - name: Manual Batch First SG Check Warning
        unique_id: manual_batch_first_sg_check_warning
        icon: mdi:hydrometer
        state: >
          {% set enabled = is_state('input_boolean.manual_batch_warnings_enabled', 'on') %}
          {{ enabled and is_state('binary_sensor.manual_batch_first_sg_check_due', 'on') }}



script:
  manual_batch_start:
    alias: Manual Batch - Start
    icon: mdi:play-circle
    mode: single
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.manual_batch_active
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.manual_batch_packaged
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.manual_batch_start
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.manual_batch_last_reading
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.manual_batch_sg_previous
        data:
          value: "{{ states('input_number.manual_batch_og') | float(1.043) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.manual_batch_sg_current
        data:
          value: "{{ states('input_number.manual_batch_og') | float(1.043) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.manual_batch_sg_new
        data:
          value: "{{ states('input_number.manual_batch_og') | float(1.043) }}"

  manual_batch_log_reading:
    alias: Manual Batch - Log SG Reading
    icon: mdi:hydrometer
    mode: single
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.manual_batch_sg_previous
        data:
          value: "{{ states('input_number.manual_batch_sg_current') | float(1.000) }}"
      - service: input_number.set_value
        target:
          entity_id: input_number.manual_batch_sg_current
        data:
          value: "{{ states('input_number.manual_batch_sg_new') | float(1.000) }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.manual_batch_last_reading
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  manual_batch_mark_packaged:
    alias: Manual Batch - Mark Packaged
    icon: mdi:package-variant-closed-check
    mode: single
    sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.manual_batch_packaged
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.manual_batch_active

  manual_batch_reset:
    alias: Manual Batch - Reset
    icon: mdi:restart
    mode: single
    sequence:
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.manual_batch_active
            - input_boolean.manual_batch_packaged
      - service: input_text.set_value
        target:
          entity_id: input_text.manual_batch_name
        data:
          value: "Mangrove Jack Passionfruit Peach Cider"
      - service: input_select.select_option
        target:
          entity_id: input_select.manual_batch_type
