type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_rapt_pill_calibration_summary
    name: RAPT Pill Calibration
    icon: mdi:tune-variant
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    label: |
      [[[
        const enabled = states['input_boolean.brewassistant_rapt_pill_calibration_enabled']?.state === 'on';
        const active = states['binary_sensor.brewassistant_rapt_pill_calibration_active']?.state === 'on';

        const raw = states['sensor.yellow_pill_gravity_2']?.state ?? 'unknown';
        const corrected = states['sensor.brewassistant_rapt_pill_sg_corrected']?.state ?? 'unknown';
        const offsetRaw = states['sensor.brewassistant_rapt_pill_sg_calibration_difference']?.state ?? 'unknown';

        const offset = ['unknown', 'unavailable', 'none', ''].includes(offsetRaw)
          ? '—'
          : offsetRaw;

        const tempDiffRaw = states['sensor.brewassistant_rapt_pill_temperature_difference']?.state ?? 'unknown';
        const tempDiff = ['unknown', 'unavailable', 'none', ''].includes(tempDiffRaw)
          ? '—'
          : `${tempDiffRaw} °C`;

        let status = 'Disabled';
        let statusIcon = '⚪';

        if (enabled && active) {
          status = 'Calibration active';
          statusIcon = '🟢';
        } else if (enabled && !active) {
          status = 'Needs calibration values';
          statusIcon = '🟠';
        }

        return `
          <div class="pill-wrap">
            <div class="pill-status">${statusIcon} ${status}</div>

            <div class="pill-grid">
              <div>
                <span class="label">Raw SG</span>
                <span class="value">${raw}</span>
              </div>
              <div>
                <span class="label">Corrected SG</span>
                <span class="value strong">${corrected}</span>
              </div>
              <div>
                <span class="label">SG Offset</span>
                <span class="value">${offset}</span>
              </div>
              <div>
                <span class="label">Temp Δ</span>
                <span class="value">${tempDiff}</span>
              </div>
            </div>
          </div>
        `;
      ]]]
    custom_fields:
      power:
        card:
          type: custom:mushroom-template-card
          entity: input_boolean.brewassistant_rapt_pill_calibration_enabled
          primary: ""
          secondary: ""
          icon: >
            {% if
            is_state('input_boolean.brewassistant_rapt_pill_calibration_enabled',
            'on') %}
              mdi:tune
            {% else %}
              mdi:tune-variant
            {% endif %}
          icon_color: >
            {% if
            is_state('input_boolean.brewassistant_rapt_pill_calibration_enabled',
            'on') %}
              green
            {% else %}
              grey
            {% endif %}
          tap_action:
            action: toggle
          card_mod:
            style: |
              ha-card {
                width: 44px !important;
                height: 44px !important;
                border-radius: 50% !important;
                background: rgba(255,255,255,0.08) !important;
                border: 1px solid rgba(255,255,255,0.12) !important;
                box-shadow: none !important;
                padding: 0 !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
              }

              mushroom-shape-icon {
                --shape-color: rgba(105,240,174,0.14) !important;
              }

              ha-state-icon {
                --mdc-icon-size: 24px;
              }
    styles:
      card:
        - position: relative
        - border-radius: 22px
        - padding: 18px
        - background: |
            [[[
              const enabled = states['input_boolean.brewassistant_rapt_pill_calibration_enabled']?.state === 'on';
              const active = states['binary_sensor.brewassistant_rapt_pill_calibration_active']?.state === 'on';

              if (enabled && active) {
                return 'linear-gradient(135deg, rgba(30,120,90,0.42), rgba(20,45,55,0.92))';
              }

              if (enabled && !active) {
                return 'linear-gradient(135deg, rgba(180,120,40,0.36), rgba(45,35,25,0.92))';
              }

              return 'linear-gradient(135deg, rgba(70,70,80,0.32), rgba(25,25,32,0.92))';
            ]]]
        - border: 1px solid rgba(255,255,255,0.10)
        - box-shadow: none
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 48px 1fr
        - grid-template-rows: min-content min-content
        - column-gap: 12px
      icon:
        - width: 34px
        - justify-self: center
        - align-self: center
        - color: |
            [[[
              const active = states['binary_sensor.brewassistant_rapt_pill_calibration_active']?.state === 'on';
              return active ? '#69f0ae' : '#b0bec5';
            ]]]
      name:
        - justify-self: start
        - align-self: end
        - font-size: 18px
        - font-weight: 700
        - letter-spacing: 0.2px
        - padding-right: 54px
      label:
        - justify-self: stretch
        - align-self: start
        - text-align: left
        - margin-top: 8px
      custom_fields:
        power:
          - position: absolute
          - top: 14px
          - right: 14px
          - z-index: 5
    extra_styles: |
      .pill-wrap {
        width: 100%;
      }

      .pill-status {
        font-size: 13px;
        opacity: 0.86;
        margin-bottom: 12px;
      }

      .pill-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .pill-grid > div {
        padding: 10px 12px;
        border-radius: 16px;
        background: rgba(255,255,255,0.065);
        border: 1px solid rgba(255,255,255,0.075);
      }

      .label {
        display: block;
        font-size: 11px;
        opacity: 0.62;
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .value {
        display: block;
        font-size: 18px;
        font-weight: 650;
        line-height: 1.15;
      }

      .value.strong {
        font-size: 21px;
        color: #69f0ae;
      }
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.yellow_pill_gravity_2
        primary: Raw SG
        secondary: >
          {% set v = states('sensor.yellow_pill_gravity_2') %} {% if v in
          ['unknown', 'unavailable', 'none'] %}
            —
          {% else %}
            {{ v }}
          {% endif %}
        icon: mdi:database-eye
        tap_action:
          action: more-info
        color: blue
        features_position: bottom
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_rapt_pill_sg_corrected
        primary: Corrected SG
        secondary: >
          {% set v = states('sensor.brewassistant_rapt_pill_sg_corrected') %} {%
          if v in ['unknown', 'unavailable', 'none'] %}
            —
          {% else %}
            {{ v }}
          {% endif %}
        icon: mdi:hydrometer
        icon_color: green
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_rapt_pill_sg_calibration_difference
        primary: SG Offset
        secondary: >
          {% set v =
          states('sensor.brewassistant_rapt_pill_sg_calibration_difference') %}
          {% if v in ['unknown', 'unavailable', 'none'] %}
            —
          {% else %}
            {{ v }}
          {% endif %}
        icon: mdi:delta
        icon_color: >
          {% set v_state =
          states('sensor.brewassistant_rapt_pill_sg_calibration_difference') %}

          {% set v = v_state | float(0) %}

          {% if v_state in ['unknown', 'unavailable', 'none'] %}
            grey
          {% elif v == 0 %}
            grey
          {% elif v > 0 %}
            amber
          {% else %}
            orange
          {% endif %}
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_rapt_pill_temperature_difference
        primary: Temp Difference
        secondary: >
          {% set d =
          states('sensor.brewassistant_rapt_pill_temperature_difference') %} {%
          if d in ['unknown', 'unavailable', 'none'] %}
            —
          {% else %}
            {{ d }} °C
          {% endif %}
        icon: mdi:thermometer-lines
        icon_color: >
          {% set d_state =
          states('sensor.brewassistant_rapt_pill_temperature_difference') %}

          {% set d = d_state | float(0) %}

          {% if d_state in ['unknown', 'unavailable', 'none'] %}
            grey
          {% elif d | abs <= 1 %}
            green
          {% elif d | abs <= 3 %}
            amber
          {% else %}
            red
          {% endif %}
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
  - type: custom:expander-card
    title-card:
      type: custom:mushroom-template-card
      primary: Calibration Values
      secondary: |
        Manual SG, raw Pill SG, temperatureat calibration point
      icon: mdi:form-textbox
      icon_color: amber
      tap_action:
        action: none
      card_mod:
        style: |
          ha-card {
            border-radius: 18px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: none;
          }
    padding: 0
    clear: false
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-number-card
            entity: input_number.brewassistant_rapt_pill_calibration_sg
            name: Manual Calibration SG
            icon: mdi:hydrometer
            display_mode: buttons
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                  margin-top: 8px;
                }
          - type: custom:mushroom-number-card
            entity: input_number.brewassistant_rapt_pill_calibration_raw_sg
            name: Raw Pill SG at Calibration
            icon: mdi:database-eye
            display_mode: buttons
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
          - type: custom:mushroom-number-card
            entity: input_number.brewassistant_rapt_pill_calibration_temperature
            name: Calibration Temperature
            icon: mdi:thermometer-check
            display_mode: buttons
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
  - type: custom:expander-card
    title-card:
      type: custom:mushroom-template-card
      primary: Details / Debug
      secondary: |
        {{ states('sensor.brewassistant_rapt_pill_calibration_summary') }}
      icon: mdi:bug-check-outline
      icon_color: grey
      tap_action:
        action: none
      card_mod:
        style: |
          ha-card {
            border-radius: 18px;
            background: rgba(255,255,255,0.030);
            border: 1px solid rgba(255,255,255,0.055);
            box-shadow: none;
          }
    padding: 0
    clear: false
    cards:
      - type: entities
        entities:
          - entity: input_boolean.brewassistant_rapt_pill_calibration_enabled
            name: Calibration Enabled
          - entity: binary_sensor.brewassistant_rapt_pill_calibration_active
            name: Calibration Active
          - entity: sensor.brewassistant_rapt_pill_calibration_summary
            name: Summary
          - entity: sensor.yellow_pill_temperature
            name: Current Pill Temperature
          - entity: sensor.yellow_pill_gravity_2
            name: Raw Pill SG
          - entity: sensor.brewassistant_rapt_pill_sg_corrected
            name: Corrected SG
          - entity: sensor.brewassistant_rapt_pill_sg_calibration_difference
            name: SG Calibration Difference
          - entity: sensor.brewassistant_rapt_pill_temperature_difference
            name: Temperature Difference
        card_mod:
          style: |
            ha-card {
              border-radius: 16px;
              background: rgba(255,255,255,0.035);
              border: 1px solid rgba(255,255,255,0.06);
              box-shadow: none;
              margin-top: 8px;
            }
card_mod:
  style: |
    ha-card {
      border-radius: 24px;
      overflow: hidden;
      background: rgba(15,18,22,0.78);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 28px rgba(0,0,0,0.22);
      padding: 8px;
    }
