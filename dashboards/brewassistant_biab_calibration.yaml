type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_biab_calibration_severity
    name: BIAB Calibration v1.5
    icon: mdi:tune-variant
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[ 
        const enabled = states['input_boolean.brewassistant_biab_calibration_enabled']?.state === 'on';

        if (!enabled) {
          return `
            <div style="font-size:13px; font-weight:800; opacity:.82; margin-top:2px;">
              Avstängd · tryck power för att visa detaljer
            </div>
          `;
        }

        const mode = states['sensor.brewassistant_biab_brew_day_mode_sv']?.state ?? 'Okänt bryggläge';
        const stage = states['sensor.brewassistant_biab_calibration_stage_sv']?.state ?? 'Okänd status';
        const next = states['sensor.brewassistant_biab_brew_day_next_measurement_sv']?.state
          ?? states['sensor.brewassistant_biab_calibration_next_step_sv']?.state
          ?? 'Nästa steg saknas';
        const profile = states['input_select.brewassistant_biab_calibration_profile']?.state ?? 'Okänd profil';

        return `
          <div style="font-size:12px; opacity:.78;">${profile}</div>
          <div style="font-size:15px; font-weight:900; margin-top:4px;">${mode} · ${stage}</div>
          <div style="font-size:12px; opacity:.78; margin-top:5px;">${next}</div>
        `;
      ]]]
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: input_boolean.brewassistant_biab_calibration_enabled
          show_name: false
          show_state: false
          icon: mdi:power
          tap_action:
            action: toggle
          styles:
            card:
              - width: 36px
              - height: 36px
              - border-radius: 50%
              - padding: 0
              - background: |
                  [[[ 
                    return entity.state === 'on'
                      ? 'rgba(129,199,132,0.25)'
                      : 'rgba(255,255,255,0.08)';
                  ]]]
              - border: |
                  [[[ 
                    return entity.state === 'on'
                      ? '1px solid rgba(129,199,132,0.55)'
                      : '1px solid rgba(255,255,255,0.12)';
                  ]]]
              - box-shadow: none
            icon:
              - width: 19px
              - color: |
                  [[[ 
                    return entity.state === 'on'
                      ? '#81c784'
                      : 'rgba(255,255,255,0.55)';
                  ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 12px 14px
        - min-height: 72px
        - background: |
            [[[ 
              const enabled = states['input_boolean.brewassistant_biab_calibration_enabled']?.state === 'on';
              const sev = entity.state;

              if (!enabled || sev === 'disabled') {
                return 'linear-gradient(135deg, rgba(66,66,66,0.42), rgba(25,25,25,0.36))';
              }
              if (sev === 'ok') {
                return 'linear-gradient(135deg, rgba(46,125,50,0.34), rgba(13,71,161,0.18))';
              }
              if (sev === 'warning') {
                return 'linear-gradient(135deg, rgba(245,124,0,0.34), rgba(38,50,56,0.36))';
              }
              if (sev === 'error') {
                return 'linear-gradient(135deg, rgba(183,28,28,0.38), rgba(38,50,56,0.38))';
              }
              return 'linear-gradient(135deg, rgba(25,118,210,0.30), rgba(38,50,56,0.42))';
            ]]]
        - border: 1px solid rgba(255,255,255,0.10)
        - box-shadow: 0 8px 26px rgba(0,0,0,0.22)
      grid:
        - grid-template-areas: "\"i n power\" \"i l power\""
        - grid-template-columns: 42px 1fr 42px
        - grid-template-rows: min-content min-content
        - column-gap: 12px
        - row-gap: 2px
      icon:
        - width: 28px
        - color: |
            [[[ 
              const enabled = states['input_boolean.brewassistant_biab_calibration_enabled']?.state === 'on';
              const sev = entity.state;
              if (!enabled || sev === 'disabled') return 'rgba(255,255,255,0.45)';
              if (sev === 'ok') return '#a5d6a7';
              if (sev === 'warning') return '#ffcc80';
              if (sev === 'error') return '#ef9a9a';
              return '#90caf9';
            ]]]
      img_cell:
        - width: 42px
        - height: 42px
        - border-radius: 15px
        - background: rgba(255,255,255,0.08)
      name:
        - justify-self: start
        - font-size: 16px
        - font-weight: 900
        - color: rgba(255,255,255,0.96)
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
        - line-height: 1.35
        - color: rgba(255,255,255,0.78)
      custom_fields:
        power:
          - justify-self: end
          - align-self: start
  - type: conditional
    conditions:
      - entity: input_boolean.brewassistant_biab_calibration_enabled
        state: "on"
    card:
      type: vertical-stack
      cards:
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:button-card
              name: 20L
              icon: mdi:numeric-20-circle-outline
              tap_action:
                action: call-service
                service: script.brewassistant_biab_load_20l_profile
              styles:
                card:
                  - height: 42px
                  - border-radius: 18px
                  - padding: 6px
                  - background: rgba(144,202,249,0.18)
                  - border: 1px solid rgba(144,202,249,0.35)
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#90caf9"
                name:
                  - font-size: 12px
                  - font-weight: 900
                  - color: rgba(255,255,255,0.92)
            - type: custom:button-card
              name: 9L
              icon: mdi:numeric-9-circle-outline
              tap_action:
                action: call-service
                service: script.brewassistant_biab_load_9l_profile
              styles:
                card:
                  - height: 42px
                  - border-radius: 18px
                  - padding: 6px
                  - background: rgba(255,213,79,0.18)
                  - border: 1px solid rgba(255,213,79,0.35)
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#ffd54f"
                name:
                  - font-size: 12px
                  - font-weight: 900
                  - color: rgba(255,255,255,0.92)
            - type: custom:button-card
              name: Reset
              icon: mdi:restore
              tap_action:
                action: call-service
                service: script.brewassistant_biab_reset_measurements
              styles:
                card:
                  - height: 42px
                  - border-radius: 18px
                  - padding: 6px
                  - background: rgba(239,83,80,0.16)
                  - border: 1px solid rgba(239,83,80,0.35)
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#ef9a9a"
                name:
                  - font-size: 12px
                  - font-weight: 900
                  - color: rgba(255,255,255,0.92)
        - type: custom:mushroom-template-card
          entity: sensor.brewassistant_biab_brew_day_summary
          primary: >-
            Bryggläge: {{ states('sensor.brewassistant_biab_brew_day_mode_sv')
            }}
          secondary: >
            {{ states('sensor.brewassistant_biab_brew_day_readiness_sv') }} · {{
            states('sensor.brewassistant_biab_brew_day_instruction') }}
          icon: mdi:clipboard-flow-outline
          icon_color: >
            {% set p = states('sensor.brewassistant_biab_brew_day_progress') |
            int(0) %} {% if p >= 100 %}
              green
            {% elif p >= 60 %}
              amber
            {% elif p >= 40 %}
              blue
            {% else %}
              grey
            {% endif %}
          multiline_secondary: true
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                margin: 8px 8px 0 8px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
              }
        - type: grid
          columns: 5
          square: false
          cards:
            - type: custom:button-card
              name: Plan
              icon: mdi:clipboard-edit-outline
              tap_action:
                action: call-service
                service: script.brewassistant_biab_mode_planning
              styles:
                card:
                  - height: 54px
                  - border-radius: 16px
                  - padding: 6px
                  - background: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Planning'
                          ? 'rgba(144,202,249,0.24)'
                          : 'rgba(255,255,255,0.045)';
                      ]]]
                  - border: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Planning'
                          ? '1px solid rgba(144,202,249,0.55)'
                          : '1px solid rgba(255,255,255,0.07)';
                      ]]]
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#90caf9"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.86)
            - type: custom:button-card
              name: Före
              icon: mdi:kettle-steam-outline
              tap_action:
                action: call-service
                service: script.brewassistant_biab_mode_pre_boil
              styles:
                card:
                  - height: 54px
                  - border-radius: 16px
                  - padding: 6px
                  - background: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Pre-boil check'
                          ? 'rgba(129,199,132,0.24)'
                          : 'rgba(255,255,255,0.045)';
                      ]]]
                  - border: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Pre-boil check'
                          ? '1px solid rgba(129,199,132,0.55)'
                          : '1px solid rgba(255,255,255,0.07)';
                      ]]]
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#81c784"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.86)
            - type: custom:button-card
              name: Efter
              icon: mdi:kettle-steam
              tap_action:
                action: call-service
                service: script.brewassistant_biab_mode_post_boil
              styles:
                card:
                  - height: 54px
                  - border-radius: 16px
                  - padding: 6px
                  - background: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Post-boil check'
                          ? 'rgba(255,213,79,0.24)'
                          : 'rgba(255,255,255,0.045)';
                      ]]]
                  - border: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Post-boil check'
                          ? '1px solid rgba(255,213,79,0.55)'
                          : '1px solid rgba(255,255,255,0.07)';
                      ]]]
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#ffd54f"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.86)
            - type: custom:button-card
              name: Jäs
              icon: mdi:fermentation
              tap_action:
                action: call-service
                service: script.brewassistant_biab_mode_fermenter
              styles:
                card:
                  - height: 54px
                  - border-radius: 16px
                  - padding: 6px
                  - background: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Fermenter check'
                          ? 'rgba(171,71,188,0.24)'
                          : 'rgba(255,255,255,0.045)';
                      ]]]
                  - border: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Fermenter check'
                          ? '1px solid rgba(171,71,188,0.55)'
                          : '1px solid rgba(255,255,255,0.07)';
                      ]]]
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#ce93d8"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.86)
            - type: custom:button-card
              name: Klar
              icon: mdi:clipboard-check-outline
              tap_action:
                action: call-service
                service: script.brewassistant_biab_mode_summary
              styles:
                card:
                  - height: 54px
                  - border-radius: 16px
                  - padding: 6px
                  - background: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Summary'
                          ? 'rgba(102,187,106,0.26)'
                          : 'rgba(255,255,255,0.045)';
                      ]]]
                  - border: |
                      [[[ 
                        return states['input_select.brewassistant_biab_brew_day_mode']?.state === 'Summary'
                          ? '1px solid rgba(102,187,106,0.58)'
                          : '1px solid rgba(255,255,255,0.07)';
                      ]]]
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: "#a5d6a7"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.86)
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_mash_efficiency
              primary: Mäskutbyte
              secondary: >
                {{ states('sensor.brewassistant_biab_mash_efficiency') }} % · Δ
                {{ states('sensor.brewassistant_biab_mash_efficiency_delta') }}
                %
              icon: mdi:percent-circle
              icon_color: >
                {% set d =
                states('sensor.brewassistant_biab_mash_efficiency_delta') |
                float(0) %} {% if
                states('sensor.brewassistant_biab_mash_efficiency') in
                ['unknown','unavailable'] %}
                  grey
                {% elif d | abs >= 5 %}
                  orange
                {% else %}
                  green
                {% endif %}
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_brewhouse_efficiency
              primary: Brygghusutbyte
              secondary: "{{ states('sensor.brewassistant_biab_brewhouse_efficiency') }} %"
              icon: mdi:home-percent-outline
              icon_color: blue
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_actual_boil_off_rate
              primary: Faktiskt bortkok
              secondary: >
                {{ states('sensor.brewassistant_biab_actual_boil_off_rate') }}
                L/h · Δ {{ states('sensor.brewassistant_biab_boil_off_delta') }}
                L/h
              icon: mdi:waves-arrow-up
              icon_color: >
                {% set d = states('sensor.brewassistant_biab_boil_off_delta') |
                float(0) %} {% if
                states('sensor.brewassistant_biab_actual_boil_off_rate') in
                ['unknown','unavailable'] %}
                  grey
                {% elif d | abs >= 0.4 %}
                  orange
                {% else %}
                  green
                {% endif %}
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_actual_trub_chiller_loss
              primary: Trub/kylförlust
              secondary: >
                {{ states('sensor.brewassistant_biab_actual_trub_chiller_loss')
                }} L · Δ {{ states('sensor.brewassistant_biab_trub_loss_delta')
                }} L
              icon: mdi:beaker-minus-outline
              icon_color: >
                {% set d = states('sensor.brewassistant_biab_trub_loss_delta') |
                float(0) %} {% if
                states('sensor.brewassistant_biab_actual_trub_chiller_loss') in
                ['unknown','unavailable'] %}
                  grey
                {% elif d | abs >= 0.4 %}
                  orange
                {% else %}
                  green
                {% endif %}
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_planned_og
              primary: Planerad OG
              secondary: >
                {{ states('sensor.brewassistant_biab_planned_og') }} · pre-boil
                {{ states('sensor.brewassistant_biab_planned_pre_boil_sg') }}
              icon: mdi:target-variant
              icon_color: purple
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_biab_og_assessment_sv
              primary: OG-status
              secondary: "{{ states('sensor.brewassistant_biab_og_assessment_sv') }}"
              icon: mdi:hydrometer
              icon_color: >
                {% set m =
                states('sensor.brewassistant_biab_measured_og_delta_points') |
                float(0) %} {% set e =
                states('sensor.brewassistant_biab_estimated_og_delta_points') |
                float(0) %} {% set has_m =
                states('sensor.brewassistant_biab_measured_og_delta_points') not
                in ['unknown','unavailable'] %} {% set has_e =
                states('sensor.brewassistant_biab_estimated_og_delta_points')
                not in ['unknown','unavailable'] %} {% set d = m if has_m else e
                %} {% if not has_m and not has_e %}
                  grey
                {% elif d | abs <= 2 %}
                  green
                {% elif d | abs <= 5 %}
                  amber
                {% else %}
                  orange
                {% endif %}
              multiline_secondary: true
              tap_action:
                action: more-info
              card_mod:
                style: |
                  ha-card {
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                  }
        - type: custom:expander-card
          title: Mätvärden för aktuellt bryggläge
          padding: 0
          clear: false
          cards:
            - type: conditional
              conditions:
                - entity: input_select.brewassistant_biab_brew_day_mode
                  state: Planning
              card:
                type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: input_number.brewassistant_biab_grain_bill_kg
                    primary: Maltmängd
                    secondary: >
                      {{ states('input_number.brewassistant_biab_grain_bill_kg')
                      }} kg · mata in total maltmängd för receptet
                    icon: mdi:barley
                    icon_color: amber
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 0 8px;
                          border-radius: 18px;
                          background: rgba(255,255,255,0.045);
                          border: 1px solid rgba(255,255,255,0.07);
                          box-shadow: none;
                        }
                  - type: custom:mushroom-template-card
                    entity: input_select.brewassistant_biab_calibration_profile
                    primary: Aktiv profil
                    secondary: >-
                      {{
                      states('input_select.brewassistant_biab_calibration_profile')
                      }}
                    icon: mdi:kettle
                    icon_color: blue
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 0 8px;
                          border-radius: 18px;
                          background: rgba(255,255,255,0.045);
                          border: 1px solid rgba(255,255,255,0.07);
                          box-shadow: none;
                        }
                  - type: custom:mushroom-template-card
                    entity: sensor.brewassistant_biab_planned_og
                    primary: Planerad OG
                    secondary: >
                      {{ states('sensor.brewassistant_biab_planned_og') }} ·
                      förväntad pre-boil SG {{
                      states('sensor.brewassistant_biab_planned_pre_boil_sg') }}
                    icon: mdi:target-variant
                    icon_color: purple
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 0 8px;
                          border-radius: 18px;
                          background: rgba(255,255,255,0.045);
                          border: 1px solid rgba(255,255,255,0.07);
                          box-shadow: none;
                        }
                  - type: custom:mushroom-template-card
                    entity: sensor.brewassistant_biab_brew_day_next_measurement_sv
                    primary: Nästa steg
                    secondary: >-
                      {{
                      states('sensor.brewassistant_biab_brew_day_next_measurement_sv')
                      }}
                    icon: mdi:arrow-right-circle-outline
                    icon_color: cyan
                    multiline_secondary: true
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 8px 8px;
                          border-radius: 18px;
                          background: rgba(144,202,249,0.08);
                          border: 1px solid rgba(144,202,249,0.18);
                          box-shadow: none;
                        }
            - type: conditional
              conditions:
                - entity: input_select.brewassistant_biab_brew_day_mode
                  state: Pre-boil check
              card:
                type: vertical-stack
                cards:
                  - type: custom:mushroom-template-card
                    entity: input_number.brewassistant_biab_grain_bill_kg
                    primary: Maltmängd
                    secondary: >-
                      {{ states('input_number.brewassistant_biab_grain_bill_kg')
                      }} kg
                    icon: mdi:barley
                    icon_color: amber
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 0 8px;
                          border-radius: 18px;
                          background: rgba(255,255,255,0.045);
                          border: 1px solid rgba(255,255,255,0.07);
                          box-shadow: none;
                        }
                  - type: custom:mushroom-template-card
                    entity: input_number.brewassistant_biab_measured_pre_boil_volume_l
                    primary: Pre-boil volume
                    secondary: >
                      {{
                      states('input_number.brewassistant_biab_measured_pre_boil_volume_l')
                      }} L · planerat {{
                      states('input_number.brewassistant_biab_planned_pre_boil_volume_l')
                      }} L
                    icon: mdi:kettle-steam-outline
                    icon_color: blue
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
                        ha-card {
                          margin: 8px 8px 0 8px;
                          border-radius: 18px;
                          background: rgba(255,255,255,0.045);
                          border: 1px solid rgba(255,255,255,0.07);
                          box-shadow: none;
                        }
                  - type: custom:mushroom-template-card
                    entity: input_number.brewassistant_biab_measured_pre_boil_sg
                    primary: Pre-boil SG
                    secondary: >
                      {{
                      states('input_number.brewassistant_biab_measured_pre_boil_sg')
                      }} · planerat {{
                      states('sensor.brewassistant_biab_planned_pre_boil_sg') }}
                      · Δ {{
                      states('sensor.brewassistant_biab_pre_boil_sg_delta_points')
                      }} p
                    icon: mdi:hydrometer
                    icon_color: cyan
                    tap_action:
                      action: more-info
                    card_mod:
                      style: |
