type: custom:stack-in-card
mode: vertical
cards:
  - type: custom:button-card
    entity: sensor.fwk_process_status
    name: Fermentation Process
    show_state: true
    show_label: true
    show_name: true
    show_icon: true
    icon: |
      [[[ 
        const enabled = states['input_boolean.fwk_process_card_enabled']?.state === 'on';
        if (!enabled) return 'mdi:beer-outline';

        const s = states['sensor.fwk_process_status']?.state ?? 'Idle';
        if (s === 'Cold crash') return 'mdi:snowflake';
        if (s === 'Ready for cold crash') return 'mdi:thermometer-chevron-down';
        if (s === 'Ready for transfer') return 'mdi:transfer-right';
        if (s === 'Dry hop now') return 'mdi:leaf-circle';
        if (s === 'Install spunding') return 'mdi:gauge';
        if (s === 'Finished / transferred to keg') return 'mdi:check-circle';
        if (s === 'Primary fermentation') return 'mdi:beer';
        return 'mdi:beer-outline';
      ]]]
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: input_boolean.fwk_process_card_enabled
          show_name: false
          show_state: false
          show_icon: true
          icon: mdi:power
          tap_action:
            action: toggle
          styles:
            card:
              - width: 42px
              - height: 42px
              - border-radius: 50%
              - padding: 0
              - background: |
                  [[[ 
                    return entity?.state === 'on'
                      ? 'rgba(255,255,255,0.22)'
                      : 'rgba(255,255,255,0.12)';
                  ]]]
              - box-shadow: none
            icon:
              - width: 22px
              - color: |
                  [[[ 
                    return entity?.state === 'on'
                      ? '#90caf9'
                      : 'rgba(255,255,255,0.65)';
                  ]]]
      chip:
        card:
          type: custom:button-card
          entity: sensor.fwk_next_step
          show_icon: true
          show_name: false
          show_state: false
          show_label: true
          icon: mdi:progress-clock
          label: |
            [[[ 
              const next = states['sensor.fwk_next_step']?.state ?? '-';
              const daysLeft = states['sensor.recipe_runtime_fermenting_days_left']?.state;
              const leftText = (daysLeft && !['unknown','unavailable','none',''].includes(daysLeft))
                ? `${Number(daysLeft).toFixed(1)} d kvar`
                : 'tid okänd';
              return `${next} · ${leftText}`;
            ]]]
          styles:
            card:
              - height: 34px
              - border-radius: 14px
              - padding: 4px 10px
              - background: rgba(255,255,255,0.08)
              - border: 1px solid rgba(255,255,255,0.08)
              - box-shadow: none
            grid:
              - grid-template-areas: "\"i l\""
              - grid-template-columns: 22px 1fr
            icon:
              - width: 18px
              - color: "#90caf9"
            label:
              - justify-self: start
              - font-size: 11px
              - font-weight: 700
              - color: rgba(255,255,255,0.9)
              - white-space: nowrap
              - overflow: hidden
              - text-overflow: ellipsis
      progress: |
        [[[ 
          const enabled = states['input_boolean.fwk_process_card_enabled']?.state === 'on';
          if (!enabled) return '';

          const raw = Number(states['sensor.fwk_attenuation']?.state ?? 0);
          const att = isNaN(raw) ? 0 : raw;
          const pct = Math.max(0, Math.min(att, 100));
          const shown = Math.round(att);

          let bar = 'linear-gradient(90deg, rgba(66,165,245,0.95), rgba(38,198,218,0.95))';
          let glow = 'rgba(66,165,245,0.28)';
          let status = 'tidig / aktiv jäsning';

          if (att >= 75 && att <= 100) {
            bar = 'linear-gradient(90deg, rgba(102,187,106,0.95), rgba(139,195,74,0.95))';
            glow = 'rgba(102,187,106,0.28)';
            status = 'nära mål';
          }
          if (att > 100) {
            bar = 'linear-gradient(90deg, rgba(255,193,7,0.95), rgba(255,152,0,0.95))';
            glow = 'rgba(255,193,7,0.30)';
            status = 'över beräknad FG';
          }

          return `
            <div style="margin-top:10px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:11px;font-weight:800;color:rgba(255,255,255,0.88);">
                <span>Fermentation progress</span>
                <span>${shown}% · ${status}</span>
              </div>
              <div style="height:9px;border-radius:999px;background:rgba(255,255,255,0.13);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.35);">
                <div style="width:${pct}%;height:100%;border-radius:999px;background:${bar};box-shadow:0 0 14px ${glow};transition:width 0.6s ease;"></div>
              </div>
            </div>
          `;
        ]]]
    label: |
      [[[ 
        const enabled = states['input_boolean.fwk_process_card_enabled']?.state === 'on';

        if (!enabled) {
          return `
            <div style="line-height:1.45;">
              <div>Status: Standby</div>
              <div>Fermentation process card disabled</div>
              <div>Tap power to show workflow, actions and details</div>
            </div>
          `;
        }

        const sg = states['sensor.fwk_live_sg']?.state;
        const temp = states['sensor.fwk_live_temp']?.state;
        const att = states['sensor.fwk_attenuation']?.state;
        const bfStatus = states['sensor.recipe_runtime_status']?.state;
        const processStatus = states['sensor.fwk_process_status']?.state ?? 'Idle';
        const statusText = (bfStatus && !['unknown','unavailable','none',''].includes(bfStatus)) ? bfStatus : processStatus;
        const sgUpdated = states['sensor.fwk_sg_last_updated']?.state;
        const planned = states['sensor.fwk_planned_summary']?.state ?? '';

        const sgText = (sg && !['unknown','unavailable'].includes(sg)) ? Number(sg).toFixed(3) : 'unknown';
        const tempText = (temp && !['unknown','unavailable'].includes(temp)) ? `${Number(temp).toFixed(1)} °C` : 'unknown';
        const attText = (att && !['unknown','unavailable'].includes(att)) ? `${Number(att).toFixed(0)} %` : '0 %';
        const sgUpdatedText = (sgUpdated && !['unknown','unavailable'].includes(sgUpdated))
          ? new Date(sgUpdated).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' })
          : 'unknown';

        let plannedShort = planned.replaceAll(' | ', ' · ');
        if (plannedShort.length > 88) plannedShort = plannedShort.substring(0, 85) + '...';

        return `
          <div style="line-height:1.45;">
            <div>Status: ${statusText}</div>
            <div>SG: ${sgText} (${sgUpdatedText}) · Temp: ${tempText} · Att: ${attText}</div>
            <div>${plannedShort}</div>
          </div>
        `;
      ]]]
    tap_action:
      action: more-info
      entity: climate.fermentation_chamber
    hold_action:
      action: none
    styles:
      grid:
        - grid-template-areas: >-
            "i n power" "i s power" "i l power" "chip chip chip" "progress
            progress progress"
        - grid-template-columns: 72px 1fr 48px
        - grid-template-rows: min-content min-content 1fr min-content min-content
      card:
        - padding: 18px
        - border-radius: 24px
        - box-shadow: 0 12px 32px rgba(0,0,0,0.38)
        - background: |
            [[[ 
              const enabled = states['input_boolean.fwk_process_card_enabled']?.state === 'on';
              if (!enabled) return 'linear-gradient(135deg, rgba(45,45,55,0.96), rgba(20,20,30,0.96))';
              const state = entity?.state ?? '';
              if (state === 'Cold crash') return 'linear-gradient(135deg, rgba(30,55,85,0.96), rgba(10,20,40,0.96))';
              if (state === 'Ready for cold crash') return 'linear-gradient(135deg, rgba(40,65,95,0.96), rgba(15,25,50,0.96))';
              if (state === 'Dry hop now') return 'linear-gradient(135deg, rgba(25,70,40,0.96), rgba(10,30,20,0.96))';
              if (state === 'Install spunding') return 'linear-gradient(135deg, rgba(95,70,25,0.96), rgba(40,25,10,0.96))';
              if (state === 'Ready for transfer') return 'linear-gradient(135deg, rgba(80,80,35,0.96), rgba(30,30,10,0.96))';
              if (state === 'Finished / transferred to keg') return 'linear-gradient(135deg, rgba(25,70,50,0.96), rgba(10,30,20,0.96))';
              if (state === 'Primary fermentation') return 'linear-gradient(135deg, rgba(80,55,35,0.96), rgba(30,20,10,0.96))';
              return 'linear-gradient(135deg, rgba(45,45,55,0.96), rgba(20,20,30,0.96))';
            ]]]
      img_cell:
        - justify-self: center
        - align-self: start
        - width: 52px
        - height: 52px
        - border-radius: 50%
        - background: rgba(255,255,255,0.12)
        - backdrop-filter: blur(6px)
      icon:
        - color: white
        - width: 34px
      name:
        - justify-self: start
        - align-self: end
        - font-size: 18px
        - font-weight: 800
        - color: white
        - white-space: normal
        - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
      state:
        - justify-self: start
        - align-self: start
        - font-size: 14px
        - font-weight: 700
        - color: rgba(255,255,255,0.88)
        - white-space: normal
      label:
        - justify-self: start
        - align-self: start
        - text-align: left
        - padding-top: 6px
        - font-size: 13px
        - line-height: 1.45
        - color: rgba(255,255,255,0.96)
        - white-space: normal
      custom_fields:
        power:
          - justify-self: end
          - align-self: start
        chip:
          - margin-top: 12px
          - width: 100%
        progress:
          - width: 100%
  - type: conditional
    conditions:
      - entity: input_boolean.fwk_process_card_enabled
        state: "on"
    card:
      type: vertical-stack
      cards:
        - type: grid
          columns: 4
          square: false
          cards:
            - type: custom:button-card
              entity: sensor.fwk_live_temp
              name: Temp
              icon: mdi:thermometer
              show_state: true
              state_display: |
                [[[ 
                  const v = entity?.state;
                  if (!v || v === 'unknown' || v === 'unavailable') return '-';
                  return `${Number(v).toFixed(1)} °C`;
                ]]]
              tap_action:
                action: more-info
              styles:
                card:
                  - height: 78px
                  - border-radius: 18px
                  - padding: 10px 6px
                  - background: rgba(120,170,255,0.14)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  - border: 1px solid rgba(255,255,255,0.06)
                icon:
                  - width: 24px
                  - color: "#90caf9"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.88)
                  - white-space: normal
                state:
                  - font-size: 14px
                  - font-weight: 900
                  - color: white
            - type: custom:button-card
              entity: sensor.fwk_live_sg
              name: SG
              icon: mdi:chart-line
              show_state: true
              state_display: |
                [[[ 
                  const v = entity?.state;
                  if (!v || v === 'unknown' || v === 'unavailable') return '-';
                  return Number(v).toFixed(3);
                ]]]
              tap_action:
                action: more-info
              styles:
                card:
                  - height: 78px
                  - border-radius: 18px
                  - padding: 10px 6px
                  - background: rgba(120,170,255,0.14)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  - border: 1px solid rgba(255,255,255,0.06)
                icon:
                  - width: 24px
                  - color: "#90caf9"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.88)
                  - white-space: normal
                state:
                  - font-size: 14px
                  - font-weight: 900
                  - color: white
            - type: custom:button-card
              entity: sensor.fwk_gravity_points_left
              name: Points Left
              icon: mdi:water-percent
              show_state: true
              state_display: |
                [[[ 
                  const v = Number(entity?.state ?? 0);
                  if (isNaN(v)) return '-';
                  return `${Math.round(v * 1000)} p`;
                ]]]
              tap_action:
                action: more-info
              styles:
                card:
                  - height: 78px
                  - border-radius: 18px
                  - padding: 10px 6px
                  - background: rgba(120,170,255,0.14)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  - border: 1px solid rgba(255,255,255,0.06)
                icon:
                  - width: 24px
                  - color: "#90caf9"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.88)
                  - white-space: normal
                state:
                  - font-size: 14px
                  - font-weight: 900
                  - color: white
            - type: custom:button-card
              entity: sensor.recipe_runtime_fermenting_days_left
              name: Days Left
              icon: mdi:calendar-clock
              show_state: true
              state_display: |
                [[[ 
                  const v = entity?.state;
                  if (!v || v === 'unknown' || v === 'unavailable') return '-';
                  return `${Number(v).toFixed(1)} d`;
                ]]]
              tap_action:
                action: more-info
              styles:
                card:
                  - height: 78px
                  - border-radius: 18px
                  - padding: 10px 6px
                  - background: rgba(120,170,255,0.14)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  - border: 1px solid rgba(255,255,255,0.06)
                icon:
                  - width: 24px
                  - color: "#90caf9"
                name:
                  - font-size: 11px
                  - font-weight: 800
                  - color: rgba(255,255,255,0.88)
                  - white-space: normal
                state:
                  - font-size: 14px
                  - font-weight: 900
                  - color: white
        - type: custom:vertical-stack-in-card
          cards:
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-template-card
                  entity: sensor.brewfather_next_fermentation_step
                  primary: Nästa jästeg
                  secondary: >
                    {% set event_time =
                    state_attr('sensor.brewfather_next_fermentation_step',
                    'time') %} {% set label =
                    states('sensor.brewfather_next_fermentation_step') %} {% if
                    event_time %}
                      {{ as_timestamp(event_time) | timestamp_custom('%-d/%-m kl %H:%M', true) }} · {{ label }}
                    {% else %}
                      {{ label }}
                    {% endif %}
                  icon: mdi:timeline-clock
                  icon_color: blue
                  multiline_secondary: true
                  tap_action:
                    action: more-info
                  card_mod:
                    style: >
                      {% set t =
                      state_attr('sensor.brewfather_next_fermentation_step',
                      'time') %}

                      {% set due = t and ((as_timestamp(t) -
                      as_timestamp(now())) <= 86400) and ((as_timestamp(t) -
                      as_timestamp(now())) > -7200) %}

                      ha-card {
                        border-radius: 18px;
                        background: {% if due %}linear-gradient(135deg, rgba(3,169,244,0.22), rgba(255,255,255,0.055)){% else %}rgba(255,255,255,0.045){% endif %};
                        border: 1px solid {% if due %}rgba(3,169,244,0.55){% else %}rgba(255,255,255,0.07){% endif %};
                        box-shadow: {% if due %}0 0 18px rgba(3,169,244,0.22){% else %}none{% endif %};
                      }
                - type: custom:mushroom-template-card
                  entity: sensor.brewfather_next_dry_hop
                  primary: Nästa torrhumling
                  secondary: >
                    {% set event_time =
                    state_attr('sensor.brewfather_next_dry_hop', 'time') %} {%
                    set label = states('sensor.brewfather_next_dry_hop') %} {%
                    if event_time %}
                      {{ as_timestamp(event_time) | timestamp_custom('%-d/%-m kl %H:%M', true) }} · {{ label }}
                    {% else %}
                      {{ label }}
                    {% endif %}
                  icon: mdi:leaf
                  icon_color: green
                  multiline_secondary: true
                  tap_action:
                    action: more-info
                  card_mod:
                    style: >
                      {% set t = state_attr('sensor.brewfather_next_dry_hop',
                      'time') %}

                      {% set label = states('sensor.brewfather_next_dry_hop') %}

                      {% set has_event = label not in
                      ['unknown','unavailable','none','','Ingen kommande
                      torrhumling'] %}

                      {% set due = has_event and t and ((as_timestamp(t) -
                      as_timestamp(now())) <= 86400) and ((as_timestamp(t) -
                      as_timestamp(now())) > -7200) %}

                      ha-card {
                        border-radius: 18px;
                        background: {% if due %}linear-gradient(135deg, rgba(76,175,80,0.24), rgba(255,255,255,0.055)){% else %}rgba(255,255,255,0.045){% endif %};
                        border: 1px solid {% if due %}rgba(76,175,80,0.60){% else %}rgba(255,255,255,0.07){% endif %};
                        box-shadow: {% if due %}0 0 18px rgba(76,175,80,0.24){% else %}none{% endif %};
                      }
                - type: custom:mushroom-template-card
                  entity: sensor.brewfather_next_bottling_day
                  primary: Tappningsdag
                  secondary: >
                    {% set event_time =
                    state_attr('sensor.brewfather_next_bottling_day', 'time') %}
                    {% set label = states('sensor.brewfather_next_bottling_day')
                    %} {% if event_time %}
                      {{ as_timestamp(event_time) | timestamp_custom('%-d/%-m kl %H:%M', true) }}
                    {% else %}
                      {{ label }}
                    {% endif %}
                  icon: mdi:bottle-wine-outline
                  icon_color: amber
                  multiline_secondary: true
                  tap_action:
                    action: more-info
                  card_mod:
                    style: >
                      {% set t =
                      state_attr('sensor.brewfather_next_bottling_day', 'time')
                      %}

                      {% set due = t and ((as_timestamp(t) -
                      as_timestamp(now())) <= 86400) and ((as_timestamp(t) -
                      as_timestamp(now())) > -7200) %}

                      ha-card {
                        border-radius: 18px;
                        background: {% if due %}linear-gradient(135deg, rgba(255,193,7,0.22), rgba(255,255,255,0.055)){% else %}rgba(255,255,255,0.045){% endif %};
                        border: 1px solid {% if due %}rgba(255,193,7,0.58){% else %}rgba(255,255,255,0.07){% endif %};
                        box-shadow: {% if due %}0 0 18px rgba(255,193,7,0.23){% else %}none{% endif %};
                      }
                - type: custom:mushroom-template-card
                  entity: sensor.brewfather_fermentation_event_summary
                  primary: Sammanfattning
                  secondary: "{{ states('sensor.brewfather_fermentation_event_summary') }}"
                  icon: mdi:calendar-star
                  icon_color: purple
                  multiline_secondary: true
                  tap_action:
                    action: more-info
                  card_mod:
                    style: >
                      {% set current = states('sensor.fwk_current_action_stage')
                      %}

                      {% set active = current not in
                      ['none','unknown','unavailable',''] %}

                      ha-card {
                        border-radius: 18px;
                        background: {% if active %}linear-gradient(135deg, rgba(156,39,176,0.20), rgba(255,255,255,0.055)){% else %}rgba(255,255,255,0.045){% endif %};
                        border: 1px solid {% if active %}rgba(156,39,176,0.48){% else %}rgba(255,255,255,0.07){% endif %};
                        box-shadow: {% if active %}0 0 16px rgba(156,39,176,0.18){% else %}none{% endif %};
                      }
          card_mod:
            style: |
              ha-card {
                margin: 8px 0 6px 0;
                padding: 10px;
                border-radius: 22px;
                background: linear-gradient(135deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
                border: 1px solid rgba(255,255,255,0.08);
                box-shadow: none;
                overflow: hidden;
              }
        - type: conditional
          conditions:
            - entity: sensor.fwk_current_action_stage
              state_not: none
          card:
            type: custom:button-card
            entity: sensor.fwk_current_action_stage
            name: Action due
            icon: |
              [[[ 
                const stage = entity?.state ?? 'none';
                if (stage === 'spunding') return 'mdi:gauge';
                if (stage === 'dry_hop') return 'mdi:leaf';
                if (stage === 'cold_crash') return 'mdi:snowflake';
                if (stage === 'transfer') return 'mdi:transfer-right';
                return 'mdi:alert-circle-outline';
              ]]]
            show_state: true
            show_label: true
            label: |
              [[[ 
                const stage = entity?.state ?? 'none';
                if (stage === 'spunding') return 'Spunding är aktivt steg · öppna Process Actions vid behov';
                if (stage === 'dry_hop') return 'Torrhumling är aktivt steg · öppna Process Actions när du är redo';
                if (stage === 'cold_crash') return 'Cold crash är aktivt steg · öppna Process Actions när du är redo';
                if (stage === 'transfer') return 'Transfer är aktivt steg · öppna Process Actions när du är redo';
                return 'Aktivt steg finns · öppna Process Actions vid behov';
              ]]]
            tap_action:
              action: none
            styles:
              card:
                - border-radius: 18px
                - padding: 12px 14px
                - background: >-
                    linear-gradient(135deg, rgba(255,193,7,0.20),
                    rgba(255,255,255,0.045))
                - border: 1px solid rgba(255,193,7,0.45)
                - box-shadow: 0 0 18px rgba(255,193,7,0.16)
              grid:
                - grid-template-areas: "\"i n\" \"i s\" \"i l\""
                - grid-template-columns: 42px 1fr
              icon:
                - width: 24px
                - color: "#ffca28"
              name:
                - justify-self: start
                - font-size: 13px
                - font-weight: 900
                - color: white
              state:
                - justify-self: start
                - font-size: 12px
                - font-weight: 800
                - color: rgba(255,255,255,0.88)
              label:
                - justify-self: start
                - font-size: 12px
                - color: rgba(255,255,255,0.82)
                - white-space: normal
        - type: custom:expander-card
          title: Process Actions
          padding: 0
          clear: true
          cards:
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:button-card
                  name: Start Batch
                  icon: mdi:play-circle
                  tap_action:
                    action: call-service
                    service: script.fwk_start_batch
                  styles:
                    card:
                      - min-height: 72px
                      - border-radius: 18px
                      - padding: 12px
                      - background: rgba(255,255,255,0.065)
                      - border: 1px solid rgba(255,255,255,0.08)
                    icon:
                      - width: 24px
                      - color: white
                    name:
                      - font-size: 0.86rem
                      - font-weight: 800
                      - color: white
                      - white-space: normal
                - type: custom:button-card
                  name: Spunding
                  icon: mdi:gauge
                  tap_action:
                    action: call-service
                    service: script.fwk_mark_spunding_installed
                  styles:
                    card:
                      - min-height: 72px
                      - border-radius: 18px
                      - padding: 12px
                      - background: rgba(255,255,255,0.065)
                      - border: 1px solid rgba(255,255,255,0.08)
                    icon:
                      - width: 24px
                      - color: white
                    name:
                      - font-size: 0.86rem
                      - font-weight: 800
                      - color: white
                      - white-space: normal
                - type: custom:button-card
                  name: Dry Hop
                  icon: mdi:leaf
                  tap_action:
                    action: call-service
                    service: script.fwk_mark_dry_hop_added
                  styles:
                    card:
                      - min-height: 72px
                      - border-radius: 18px
                      - padding: 12px
                      - background: rgba(255,255,255,0.065)
                      - border: 1px solid rgba(255,255,255,0.08)
                    icon:
                      - width: 24px
                      - color: white
                    name:
                      - font-size: 0.86rem
                      - font-weight: 800
                      - color: white
                      - white-space: normal
                - type: custom:button-card
