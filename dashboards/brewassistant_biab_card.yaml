type: custom:stack-in-card
mode: vertical
cards:
  - type: custom:button-card
    entity: input_boolean.brewassistant_biab_active
    name: BrewAssistant BIAB
    icon: mdi:kettle-steam
    show_state: false
    show_label: true
    tap_action:
      action: toggle
    label: |
      [[[
        const active = states['input_boolean.brewassistant_biab_active']?.state === 'on';
        const stage = states['sensor.brewassistant_biab_current_stage']?.state ?? 'Idle';
        const progress = states['sensor.brewassistant_biab_progress']?.state ?? '0';
        const instruction = states['sensor.brewassistant_biab_instruction']?.state ?? '';
        if (!active) return 'Off · Tap to start brewday';
        return `${stage} · ${progress}%\n${instruction}`;
      ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 18px
        - color: white
        - background: |
            [[[
              return entity.state === 'on'
                ? 'linear-gradient(135deg, rgba(255,126,45,0.95), rgba(160,64,0,0.95))'
                : 'linear-gradient(135deg, rgba(35,39,47,0.95), rgba(15,17,22,0.95))';
            ]]]
        - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 48px 1fr
      icon:
        - width: 38px
        - color: white
      name:
        - font-size: 20px
        - font-weight: 800
        - justify-self: start
      label:
        - white-space: pre-line
        - font-size: 13px
        - opacity: 0.92
        - justify-self: start
  - type: conditional
    conditions:
      - entity: input_boolean.brewassistant_biab_active
        state: "on"
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-template-card
          primary: "{{ states('sensor.brewassistant_biab_current_stage') }}"
          secondary: "Progress: {{ states('sensor.brewassistant_biab_progress') }}%"
          icon: mdi:progress-check
          badge_icon: mdi:kettle
          multiline_secondary: true
          card_mod:
            style: |
              ha-card {
                border-radius: 18px !important;
                margin: 8px 8px 0 8px !important;
                background: rgba(255,255,255,0.05) !important;
                box-shadow: none !important;
              }
              mushroom-state-info {
                --card-primary-color: white;
                --card-secondary-color: rgba(255,255,255,0.72);
              }
        - type: custom:vertical-stack-in-card
          cards:
            - type: custom:button-card
              name: BIAB Calculations
              icon: mdi:calculator-variant
              show_state: false
              show_label: true
              label: |
                [[[
                  const model = states['input_select.brewassistant_biab_model']?.state ?? 'Unknown';
                  const malt = states['input_number.brewassistant_biab_malt_weight_kg']?.state ?? '0';
                  const pre = states['input_number.brewassistant_biab_pre_boil_volume_l']?.state ?? '0';
                  const mash = states['sensor.brewassistant_biab_mash_water_l']?.state ?? '0';
                  const sparge = states['sensor.brewassistant_biab_sparge_water_l']?.state ?? '0';

                  return `${model} · Malt ${malt} kg · Pre-boil ${pre} L\nMash water ${mash} L · Sparge ${sparge} L`;
                ]]]
              styles:
                card:
                  - border-radius: 20px
                  - padding: 16px
                  - color: white
                  - background: >-
                      linear-gradient(135deg, rgba(255,126,45,0.22),
                      rgba(20,24,31,0.96))
                  - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
                grid:
                  - grid-template-areas: "\"i n\" \"i l\""
                  - grid-template-columns: 44px 1fr
                icon:
                  - width: 34px
                  - color: "#ff9f43"
                name:
                  - font-size: 19px
                  - font-weight: 800
                  - justify-self: start
                label:
                  - white-space: pre-line
                  - font-size: 13px
                  - opacity: 0.9
                  - justify-self: start
            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:mushroom-select-card
                  entity: input_select.brewassistant_biab_model
                  name: DigiBoil model
                  icon: mdi:kettle
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.65);
                      }
                      ha-select, mwc-select {
                        --mdc-theme-primary: #ff9f43 !important;
                        --mdc-select-fill-color: rgba(255,255,255,0.08) !important;
                        --mdc-select-ink-color: white !important;
                        --mdc-select-label-ink-color: rgba(255,255,255,0.65) !important;
                      }
                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_malt_weight_kg
                  name: Malt weight
                  icon: mdi:grain
                  display_mode: buttons
                  layout: horizontal
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.65);
                      }
                      ha-textfield {
                        --mdc-text-field-fill-color: rgba(255,255,255,0.09) !important;
                        --mdc-text-field-ink-color: white !important;
                        --mdc-text-field-label-ink-color: rgba(255,255,255,0.65) !important;
                        --mdc-theme-primary: #ff9f43 !important;
                      }
                      ha-textfield input {
                        color: white !important;
                      }
                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_pre_boil_volume_l
                  name: Pre-boil volume
                  icon: mdi:kettle-steam
                  display_mode: buttons
                  layout: horizontal
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.65);
                      }
                      ha-textfield {
                        --mdc-text-field-fill-color: rgba(255,255,255,0.09) !important;
                        --mdc-text-field-ink-color: white !important;
                        --mdc-text-field-label-ink-color: rgba(255,255,255,0.65) !important;
                        --mdc-theme-primary: #ff9f43 !important;
                      }
                      ha-textfield input {
                        color: white !important;
                      }
                - type: custom:mushroom-template-card
                  primary: Mash water
                  secondary: "{{ states('sensor.brewassistant_biab_mash_water_l') }} L"
                  icon: mdi:water
                  icon_color: blue
                  layout: horizontal
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.75);
                      }
                - type: custom:mushroom-template-card
                  primary: Sparge water
                  secondary: "{{ states('sensor.brewassistant_biab_sparge_water_l') }} L"
                  icon: mdi:shower-head
                  icon_color: cyan
                  layout: horizontal
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.75);
                      }
                - type: custom:mushroom-template-card
                  primary: Total water
                  secondary: |
                    {{ 
                      (
                        states('sensor.brewassistant_biab_mash_water_l') | float(0) +
                        states('sensor.brewassistant_biab_sparge_water_l') | float(0)
                      ) | round(1)
                    }} L
                  icon: mdi:waves-arrow-up
                  icon_color: amber
                  layout: horizontal
                  card_mod:
                    style: |
                      ha-card {
                        border-radius: 18px !important;
                        background: rgba(255,255,255,0.06) !important;
                        box-shadow: none !important;
                      }
                      mushroom-state-info {
                        --card-primary-color: white;
                        --card-secondary-color: rgba(255,255,255,0.75);
                      }
            - type: custom:button-card
              name: Water Formula
              icon: mdi:flask-outline
              show_state: false
              show_label: true
              label: |
                [[[
                  const model = states['input_select.brewassistant_biab_model']?.state ?? 'DigiBoil 35';
                  if (model === 'DigiBoil 65') {
                    return 'Mash water = malt kg × 2.3 + 5\nSparge = pre-boil + malt kg − mash water';
                  }
                  return 'Mash water = malt kg × 2 + 5\nSparge = pre-boil + malt kg − mash water';
                ]]]
              styles:
                card:
                  - margin-top: 4px
                  - border-radius: 18px
                  - padding: 14px
                  - color: white
                  - background: rgba(255,255,255,0.045)
                  - box-shadow: none
                grid:
                  - grid-template-areas: "\"i n\" \"i l\""
                  - grid-template-columns: 38px 1fr
                icon:
                  - width: 28px
                  - color: "#ff9f43"
                name:
                  - font-size: 15px
                  - font-weight: 700
                  - justify-self: start
                label:
                  - white-space: pre-line
                  - font-size: 12px
                  - opacity: 0.8
                  - justify-self: start
          card_mod:
            style: |
              ha-card {
                border-radius: 22px !important;
                margin: 8px !important;
                padding: 10px !important;
                background: linear-gradient(180deg, rgba(24,27,34,0.98), rgba(12,14,18,0.98)) !important;
                box-shadow: 0 10px 28px rgba(0,0,0,0.35) !important;
                border: 1px solid rgba(255,255,255,0.08) !important;
              }
        - type: custom:vertical-stack-in-card
          cards:
            - type: custom:button-card
              name: BIAB Step Timer
              icon: mdi:timer-outline
              show_state: false
              show_label: true
              label: |
                [[[
                  const summary = states['sensor.brewassistant_biab_timer_summary']?.state ?? 'No timer';
                  const remaining = states['timer.brewassistant_biab_step_timer']?.attributes?.remaining ?? '—';
                  const finishes = states['timer.brewassistant_biab_step_timer']?.attributes?.finishes_at ?? '';
                  return `${summary}\nRemaining: ${remaining}`;
                ]]]
              styles:
                card:
                  - border-radius: 20px
                  - padding: 16px
                  - color: white
                  - background: linear-gradient(135deg, rgba(50,70,95,0.95), rgba(15,18,24,0.98))
                  - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
                grid:
                  - grid-template-areas: '"i n" "i l"'
                  - grid-template-columns: 44px 1fr
                icon:
                  - width: 34px
                  - color: "#00bcd4"
                name:
                  - font-size: 18px
                  - font-weight: 800
                  - justify-self: start
                label:
                  - white-space: pre-line
                  - font-size: 13px
                  - opacity: 0.9
                  - justify-self: start

            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_mash_minutes
                  name: Mash timer
                  icon: mdi:barley
                  display_mode: buttons
                  layout: horizontal

                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_mashout_minutes
                  name: Mash-out timer
                  icon: mdi:thermometer-chevron-up
                  display_mode: buttons
                  layout: horizontal

                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_boil_minutes
                  name: Boil timer
                  icon: mdi:fire
                  display_mode: buttons
                  layout: horizontal

                - type: custom:mushroom-number-card
                  entity: input_number.brewassistant_biab_cooling_minutes
                  name: Cooling estimate
                  icon: mdi:snowflake
                  display_mode: buttons
                  layout: horizontal
          card_mod:
            style: |
              ha-card {
                margin: 8px !important;
                padding: 10px !important;
                border-radius: 22px !important;
                background: linear-gradient(180deg, rgba(24,27,34,0.98), rgba(12,14,18,0.98)) !important;
                box-shadow: 0 10px 28px rgba(0,0,0,0.35) !important;
                border: 1px solid rgba(255,255,255,0.08) !important;
              }
        - type: conditional
          conditions:
            - entity: sensor.brewassistant_biab_warning_level
              state_not: ok
          card:
            type: custom:button-card
            entity: sensor.brewassistant_biab_warning_level
            name: BIAB Sanity Check
            icon: |
              [[[
                const level = entity.state;
                if (level === 'critical') return 'mdi:alert-octagon';
                if (level === 'warning') return 'mdi:alert';
                return 'mdi:check-circle';
              ]]]
            show_state: false
            show_label: true
            label: |
              [[[
                const msg = states['sensor.brewassistant_biab_warning_message']?.state ?? 'Unknown warning';
                const pre = states['sensor.brewassistant_biab_suggested_pre_boil_volume_l']?.state ?? '—';
                const sparge = states['sensor.brewassistant_biab_suggested_sparge_water_l']?.state ?? '—';
                return `${msg}\nSuggested pre-boil: ${pre} L · Suggested sparge: ${sparge} L`;
              ]]]
            styles:
              card:
                - margin: 8px
                - border-radius: 18px
                - padding: 14px
                - color: white
                - background: |
                    [[[
                      if (entity.state === 'critical') {
                        return 'linear-gradient(135deg, rgba(180,35,35,0.95), rgba(65,10,10,0.95))';
                      }
                      return 'linear-gradient(135deg, rgba(255,160,40,0.92), rgba(90,50,10,0.92))';
                    ]]]
                - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
              grid:
                - grid-template-areas: "\"i n\" \"i l\""
                - grid-template-columns: 42px 1fr
              icon:
                - width: 32px
                - color: white
              name:
                - font-size: 16px
                - font-weight: 800
                - justify-self: start
              label:
                - white-space: pre-line
                - font-size: 13px
                - justify-self: start
        - type: custom:expander-card
          title: BIAB Checklist
          clear: false
          cards:
            - type: entities
              entities:
                - entity: input_boolean.brewassistant_biab_step_water
                  name: 💧 Water calculation
                - entity: input_boolean.brewassistant_biab_step_mash
                  name: 🌾 Mash
                - entity: input_boolean.brewassistant_biab_step_mashout
                  name: 🔁 Mash-out
                - entity: input_boolean.brewassistant_biab_step_sparge
                  name: 🚿 Sparge
                - entity: input_boolean.brewassistant_biab_step_boil
                  name: 🔥 Boil
                - entity: input_boolean.brewassistant_biab_step_cooling
                  name: ❄️ Cooling
                - entity: input_boolean.brewassistant_biab_step_transfer
                  name: 🧪 Transfer to fermenter
          card_mod:
            style: |
              ha-card {
                margin: 8px !important;
                border-radius: 18px !important;
                background: rgba(255,255,255,0.04) !important;
                box-shadow: none !important;
                border: 1px solid rgba(255,255,255,0.06) !important;
              }
