type: custom:stack-in-card
mode: vertical
cards:
  - type: custom:button-card
    entity: input_boolean.brewassistant_biab_active
    name: BrewAssistant BIAB
    icon: mdi:kettle-steam
    show_state: false
    show_label: true
    tap_action:
      action: none
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: input_boolean.brewassistant_biab_active
          icon: mdi:power
          show_name: false
          show_state: false
          tap_action:
            action: toggle
          styles:
            card:
              - width: 38px
              - height: 38px
              - border-radius: 50%
              - padding: 0
              - background: rgba(255,255,255,0.08)
              - box-shadow: none
              - border: 1px solid rgba(255,255,255,0.10)
            icon:
              - width: 20px
              - color: |
                  [[[
                    return states['input_boolean.brewassistant_biab_active']?.state === 'on'
                      ? '#ffffff'
                      : 'rgba(255,255,255,0.62)';
                  ]]]
    label: |
      [[[
        const active = states['input_boolean.brewassistant_biab_active']?.state === 'on';
        const stage = states['sensor.brewassistant_biab_current_stage']?.state ?? 'Idle';
        const progress = states['sensor.brewassistant_biab_progress']?.state ?? '0';
        const instruction = states['sensor.brewassistant_biab_instruction']?.state ?? '';

        if (!active) {
          return 'Avstängd · tryck power för att visa detaljer';
        }

        return `${stage} · ${progress}%\n${instruction}`;
      ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 14px 14px
        - color: white
        - background: |
            [[[
              return entity.state === 'on'
                ? 'linear-gradient(135deg, rgba(255,126,45,0.95), rgba(160,64,0,0.95))'
                : 'linear-gradient(135deg, rgba(30,33,38,0.98), rgba(18,20,24,0.98))';
            ]]]
        - box-shadow: |
            [[[
              return entity.state === 'on'
                ? '0 8px 22px rgba(0,0,0,0.35)'
                : 'none';
            ]]]
        - border: 1px solid rgba(255,255,255,0.08)
      grid:
        - grid-template-areas: "\"i n power\" \"i l power\""
        - grid-template-columns: 48px 1fr 42px
        - grid-template-rows: min-content min-content
      icon:
        - width: 30px
        - color: |
            [[[
              return entity.state === 'on'
                ? '#ffffff'
                : 'rgba(255,255,255,0.46)';
            ]]]
      img_cell:
        - width: 42px
        - height: 42px
        - border-radius: 50%
        - background: |
            [[[
              return entity.state === 'on'
                ? 'rgba(255,255,255,0.14)'
                : 'rgba(255,255,255,0.07)';
            ]]]
      name:
        - font-size: 18px
        - font-weight: 800
        - justify-self: start
        - align-self: end
      label:
        - white-space: pre-line
        - font-size: 13px
        - font-weight: 700
        - opacity: 0.78
        - justify-self: start
        - align-self: start
      custom_fields:
        power:
          - justify-self: end
          - align-self: center
  - type: conditional
    conditions:
      - entity: input_boolean.brewassistant_biab_active
        state: "on"
    card:
      type: vertical-stack
      cards:
        - type: custom:mushroom-template-card
          primary: "{{ states('sensor.brewassistant_biab_current_stage') }}"
          secondary: "Progress: {{ states('sensor.brewassistant_biab_progress') }}%"
          icon: mdi:progress-check
          badge_icon: mdi:kettle
          multiline_secondary: true
          card_mod:
            style: |
              ha-card {
                border-radius: 18px !important;
                margin: 8px 8px 0 8px !important;
                background: rgba(255,255,255,0.05) !important;
                box-shadow: none !important;
              }
        - type: custom:mushroom-template-card
          primary: Current instruction
          secondary: "{{ states('sensor.brewassistant_biab_step_notification_message') }}"
          icon: mdi:arrow-right-bold-circle
          multiline_secondary: true
          card_mod:
            style: |
              ha-card {
                border-radius: 18px !important;
                margin: 8px 8px 0 8px !important;
                background: rgba(255,255,255,0.05) !important;
                box-shadow: none !important;
              }
              mushroom-state-info {
                --card-primary-color: white;
                --card-secondary-color: rgba(255,255,255,0.72);
              }        - type: conditional
          conditions:
            - entity: sensor.brewassistant_biab_warning_level
              state_not: ok
          card:
            type: custom:button-card
            entity: sensor.brewassistant_biab_warning_level
            name: BIAB Sanity Check
            icon: |
              [[[
                const level = entity.state;
                if (level === 'critical') return 'mdi:alert-octagon';
                if (level === 'warning') return 'mdi:alert';
                return 'mdi:check-circle';
              ]]]
            show_state: false
            show_label: true
            label: |
              [[[
                const msg = states['sensor.brewassistant_biab_warning_message']?.state ?? 'Unknown warning';
                const pre = states['sensor.brewassistant_biab_suggested_pre_boil_volume_l']?.state ?? '—';
                const sparge = states['sensor.brewassistant_biab_suggested_sparge_water_l']?.state ?? '—';
                return `${msg}\nSuggested pre-boil: ${pre} L · Suggested sparge: ${sparge} L`;
              ]]]
            styles:
              card:
                - margin: 8px
                - border-radius: 18px
                - padding: 14px
                - color: white
                - background: |
                    [[[
                      if (entity.state === 'critical') {
                        return 'linear-gradient(135deg, rgba(180,35,35,0.95), rgba(65,10,10,0.95))';
                      }
                      return 'linear-gradient(135deg, rgba(255,160,40,0.92), rgba(90,50,10,0.92))';
                    ]]]
                - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
              grid:
                - grid-template-areas: "\"i n\" \"i l\""
                - grid-template-columns: 42px 1fr
              icon:
                - width: 32px
                - color: white
              name:
                - font-size: 16px
                - font-weight: 800
                - justify-self: start
              label:
                - white-space: pre-line
                - font-size: 13px
                - justify-self: start
        - type: custom:mushroom-template-card
          primary: DigiBoil 35L
          secondary: >
            {{ states('sensor.brewassistant_biab_digiboil_power_status') }} · {{
            states('sensor.brewassistant_biab_digiboil_power_mode') }} · {{
            states('sensor.digiboil_35l_power') }} W
          icon: >
            {% if
            is_state('binary_sensor.brewassistant_biab_digiboil_heating_detected',
            'on') %}
              mdi:fire
            {% elif is_state('switch.digiboil_35l', 'on') %}
              mdi:kettle-steam
            {% else %}
              mdi:kettle-outline
            {% endif %}
          icon_color: >
            {% if
            is_state('binary_sensor.brewassistant_biab_digiboil_heating_detected',
            'on') %}
              orange
            {% elif is_state('switch.digiboil_35l', 'on') %}
              blue
            {% else %}
              grey
            {% endif %}
          tap_action:
            action: more-info
            entity: switch.digiboil_35l
          card_mod:
            style: |
              ha-card {
                border-radius: 18px !important;
                margin: 8px 8px 0 8px !important;
                background: rgba(255,255,255,0.05) !important;
                box-shadow: none !important;
              }
        - type: custom:mushroom-template-card
          primary: DigiBoil Power Mode
          secondary: >
            {{ states('sensor.brewassistant_biab_digiboil_power_mode') }} · {{
            states('sensor.digiboil_35l_power') }} W
          icon: mdi:lightning-bolt
          icon_color: >
            {% set mode =
            states('sensor.brewassistant_biab_digiboil_power_mode') %} {% if
            mode == '2400 W' %}
              red
            {% elif mode == '1900 W' %}
              orange
            {% elif mode == '500 W' %}
              amber
            {% else %}
              grey
            {% endif %}
          card_mod:
            style: |
              ha-card {
                border-radius: 18px !important;
                margin: 8px 8px 0 8px !important;
                background: rgba(255,255,255,0.05) !important;
                box-shadow: none !important;
              }
        - type: custom:expander-card
          title: BIAB Calculations
          clear: false
          cards:
            - type: custom:vertical-stack-in-card
              cards:
                - type: custom:button-card
                  name: BIAB Calculations
                  icon: mdi:calculator-variant
                  show_state: false
                  show_label: true
                  label: |
                    [[[
                      const model = states['input_select.brewassistant_biab_model']?.state ?? 'Unknown';
                      const malt = states['input_number.brewassistant_biab_malt_weight_kg']?.state ?? '0';
                      const pre = states['input_number.brewassistant_biab_pre_boil_volume_l']?.state ?? '0';
                      const mash = states['sensor.brewassistant_biab_mash_water_l']?.state ?? '0';
                      const sparge = states['sensor.brewassistant_biab_sparge_water_l']?.state ?? '0';
                      return `${model} · Malt ${malt} kg · Pre-boil ${pre} L\nMash water ${mash} L · Sparge ${sparge} L`;
                    ]]]
                  styles:
                    card:
                      - border-radius: 20px
                      - padding: 16px
                      - color: white
                      - background: >-
                          linear-gradient(135deg, rgba(255,126,45,0.22),
                          rgba(20,24,31,0.96))
                      - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
                    grid:
                      - grid-template-areas: "\"i n\" \"i l\""
                      - grid-template-columns: 44px 1fr
                    icon:
                      - width: 34px
                      - color: "#ff9f43"
                    name:
                      - font-size: 19px
                      - font-weight: 800
                      - justify-self: start
                    label:
                      - white-space: pre-line
                      - font-size: 13px
                      - opacity: 0.9
                      - justify-self: start
                - type: grid
                  columns: 1
                  square: false
                  cards:
                    - type: custom:mushroom-select-card
                      entity: input_select.brewassistant_biab_model
                      name: DigiBoil model
                      icon: mdi:kettle
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_malt_weight_kg
                      name: Malt weight
                      icon: mdi:grain
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_pre_boil_volume_l
                      name: Pre-boil volume
                      icon: mdi:kettle-steam
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-template-card
                      primary: Mash water
                      secondary: "{{ states('sensor.brewassistant_biab_mash_water_l') }} L"
                      icon: mdi:water
                      icon_color: blue
                      layout: horizontal
                    - type: custom:mushroom-template-card
                      primary: Sparge water
                      secondary: >-
                        {{ states('sensor.brewassistant_biab_sparge_water_l') }}
                        L
                      icon: mdi:shower-head
                      icon_color: cyan
                      layout: horizontal
                    - type: custom:mushroom-template-card
                      primary: Total water
                      secondary: |
                        {{ 
                          (
                            states('sensor.brewassistant_biab_mash_water_l') | float(0) +
                            states('sensor.brewassistant_biab_sparge_water_l') | float(0)
                          ) | round(1)
                        }} L
                      icon: mdi:waves-arrow-up
                      icon_color: amber
                      layout: horizontal
                - type: custom:button-card
                  name: Water Formula
                  icon: mdi:flask-outline
                  show_state: false
                  show_label: true
                  label: |
                    [[[
                      const model = states['input_select.brewassistant_biab_model']?.state ?? 'DigiBoil 35';
                      if (model === 'DigiBoil 65') {
                        return 'Mash water = malt kg × 2.3 + 5\nSparge = pre-boil + malt kg − mash water';
                      }
                      return 'Mash water = malt kg × 2 + 5\nSparge = pre-boil + malt kg − mash water';
                    ]]]
                  styles:
                    card:
                      - margin-top: 4px
                      - border-radius: 18px
                      - padding: 14px
                      - color: white
                      - background: rgba(255,255,255,0.045)
                      - box-shadow: none
                    grid:
                      - grid-template-areas: "\"i n\" \"i l\""
                      - grid-template-columns: 38px 1fr
                    icon:
                      - width: 28px
                      - color: "#ff9f43"
                    name:
                      - font-size: 15px
                      - font-weight: 700
                      - justify-self: start
                    label:
                      - white-space: pre-line
                      - font-size: 12px
                      - opacity: 0.8
                      - justify-self: start
              card_mod:
                style: |
                  ha-card {
                    border-radius: 22px !important;
                    margin: 8px !important;
                    padding: 10px !important;
                    background: linear-gradient(180deg, rgba(24,27,34,0.98), rgba(12,14,18,0.98)) !important;
                    box-shadow: 0 10px 28px rgba(0,0,0,0.35) !important;
                    border: 1px solid rgba(255,255,255,0.08) !important;
                  }
        - type: custom:expander-card
          title: BIAB Timers & Temperatures
          clear: false
          cards:
            - type: custom:vertical-stack-in-card
              cards:
                - type: custom:button-card
                  name: BIAB Timers & Temperatures
                  icon: mdi:thermometer-lines
                  show_state: false
                  show_label: true
                  label: |
                    [[[
                      const summary = states['sensor.brewassistant_biab_timer_summary']?.state ?? 'No timer';
                      const remaining = states['timer.brewassistant_biab_step_timer']?.attributes?.remaining ?? '—';

                      const strike = states['input_number.brewassistant_biab_strike_temp_c']?.state ?? '—';
                      const mash = states['input_number.brewassistant_biab_mash_temp_c']?.state ?? '—';
                      const mashout = states['input_number.brewassistant_biab_mashout_temp_c']?.state ?? '—';
                      const sparge = states['input_number.brewassistant_biab_sparge_temp_c']?.state ?? '—';
                      const chill = states['input_number.brewassistant_biab_cooling_target_temp_c']?.state ?? '—';

                      return `${summary}\nRemaining: ${remaining}\nStrike ${strike}°C · Mash ${mash}°C · Mash-out ${mashout}°C\nSparge ${sparge}°C · Chill target ${chill}°C`;
                    ]]]
                  styles:
                    card:
                      - border-radius: 20px
                      - padding: 16px
                      - color: white
                      - background: >-
                          linear-gradient(135deg, rgba(50,70,95,0.95),
                          rgba(15,18,24,0.98))
                      - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
                    grid:
                      - grid-template-areas: "\"i n\" \"i l\""
                      - grid-template-columns: 44px 1fr
                    icon:
                      - width: 34px
                      - color: "#00bcd4"
                    name:
                      - font-size: 18px
                      - font-weight: 800
                      - justify-self: start
                    label:
                      - white-space: pre-line
                      - font-size: 13px
                      - opacity: 0.9
                      - justify-self: start
                - type: grid
                  columns: 1
                  square: false
                  cards:
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_mash_minutes
                      name: Mash timer
                      icon: mdi:barley
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_mashout_minutes
                      name: Mash-out timer
                      icon: mdi:timer-sand
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_boil_minutes
                      name: Boil timer
                      icon: mdi:fire
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_cooling_minutes
                      name: Cooling estimate
                      icon: mdi:snowflake
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_strike_temp_c
                      name: Strike temperature
                      icon: mdi:thermometer-chevron-up
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_mash_temp_c
                      name: Mash temperature
                      icon: mdi:thermometer
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_mashout_temp_c
                      name: Mash-out temperature
                      icon: mdi:thermometer-high
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_sparge_temp_c
                      name: Sparge water temperature
                      icon: mdi:shower-head
                      display_mode: buttons
                      layout: horizontal
                    - type: custom:mushroom-number-card
                      entity: input_number.brewassistant_biab_cooling_target_temp_c
                      name: Cooling target temperature
                      icon: mdi:snowflake-thermometer
                      display_mode: buttons
                      layout: horizontal
              card_mod:
                style: |
                  ha-card {
                    margin: 8px !important;
                    padding: 10px !important;
                    border-radius: 22px !important;
                    background: linear-gradient(180deg, rgba(24,27,34,0.98), rgba(12,14,18,0.98)) !important;
                    box-shadow: 0 10px 28px rgba(0,0,0,0.35) !important;
                    border: 1px solid rgba(255,255,255,0.08) !important;
                  }
        - type: custom:expander-card
          title: BIAB Hop Scheduler
          clear: false
          cards:
            - type: custom:vertical-stack-in-card
              cards:
                - type: custom:button-card
                  entity: input_boolean.brewassistant_biab_hop_reminders_enabled
                  name: BIAB Hop Scheduler
                  icon: mdi:hop
                  show_state: false
                  show_label: true
                  tap_action:
                    action: toggle
                  label: |
                    [[[
                      const enabled = entity.state === 'on';
                      const h1 = states['input_text.brewassistant_biab_hop_1_label']?.state ?? 'Hop 1';
                      const h2 = states['input_text.brewassistant_biab_hop_2_label']?.state ?? 'Hop 2';
                      const h3 = states['input_text.brewassistant_biab_hop_3_label']?.state ?? 'Hop 3';
                      const t1 = states['input_number.brewassistant_biab_hop_1_remaining_min']?.state ?? '—';
                      const t2 = states['input_number.brewassistant_biab_hop_2_remaining_min']?.state ?? '—';
                      const t3 = states['input_number.brewassistant_biab_hop_3_remaining_min']?.state ?? '—';

                      if (!enabled) return 'Off · Tap to enable hop reminders';
                      return `Active\n${h1} @ ${t1} min kvar · ${h2} @ ${t2} min kvar · ${h3} @ ${t3} min kvar`;
                    ]]]
                  styles:
                    card:
                      - border-radius: 20px
                      - padding: 16px
                      - color: white
                      - background: |
                          [[[
                            return entity.state === 'on'
                              ? 'linear-gradient(135deg, rgba(65,160,90,0.92), rgba(14,55,26,0.98))'
                              : 'linear-gradient(135deg, rgba(50,55,65,0.92), rgba(18,20,25,0.98))';
                          ]]]
                      - box-shadow: 0 8px 22px rgba(0,0,0,0.35)
                    grid:
                      - grid-template-areas: "\"i n\" \"i l\""
                      - grid-template-columns: 44px 1fr
                    icon:
                      - width: 34px
                      - color: "#7bed9f"
                    name:
                      - font-size: 18px
                      - font-weight: 800
                      - justify-self: start
                    label:
                      - white-space: pre-line
                      - font-size: 13px
                      - opacity: 0.92
                      - justify-self: start
                - type: conditional
                  conditions:
                    - entity: input_boolean.brewassistant_biab_hop_reminders_enabled
                      state: "on"
                  card:
                    type: grid
                    columns: 1
                    square: false
                    cards:
                      - type: custom:mushroom-template-card
                        primary: Hop Reminder Status
                        secondary: >
                          {{
                          state_attr('sensor.brewassistant_biab_hop_reminder_summary',
                          'hop_1') }} {{ '\n' }} {{
                          state_attr('sensor.brewassistant_biab_hop_reminder_summary',
                          'hop_2') }} {{ '\n' }} {{
                          state_attr('sensor.brewassistant_biab_hop_reminder_summary',
                          'hop_3') }}
                        icon: mdi:format-list-checks
                        icon_color: green
                        multiline_secondary: true
                      - type: custom:mushroom-template-card
                        primary: Reminder 1
                        secondary: >
                          {{ states('input_text.brewassistant_biab_hop_1_label')
                          }} · {{
                          states('input_number.brewassistant_biab_hop_1_remaining_min')
                          }} min kvar · {{ 'Enabled' if
                          is_state('input_boolean.brewassistant_biab_hop_1_enabled','on')
                          else 'Disabled' }}
                        icon: mdi:numeric-1-circle
                        icon_color: green
                        multiline_secondary: true
                      - type: custom:stack-in-card
                        mode: vertical
                        cards:
                          - type: custom:mushroom-entity-card
                            entity: input_boolean.brewassistant_biab_hop_1_enabled
                            name: Enable reminder 1
                            icon: mdi:toggle-switch
                            layout: horizontal
                          - type: custom:mushroom-entity-card
                            entity: input_text.brewassistant_biab_hop_1_label
                            name: Label
                            icon: mdi:form-textbox
                            layout: horizontal
                            tap_action:
                              action: more-info
                          - type: custom:mushroom-number-card
                            entity: >-
                              input_number.brewassistant_biab_hop_1_remaining_min
                            name: Minutes remaining
                            icon: mdi:timer-outline
                            display_mode: buttons
                            layout: horizontal
                      - type: custom:mushroom-template-card
                        primary: Reminder 2
                        secondary: >
                          {{ states('input_text.brewassistant_biab_hop_2_label')
                          }} · {{
                          states('input_number.brewassistant_biab_hop_2_remaining_min')
                          }} min kvar · {{ 'Enabled' if
                          is_state('input_boolean.brewassistant_biab_hop_2_enabled','on')
                          else 'Disabled' }}
                        icon: mdi:numeric-2-circle
                        icon_color: light-green
                        multiline_secondary: true
                      - type: custom:stack-in-card
                        mode: vertical
                        cards:
                          - type: custom:mushroom-entity-card
                            entity: input_boolean.brewassistant_biab_hop_2_enabled
                            name: Enable reminder 2
                            icon: mdi:toggle-switch
                            layout: horizontal
                          - type: custom:mushroom-entity-card
                            entity: input_text.brewassistant_biab_hop_2_label
                            name: Label
                            icon: mdi:form-textbox
                            layout: horizontal
                            tap_action:
                              action: more-info
                          - type: custom:mushroom-number-card
                            entity: >-
                              input_number.brewassistant_biab_hop_2_remaining_min
                            name: Minutes remaining
                            icon: mdi:timer-outline
                            display_mode: buttons
                            layout: horizontal
                      - type: custom:mushroom-template-card
                        primary: Reminder 3
                        secondary: >
                          {{ states('input_text.brewassistant_biab_hop_3_label')
                          }} · {{
                          states('input_number.brewassistant_biab_hop_3_remaining_min')
                          }} min kvar · {{ 'Enabled' if
                          is_state('input_boolean.brewassistant_biab_hop_3_enabled','on')
                          else 'Disabled' }}
                        icon: mdi:numeric-3-circle
                        icon_color: lime
                        multiline_secondary: true
                      - type: custom:stack-in-card
                        mode: vertical
                        cards:
                          - type: custom:mushroom-entity-card
                            entity: input_boolean.brewassistant_biab_hop_3_enabled
                            name: Enable reminder 3
                            icon: mdi:toggle-switch
                            layout: horizontal
                          - type: custom:mushroom-entity-card
                            entity: input_text.brewassistant_biab_hop_3_label
                            name: Label
                            icon: mdi:form-textbox
                            layout: horizontal
                            tap_action:
                              action: more-info
                          - type: custom:mushroom-number-card
                            entity: >-
                              input_number.brewassistant_biab_hop_3_remaining_min
                            name: Minutes remaining
