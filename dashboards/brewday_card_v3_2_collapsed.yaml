# BrewAssistant Brewday Card v3.2 - collapsed inactive layout
# Clean Brewday overview.
#
# Design:
# - Always show the top card.
# - While inactive/idle: show only the top card.
# - When Brewday runtime is active OR BrewZilla is on: show details + compact RAW debug.
# - Full RAW checklist should remain separate: brewfather_raw_timeline_v2.yaml
#
# Required custom cards:
# - custom:button-card
# - custom:mushroom-entity-card
# - custom:vertical-stack-in-card

type: custom:vertical-stack-in-card
cards:
  ###########################################################################
  # TOP CARD - ALWAYS VISIBLE
  ###########################################################################
  - type: custom:button-card
    entity: sensor.brewassistant_brewday_runtime_state
    name: Brewday
    icon: mdi:beer-outline
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const s = (id) => states[id]?.state;
        const n = (id) => Number(s(id));
        const ok = (v) => Number.isFinite(v);
        const fmt = (v, d=1) => ok(v) ? v.toFixed(d) : '–';

        const runtime = s('sensor.brewassistant_brewday_runtime_state') ?? 'idle';
        const source = s('sensor.brewassistant_brewday_runtime_source') ?? 'None';
        const stage = s('sensor.brewassistant_brewday_runtime_stage') ?? 'Idle';
        const step = s('sensor.brewassistant_brewday_runtime_step') ?? 'Idle';
        const next = s('sensor.brewassistant_brewday_runtime_next_step') ?? 'None';
        const target = n('sensor.brewassistant_brewday_target_temperature');
        const remaining = n('sensor.brewassistant_brewday_live_time_remaining_minutes');
        const progress = n('sensor.brewassistant_brewday_live_progress');
        const ageMin = n('sensor.brewassistant_brewday_snapshot_age_minutes');

        const current = n('sensor.brewassistant_brewzilla_current_temperature');
        const bzTarget = n('sensor.brewassistant_brewzilla_target_temperature');
        const power = n('sensor.brewzilla_power');
        const main = s('switch.brewzilla') ?? 'unknown';
        const heater = s('switch.brewzilla_heater') ?? 'unknown';
        const pump = s('switch.brewzilla_pump') ?? 'unknown';

        const attrs = states['sensor.brewassistant_brewday_runtime_state']?.attributes ?? {};
        const rawIndex = attrs.raw_step_index ?? '–';
        const resolvedIndex = attrs.resolved_step_index ?? '–';
        const rawName = attrs.raw_step_name ?? '–';

        const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
        const inactive = inactiveStates.includes(runtime) && main !== 'on';
        const activeTarget = ok(target) ? target : bzTarget;
        const progressWidth = ok(progress) ? Math.min(100, Math.max(0, progress)) : 0;

        const chip = (text, bg='rgba(255,255,255,.10)', color='rgba(255,255,255,.84)') =>
          `<span style="padding:5px 9px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;">${text}</span>`;

        const rawChip = inactive
          ? ''
          : chip(
              `RAW ${resolvedIndex}/${rawIndex}`,
              String(resolvedIndex) !== String(rawIndex) ? 'rgba(255,112,67,.14)' : 'rgba(129,199,132,.14)',
              String(resolvedIndex) !== String(rawIndex) ? '#ffab91' : '#a5d6a7'
            );

        return `
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="font-size:13px;font-weight:950;letter-spacing:.8px;opacity:.70;text-transform:uppercase;">
              ${inactive ? 'Standby' : `${runtime} · ${stage}`}
            </div>

            <div style="font-size:24px;font-weight:950;line-height:1.14;">
              ${inactive ? 'No active brewday' : step}
            </div>

            <div style="font-size:18px;font-weight:950;">
              ${ok(current) ? fmt(current) + '°C' : 'BrewZilla –'}${ok(activeTarget) ? ` → ${fmt(activeTarget)}°C` : ''}
              ${ok(power) ? `<span style="opacity:.52;"> · ${power.toFixed(1)} W</span>` : ''}
            </div>

            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${chip(source)}
              ${chip(`Power ${main.toUpperCase()}`, main === 'on' ? 'rgba(76,175,80,.18)' : 'rgba(255,255,255,.08)', main === 'on' ? '#c8e6c9' : 'rgba(255,255,255,.70)')}
              ${chip(`Heater ${heater.toUpperCase()}`, heater === 'on' ? 'rgba(255,112,67,.22)' : 'rgba(255,255,255,.08)', heater === 'on' ? '#ffccbc' : 'rgba(255,255,255,.70)')}
              ${chip(`Pump ${pump.toUpperCase()}`, pump === 'on' ? 'rgba(77,208,225,.18)' : 'rgba(255,255,255,.08)', pump === 'on' ? '#b2ebf2' : 'rgba(255,255,255,.70)')}
              ${rawChip}
            </div>

            ${
              inactive
                ? '<div style="font-size:12px;opacity:.58;line-height:1.35;">Detailed runtime and RAW debug stay hidden until Brewday/BrewZilla is active.</div>'
                : `<div style="font-size:13px;font-weight:850;opacity:.82;">Next: ${next}</div>`
            }

            ${
              inactive
                ? ''
                : `<div style="font-size:12px;opacity:.58;line-height:1.35;">${ok(remaining) ? remaining.toFixed(0) : '–'} min kvar · ${ok(progress) ? progress.toFixed(1) : '–'}% · snapshot age ${ok(ageMin) ? ageMin.toFixed(0) : '–'} min</div>`
            }

            ${
              inactive
                ? ''
                : `<div style="font-size:11px;opacity:.44;line-height:1.3;">Raw: ${rawName}</div>`
            }

            ${
              inactive
                ? ''
                : `<div style="height:8px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;"><div style="height:100%;width:${progressWidth}%;background:linear-gradient(90deg,rgba(100,181,246,.90),rgba(77,208,225,.90));"></div></div>`
            }
          </div>`;
      ]]]
    custom_fields:
      badge: |
        [[[
          const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
          const main = states['switch.brewzilla']?.state ?? 'unknown';
          const heater = states['switch.brewzilla_heater']?.state === 'on';
          const pump = states['switch.brewzilla_pump']?.state === 'on';
          const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];

          let text = 'IDLE';
          let bg = 'rgba(255,255,255,.08)';
          let color = 'rgba(255,255,255,.70)';

          if (!inactiveStates.includes(runtime)) {
            text = 'LIVE';
            bg = 'rgba(100,181,246,.16)';
            color = '#bbdefb';
          }
          if (main === 'on' && text === 'IDLE') {
            text = 'READY';
            bg = 'rgba(76,175,80,.18)';
            color = '#c8e6c9';
          }
          if (heater || pump) {
            text = 'HOT SIDE';
            bg = 'rgba(255,112,67,.20)';
            color = '#ffccbc';
          }

          return `<div style="padding:7px 11px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;letter-spacing:.7px;">${text}</div>`;
        ]]]
    styles:
      card:
        - border-radius: 28px
        - padding: 18px
        - min-height: |
            [[[
              const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
              const main = states['switch.brewzilla']?.state ?? 'unknown';
              const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
              const inactive = inactiveStates.includes(runtime) && main !== 'on';
              return inactive ? '166px' : '232px';
            ]]]
        - overflow: hidden
        - border: 1px solid rgba(255,255,255,.10)
        - box-shadow: 0 16px 40px rgba(0,0,0,.42)
        - background: |
            [[[
              const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
              const heater = states['switch.brewzilla_heater']?.state === 'on';
              const pump = states['switch.brewzilla_pump']?.state === 'on';
              const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];

              if (heater) {
                return 'radial-gradient(circle at top right, rgba(255,112,67,.28), transparent 40%), linear-gradient(135deg, rgba(55,26,15,.98), rgba(9,12,18,.98))';
              }
              if (pump) {
                return 'radial-gradient(circle at top right, rgba(77,208,225,.22), transparent 40%), linear-gradient(135deg, rgba(12,39,45,.98), rgba(9,12,18,.98))';
              }
              if (!inactiveStates.includes(runtime)) {
                return 'radial-gradient(circle at top right, rgba(100,181,246,.24), transparent 40%), linear-gradient(135deg, rgba(13,31,48,.98), rgba(9,12,18,.98))';
              }
              return 'radial-gradient(circle at top right, rgba(144,164,174,.16), transparent 40%), linear-gradient(135deg, rgba(18,24,32,.98), rgba(9,12,18,.98))';
            ]]]
      grid:
        - grid-template-areas: '"i badge" "n n" "l l"'
        - grid-template-columns: 54px 1fr
      img_cell:
        - width: 48px
        - height: 48px
        - border-radius: 18px
        - background: rgba(255,255,255,.10)
      icon:
        - width: 32px
        - color: '#64b5f6'
      name:
        - justify-self: start
        - align-self: end
        - margin-top: 12px
        - font-size: 25px
        - font-weight: 950
      label:
        - justify-self: stretch
        - text-align: left
        - white-space: normal
        - margin-top: 8px
      custom_fields:
        badge:
          - justify-self: end
          - align-self: start

  ###########################################################################
  # DETAILS - VISIBLE WHEN BREWDAY RUNTIME IS ACTIVE OR BREWZILLA IS ON
  ###########################################################################
  - type: conditional
    conditions:
      - condition: or
        conditions:
          - entity: switch.brewzilla
            state: "on"
          - entity: sensor.brewassistant_brewday_runtime_state
            state_not: idle
          - entity: sensor.brewassistant_brewday_runtime_state
            state_not: inactive
    card:
      type: vertical-stack
      cards:
        #####################################################################
        # RUNTIME DETAIL
        #####################################################################
        - type: custom:vertical-stack-in-card
          cards:
            - type: custom:button-card
              name: Brewday Runtime
              icon: mdi:playlist-play
              show_label: true
              label: |
                [[[
                  const step = states['sensor.brewassistant_brewday_runtime_step']?.state ?? '–';
                  const next = states['sensor.brewassistant_brewday_runtime_next_step']?.state ?? '–';
                  const remaining = states['sensor.brewassistant_brewday_live_time_remaining_minutes']?.state ?? '–';
                  return `${step} · Next: ${next} · ${remaining} min`;
                ]]]
              styles:
                card:
                  - border-radius: 20px 20px 10px 10px
                  - padding: 13px
                  - background: rgba(255,255,255,.055)
                  - border: 1px solid rgba(255,255,255,.08)
                grid:
                  - grid-template-areas: '"i n" "i l"'
                  - grid-template-columns: 40px 1fr
                icon:
                  - color: '#90caf9'
                  - width: 27px
                name:
                  - justify-self: start
                  - font-size: 17px
                  - font-weight: 950
                label:
                  - justify-self: stretch
                  - text-align: left
                  - font-size: 12px
                  - opacity: .72
                  - white-space: normal

            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_runtime_source
                  name: Runtime source
                  icon: mdi:source-branch
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_runtime_stage
                  name: Stage
                  icon: mdi:playlist-play
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_runtime_step
                  name: Current step
                  icon: mdi:play-circle
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_runtime_next_step
                  name: Next step
                  icon: mdi:skip-next
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_target_temperature
                  name: Tracker target
                  icon: mdi:target
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_live_time_remaining_minutes
                  name: Step remaining
                  icon: mdi:timer-sand
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_live_progress
                  name: Progress
                  icon: mdi:progress-clock
                - type: custom:mushroom-entity-card
                  entity: sensor.brewassistant_brewday_snapshot_age_minutes
                  name: Snapshot age
                  icon: mdi:clock-alert-outline

        #####################################################################
        # COMPACT RAW DEBUG
        #####################################################################
        - type: custom:button-card
          entity: sensor.brewfather_brew_tracker_raw
          name: RAW Brew Tracker Debug
          icon: mdi:database-eye
          show_label: true
          tap_action:
            action: more-info
          label: |
            [[[
              const raw = entity?.attributes?.data ?? {};
              const stages = Array.isArray(raw.stages) ? raw.stages : [];
              const stageIndex = Number(raw.stage ?? 0);
              const stage = stages[stageIndex] ?? {};
              const rawStepIndex = Number(stage.step ?? -1);
              const attrs = states['sensor.brewassistant_brewday_runtime_state']?.attributes ?? {};
              const resolved = attrs.resolved_step_index ?? '–';
              const rawName = attrs.raw_step_name ?? '–';
              const age = attrs.snapshot_age_seconds;
              const remaining = Number(stage.remainingSeconds ?? 0);
              const progress = Number(stage.progressPercent ?? 0);
              const status = raw.status ?? entity?.state ?? 'unknown';

              return `
                <div style="display:flex;flex-direction:column;gap:5px;">
                  <div>Status: <b>${status}</b> · stage ${stageIndex} · raw ${rawStepIndex} · resolved ${resolved}</div>
                  <div>Raw: ${rawName}</div>
                  <div>Remaining ${Number.isFinite(remaining) ? Math.round(remaining) : '–'}s · Progress ${Number.isFinite(progress) ? progress.toFixed(1) : '–'}% · Age ${age !== undefined ? Math.round(Number(age)) + 's' : '–'}</div>
                  <div style="opacity:.58;">Tap for full raw payload. Use RAW Timeline card for full checklist.</div>
                </div>
              `;
            ]]]
          styles:
            card:
              - border-radius: 20px
              - padding: 14px
              - background: rgba(255,255,255,.045)
              - border: 1px solid rgba(255,255,255,.07)
            grid:
              - grid-template-areas: '"i n" "i l"'
              - grid-template-columns: 42px 1fr
            icon:
              - color: '#90a4ae'
              - width: 26px
            name:
              - justify-self: start
              - font-size: 15px
              - font-weight: 950
            label:
              - justify-self: stretch
              - text-align: left
              - font-size: 12px
              - opacity: .75
              - white-space: normal
