type: custom:vertical-stack-in-card
cards:
  - type: custom:vertical-stack-in-card
    cards:
      - type: custom:button-card
        entity: climate.fermentation_chamber
        name: Fermentation Chamber
        icon: mdi:cup
        show_state: true
        show_label: true
        state_display: |
          [[[
            const hvac = entity?.state ?? 'unknown';
            const action = entity?.attributes?.hvac_action ?? 'unknown';

            if (hvac === 'off') return 'Off';
            if (action === 'cooling') return 'Cooling';
            if (action === 'heating') return 'Heating';
            if (action === 'idle') return 'Idle';
            if (hvac === 'heat_cool') return 'Auto';
            if (hvac === 'cool') return 'Cooling enabled';
            if (hvac === 'heat') return 'Heating enabled';
            return hvac;
          ]]]
        tap_action:
          action: more-info
        hold_action:
          action: none
        custom_fields:
          apply:
            card:
              type: custom:button-card
              show_name: false
              show_state: false
              show_icon: true
              icon: mdi:crosshairs-gps
              tap_action:
                action: call-service
                service: script.fwk_apply_brewfather_target
              styles:
                card:
                  - width: 36px
                  - height: 36px
                  - border-radius: 50%
                  - padding: 0
                  - background: rgba(144,202,249,0.24)
                  - box-shadow: none
                icon:
                  - width: 20px
                  - color: rgba(255,255,255,0.96)
          power:
            card:
              type: custom:button-card
              entity: climate.fermentation_chamber
              show_name: false
              show_state: false
              show_icon: true
              icon: mdi:power
              tap_action:
                action: call-service
                service: |
                  [[[
                    return entity?.state === 'off'
                      ? 'climate.turn_on'
                      : 'climate.turn_off';
                  ]]]
                target:
                  entity_id: climate.fermentation_chamber
              styles:
                card:
                  - width: 36px
                  - height: 36px
                  - border-radius: 50%
                  - padding: 0
                  - background: rgba(255,255,255,0.12)
                  - box-shadow: none
                icon:
                  - width: 21px
                  - color: |
                      [[[
                        const hvac = entity?.state;
                        const isOn = hvac !== 'off' && hvac !== 'unavailable' && hvac !== 'unknown';
                        return isOn ? '#90caf9' : 'rgba(255,255,255,0.55)';
                      ]]]
        label: |
          [[[
            const currentRaw = entity?.attributes?.current_temperature;
            const targetLowRaw = entity?.attributes?.target_temp_low;
            const targetHighRaw = entity?.attributes?.target_temp_high;
            const targetRaw = entity?.attributes?.temperature;
            const hvac = entity?.state ?? 'unknown';
            const action = entity?.attributes?.hvac_action ?? 'unknown';

            const recipeTargetRaw = states['sensor.fwk_recipe_active_target_temp']?.state;
            const suggestedRaw = states['sensor.fwk_suggested_chamber_range']?.state;
            const alignmentRaw = states['sensor.fwk_chamber_alignment_status']?.state;
            const chamberActionRaw = states['sensor.fwk_chamber_action']?.state;

            const current =
              currentRaw !== undefined &&
              currentRaw !== null &&
              currentRaw !== 'unknown' &&
              currentRaw !== 'unavailable'
                ? parseFloat(currentRaw)
                : null;

            const recipeTarget =
              recipeTargetRaw &&
              recipeTargetRaw !== 'unknown' &&
              recipeTargetRaw !== 'unavailable'
                ? parseFloat(recipeTargetRaw)
                : null;

            const targetLow =
              targetLowRaw !== undefined &&
              targetLowRaw !== null &&
              targetLowRaw !== 'unknown' &&
              targetLowRaw !== 'unavailable'
                ? parseFloat(targetLowRaw)
                : null;

            const targetHigh =
              targetHighRaw !== undefined &&
              targetHighRaw !== null &&
              targetHighRaw !== 'unknown' &&
              targetHighRaw !== 'unavailable'
                ? parseFloat(targetHighRaw)
                : null;

            const target =
              targetRaw !== undefined &&
              targetRaw !== null &&
              targetRaw !== 'unknown' &&
              targetRaw !== 'unavailable'
                ? parseFloat(targetRaw)
                : null;

            const nowTxt = current !== null ? `${current.toFixed(1)} °C` : '-';
            const recipeTxt = recipeTarget !== null ? `${recipeTarget.toFixed(1)} °C` : '-';

            let suggestedTxt = '-';
            if (suggestedRaw && suggestedRaw !== 'unknown' && suggestedRaw !== 'unavailable') {
              suggestedTxt = suggestedRaw;
            } else if (recipeTarget !== null) {
              suggestedTxt = `${(recipeTarget - 0.5).toFixed(1)}–${(recipeTarget + 0.5).toFixed(1)} °C`;
            }

            let chamberTxt = '-';
            if (targetLow !== null && targetHigh !== null) {
              chamberTxt = `${targetLow.toFixed(1)}–${targetHigh.toFixed(1)} °C`;
            } else if (target !== null) {
              chamberTxt = `${target.toFixed(1)} °C`;
            }

            const alignment =
              alignmentRaw &&
              alignmentRaw !== 'unknown' &&
              alignmentRaw !== 'unavailable'
                ? alignmentRaw
                : hvac === 'off'
                  ? 'Chamber off'
                  : action === 'cooling'
                    ? 'Cooling'
                    : action === 'heating'
                      ? 'Heating'
                      : 'Idle';

            const chamberAction =
              chamberActionRaw &&
              chamberActionRaw !== 'unknown' &&
              chamberActionRaw !== 'unavailable'
                ? chamberActionRaw
                : '-';

            return `
              <div style="line-height: 1.45;">
                <div>Now: ${nowTxt}</div>
                <div>Recipe target: ${recipeTxt}</div>
                <div>Suggested: ${suggestedTxt}</div>
                <div>Chamber: ${chamberTxt}</div>
                <div>Action: ${chamberAction}</div>
                <div>Alignment: ${alignment}</div>
              </div>
            `;
          ]]]
        styles:
          card:
            - border-radius: 24px
            - padding: 18px
            - min-height: 180px
            - color: white
            - background: |
                [[[
                  const hvac = entity?.state;
                  const action = entity?.attributes?.hvac_action;
                  const alignment = states['sensor.fwk_chamber_alignment_status']?.state ?? '';

                  if (hvac === 'off') {
                    return 'linear-gradient(135deg, #34343a, #242428)';
                  }

                  if (action === 'cooling') {
                    return 'linear-gradient(135deg, #0d47a1, #1e3a5f)';
                  }

                  if (action === 'heating') {
                    return 'linear-gradient(135deg, #6d2c00, #3b1d00)';
                  }

                  if (alignment === 'On recipe') {
                    return 'linear-gradient(135deg, #005739, #063324)';
                  }

                  if (alignment === 'Chamber target warmer than recipe') {
                    return 'linear-gradient(135deg, #6d4c00, #332300)';
                  }

                  if (alignment === 'Chamber target colder than recipe') {
                    return 'linear-gradient(135deg, #0d47a1, #1e3a5f)';
                  }

                  return 'linear-gradient(135deg, #3a3a40, #242428)';
                ]]]
            - box-shadow: 0 10px 26px rgba(0,0,0,0.24)
            - overflow: hidden
          grid:
            - grid-template-areas: "\"i n apply power\" \"i s apply power\" \"i l apply power\""
            - grid-template-columns: 72px 1fr 38px 38px
            - grid-template-rows: min-content min-content 1fr
          img_cell:
            - width: 52px
            - height: 52px
            - border-radius: 50%
            - background: rgba(255,255,255,0.14)
            - align-self: start
          icon:
            - width: 32px
            - color: white
          name:
            - justify-self: start
            - align-self: end
            - text-align: left
            - font-size: 18px
            - font-weight: 900
            - color: white
            - white-space: normal
            - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
          state:
            - justify-self: start
            - align-self: start
            - text-align: left
            - font-size: 14px
            - font-weight: 900
            - color: white
            - padding-top: 2px
            - white-space: normal
            - text-shadow: 0 1px 2px rgba(0,0,0,0.6)
          label:
            - justify-self: start
            - align-self: start
            - text-align: left
            - font-size: 12px
            - font-weight: 600
            - line-height: 1.45
            - color: white
            - padding-top: 6px
            - white-space: normal
            - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
          custom_fields:
            apply:
              - justify-self: end
              - align-self: start
            power:
              - justify-self: end
              - align-self: start
    card_mod:
      style: |
        ha-card {
          background: transparent !important;
          box-shadow: none !important;
          border: none !important;
        }
  - type: conditional
    conditions:
      - condition: state
        entity: input_boolean.brewassistant_fermentation_enabled
        state: "on"
      - condition: and
        conditions:
          - condition: state
            entity: climate.fermentation_chamber
            state_not: "off"
    card:
      type: custom:vertical-stack-in-card
      cards:
        - type: custom:button-card
          entity: sensor.brewassistant_smart_fermentation_status
          name: Smart Fermentation Control
          icon: mdi:brain
          show_state: true
          show_label: true
          tap_action:
            action: more-info
          hold_action:
            action: none
          custom_fields:
            expand:
              card:
                type: custom:button-card
                entity: input_boolean.brewassistant_smart_show_details
                show_name: false
                show_state: false
                show_icon: true
                icon: |
                  [[[
                    return entity?.state === 'on'
                      ? 'mdi:chevron-up'
                      : 'mdi:chevron-down';
                  ]]]
                tap_action:
                  action: call-service
                  service: input_boolean.toggle
                  target:
                    entity_id: input_boolean.brewassistant_smart_show_details
                styles:
                  card:
                    - width: 36px
                    - height: 36px
                    - border-radius: 50%
                    - padding: 0
                    - background: |
                        [[[
                          return entity?.state === 'on'
                            ? 'rgba(144,202,249,0.24)'
                            : 'rgba(255,255,255,0.12)';
                        ]]]
                    - box-shadow: none
                  icon:
                    - width: 22px
                    - color: |
                        [[[
                          return entity?.state === 'on'
                            ? '#90caf9'
                            : 'rgba(255,255,255,0.65)';
                        ]]]
            power:
              card:
                type: custom:button-card
                entity: input_boolean.brewassistant_smart_fermentation_enabled
                show_name: false
                show_state: false
                show_icon: true
                icon: mdi:power
                tap_action:
                  action: call-service
                  service: input_boolean.toggle
                  target:
                    entity_id: input_boolean.brewassistant_smart_fermentation_enabled
                styles:
                  card:
                    - width: 36px
                    - height: 36px
                    - border-radius: 50%
                    - padding: 0
                    - background: rgba(255,255,255,0.12)
                    - box-shadow: none
                  icon:
                    - width: 21px
                    - color: |
                        [[[
                          const isOn = entity?.state === 'on';
                          return isOn ? '#7dff9b' : 'rgba(255,255,255,0.55)';
                        ]]]
          label: |
            [[[
              const temp = states['sensor.brewassistant_smart_liquid_temp']?.state ?? '—';
              const target = states['sensor.brewassistant_smart_target_temp']?.state ?? '—';
              const delta = states['sensor.brewassistant_smart_temp_delta']?.state ?? '—';
              const rate = states['sensor.brewassistant_smart_temp_rate']?.state ?? '—';
              const pulse = states['sensor.brewassistant_smart_heat_pulse_minutes']?.state ?? '—';

              const enabled = states['input_boolean.brewassistant_smart_fermentation_enabled']?.state === 'on';
              const mode = states['input_select.brewassistant_smart_fermentation_mode']?.state ?? '—';
              const heat = states['binary_sensor.brewassistant_smart_heat_permitted']?.state;
              const needed = states['binary_sensor.brewassistant_smart_heat_needed']?.state;
              const cooldown = states['timer.brewassistant_smart_heat_cooldown']?.state;

              const matState = states['switch.fermentation_heat_mat']?.state ?? 'unknown';
              const matPowerRaw = states['sensor.fermentation_heat_mat_power']?.state;
              const matPower =
                matPowerRaw !== undefined &&
                matPowerRaw !== null &&
                matPowerRaw !== 'unknown' &&
                matPowerRaw !== 'unavailable'
                  ? parseFloat(matPowerRaw)
                  : null;

              const matTxt =
                matState === 'on'
                  ? `🔥 Matta på${matPower !== null ? ` · ${matPower.toFixed(1)} W` : ''}`
                  : matState === 'off'
                    ? `Matta av${matPower !== null ? ` · ${matPower.toFixed(1)} W` : ''}`
                    : 'Matta okänd';

              let modeTxt = enabled ? mode : 'Off';
              let line1 = `${modeTxt} · ${temp} °C / ${target} °C`;
              let line2 = `${temp} °C → ${target} °C`;
              let line3 = `Δ ${delta} °C · ${rate} °C/h · puls ${pulse} min`;

              let status = '✅ Stabil';
              if (!enabled) status = '⏻ Smart styrning av';
              else if (matState === 'on') status = '🔥 Värmematta aktiv';
              else if (heat === 'on') status = '🔥 Värme redo';
              else if (needed === 'on' && cooldown === 'active') status = '⏳ Väntar cooldown';
              else if (needed === 'on') status = '🛡️ Värme blockerad';

              return `
                <div style="line-height: 1.45;">
                  <div style="font-size: 12px; opacity: 0.78;">${line1}</div>
                  <div style="margin-top: 8px;">${line2}</div>
                  <div>${status} · ${line3}</div>
                  <div style="margin-top: 4px; opacity: 0.9;">${matTxt}</div>
                </div>
              `;
            ]]]
          styles:
            card:
              - border-radius: 24px
              - padding: 18px
              - min-height: 152px
              - color: white
              - background: |
                  [[[
                    const enabled = states['input_boolean.brewassistant_smart_fermentation_enabled']?.state === 'on';
                    const matOn = states['switch.fermentation_heat_mat']?.state === 'on';
                    const permitted = states['binary_sensor.brewassistant_smart_heat_permitted']?.state === 'on';
                    const needed = states['binary_sensor.brewassistant_smart_heat_needed']?.state === 'on';
                    const blocked = needed && !permitted;

                    if (!enabled) {
                      return 'linear-gradient(135deg, #34343a, #242428)';
                    }

                    if (matOn) {
                      return 'linear-gradient(135deg, #7a2600, #3b1200)';
                    }

                    if (permitted) {
                      return 'linear-gradient(135deg, #6d2c00, #3b1d00)';
                    }

                    if (blocked) {
                      return 'linear-gradient(135deg, #6d4c00, #332300)';
                    }

                    return 'linear-gradient(135deg, #3a3a40, #242428)';
                  ]]]
              - box-shadow: 0 10px 26px rgba(0,0,0,0.24)
              - overflow: hidden
            grid:
              - grid-template-areas: "\"i n expand power\" \"i l expand power\""
              - grid-template-columns: 72px 1fr 38px 38px
              - grid-template-rows: min-content 1fr
            img_cell:
              - width: 52px
              - height: 52px
              - border-radius: 50%
              - background: rgba(255,255,255,0.14)
              - align-self: start
            icon:
              - width: 32px
              - color: |
                  [[[
                    const matOn = states['switch.fermentation_heat_mat']?.state === 'on';
                    const permitted = states['binary_sensor.brewassistant_smart_heat_permitted']?.state === 'on';
                    const blocked = states['binary_sensor.brewassistant_smart_heat_needed']?.state === 'on'
                      && states['binary_sensor.brewassistant_smart_heat_permitted']?.state !== 'on';

                    if (matOn) return '#ff8a65';
                    if (permitted) return '#ffcc80';
                    if (blocked) return '#ffd54f';
                    return '#b8ffe8';
                  ]]]
              - filter: drop-shadow(0 0 8px rgba(120,255,215,0.45))
            name:
              - justify-self: start
              - align-self: end
              - text-align: left
              - font-size: 18px
              - font-weight: 900
              - color: white
              - white-space: normal
              - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
            state:
              - display: none
            label:
              - justify-self: start
              - align-self: start
              - text-align: left
              - font-size: 13px
              - font-weight: 600
              - color: white
              - white-space: normal
              - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
            custom_fields:
              expand:
                - justify-self: end
                - align-self: start
              power:
                - justify-self: end
                - align-self: start
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:mushroom-template-card
              primary: Styrtemp
              secondary: >
                {% set temp = states('sensor.brewassistant_smart_liquid_temp')
                %} {% set source =
                states('sensor.brewassistant_smart_liquid_temp_source') %} {{
                temp }} °C · {{ source }}
              icon: >
                {% if is_state('sensor.brewassistant_smart_liquid_temp_source',
                'RAPT Pill') %}
                  mdi:thermometer-water
                {% elif
                is_state('sensor.brewassistant_smart_liquid_temp_source',
                'Kegerator fallback') %}
                  mdi:fridge
                {% else %}
                  mdi:alert-circle
                {% endif %}
              icon_color: >
                {% if is_state('sensor.brewassistant_smart_liquid_temp_source',
                'RAPT Pill') %}
                  blue
                {% elif
                is_state('sensor.brewassistant_smart_liquid_temp_source',
                'Kegerator fallback') %}
                  amber
                {% else %}
                  red
                {% endif %}
              layout: vertical
              tap_action:
                action: more-info
              entity: sensor.brewassistant_smart_liquid_temp
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Target
              secondary: "{{ states('sensor.brewassistant_smart_target_temp') }} °C"
              icon: mdi:target
              icon_color: green
              layout: vertical
              tap_action:
                action: more-info
              entity: sensor.brewassistant_smart_target_temp
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Delta
              secondary: "{{ states('sensor.brewassistant_smart_temp_delta') }} °C"
              icon: mdi:delta
              icon_color: >
                {% set d = states('sensor.brewassistant_smart_temp_delta') |
                float(0) %} {% if d < -0.25 %}
                  orange
                {% elif d > 0.25 %}
                  red
                {% else %}
                  green
                {% endif %}
              layout: vertical
              tap_action:
                action: more-info
              entity: sensor.brewassistant_smart_temp_delta
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Trend
              secondary: "{{ states('sensor.brewassistant_smart_temp_rate') }} °C/h"
              icon: mdi:chart-line
              icon_color: >
                {% set r = states('sensor.brewassistant_smart_temp_rate') |
                float(0) %} {% if r >= 0.25 %}
                  orange
                {% elif r <= -0.25 %}
                  blue
                {% else %}
                  green
                {% endif %}
              layout: vertical
              tap_action:
                action: more-info
              entity: sensor.brewassistant_smart_temp_rate
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Puls
              secondary: >-
                {{ states('sensor.brewassistant_smart_heat_pulse_minutes') }}
                min
              icon: mdi:timer
              icon_color: amber
              layout: vertical
              tap_action:
                action: more-info
              entity: sensor.brewassistant_smart_heat_pulse_minutes
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Värmematta
              secondary: >
                {% set sw = states('switch.fermentation_heat_mat') %} {% set w =
                states('sensor.fermentation_heat_mat_power') %} {% if sw == 'on'
                %}
                  På · {{ w }} W
                {% elif sw == 'off' %}
                  Av · {{ w }} W
                {% else %}
                  {{ sw }} · {{ w }} W
                {% endif %}
              icon: mdi:radiator
              icon_color: >
                {% set sw = states('switch.fermentation_heat_mat') %} {% set w =
                states('sensor.fermentation_heat_mat_power') | float(0) %} {% if
                sw == 'on' and w > 2 %}
                  red
                {% elif sw == 'on' %}
                  orange
                {% else %}
                  grey
                {% endif %}
              layout: vertical
              tap_action:
                action: more-info
              entity: switch.fermentation_heat_mat
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
            - type: custom:mushroom-template-card
              primary: Cooldown
              secondary: "{{ states('timer.brewassistant_smart_heat_cooldown') }}"
              icon: mdi:timer-sand
              icon_color: >
                {% if is_state('timer.brewassistant_smart_heat_cooldown',
                'active') %}
                  amber
                {% else %}
                  green
                {% endif %}
              layout: vertical
              tap_action:
                action: more-info
              entity: timer.brewassistant_smart_heat_cooldown
              card_mod:
                style: |
                  ha-card {
                    min-height: 104px;
                    border-radius: 18px;
                    background: rgba(255,255,255,0.045);
                    border: 1px solid rgba(255,255,255,0.07);
                    box-shadow: none;
                    --card-primary-font-size: 14px;
                    --card-primary-font-weight: 800;
                    --card-secondary-font-size: 12px;
                    --card-secondary-color: rgba(255,255,255,0.78);
                  }
        - type: conditional
          conditions:
            - entity: input_boolean.brewassistant_smart_show_details
              state: "on"
          card:
            type: custom:vertical-stack-in-card
            cards:
              - type: custom:vertical-stack-in-card
                cards:
                  - type: markdown
                    content: "## Smart styrning"
                    card_mod:
                      style: |
                        ha-card {
                          background: transparent;
                          box-shadow: none;
                          color: white;
                          padding: 0 4px;
                        }
                        ha-markdown {
                          padding: 0 !important;
                        }
                        h2 {
                          margin: 2px 0 8px 0 !important;
