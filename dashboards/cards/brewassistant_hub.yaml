type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    show_label: false
    triggers_update:
      - sensor.brewassistant_brewzilla_orchestration_mode
      - sensor.brewassistant_brewzilla_connection_state
      - sensor.brewassistant_brewzilla_wort_temperature
      - sensor.brewassistant_brewzilla_requested_target
      - sensor.brewassistant_brewday_runtime_source
      - sensor.brewassistant_runtime_recipe_name
      - sensor.brewassistant_runtime_status
      - sensor.brewassistant_runtime_source_status
      - sensor.brewassistant_brewday_runtime_state
      - sensor.brewassistant_brewday_runtime_source
      - sensor.brewassistant_brewday_stage
      - sensor.brewfather_next_fermentation_step
      - sensor.brewfather_fermentation_event_summary
      - switch.brewassistant_kegerator_fan_auto_enabled
      - climate.kegerator_kylskap
      - sensor.kyl_temperatur_4
      - sensor.kegerator_power
      - switch.kegerator_fan
      - climate.fermentation_chamber
      - sensor.brewassistant_fermentation_chamber_air_temperature_average
      - switch.brewassistant_fermentation_climate_supervisor_enabled
      - sensor.brewassistant_gravity
      - sensor.brewassistant_carbonation_status
      - sensor.brewassistant_carbonation_target_volumes
      - sensor.brewassistant_carbonation_temperature
      - sensor.brewassistant_carbonation_recommended_pressure_bar
    styles:
      card:
        - border-radius: 20px 20px 8px 8px
        - padding: 14px
        - background: >-
            linear-gradient(135deg, rgba(255,183,77,.13),
            rgba(127,127,127,.035))
        - border: 1px solid rgba(127,127,127,.14)
        - box-shadow: var(--ha-card-box-shadow)
      grid:
        - grid-template-areas: "\"head\" \"summary\" \"brewfather\""
        - grid-template-columns: 1fr
        - row-gap: 9px
      custom_fields:
        head:
          - grid-area: head
        summary:
          - grid-area: summary
        brewfather:
          - grid-area: brewfather
    custom_fields:
      head: |
        [[[
          return `
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <div style="min-width:0;">
                <div style="font-size:20px; font-weight:950; line-height:1.05; letter-spacing:-.02em;">
                  BrewAssistant Hub
                </div>
                <div style="font-size:12px; font-weight:750; opacity:.68; margin-top:3px;">
                  BrewZilla · Fermentation · Carbonation · Kegerator
                </div>
              </div>
              <div style="
                border-radius:999px;
                padding:6px 10px;
                border:1px solid rgba(127,127,127,.18);
                background:rgba(255,255,255,.45);
                display:flex;
                align-items:center;
                gap:6px;
                font-size:11px;
                font-weight:950;
                white-space:nowrap;
              ">
                <ha-icon icon="mdi:home-assistant" style="width:14px;height:14px;"></ha-icon>
                Mission Control
              </div>
            </div>
          `;
        ]]]
      summary: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function num(id) {
            const raw = states[id]?.state;
            const n = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(n) ? n : null;
          }

          function fmt(n, unit = '', d = 1) {
            if (!Number.isFinite(n)) return '—';
            return `${n.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          const bzTemp = num('sensor.brewassistant_brewzilla_wort_temperature') ?? num('sensor.brewzilla_temperature');
          const bzMode = clean(states['sensor.brewassistant_brewzilla_orchestration_mode']?.state) || '—';
          const bzConn = clean(states['sensor.brewassistant_brewzilla_connection_state']?.state) || '—';
          const brewday = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || clean(states['sensor.brewassistant_brewday_stage']?.state) || 'idle';
          const brewdayActive = !['idle','inactive','completed','prepared','setup','none','unknown','—'].includes(String(brewday).toLowerCase());
          const bzDisplay = (!brewdayActive && (bzMode === 'blocked' || bzConn === 'Disconnected')) ? 'vilande' : bzMode;

          const fermClimate = clean(states['climate.fermentation_chamber']?.state) || 'off';
          const fermTemp = num('sensor.brewassistant_fermentation_chamber_air_temperature_average');

          const carbStatus = clean(states['sensor.brewassistant_carbonation_status']?.state) || 'Inactive';
          const carbBar = num('sensor.brewassistant_carbonation_recommended_pressure_bar');

          const kegStatus = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status) || clean(states['climate.kegerator_kylskap']?.state) || '—';
          const kegTemp = num('sensor.kyl_temperatur_4');
          const fan = clean(states['switch.kegerator_fan']?.state) || '—';

          return `
            <div style="font-size:12px; font-weight:800; opacity:.76; line-height:1.35;">
              BrewZilla ${fmt(bzTemp,'°C')} · ${bzDisplay}<br>
              Fermentation ${fermClimate} · ${fmt(fermTemp,'°C')} · Carbonation ${carbStatus} · ${fmt(carbBar,'bar',2)}<br>
              Kegerator ${fmt(kegTemp,'°C')} · ${kegStatus} · fan ${fan}
            </div>
          `;
        ]]]
      brewfather: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          const runtimeSource =
            clean(states['sensor.brewassistant_brewday_runtime_source']?.state) ||
            clean(states['sensor.brewassistant_runtime_source_status']?.state) ||
            clean(states['sensor.brewassistant_runtime_status']?.attributes?.source) ||
            'Manual / lokal';

          const recipe =
            clean(states['sensor.brewassistant_runtime_recipe_name']?.state) ||
            clean(states['sensor.brewfather_next_fermentation_step']?.attributes?.recipe_name) ||
            clean(states['sensor.brewfather_fermentation_event_summary']?.attributes?.recipe_name);

          const runtimeStatus = clean(states['sensor.brewassistant_runtime_status']?.state);
          const bfStep = clean(states['sensor.brewfather_next_fermentation_step']?.state);
          const hasBrewfather = !!recipe || String(runtimeSource).toLowerCase().includes('brewfather');

          const icon = hasBrewfather ? 'mdi:beer-outline' : 'mdi:cloud-check-outline';
          const title = hasBrewfather ? 'Brewfather / Runtime' : 'Brewfather vilande';
          const detail = hasBrewfather
            ? `${recipe || 'Aktiv källa'} · ${runtimeStatus || bfStep || runtimeSource}`
            : 'Ingen aktiv Brewfather-batch · lokal/manual runtime används vid behov';

          const bg = hasBrewfather ? 'rgba(33,150,243,.10)' : 'rgba(127,127,127,.055)';
          const border = hasBrewfather ? 'rgba(33,150,243,.22)' : 'rgba(127,127,127,.10)';

          return `
            <div style="
              display:grid;
              grid-template-columns:22px minmax(0,1fr);
              gap:8px;
              align-items:center;
              border-radius:14px;
              padding:7px 10px;
              background:${bg};
              border:1px solid ${border};
              min-width:0;
            ">
              <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.68;"></ha-icon>
              <div style="min-width:0;display:flex;gap:7px;align-items:baseline;overflow:hidden;">
                <div style="font-size:11px;font-weight:950;line-height:1.1;white-space:nowrap;">${title}</div>
                <div style="font-size:10.5px;font-weight:750;opacity:.62;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${detail}</div>
              </div>
            </div>
          `;
        ]]]
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.brewassistant_brewzilla_orchestration_mode
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:kettle-steam-outline
        name: BrewZilla
        tap_action:
          action: more-info
          entity: sensor.brewassistant_brewzilla_orchestration_mode
        label: |
          [[[
            function clean(v) {
              if (v === undefined || v === null) return null;
              const s = String(v);
              return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
            }
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const mode = clean(states['sensor.brewassistant_brewzilla_orchestration_mode']?.state) || '—';
            const conn = clean(states['sensor.brewassistant_brewzilla_connection_state']?.state) || '—';
            const runtime = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || clean(states['sensor.brewassistant_brewday_stage']?.state) || 'idle';
            const brewdayActive = !['idle','inactive','completed','prepared','setup','none','unknown','—'].includes(String(runtime).toLowerCase());
            const displayMode = (!brewdayActive && (mode === 'blocked' || conn === 'Disconnected')) ? 'vilande' : mode;
            const temp = num('sensor.brewassistant_brewzilla_wort_temperature') ?? num('sensor.brewzilla_temperature');
            const target = num('sensor.brewassistant_brewzilla_requested_target');
            return `${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} → ${Number.isFinite(target) ? target.toFixed(1) + ' °C' : '—'} · ${displayMode} · ${conn}`;
          ]]]
        styles:
          card:
            - min-height: 86px
            - padding: 12px
            - border-radius: 16px
            - background: |
                [[[
                  const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state;
                  const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
                  const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state || states['sensor.brewassistant_brewday_stage']?.state || 'idle';
                  const brewdayActive = !['idle','inactive','completed','prepared','setup','none','unknown','unavailable'].includes(String(runtime).toLowerCase());
                  if (!brewdayActive && (mode === 'blocked' || conn === 'Disconnected')) return 'rgba(127,127,127,.07)';
                  if (mode === 'blocked') return 'rgba(255,152,0,.13)';
                  if (mode === 'direct_with_abort' || mode === 'direct') return 'rgba(76,175,80,.13)';
                  if (mode === 'monitor') return 'rgba(33,150,243,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 36px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - color: |
                [[[
                  const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state;
                  const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
                  const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state || states['sensor.brewassistant_brewday_stage']?.state || 'idle';
                  const brewdayActive = !['idle','inactive','completed','prepared','setup','none','unknown','unavailable'].includes(String(runtime).toLowerCase());
                  if (!brewdayActive && (mode === 'blocked' || conn === 'Disconnected')) return 'rgba(127,127,127,.9)';
                  if (mode === 'blocked') return 'rgb(255,152,0)';
                  if (mode === 'direct_with_abort' || mode === 'direct') return 'rgb(76,175,80)';
                  if (mode === 'monitor') return 'rgb(33,150,243)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        entity: climate.fermentation_chamber
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:beer-outline
        name: Fermentation
        tap_action:
          action: more-info
          entity: climate.fermentation_chamber
        label: |
          [[[
            function clean(v) {
              if (v === undefined || v === null) return null;
              const s = String(v);
              return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
            }
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const climate = clean(states['climate.fermentation_chamber']?.state) || '—';
            const chamber = num('sensor.brewassistant_fermentation_chamber_air_temperature_average');
            const supervisor = clean(states['switch.brewassistant_fermentation_climate_supervisor_enabled']?.state) || '—';
            const sgRaw = num('sensor.brewassistant_gravity');
            const sg = Number.isFinite(sgRaw) && sgRaw > 0.95 && sgRaw < 1.2 ? sgRaw.toFixed(3) : '—';
            return `${climate} · chamber ${Number.isFinite(chamber) ? chamber.toFixed(1) + ' °C' : '—'} · SG ${sg} · supervisor ${supervisor}`;
          ]]]
        styles:
          card:
            - min-height: 86px
            - padding: 12px
            - border-radius: 16px
            - background: |
                [[[
                  const c = states['climate.fermentation_chamber']?.state;
                  if (c === 'off') return 'rgba(127,127,127,.07)';
                  if (c === 'heat') return 'rgba(255,152,0,.13)';
                  if (c === 'cool') return 'rgba(33,150,243,.13)';
                  if (c === 'heat_cool') return 'rgba(76,175,80,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 36px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - color: |
                [[[
                  const c = states['climate.fermentation_chamber']?.state;
                  if (c === 'off') return 'rgba(127,127,127,.9)';
                  if (c === 'heat') return 'rgb(255,152,0)';
                  if (c === 'cool') return 'rgb(33,150,243)';
                  if (c === 'heat_cool') return 'rgb(76,175,80)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        entity: sensor.brewassistant_carbonation_status
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:beer
        name: Carbonation
        tap_action:
          action: more-info
          entity: sensor.brewassistant_carbonation_status
        label: |
          [[[
            function clean(v) {
              if (v === undefined || v === null) return null;
              const s = String(v);
              return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
            }
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const status = clean(states['sensor.brewassistant_carbonation_status']?.state) || 'Inactive';
            const target = num('sensor.brewassistant_carbonation_target_volumes');
            const temp = num('sensor.brewassistant_carbonation_temperature');
            const bar = num('sensor.brewassistant_carbonation_recommended_pressure_bar');
            return `${status} · target ${Number.isFinite(target) ? target.toFixed(2) + ' vol' : '—'} · ${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} · ${Number.isFinite(bar) ? bar.toFixed(2) + ' bar' : '—'}`;
          ]]]
        styles:
          card:
            - min-height: 86px
            - padding: 12px
            - border-radius: 16px
            - background: |
                [[[
                  const s = states['sensor.brewassistant_carbonation_status']?.state;
                  if (s === 'Ready to serve') return 'rgba(76,175,80,.13)';
                  if (s === 'Conditioning') return 'rgba(0,188,212,.13)';
                  if (s === 'Carbonating') return 'rgba(33,150,243,.13)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 36px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - color: |
                [[[
                  const s = states['sensor.brewassistant_carbonation_status']?.state;
                  if (s === 'Ready to serve') return 'rgb(76,175,80)';
                  if (s === 'Conditioning') return 'rgb(0,188,212)';
                  if (s === 'Carbonating') return 'rgb(33,150,243)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        entity: switch.brewassistant_kegerator_fan_auto_enabled
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:snowflake
        name: Kegerator
        tap_action:
          action: more-info
          entity: switch.brewassistant_kegerator_fan_auto_enabled
        label: |
          [[[
            function clean(v) {
              if (v === undefined || v === null) return null;
              const s = String(v);
              return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
            }
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const temp = num('sensor.kyl_temperatur_4');
            const target = states['climate.kegerator_kylskap']?.attributes?.temperature;
            const climate = clean(states['climate.kegerator_kylskap']?.state) || '—';
            const fan = clean(states['switch.kegerator_fan']?.state) || '—';
            const reason = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.fan_reason) || '—';
            return `${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} → ${Number.isFinite(Number(target)) ? Number(target).toFixed(1) + ' °C' : '—'} · ${climate} · fan ${fan} · ${reason}`;
          ]]]
        styles:
          card:
            - min-height: 86px
            - padding: 12px
            - border-radius: 16px
            - background: |
                [[[
                  const status = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
                  if (status === 'cooling') return 'rgba(33,150,243,.13)';
                  if (status === 'afterrun') return 'rgba(0,188,212,.13)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 36px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - color: |
                [[[
                  const status = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
                  if (status === 'cooling') return 'rgb(33,150,243)';
                  if (status === 'afterrun') return 'rgb(0,188,212)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
  - type: custom:button-card
    show_icon: true
    show_name: true
    show_label: true
    icon: mdi:information-outline
    name: Nästa naturliga steg
    label: |
      [[[
        function clean(v) {
          if (v === undefined || v === null) return null;
          const s = String(v);
          return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
        }

        const carb = clean(states['sensor.brewassistant_carbonation_status']?.state) || 'Inactive';
        const ferm = clean(states['climate.fermentation_chamber']?.state) || 'off';
        const kegStatus = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status);
        const fanReason = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.fan_reason);
        const fan = clean(states['switch.kegerator_fan']?.state);
        const bz = clean(states['sensor.brewassistant_brewzilla_orchestration_mode']?.state) || 'unknown';
        const bzConn = clean(states['sensor.brewassistant_brewzilla_connection_state']?.state) || 'unknown';
        const brewday = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || clean(states['sensor.brewassistant_brewday_stage']?.state) || 'idle';
        const bfRecipe = clean(states['sensor.brewassistant_runtime_recipe_name']?.state);

        const brewdayActive = !['idle','inactive','completed','prepared','none','unknown'].includes(String(brewday).toLowerCase());

        if (carb === 'Ready to serve') return 'Carbonation är klar · dags att servera eller flytta till lagring.';
        if (ferm !== 'off') return 'Fermentation chamber är aktiv · följ chamber temp, SG och klimatlogik.';
        if (kegStatus === 'cooling') return `Kegerator kyler · fläkt ${fan || '—'} · ${fanReason || 'normal cirkulation'}.`;
        if (kegStatus === 'afterrun') return `Kegerator efterventilerar · fläkt ${fan || '—'} · jämnar ut temperaturen.`;
        if (bfRecipe) return `Brewfather/runtime har receptdata · ${bfRecipe}.`;
        if (brewdayActive && (bz === 'blocked' || bzConn === 'Disconnected')) return 'BrewZilla behöver uppmärksamhet för aktiv bryggdag · kontrollera anslutning/säkerhetsläge.';
        if (carb === 'Carbonating' || carb === 'Conditioning') return `Carbonation pågår · status ${carb}.`;
        return 'Allt ser lugnt ut · öppna respektive modul för detaljer när du vill nörda ner dig.';
      ]]]
    tap_action:
      action: none
    styles:
      card:
        - margin-top: 4px
        - border-radius: 8px 8px 18px 18px
        - padding: 10px 12px
        - background: rgba(127,127,127,.06)
        - border: 1px solid rgba(127,127,127,.12)
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 30px minmax(0,1fr)
        - column-gap: 8px
      icon:
        - width: 18px
        - opacity: 0.72
      name:
        - justify-self: start
        - font-size: 13px
        - font-weight: 950
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
        - font-size: 11.5px
        - font-weight: 750
        - opacity: 0.72
