# BrewAssistant Brewfather Feed Card v1.0 Unified Clean
# Paste as ONE card into an existing Home Assistant dashboard.
# Requires:
# - custom:button-card
# - custom:expander-card
#
# Hidden unless Brewfather/BrewTracker actively provides runtime data:
# binary_sensor.brewassistant_runtime_brewfather_available == on

type: conditional
conditions:
  - entity: binary_sensor.brewassistant_runtime_brewfather_available
    state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: binary_sensor.brewassistant_runtime_brewfather_available
      name: Brewfather Feed
      icon: |
        [[[
          const available = states['binary_sensor.brewassistant_runtime_brewfather_available']?.state === 'on';
          const age = Number(states['sensor.brewassistant_brewday_snapshot_age_minutes']?.state);
          const runtime = String(states['sensor.brewassistant_brewday_runtime_state']?.state ?? '').toLowerCase();

          if (!available) return 'mdi:cloud-alert-outline';
          if (Number.isFinite(age) && age > 10) return 'mdi:cloud-clock-outline';
          if (runtime === 'live' || runtime === 'running') return 'mdi:cloud-check-outline';
          return 'mdi:cloud-sync-outline';
        ]]]
      show_state: false
      show_label: true
      tap_action:
        action: more-info
      hold_action:
        action: call-service
        service: brewassistant.force_brewfather_refresh
      label: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function n(id) {
            const raw = states[id]?.state;
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function attr(entity, key) {
            const raw = states[entity]?.attributes?.[key];
            if (raw === undefined || raw === null) return null;
            const s = String(raw);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function fmt(v, unit = '', d = 1) {
            if (!Number.isFinite(v)) return '—';
            return `${v.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          function short(v, max = 48) {
            const s = String(v ?? '—');
            return s.length > max ? s.slice(0, max - 1) + '…' : s;
          }

          const feed = states['binary_sensor.brewassistant_runtime_brewfather_available'];
          const source = attr('binary_sensor.brewassistant_runtime_brewfather_available', 'source') || attr('sensor.brewassistant_brewday_runtime_summary', 'source_entity') || 'Brewfather';
          const sourceStatus = attr('binary_sensor.brewassistant_runtime_brewfather_available', 'source_status') || 'feed active';
          const snapshotAgeSeconds = Number(feed?.attributes?.snapshot_age_seconds);
          const snapshotAge = n('sensor.brewassistant_brewday_snapshot_age_minutes') ?? (Number.isFinite(snapshotAgeSeconds) ? snapshotAgeSeconds / 60 : null);

          const runtimeState = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || attr('binary_sensor.brewassistant_runtime_brewfather_available', 'runtime_state') || '—';
          const runtimeStatus = clean(states['sensor.brewassistant_brewday_runtime_status']?.state) || runtimeState;
          const summary = clean(states['sensor.brewassistant_brewday_runtime_summary']?.state) || 'Brewfather feed is active.';
          const stage = clean(states['sensor.brewassistant_brewday_runtime_stage']?.state) || '—';
          const step = clean(states['sensor.brewassistant_brewday_runtime_step']?.state) || '—';
          const next = clean(states['sensor.brewassistant_brewday_runtime_next_step']?.state) || '—';

          const progress = n('sensor.brewassistant_brewday_live_progress');
          const remaining = n('sensor.brewassistant_brewday_live_time_remaining_minutes');
          const targetTemp = n('sensor.brewassistant_brewday_target_temperature');

          const targetSource = attr('sensor.brewassistant_brewday_runtime_summary', 'target_temperature_source') || 'target source';
          const confirmationHint = attr('sensor.brewassistant_brewday_runtime_summary', 'confirmation_hint') || '—';
          const pausedFreeze = attr('sensor.brewassistant_brewday_runtime_summary', 'paused_freeze') || '—';

          let headline = 'Brewfather feed aktiv';
          let badge = 'Live feed';
          let badgeIcon = 'mdi:cloud-check-outline';
          let chipBg = 'rgba(76,175,80,.12)';
          let chipBorder = 'rgba(76,175,80,.24)';
          let tone = 'active';

          if (Number.isFinite(snapshotAge) && snapshotAge > 10) {
            headline = 'Feed aktiv · gammal snapshot';
            badge = 'Stale';
            badgeIcon = 'mdi:cloud-clock-outline';
            chipBg = 'rgba(255,193,7,.14)';
            chipBorder = 'rgba(255,193,7,.28)';
            tone = 'stale';
          } else if (runtimeState === 'live' || runtimeState === 'running') {
            headline = 'BrewTracker live';
            badge = 'Live';
            badgeIcon = 'mdi:cloud-check-outline';
          }

          const metric = (title, main, sub, icon, kind = 'neutral') => {
            const bg =
              kind === 'blue' ? 'rgba(33,150,243,.09)' :
              kind === 'cyan' ? 'rgba(0,188,212,.10)' :
              kind === 'green' ? 'rgba(76,175,80,.11)' :
              kind === 'yellow' ? 'rgba(255,193,7,.13)' :
              kind === 'red' ? 'rgba(244,67,54,.11)' :
              'rgba(127,127,127,.08)';
            const border =
              kind === 'blue' ? 'rgba(33,150,243,.20)' :
              kind === 'cyan' ? 'rgba(0,188,212,.22)' :
              kind === 'green' ? 'rgba(76,175,80,.24)' :
              kind === 'yellow' ? 'rgba(255,193,7,.26)' :
              kind === 'red' ? 'rgba(244,67,54,.24)' :
              'rgba(127,127,127,.14)';
            return `
              <div style="
                min-width:0;
                border-radius:13px;
                padding:7px 6px;
                background:${bg};
                border:1px solid ${border};
                display:grid;
                grid-template-columns:18px minmax(0,1fr);
                gap:5px;
                align-items:center;
              ">
                <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
                <div style="min-width:0;text-align:center;">
                  <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                  <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                  <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                </div>
              </div>
            `;
          };

          const runtimeKind = runtimeState === 'live' || runtimeState === 'running' ? 'green' : runtimeState === 'paused' ? 'yellow' : 'neutral';
          const ageKind = Number.isFinite(snapshotAge) && snapshotAge > 10 ? 'yellow' : Number.isFinite(snapshotAge) ? 'green' : 'neutral';
          const progressKind = Number.isFinite(progress) && progress >= 80 ? 'green' : Number.isFinite(progress) && progress > 0 ? 'blue' : 'neutral';

          const hintBg = tone === 'stale' ? 'rgba(255,193,7,.10)' : 'rgba(76,175,80,.10)';
          const hintBorder = tone === 'stale' ? 'rgba(255,193,7,.22)' : 'rgba(76,175,80,.20)';

          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="min-width:0;">
                  <div style="font-size:12px;font-weight:850;opacity:.66;">Brewfather · BrewTracker source · feed health</div>
                  <div style="font-size:12px;font-weight:850;opacity:.66;">installed badge · ${short(source, 42)}</div>
                </div>
                <div style="
                  display:inline-flex;
                  align-items:center;
                  gap:6px;
                  padding:6px 9px;
                  border-radius:999px;
                  background:${chipBg};
                  border:1px solid ${chipBorder};
                  font-size:11px;
                  font-weight:950;
                  white-space:nowrap;
                ">
                  <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                  <span>${badge}</span>
                </div>
              </div>

              <div style="margin-top:8px;text-align:center;">
                <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
                <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                  ${sourceStatus} · ${runtimeState} · snapshot ${fmt(snapshotAge, 'min')}<br>${short(summary, 78)}
                </div>
              </div>

              <div style="
                margin-top:11px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Runtime', short(runtimeState, 14), runtimeStatus, 'mdi:state-machine', runtimeKind)}
                ${metric('Stage', short(stage, 14), 'BrewTracker', 'mdi:clipboard-list-outline', 'blue')}
                ${metric('Step', short(step, 14), 'current', 'mdi:play-circle-outline', 'cyan')}
                ${metric('Next', short(next, 14), 'next', 'mdi:skip-next-outline', 'neutral')}
              </div>

              <div style="
                margin-top:7px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Progress', fmt(progress, '%', 0), Number.isFinite(remaining) ? `${remaining.toFixed(0)} min` : 'remaining', 'mdi:progress-clock', progressKind)}
                ${metric('Snapshot', fmt(snapshotAge, 'min'), 'age', 'mdi:clock-sync-outline', ageKind)}
                ${metric('Target', fmt(targetTemp, '°C'), short(targetSource, 14), 'mdi:target', 'neutral')}
                ${metric('Source', short(source, 14), 'feed', 'mdi:database-search', 'green')}
              </div>

              <div style="
                margin-top:10px;
                display:grid;
                grid-template-columns:20px minmax(0,1fr);
                gap:7px;
                align-items:center;
                border-radius:14px;
                padding:8px 9px;
                background:${hintBg};
                border:1px solid ${hintBorder};
              ">
                <ha-icon icon="${tone === 'stale' ? 'mdi:cloud-clock-outline' : 'mdi:cloud-check-outline'}" style="width:15px;height:15px;opacity:.76;"></ha-icon>
                <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                  Brewfather feed installerad och skickar aktiv data · confirm ${confirmationHint} · paused ${pausedFreeze}
                </div>
              </div>
            </div>
          `;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - overflow: hidden
          - background: |
              [[[
                const age = Number(states['sensor.brewassistant_brewday_snapshot_age_minutes']?.state);
                if (Number.isFinite(age) && age > 10) return 'linear-gradient(135deg, rgba(255,193,7,.12), rgba(127,127,127,.035))';
                return 'linear-gradient(135deg, rgba(76,175,80,.11), rgba(127,127,127,.035))';
              ]]]
          - border: 1px solid rgba(127,127,127,.18)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: '"i n" "i l"'
          - grid-template-columns: 42px minmax(0,1fr)
          - grid-template-rows: min-content min-content
          - column-gap: 12px
        icon:
          - width: 27px
          - height: 27px
        img_cell:
          - width: 42px
          - height: 42px
          - border-radius: 50%
          - background: rgba(76,175,80,.13)
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 950
          - letter-spacing: -.02em
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
          - margin-top: 4px

    - type: horizontal-stack
      cards:
        - type: custom:button-card
          name: Force refresh
          icon: mdi:refresh
          tap_action:
            action: call-service
            service: brewassistant.force_brewfather_refresh
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(33,150,243,.09)
              - border: 1px solid rgba(33,150,243,.22)
            icon:
              - width: 22px
              - height: 22px
            name:
              - font-size: 11px
              - font-weight: 950

        - type: custom:button-card
          entity: binary_sensor.brewassistant_runtime_brewfather_available
          name: Feed details
          icon: mdi:cloud-search-outline
          tap_action:
            action: more-info
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(76,175,80,.10)
              - border: 1px solid rgba(76,175,80,.24)
            icon:
              - width: 22px
              - height: 22px
            name:
              - font-size: 11px
              - font-weight: 950

    - type: custom:expander-card
      title-card:
        type: custom:button-card
        entity: binary_sensor.brewassistant_runtime_brewfather_available
        name: Brewfather feed detaljer
        icon: mdi:tune-variant
        show_state: false
        show_label: true
        label: |
          [[[
            const state = states['binary_sensor.brewassistant_runtime_brewfather_available']?.state ?? 'off';
            const source = states['binary_sensor.brewassistant_runtime_brewfather_available']?.attributes?.source ?? 'No source';
            const status = states['binary_sensor.brewassistant_runtime_brewfather_available']?.attributes?.source_status ?? 'No status';
            const age = states['sensor.brewassistant_brewday_snapshot_age_minutes']?.state ?? '—';
            return `${state} · ${source} · ${status} · ${age} min`;
          ]]]
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(127,127,127,.055)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: '"i n" "i l"'
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - height: 22px
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: .72
      cards:
        - type: entities
          title: Brewfather / BrewTracker feed
          show_header_toggle: false
          entities:
            - entity: binary_sensor.brewassistant_runtime_brewfather_available
              name: Brewfather available
            - entity: sensor.brewassistant_brewday_runtime_summary
              name: Runtime summary
            - entity: sensor.brewassistant_brewday_runtime_state
              name: Runtime state
            - entity: sensor.brewassistant_brewday_runtime_status
              name: Runtime status
            - entity: sensor.brewassistant_brewday_runtime_stage
              name: Stage
            - entity: sensor.brewassistant_brewday_runtime_step
              name: Step
            - entity: sensor.brewassistant_brewday_runtime_next_step
              name: Next step
            - entity: sensor.brewassistant_brewday_live_progress
              name: Progress
            - entity: sensor.brewassistant_brewday_live_time_remaining_minutes
              name: Remaining minutes
            - entity: sensor.brewassistant_brewday_snapshot_age_minutes
              name: Snapshot age
            - entity: sensor.brewassistant_brewday_target_temperature
              name: Target temperature
            - type: attribute
              entity: binary_sensor.brewassistant_runtime_brewfather_available
              attribute: source
              name: Source
            - type: attribute
              entity: binary_sensor.brewassistant_runtime_brewfather_available
              attribute: source_status
              name: Source status
            - type: attribute
              entity: binary_sensor.brewassistant_runtime_brewfather_available
              attribute: snapshot_age_seconds
              name: Snapshot age seconds
            - type: attribute
              entity: sensor.brewassistant_brewday_runtime_summary
              attribute: source_entity
              name: Source entity
            - type: attribute
              entity: sensor.brewassistant_brewday_runtime_summary
              attribute: target_temperature_source
              name: Target source
            - type: attribute
              entity: sensor.brewassistant_brewday_runtime_summary
              attribute: confirmation_hint
              name: Confirmation hint
            - type: attribute
              entity: sensor.brewassistant_brewday_runtime_summary
              attribute: paused_freeze
              name: Paused freeze
