# BrewTracker Feed Health Card v1
# Compact diagnostics card for the Brewfather Brew Tracker -> BrewAssistant runtime feed.
# Required custom cards:
# - custom:vertical-stack-in-card
# - custom:mushroom-template-card
# - custom:mushroom-chips-card
# - custom:bar-card

# Paste this card into a diagnostics/debug section of the Brewday dashboard.

type: custom:vertical-stack-in-card
cards:
  - type: custom:mushroom-template-card
    entity: binary_sensor.brewassistant_runtime_brewfather_available
    primary: >-
      {% set src = state_attr('binary_sensor.brewassistant_runtime_brewfather_available', 'source') %}
      {% set state = state_attr('binary_sensor.brewassistant_runtime_brewfather_available', 'runtime_state') %}
      BrewTracker Feed · {{ src or 'No source' }}{% if state %} · {{ state }}{% endif %}
    secondary: >-
      {% set status = state_attr('binary_sensor.brewassistant_runtime_brewfather_available', 'source_status') %}
      {% set age = state_attr('binary_sensor.brewassistant_runtime_brewfather_available', 'snapshot_age_seconds') | int(0) %}
      {{ status or 'No runtime feed' }} · snapshot {{ (age / 60) | round(1) }} min
    icon: >-
      {% if is_state('binary_sensor.brewassistant_runtime_brewfather_available', 'on') %}
        mdi:cloud-check-outline
      {% else %}
        mdi:cloud-alert-outline
      {% endif %}
    icon_color: >-
      {% if is_state('binary_sensor.brewassistant_runtime_brewfather_available', 'on') %}
        green
      {% else %}
        red
      {% endif %}
    card_mod:
      style: |
        ha-card {
          border-radius: 18px;
          background: rgba(15, 23, 42, .72);
        }

  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: sensor.brewassistant_brewday_runtime_status
        icon: mdi:state-machine
        content: '{{ states("sensor.brewassistant_brewday_runtime_status") }}'
        icon_color: >-
          {% if is_state('sensor.brewassistant_brewday_runtime_status', 'running') %}
            green
          {% elif is_state('sensor.brewassistant_brewday_runtime_status', 'paused') %}
            amber
          {% elif is_state('sensor.brewassistant_brewday_runtime_status', 'completed') %}
            blue
          {% else %}
            grey
          {% endif %}
      - type: template
        entity: sensor.brewassistant_brewday_runtime_state
        icon: mdi:timer-cog-outline
        content: '{{ states("sensor.brewassistant_brewday_runtime_state") }}'
        icon_color: >-
          {% if is_state('sensor.brewassistant_brewday_runtime_state', 'live') %}
            green
          {% elif is_state('sensor.brewassistant_brewday_runtime_state', 'paused') %}
            amber
          {% elif is_state('sensor.brewassistant_brewday_runtime_state', 'awaiting_snapshot') %}
            red
          {% else %}
            grey
          {% endif %}
      - type: template
        entity: sensor.brewassistant_brewday_snapshot_age_minutes
        icon: mdi:clock-sync-outline
        content: '{{ states("sensor.brewassistant_brewday_snapshot_age_minutes") }} min'
        icon_color: blue
      - type: template
        icon: mdi:database-search
        content: >-
          {{ state_attr('sensor.brewassistant_brewday_runtime_summary', 'source_entity') or 'raw?' }}
        icon_color: purple

  - type: custom:bar-card
    entity: sensor.brewassistant_brewday_live_progress
    name: BrewTracker progress
    height: 16px
    min: 0
    max: 100
    decimal: 0
    positions:
      icon: 'off'
      indicator: 'off'
      name: inside
      value: inside
    severity:
      - from: 0
        to: 35
        color: '#64748b'
      - from: 36
        to: 75
        color: '#0ea5e9'
      - from: 76
        to: 100
        color: '#22c55e'
    card_mod:
      style: |
        ha-card {
          background: rgba(15, 23, 42, .55);
          border-radius: 16px;
          padding: 8px 12px;
        }

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewday_runtime_stage
        primary: Stage
        secondary: '{{ states(entity) }}'
        icon: mdi:clipboard-list-outline
        icon_color: blue
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewday_runtime_step
        primary: Current step
        secondary: '{{ states(entity) }}'
        icon: mdi:play-circle-outline
        icon_color: green
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewday_runtime_next_step
        primary: Next step
        secondary: '{{ states(entity) }}'
        icon: mdi:skip-next-outline
        icon_color: amber
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewday_live_time_remaining_minutes
        primary: Time remaining
        secondary: '{{ states(entity) }} min'
        icon: mdi:timer-sand
        icon_color: cyan

  - type: custom:mushroom-template-card
    entity: sensor.brewassistant_brewday_runtime_summary
    primary: Runtime details
    secondary: >-
      Target {{ states('sensor.brewassistant_brewday_target_temperature') }} °C ·
      source {{ state_attr(entity, 'target_temperature_source') or 'unknown' }} ·
      confirm {{ state_attr(entity, 'confirmation_hint') }} ·
      paused {{ state_attr(entity, 'paused_freeze') }}
    icon: mdi:information-outline
    icon_color: indigo
    card_mod:
      style: |
        ha-card {
          border-radius: 18px;
          background: rgba(30, 41, 59, .58);
        }
