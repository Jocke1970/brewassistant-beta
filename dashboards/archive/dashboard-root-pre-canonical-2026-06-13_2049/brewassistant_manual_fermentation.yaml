type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: input_boolean.manual_batch_active
    name: Manual Fermentation
    icon: mdi:fruit-cherries
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const enabled = entity.state === 'on';

        if (!enabled) {
          return `
            <div style="font-size:13px; font-weight:800; opacity:.82; margin-top:2px;">
              Avstängd · tryck power för att visa detaljer
            </div>
          `;
        }

        const batch = states['input_text.manual_batch_name']?.state ?? 'Manual batch';
        const status = states['sensor.manual_batch_status']?.state ?? 'Monitoring';
        const next = states['sensor.manual_batch_next_action']?.state ?? 'Följ SG-trenden och logga nästa hydrometermätning.';

        const sgRaw = parseFloat(states['input_number.manual_batch_sg_current']?.state);
        const sg = Number.isFinite(sgRaw) ? sgRaw.toFixed(3) : '—';

        const abvRaw = parseFloat(states['sensor.manual_batch_abv_current']?.state);
        const abv = Number.isFinite(abvRaw) ? abvRaw.toFixed(1) : '0.0';

        const daysRaw = parseFloat(states['sensor.manual_batch_days_active']?.state);
        const days = Number.isFinite(daysRaw) ? daysRaw.toFixed(1) : '0.0';

        return `
          <div style="font-size:12px; opacity:.78;">${batch}</div>
          <div style="font-size:15px; font-weight:900; margin-top:4px;">${status} · SG ${sg} · ${abv}%</div>
          <div style="font-size:12px; opacity:.78; margin-top:5px;">${days} dagar · ${next}</div>
        `;
      ]]]
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: input_boolean.manual_batch_active
          show_name: false
          show_state: false
          icon: mdi:power
          tap_action:
            action: toggle
          styles:
            card:
              - width: 36px
              - height: 36px
              - border-radius: 50%
              - padding: 0
              - background: |
                  [[[
                    return entity.state === 'on'
                      ? 'rgba(129,199,132,0.25)'
                      : 'rgba(255,255,255,0.08)';
                  ]]]
              - border: |
                  [[[
                    return entity.state === 'on'
                      ? '1px solid rgba(129,199,132,0.55)'
                      : '1px solid rgba(255,255,255,0.12)';
                  ]]]
              - box-shadow: none
            icon:
              - width: 19px
              - color: |
                  [[[
                    return entity.state === 'on'
                      ? '#81c784'
                      : 'rgba(255,255,255,0.55)';
                  ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 12px 14px
        - min-height: 72px
        - background: |
            [[[
              const enabled = entity.state === 'on';
              const status = states['sensor.manual_batch_status']?.state ?? 'Idle';
              const warning = states['sensor.manual_batch_warning_level']?.state ?? 'ok';

              if (!enabled) {
                return 'linear-gradient(135deg, rgba(66,66,66,0.42), rgba(25,25,25,0.36))';
              }

              if (warning === 'critical') {
                return 'linear-gradient(135deg, rgba(183,28,28,0.38), rgba(38,50,56,0.38))';
              }

              if (warning === 'warning') {
                return 'linear-gradient(135deg, rgba(245,124,0,0.34), rgba(38,50,56,0.36))';
              }

              if (warning === 'ready' || status === 'Ready for packaging') {
                return 'linear-gradient(135deg, rgba(46,125,50,0.34), rgba(13,71,161,0.18))';
              }

              if (status === 'Active fermentation') {
                return 'linear-gradient(135deg, rgba(255,159,67,0.34), rgba(95,39,205,0.22))';
              }

              if (status === 'Slowing down' || status === 'Stable / verifying') {
                return 'linear-gradient(135deg, rgba(245,124,0,0.26), rgba(38,50,56,0.36))';
              }

              if (status === 'Packaged') {
                return 'linear-gradient(135deg, rgba(25,118,210,0.30), rgba(38,50,56,0.42))';
              }

              return 'linear-gradient(135deg, rgba(255,132,89,0.30), rgba(38,50,56,0.42))';
            ]]]
        - border: 1px solid rgba(255,255,255,0.10)
        - box-shadow: 0 8px 26px rgba(0,0,0,0.22)
      grid:
        - grid-template-areas: "\"i n power\" \"i l power\""
        - grid-template-columns: 42px 1fr 42px
        - grid-template-rows: min-content min-content
        - column-gap: 12px
        - row-gap: 2px
      icon:
        - width: 28px
        - color: |
            [[[
              const enabled = entity.state === 'on';
              const warning = states['sensor.manual_batch_warning_level']?.state ?? 'ok';
              const status = states['sensor.manual_batch_status']?.state ?? 'Idle';

              if (!enabled) return 'rgba(255,255,255,0.45)';
              if (warning === 'critical') return '#ef9a9a';
              if (warning === 'warning') return '#ffcc80';
              if (warning === 'ready' || status === 'Ready for packaging') return '#a5d6a7';
              return '#ffd28a';
            ]]]
      img_cell:
        - width: 42px
        - height: 42px
        - border-radius: 15px
        - background: rgba(255,255,255,0.08)
      name:
        - justify-self: start
        - font-size: 16px
        - font-weight: 900
        - color: rgba(255,255,255,0.96)
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
        - line-height: 1.35
        - color: rgba(255,255,255,0.78)
      custom_fields:
        power:
          - justify-self: end
          - align-self: start
  - type: conditional
    conditions:
      - entity: input_boolean.manual_batch_active
        state: "on"
    card:
      type: vertical-stack
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              entity: input_number.manual_batch_sg_current
              name: SG nu
              icon: mdi:hydrometer
              show_state: true
              state_display: |
                [[[
                  const v = parseFloat(entity.state);
                  return Number.isFinite(v) ? v.toFixed(3) : '—';
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: rgba(255,255,255,0.055)
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.70)
                  - font-size: 12px
                  - font-weight: 700
                state:
                  - color: white
                  - font-size: 20px
                  - font-weight: 850
                icon:
                  - color: rgba(255,190,118,0.95)
            - type: custom:button-card
              entity: sensor.manual_batch_abv_current
              name: ABV
              icon: mdi:percent
              show_state: true
              state_display: |
                [[[
                  let v = parseFloat(entity.state);
                  if (Number.isFinite(v)) return `${v.toFixed(1)} %`;

                  const og = parseFloat(states['input_number.manual_batch_og']?.state);
                  const sg = parseFloat(states['input_number.manual_batch_sg_current']?.state);
                  if (Number.isFinite(og) && Number.isFinite(sg) && og >= sg) {
                    return `${((og - sg) * 131.25).toFixed(1)} %`;
                  }
                  return '—';
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: rgba(255,255,255,0.055)
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.70)
                  - font-size: 12px
                  - font-weight: 700
                state:
                  - color: white
                  - font-size: 20px
                  - font-weight: 850
                icon:
                  - color: rgba(129,236,236,0.95)
            - type: custom:button-card
              entity: sensor.manual_batch_attenuation
              name: Utjäsning
              icon: mdi:chart-bell-curve
              show_state: true
              state_display: |
                [[[
                  let v = parseFloat(entity.state);
                  if (Number.isFinite(v)) return `${v.toFixed(1)} %`;

                  const og = parseFloat(states['input_number.manual_batch_og']?.state);
                  const sg = parseFloat(states['input_number.manual_batch_sg_current']?.state);
                  if (Number.isFinite(og) && Number.isFinite(sg) && og > 1 && og > sg) {
                    return `${(((og - sg) / (og - 1)) * 100).toFixed(1)} %`;
                  }
                  return '0.0 %';
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: rgba(255,255,255,0.055)
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.70)
                  - font-size: 12px
                  - font-weight: 700
                state:
                  - color: white
                  - font-size: 20px
                  - font-weight: 850
                icon:
                  - color: rgba(116,185,255,0.95)
            - type: custom:button-card
              entity: sensor.manual_batch_sg_delta
              name: SG Δ
              icon: mdi:delta
              show_state: true
              state_display: |
                [[[
                  let v = parseFloat(entity.state);
                  if (Number.isFinite(v)) return v.toFixed(3);

                  const prev = parseFloat(states['input_number.manual_batch_sg_previous']?.state);
                  const cur = parseFloat(states['input_number.manual_batch_sg_current']?.state);
                  if (Number.isFinite(prev) && Number.isFinite(cur)) {
                    return (prev - cur).toFixed(3);
                  }
                  return '—';
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: rgba(255,255,255,0.055)
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.70)
                  - font-size: 12px
                  - font-weight: 700
                state:
                  - color: white
                  - font-size: 20px
                  - font-weight: 850
                icon:
                  - color: rgba(85,239,196,0.95)
        - type: custom:button-card
          name: Cider Progress
          icon: mdi:chart-timeline-variant-shimmer
          show_state: false
          show_label: true
          label: |
            [[[
              const og = parseFloat(states['input_number.manual_batch_og']?.state);
              const sg = parseFloat(states['input_number.manual_batch_sg_current']?.state);
              const fg = parseFloat(states['input_number.manual_batch_expected_fg']?.state);

              const fmt = (v) => Number.isFinite(v) ? v.toFixed(3) : '—';

              let progress = 0;
              if (Number.isFinite(og) && Number.isFinite(sg) && Number.isFinite(fg) && og > fg) {
                progress = ((og - sg) / (og - fg)) * 100;
                progress = Math.max(0, Math.min(100, progress));
              }

              const remaining = Number.isFinite(sg) && Number.isFinite(fg)
                ? Math.max(0, (sg - fg) * 1000).toFixed(0)
                : '—';

              return `
                <div class="progress-wrap">
                  <div class="progress-top">
                    <span>OG ${fmt(og)}</span>
                    <span>SG ${fmt(sg)}</span>
                    <span>FG ${fmt(fg)}</span>
                  </div>

                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${progress}%"></div>
                  </div>

                  <div class="progress-bottom">
                    <span>${progress.toFixed(0)}% mot förväntad FG</span>
                    <span>${remaining} SG-punkter kvar</span>
                  </div>
                </div>
              `;
            ]]]
          styles:
            card:
              - border-radius: 20px
              - padding: 16px
              - background: |
                  [[[
                    const sg = parseFloat(states['input_number.manual_batch_sg_current']?.state);
                    const fg = parseFloat(states['input_number.manual_batch_expected_fg']?.state);
                    const margin = parseFloat(states['input_number.manual_batch_fg_margin']?.state ?? '0.004');

                    if (Number.isFinite(sg) && Number.isFinite(fg) && sg <= fg + margin) {
                      return 'linear-gradient(135deg, rgba(46,204,113,0.18), rgba(46,204,113,0.06))';
                    }

                    return 'linear-gradient(135deg, rgba(255,190,118,0.16), rgba(255,118,117,0.06))';
                  ]]]
              - border: 1px solid rgba(255,255,255,0.10)
              - box-shadow: none
            grid:
              - grid-template-areas: "\"i n\" \"i l\""
              - grid-template-columns: 42px 1fr
              - grid-template-rows: min-content 1fr
            img_cell:
              - width: 42px
              - height: 42px
              - border-radius: 14px
              - background: rgba(255,255,255,0.10)
            icon:
              - width: 26px
              - color: rgba(255,190,118,0.95)
            name:
              - justify-self: start
              - color: white
              - font-size: 15px
              - font-weight: 800
              - padding-left: 4px
            label:
              - justify-self: stretch
              - text-align: left
              - padding-left: 4px
              - margin-top: 8px
              - white-space: normal
          extra_styles: |
            .progress-wrap {
              display: flex;
              flex-direction: column;
              gap: 8px;
              width: 100%;
            }

            .progress-top,
            .progress-bottom {
              display: flex;
              justify-content: space-between;
              gap: 8px;
              font-size: 12px;
              font-weight: 700;
              color: rgba(255,255,255,0.84);
            }

            .progress-bottom {
              color: rgba(255,255,255,0.68);
            }

            .progress-bar {
              width: 100%;
              height: 10px;
              border-radius: 999px;
              background: rgba(0,0,0,0.28);
              overflow: hidden;
              border: 1px solid rgba(255,255,255,0.08);
            }

            .progress-fill {
              height: 100%;
              border-radius: 999px;
              background: linear-gradient(90deg, rgba(255,190,118,0.95), rgba(46,204,113,0.95));
              box-shadow: 0 0 16px rgba(255,190,118,0.30);
              transition: width 0.4s ease;
            }
        - type: conditional
          conditions:
            - condition: state
              entity: sensor.manual_batch_warning_level
              state_not: ok
          card:
            type: custom:button-card
            entity: sensor.manual_batch_warning_level
            name: Manual Batch Warnings
            icon: |
              [[[
                const level = entity.state ?? 'ok';
                if (level === 'critical') return 'mdi:alert-octagon';
                if (level === 'warning') return 'mdi:alert';
                if (level === 'ready') return 'mdi:check-decagram';
                return 'mdi:shield-check';
              ]]]
            show_state: false
            show_label: true
            label: |
              [[[
                const enabled = states['input_boolean.manual_batch_warnings_enabled']?.state === 'on';
                const level = entity.state ?? 'ok';
                const summary = states['sensor.manual_batch_warning_summary']?.state ?? 'Inga varningar';

                if (!enabled) return 'Varningar är avstängda';

                const pretty = {
                  ok: 'OK',
                  warning: 'Warning',
                  critical: 'Critical',
                  ready: 'Ready'
                }[level] ?? level;

                return `
                  <div class="warn-wrap">
                    <span class="warn-pill ${level}">${pretty}</span>
                    <span class="warn-text">${summary}</span>
                  </div>
                `;
              ]]]
            styles:
              card:
                - border-radius: 20px
                - padding: 14px
                - background: |
                    [[[
                      const enabled = states['input_boolean.manual_batch_warnings_enabled']?.state === 'on';
                      const level = entity.state ?? 'ok';

                      if (!enabled) return 'rgba(255,255,255,0.045)';
                      if (level === 'critical') return 'linear-gradient(135deg, rgba(255,82,82,0.22), rgba(90,20,20,0.18))';
                      if (level === 'warning') return 'linear-gradient(135deg, rgba(255,190,118,0.20), rgba(255,159,67,0.08))';
                      if (level === 'ready') return 'linear-gradient(135deg, rgba(46,204,113,0.18), rgba(72,126,176,0.10))';
                      return 'linear-gradient(135deg, rgba(46,204,113,0.12), rgba(255,255,255,0.035))';
                    ]]]
                - border: |
                    [[[
                      const enabled = states['input_boolean.manual_batch_warnings_enabled']?.state === 'on';
                      const level = entity.state ?? 'ok';

                      if (!enabled) return '1px solid rgba(255,255,255,0.08)';
                      if (level === 'critical') return '1px solid rgba(255,82,82,0.35)';
                      if (level === 'warning') return '1px solid rgba(255,190,118,0.32)';
                      if (level === 'ready') return '1px solid rgba(46,204,113,0.30)';
                      return '1px solid rgba(46,204,113,0.18)';
                    ]]]
                - box-shadow: none
              grid:
                - grid-template-areas: "\"i n\" \"i l\""
                - grid-template-columns: 42px 1fr
                - grid-template-rows: min-content 1fr
              img_cell:
                - width: 42px
                - height: 42px
                - border-radius: 14px
                - background: rgba(255,255,255,0.10)
              icon:
                - width: 26px
                - color: |
                    [[[
                      const level = entity.state ?? 'ok';
                      if (level === 'critical') return 'rgba(255,82,82,1)';
                      if (level === 'warning') return 'rgba(255,190,118,1)';
                      if (level === 'ready') return 'rgba(46,204,113,1)';
                      return 'rgba(85,239,196,0.95)';
                    ]]]
              name:
                - justify-self: start
                - color: rgba(255,255,255,0.90)
                - font-size: 15px
                - font-weight: 800
                - padding-left: 4px
              label:
                - justify-self: stretch
                - text-align: left
                - padding-left: 4px
                - margin-top: 8px
                - white-space: normal
            extra_styles: |
              .warn-wrap {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px;
              }

              .warn-pill {
                display: inline-flex;
                align-items: center;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 11px;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 0.35px;
                border: 1px solid rgba(255,255,255,0.16);
              }

              .warn-pill.ok {
                background: rgba(46,204,113,0.18);
                color: rgba(255,255,255,0.94);
              }

              .warn-pill.warning {
                background: rgba(255,190,118,0.22);
                color: rgba(255,255,255,0.96);
              }

              .warn-pill.critical {
                background: rgba(255,82,82,0.24);
                color: rgba(255,255,255,0.98);
              }

              .warn-pill.ready {
                background: rgba(46,204,113,0.22);
                color: rgba(255,255,255,0.98);
              }

              .warn-text {
                font-size: 13px;
                line-height: 1.35;
                font-weight: 700;
                color: rgba(255,255,255,0.88);
              }
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              name: Mät igen
              icon: mdi:timer-sand
              show_state: false
              show_label: true
              label: |
                [[[
                  const last = states['input_datetime.manual_batch_last_reading']?.state;
                  let hours = NaN;

                  if (last && !['unknown','unavailable',''].includes(last)) {
                    const ts = new Date(last.replace(' ', 'T')).getTime();
                    if (Number.isFinite(ts)) {
                      hours = (Date.now() - ts) / 3600000;
                    }
                  }

                  if (!Number.isFinite(hours)) {
                    return 'Ingen mätning loggad';
                  }

                  const left = Math.max(0, 24 - hours);

                  if (hours >= 24) {
                    return `${hours.toFixed(1)} h sedan · redo att mäta`;
                  }

                  return `${hours.toFixed(1)} h sedan · vänta ca ${left.toFixed(1)} h`;
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: |
                      [[[
                        const last = states['input_datetime.manual_batch_last_reading']?.state;
                        if (!last || ['unknown','unavailable',''].includes(last)) {
                          return 'rgba(255,255,255,0.055)';
                        }

                        const ts = new Date(last.replace(' ', 'T')).getTime();
                        const hours = Number.isFinite(ts) ? (Date.now() - ts) / 3600000 : 0;

                        return hours >= 24
                          ? 'rgba(46,204,113,0.16)'
                          : 'rgba(255,190,118,0.12)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.72)
                  - font-size: 12px
                  - font-weight: 800
                label:
                  - color: white
                  - font-size: 13px
                  - font-weight: 750
                  - white-space: normal
                icon:
                  - color: |
                      [[[
                        const last = states['input_datetime.manual_batch_last_reading']?.state;
                        if (!last || ['unknown','unavailable',''].includes(last)) {
                          return 'rgba(255,255,255,0.60)';
                        }

                        const ts = new Date(last.replace(' ', 'T')).getTime();
                        const hours = Number.isFinite(ts) ? (Date.now() - ts) / 3600000 : 0;

                        return hours >= 24
                          ? 'rgba(46,204,113,1)'
                          : 'rgba(255,190,118,1)';
                      ]]]
            - type: custom:button-card
              name: Cidersteg
              icon: mdi:format-list-checks
              show_state: false
              show_label: true
              label: |
                [[[
                  const sg = parseFloat(states['input_number.manual_batch_sg_current']?.state);
                  const fg = parseFloat(states['input_number.manual_batch_expected_fg']?.state);
                  const margin = parseFloat(states['input_number.manual_batch_fg_margin']?.state ?? '0.004');
                  const packaged = states['input_boolean.manual_batch_packaged']?.state === 'on';

                  if (packaged) return 'Förpackad / lagring';

                  if (!Number.isFinite(sg) || !Number.isFinite(fg)) {
                    return 'Primärjäsning';
                  }

                  if (sg <= fg + margin) {
                    return 'Stabilitetskontroll / smakpåse snart';
                  }

                  if (sg <= fg + 0.010) {
                    return 'SG-kontroll · jäsning avtar';
                  }

                  return 'Primärjäsning';
                ]]]
              styles:
                card:
                  - border-radius: 18px
                  - padding: 14px
                  - background: rgba(255,255,255,0.055)
                  - border: 1px solid rgba(255,255,255,0.09)
                  - box-shadow: none
                name:
                  - color: rgba(255,255,255,0.72)
                  - font-size: 12px
                  - font-weight: 800
                label:
                  - color: white
                  - font-size: 13px
                  - font-weight: 750
                  - white-space: normal
                icon:
                  - color: rgba(116,185,255,0.95)
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              entity: script.manual_batch_start
              name: Starta
              icon: mdi:play-circle
              tap_action:
                action: call-service
                service: script.manual_batch_start
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(46,204,113,0.18)
                  - border: 1px solid rgba(46,204,113,0.30)
                name:
                  - font-size: 12px
                  - font-weight: 800
                  - color: white
                icon:
                  - color: rgba(46,204,113,1)
            - type: custom:button-card
              entity: script.manual_batch_log_reading
              name: Logga SG
              icon: mdi:playlist-edit
              tap_action:
                action: call-service
                service: script.manual_batch_log_reading
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(255,190,118,0.18)
                  - border: 1px solid rgba(255,190,118,0.30)
                name:
                  - font-size: 12px
                  - font-weight: 800
                  - color: white
                icon:
                  - color: rgba(255,190,118,1)
            - type: custom:button-card
