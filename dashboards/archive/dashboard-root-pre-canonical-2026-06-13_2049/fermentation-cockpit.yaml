type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_temperature_status
    name: Fermentation Cockpit
    icon: mdi:beer
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const get = (id, fallback = '—') => states[id]?.state ?? fallback;
        const num = (id) => Number(states[id]?.state);
        const fmt = (v, d = 1) => Number.isFinite(v) ? v.toFixed(d).replace('.', ',') : '—';

        const process = get('sensor.brewassistant_process_status');
        const stage = get('sensor.brewassistant_process_current_action_stage');
        const reason = states['sensor.brewassistant_process_status']?.attributes?.process_reason ?? '—';

        const tempStatus = get('sensor.brewassistant_temperature_status');
        const severity = get('sensor.brewassistant_temperature_severity');
        const problem = get('sensor.brewassistant_problem_level');

        const liquid = num('sensor.brewassistant_liquid_temperature');
        const target = num('sensor.brewassistant_recipe_target_temperature');
        const delta = num('sensor.brewassistant_temperature_delta');
        const gravity = num('sensor.brewassistant_gravity');
        const source = get('sensor.brewassistant_liquid_temperature_source');

        const inactive =
          stage === 'none' ||
          process === 'Idle' ||
          process === 'Finished / transferred to keg' ||
          tempStatus === 'Standby' ||
          tempStatus === 'Completed';

        const coldCrash = stage === 'cold_crash' || process === 'Cold crash';
        const fermentation = stage === 'fermentation' || process === 'Primary fermentation';

        const title =
          inactive ? 'Standby' :
          coldCrash ? 'Cold crash active' :
          fermentation ? 'Fermentation active' :
          tempStatus;

        const subtitle =
          inactive ? 'No active fermentation batch' :
          coldCrash ? 'Monitoring cold crash target' :
          fermentation ? 'Monitoring fermentation target' :
          process;

        const metricLine = inactive
          ? 'Last context hidden from alert view'
          : `${fmt(liquid,1)} → ${fmt(target,1)} °C · Δ ${Number.isFinite(delta) ? delta.toFixed(2).replace('.', ',') : '—'} °C`;

        const sgLine = Number.isFinite(gravity)
          ? `SG ${gravity.toFixed(3).replace('.', ',')} · ${source}`
          : `${source}`;

        return `
          <div style="font-size:12px;font-weight:900;opacity:.72;text-transform:uppercase;letter-spacing:.08em;">
            ${process} · ${stage}
          </div>

          <div style="font-size:21px;font-weight:950;margin-top:5px;">
            ${title}
          </div>

          <div style="font-size:13px;font-weight:850;opacity:.82;margin-top:5px;">
            ${subtitle}
          </div>

          <div style="font-size:12px;opacity:.72;margin-top:7px;">
            ${metricLine}
          </div>

          <div style="font-size:12px;opacity:.68;margin-top:4px;">
            ${inactive ? reason : sgLine}
          </div>

          <div style="margin-top:12px;height:8px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;">
            <div style="
              height:100%;
              width:${inactive ? 100 : severity === 'ok' ? 100 : severity === 'info' ? 66 : 38}%;
              background:${inactive ? 'rgba(56,189,248,.70)' : severity === 'ok' ? 'rgba(34,197,94,.85)' : severity === 'info' ? 'rgba(245,158,11,.82)' : 'rgba(248,113,113,.86)'};
              border-radius:999px;">
            </div>
          </div>

          <div style="font-size:11px;opacity:.58;margin-top:8px;">
            Status: ${tempStatus} · Severity: ${severity} · Problem: ${problem}
          </div>
        `;
      ]]]
    styles:
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 54px 1fr
      card:
        - padding: 18px
        - border-radius: 22px 22px 8px 8px
        - border: 1px solid rgba(255,255,255,.10)
        - background: |
            [[[
              const process = states['sensor.brewassistant_process_status']?.state ?? 'Idle';
              const stage = states['sensor.brewassistant_process_current_action_stage']?.state ?? 'none';
              const status = states['sensor.brewassistant_temperature_status']?.state ?? 'Standby';
              const severity = states['sensor.brewassistant_temperature_severity']?.state ?? 'ok';

              const inactive =
                stage === 'none' ||
                process === 'Idle' ||
                process === 'Finished / transferred to keg' ||
                status === 'Standby' ||
                status === 'Completed';

              if (inactive) return 'linear-gradient(135deg, rgba(14,165,233,.45), rgba(15,23,42,.98))';
              if (stage === 'cold_crash') return 'linear-gradient(135deg, rgba(56,189,248,.72), rgba(15,23,42,.98))';
              if (severity === 'ok') return 'linear-gradient(135deg, rgba(34,197,94,.70), rgba(15,23,42,.98))';
              if (severity === 'info') return 'linear-gradient(135deg, rgba(245,158,11,.66), rgba(15,23,42,.98))';
              return 'linear-gradient(135deg, rgba(239,68,68,.76), rgba(15,23,42,.98))';
            ]]]
      img_cell:
        - width: 46px
        - height: 46px
        - border-radius: 50%
        - background: rgba(255,255,255,.12)
      icon:
        - color: |
            [[[
              const stage = states['sensor.brewassistant_process_current_action_stage']?.state ?? 'none';
              if (stage === 'none') return '#BAE6FD';
              if (stage === 'cold_crash') return '#E0F2FE';
              return '#DCFCE7';
            ]]]
      name:
        - justify-self: start
        - font-size: 18px
        - font-weight: 950
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.brewassistant_process_status
        name: Process
        icon: mdi:timeline-check-outline
        show_state: false
        show_label: true
        tap_action:
          action: more-info
        label: |
          [[[
            const air = states['sensor.brewassistant_fermentation_effective_air_target'];
            const scope = air?.attributes?.scope_active === true;
            const process = entity?.state ?? 'Idle';

            if (!scope) return `Idle<br><span style="opacity:.68;">standby</span>`;
            return `${process}<br><span style="opacity:.68;">aktiv</span>`;
          ]]]
        styles:
          card:
            - height: 68px
            - padding: 8px
            - border-radius: 14px
            - background: |
                [[[
                  const scope = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes?.scope_active === true;
                  return scope ? 'linear-gradient(135deg, rgba(34,197,94,.22), rgba(15,23,42,.06))' : 'rgba(255,255,255,.035)';
                ]]]
            - border: 1px solid rgba(255,255,255,.10)
          icon:
            - width: 19px
            - color: |
                [[[
                  const scope = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes?.scope_active === true;
                  return scope ? '#86EFAC' : '#BAE6FD';
                ]]]
          name:
            - font-size: 12px
            - font-weight: 950
          label:
            - font-size: 11px
            - line-height: 1.2
            - opacity: 0.82
      - type: custom:button-card
        entity: sensor.brewassistant_temperature_status
        name: Temp
        icon: mdi:thermometer
        show_state: false
        show_label: true
        tap_action:
          action: more-info
        label: |
          [[[
            const air = states['sensor.brewassistant_fermentation_effective_air_target'];
            const a = air?.attributes ?? {};
            const scope = a.scope_active === true;
            const ready = a.ready === true;

            if (!scope) return `Standby<br><span style="opacity:.68;">ej aktiv</span>`;
            if (!ready) return `Väntar<br><span style="opacity:.68;">ej redo</span>`;

            const demand = a.demand ?? 'hold';
            const text =
              demand.includes('cooling') ? 'Kylning' :
              demand === 'hold' ? 'Håller' :
              demand.includes('warm') || demand === 'relax' ? 'Varmare' :
              'Aktiv';

            return `${text}<br><span style="opacity:.68;">${demand}</span>`;
          ]]]
        styles:
          card:
            - height: 68px
            - padding: 8px
            - border-radius: 14px
            - background: |
                [[[
                  const a = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes ?? {};
                  const scope = a.scope_active === true;
                  const demand = a.demand ?? 'standby';

                  if (!scope) return 'rgba(255,255,255,.035)';
                  if (demand.includes('cooling')) return 'linear-gradient(135deg, rgba(14,165,233,.26), rgba(15,23,42,.06))';
                  if (demand === 'hold') return 'linear-gradient(135deg, rgba(34,197,94,.22), rgba(15,23,42,.06))';
                  if (demand.includes('warm') || demand === 'relax') return 'linear-gradient(135deg, rgba(245,158,11,.24), rgba(15,23,42,.06))';
                  return 'rgba(255,255,255,.045)';
                ]]]
            - border: 1px solid rgba(255,255,255,.10)
          icon:
            - width: 19px
            - color: |
                [[[
                  const a = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes ?? {};
                  const scope = a.scope_active === true;
                  const demand = a.demand ?? 'standby';

                  if (!scope) return '#BAE6FD';
                  if (demand.includes('cooling')) return '#7DD3FC';
                  if (demand === 'hold') return '#86EFAC';
                  if (demand.includes('warm') || demand === 'relax') return '#FDBA74';
                  return '#CBD5E1';
                ]]]
          name:
            - font-size: 12px
            - font-weight: 950
          label:
            - font-size: 11px
            - line-height: 1.2
            - opacity: 0.82
      - type: custom:button-card
        entity: sensor.brewassistant_fermentation_liquid_delta
        name: Delta
        icon: mdi:delta
        show_state: false
        show_label: true
        tap_action:
          action: more-info
        label: |
          [[[
            const air = states['sensor.brewassistant_fermentation_effective_air_target'];
            const a = air?.attributes ?? {};
            const scope = a.scope_active === true;
            const ready = a.ready === true;

            const fmt = (v, d = 1) => Number.isFinite(Number(v)) ? Number(v).toFixed(d).replace('.', ',') : '—';

            if (!scope) return `—<br><span style="opacity:.68;">standby</span>`;
            if (!ready) return `—<br><span style="opacity:.68;">ej redo</span>`;

            const delta = Number(entity?.state);
            const label =
              Number.isFinite(delta) && delta > 0.2 ? 'över mål' :
              Number.isFinite(delta) && delta < -0.2 ? 'under mål' :
              'nära mål';

            return `${fmt(delta,1)} °C<br><span style="opacity:.68;">${label}</span>`;
          ]]]
        styles:
          card:
            - height: 68px
            - padding: 8px
            - border-radius: 14px
            - background: |
                [[[
                  const air = states['sensor.brewassistant_fermentation_effective_air_target'];
                  const a = air?.attributes ?? {};
                  const scope = a.scope_active === true;
                  const ready = a.ready === true;
                  const delta = Number(entity?.state);

                  if (!scope || !ready || !Number.isFinite(delta)) return 'rgba(255,255,255,.035)';
                  if (delta >= 1) return 'linear-gradient(135deg, rgba(14,165,233,.28), rgba(15,23,42,.06))';
                  if (delta <= -0.5) return 'linear-gradient(135deg, rgba(245,158,11,.26), rgba(15,23,42,.06))';
                  return 'linear-gradient(135deg, rgba(34,197,94,.22), rgba(15,23,42,.06))';
                ]]]
            - border: 1px solid rgba(255,255,255,.10)
          icon:
            - width: 19px
            - color: |
                [[[
                  const air = states['sensor.brewassistant_fermentation_effective_air_target'];
                  const a = air?.attributes ?? {};
                  const scope = a.scope_active === true;
                  const ready = a.ready === true;
                  const delta = Number(entity?.state);

                  if (!scope || !ready || !Number.isFinite(delta)) return '#BAE6FD';
                  if (delta >= 1) return '#7DD3FC';
                  if (delta <= -0.5) return '#FDBA74';
                  return '#86EFAC';
                ]]]
          name:
            - font-size: 12px
            - font-weight: 950
          label:
            - font-size: 11px
            - line-height: 1.2
            - opacity: 0.82
      - type: custom:button-card
        entity: sensor.brewassistant_gravity
        name: Gravity
        icon: mdi:water-percent
        show_state: false
        show_label: true
        tap_action:
          action: more-info
        label: |
          [[[
            const air = states['sensor.brewassistant_fermentation_effective_air_target'];
            const scope = air?.attributes?.scope_active === true;
            const fmt = (v, d = 3) => Number.isFinite(Number(v)) ? Number(v).toFixed(d).replace('.', ',') : '—';

            if (!scope) return `—<br><span style="opacity:.68;">standby</span>`;
            return `${fmt(entity?.state,3)} SG<br><span style="opacity:.68;">active</span>`;
          ]]]
        styles:
          card:
            - height: 68px
            - padding: 8px
            - border-radius: 14px
            - background: |
                [[[
                  const scope = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes?.scope_active === true;
                  return scope ? 'linear-gradient(135deg, rgba(34,197,94,.20), rgba(15,23,42,.06))' : 'rgba(255,255,255,.035)';
                ]]]
            - border: 1px solid rgba(255,255,255,.10)
          icon:
            - width: 19px
            - color: |
                [[[
                  const scope = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes?.scope_active === true;
                  return scope ? '#86EFAC' : '#BAE6FD';
                ]]]
          name:
            - font-size: 12px
            - font-weight: 950
          label:
            - font-size: 11px
            - line-height: 1.2
            - opacity: 0.82
  - type: conditional
    conditions:
      - entity: sensor.brewassistant_process_current_action_stage
        state_not: none
    card:
      type: custom:vertical-stack-in-card
      cards:
        - type: custom:button-card
          entity: switch.brewassistant_fermentation_climate_supervisor_enabled
          name: Fermentation Climate Control
          icon: mdi:thermostat-auto
          show_state: false
          show_label: true
          tap_action:
            action: toggle
          label: |
            [[[
              const sup = entity?.attributes ?? {};
              const air = states['sensor.brewassistant_fermentation_effective_air_target']?.attributes ?? {};
              const applyMode = states['select.brewassistant_apply_mode']?.state ?? 'Read only';
              const confirm = states['button.brewassistant_confirm_supervised_apply']?.attributes ?? {};

              const fmt = (v, d = 1) => {
                if (v === null || v === undefined || v === '' || v === 'unknown' || v === 'unavailable') return '—';
                const n = Number(v);
                return Number.isFinite(n) ? n.toFixed(d) : '—';
              };

              const enabled = entity?.state === 'on';
              const pending = sup.has_pending_action === true || confirm.has_pending_action === true;
              const status = sup.status ?? 'disabled';
              const action = sup.action ?? 'none';
              const reason = sup.reason ?? air.reason ?? '—';

              let title = 'Climate control av';
              if (pending) title = 'Väntar på kvittens';
              else if (enabled && action === 'would_apply_target') title = 'Supervision · skulle ändra target';
              else if (enabled && action === 'hold_target') title = 'Supervision · target matchar';
              else if (enabled && status === 'standby') title = 'Supervision · standby';
              else if (enabled && status === 'unavailable') title = 'Supervision · saknar data';
              else if (enabled) title = `Supervision · ${status}`;

              const line1 = pending
                ? (sup.pending_action?.summary ?? confirm.pending_summary ?? 'Pending action')
                : enabled
                  ? `Recommended ${fmt(sup.recommended_air_target,1)} °C · climate ${fmt(sup.controller_target_temperature,1)} °C`
                  : 'Avstängd · ingen monitorering';

              const line2 = pending
                ? `Tryck Confirm för att utföra · Cancel för att kasta`
                : enabled
                  ? `Δ target ${fmt(sup.target_delta,2)} °C · ${applyMode}`
                  : `Tryck power för monitor/supervised cockpit`;

              return `
                <div style="font-size:12px;font-weight:900;opacity:.72;text-transform:uppercase;letter-spacing:.08em;">
                  ${applyMode} · ${sup.mode_scope ?? 'monitor_only'} · ${status} · ${action}
                </div>
                <div style="font-size:21px;font-weight:950;margin-top:5px;">${title}</div>
                <div style="font-size:13px;font-weight:850;opacity:.86;margin-top:6px;line-height:1.35;">${line1}</div>
                <div style="font-size:12px;opacity:.76;margin-top:5px;line-height:1.35;">${line2}</div>
                <div style="font-size:12px;opacity:.62;margin-top:5px;line-height:1.35;">${reason}</div>
              `;
            ]]]
          styles:
            grid:
              - grid-template-areas: "\"i n p\" \"i l l\""
              - grid-template-columns: 54px 1fr 42px
            card:
              - padding: 18px
              - border-radius: 22px
              - border: 1px solid rgba(255,255,255,.10)
              - color: "#F8FAFC"
              - background: |
                  [[[
                    const sup = entity?.attributes ?? {};
                    const enabled = entity?.state === 'on';
                    const pending = sup.has_pending_action === true;
                    const action = sup.action ?? 'none';
                    const status = sup.status ?? 'disabled';

                    if (pending) return 'linear-gradient(135deg, rgba(245,158,11,.76), rgba(15,23,42,.98))';
                    if (!enabled) return 'linear-gradient(135deg, rgba(51,65,85,.82), rgba(15,23,42,.98))';
                    if (status === 'standby') return 'linear-gradient(135deg, rgba(71,85,105,.78), rgba(15,23,42,.98))';
                    if (action === 'would_apply_target' || action === 'pending_confirmation') return 'linear-gradient(135deg, rgba(14,165,233,.66), rgba(15,23,42,.98))';
                    if (action === 'hold_target') return 'linear-gradient(135deg, rgba(34,197,94,.46), rgba(15,23,42,.98))';
                    if (status === 'unavailable') return 'linear-gradient(135deg, rgba(120,53,15,.72), rgba(15,23,42,.98))';
                    return 'linear-gradient(135deg, rgba(30,41,59,.86), rgba(15,23,42,.98))';
                  ]]]
            img_cell:
              - width: 46px
              - height: 46px
              - border-radius: 50%
              - background: rgba(255,255,255,.12)
            icon:
              - width: 25px
              - color: |
                  [[[
                    const sup = entity?.attributes ?? {};
                    const enabled = entity?.state === 'on';
                    const pending = sup.has_pending_action === true;
                    const action = sup.action ?? 'none';

                    if (pending) return '#FDE68A';
                    if (!enabled) return '#94A3B8';
                    if (action === 'would_apply_target' || action === 'pending_confirmation') return '#7DD3FC';
                    if (action === 'hold_target') return '#86EFAC';
                    return '#CBD5E1';
                  ]]]
            name:
              - justify-self: start
              - font-size: 18px
              - font-weight: 950
              - color: "#F8FAFC"
            label:
              - justify-self: start
              - text-align: left
              - white-space: normal
              - color: "#F8FAFC"
            custom_fields:
              p:
                - justify-self: end
                - align-self: start
                - width: 34px
                - height: 34px
                - border-radius: 50%
                - background: rgba(255,255,255,.12)
                - display: flex
                - align-items: center
                - justify-content: center
          custom_fields:
            p: |
              [[[
                return entity?.state === 'on'
                  ? '<ha-icon icon="mdi:power" style="width:19px;color:#86EFAC;"></ha-icon>'
                  : '<ha-icon icon="mdi:power" style="width:19px;color:#94A3B8;"></ha-icon>';
              ]]]
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:button-card
              entity: button.brewassistant_confirm_supervised_apply
              name: Confirm
              icon: mdi:check-decagram
              show_state: false
              show_label: true
              tap_action:
                action: call-service
                service: button.press
                service_data:
                  entity_id: button.brewassistant_confirm_supervised_apply
                confirmation:
                  text: Bekräfta pending BrewAssistant-action?
              label: |
                [[[
                  const a = entity?.attributes ?? {};
                  return a.has_pending_action === true ? 'Utför pending action' : 'Ingen pending action';
                ]]]
              styles:
                card:
                  - height: 72px
                  - padding: 10px
                  - border-radius: 16px
                  - background: |
                      [[[
                        const pending = entity?.attributes?.has_pending_action === true;
                        if (pending) return 'linear-gradient(135deg, rgba(34,197,94,.34), rgba(15,23,42,.92))';
                        return 'rgba(255,255,255,.035)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,.10)
                  - opacity: |
                      [[[
                        return entity?.attributes?.has_pending_action === true ? '1' : '.48';
                      ]]]
                icon:
                  - width: 22px
                  - color: |
                      [[[
                        return entity?.attributes?.has_pending_action === true ? '#86EFAC' : '#64748B';
                      ]]]
                name:
                  - font-size: 13px
                  - font-weight: 950
                label:
                  - font-size: 11px
                  - opacity: 0.78
            - type: custom:button-card
              entity: button.brewassistant_cancel_supervised_apply
              name: Cancel
              icon: mdi:cancel
              show_state: false
              show_label: true
              tap_action:
                action: call-service
                service: button.press
                service_data:
                  entity_id: button.brewassistant_cancel_supervised_apply
              label: |
                [[[
                  const confirm = states['button.brewassistant_confirm_supervised_apply']?.attributes ?? {};
                  return confirm.has_pending_action === true ? 'Kasta pending action' : 'Inget att kasta';
                ]]]
              styles:
                card:
                  - height: 72px
                  - padding: 10px
                  - border-radius: 16px
                  - background: |
                      [[[
                        const confirm = states['button.brewassistant_confirm_supervised_apply']?.attributes ?? {};
                        const pending = confirm.has_pending_action === true;
                        if (pending) return 'linear-gradient(135deg, rgba(239,68,68,.28), rgba(15,23,42,.92))';
                        return 'rgba(255,255,255,.035)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,.10)
                  - opacity: |
                      [[[
                        const confirm = states['button.brewassistant_confirm_supervised_apply']?.attributes ?? {};
                        return confirm.has_pending_action === true ? '1' : '.48';
                      ]]]
                icon:
                  - width: 22px
                  - color: |
                      [[[
                        const confirm = states['button.brewassistant_confirm_supervised_apply']?.attributes ?? {};
                        return confirm.has_pending_action === true ? '#FCA5A5' : '#64748B';
                      ]]]
                name:
                  - font-size: 13px
                  - font-weight: 950
                label:
                  - font-size: 11px
                  - opacity: 0.78
  - type: custom:expander-card
    title: Climate control settings & debug
    padding: 0
    clear: true
    cards:
      - type: custom:mushroom-template-card
        entity: switch.brewassistant_fermentation_climate_supervisor_enabled
        primary: Fermentation Climate Supervisor
        secondary: "{{ states(entity) }}"
        icon: mdi:thermostat-auto
        icon_color: "{% if is_state(entity, 'on') %}green{% else %}grey{% endif %}"
        tap_action:
          action: toggle
      - type: custom:mushroom-select-card
        entity: select.brewassistant_apply_mode
        name: BrewAssistant apply mode
        icon: mdi:shield-check-outline
        layout: horizontal
        secondary_info: state
      - type: custom:mushroom-select-card
        entity: select.brewassistant_fermentation_air_target_test_mode
        name: Air target test mode
        icon: mdi:beaker-question-outline
        layout: horizontal
        secondary_info: state
      - type: entities
        title: Debug entities
        entities:
          - entity: sensor.brewassistant_fermentation_effective_air_target
          - entity: sensor.brewassistant_fermentation_liquid_delta
          - entity: switch.brewassistant_fermentation_climate_supervisor_enabled
          - entity: button.brewassistant_confirm_supervised_apply
          - entity: button.brewassistant_cancel_supervised_apply
  - type: custom:expander-card
    title: Fermentation details
    padding: 0
    clear: true
    cards:
      - type: entities
        entities:
          - entity: sensor.brewassistant_process_status
          - entity: sensor.brewassistant_process_current_action_stage
          - entity: sensor.brewassistant_temperature_status
          - entity: sensor.brewassistant_temperature_severity
          - entity: sensor.brewassistant_problem_level
          - entity: sensor.brewassistant_liquid_temperature
          - entity: sensor.brewassistant_recipe_target_temperature
          - entity: sensor.brewassistant_temperature_delta
