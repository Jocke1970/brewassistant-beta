type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: input_boolean.brewassistant_notifications_enabled
    name: BrewAssistant Notifications
    icon: mdi:bell-cog
    show_state: false
    show_label: true
    triggers_update:
      - input_boolean.brewassistant_notifications_enabled
      - input_boolean.brewassistant_warnings_enabled
      - input_boolean.brewassistant_persistent_notifications_enabled
      - input_boolean.brewassistant_chamber_module_active
      - input_boolean.brewassistant_fermentation_module_active
      - input_boolean.brewassistant_serving_module_active
      - input_boolean.brewassistant_hot_side_module_active
    label: |
      [[[
        const master = states['input_boolean.brewassistant_notifications_enabled']?.state === 'on';
        const warnings = states['input_boolean.brewassistant_warnings_enabled']?.state === 'on';
        const persistent = states['input_boolean.brewassistant_persistent_notifications_enabled']?.state === 'on';

        const chamber = states['input_boolean.brewassistant_chamber_module_active']?.state === 'on';
        const ferm = states['input_boolean.brewassistant_fermentation_module_active']?.state === 'on';
        const serving = states['input_boolean.brewassistant_serving_module_active']?.state === 'on';
        const hot = states['input_boolean.brewassistant_hot_side_module_active']?.state === 'on';

        const active = [];
        if (ferm) active.push('Fermentation');
        if (chamber) active.push('Chamber');
        if (serving) active.push('Serving');
        if (hot) active.push('Hot Side');

        const activeTxt = active.length ? active.join(' · ') : 'No active modules';

        if (!master && !warnings) {
          return `Muted · HA Inbox ${persistent ? 'on' : 'off'} · ${activeTxt}`;
        }

        if (!master && warnings) {
          return `Warnings only · HA Inbox ${persistent ? 'on' : 'off'} · ${activeTxt}`;
        }

        return `Mobile on · Warnings ${warnings ? 'on' : 'off'} · HA Inbox ${persistent ? 'on' : 'off'} · ${activeTxt}`;
      ]]]
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    custom_fields:
      status_icon: |
        [[[
          const master = states['input_boolean.brewassistant_notifications_enabled']?.state === 'on';
          const warnings = states['input_boolean.brewassistant_warnings_enabled']?.state === 'on';

          let icon = 'mdi:bell-off';
          if (master) icon = 'mdi:bell-ring';
          else if (warnings) icon = 'mdi:bell-alert';

          return `<ha-icon icon="${icon}"></ha-icon>`;
        ]]]
    styles:
      card:
        - padding: 18px
        - border-radius: 24px
        - min-height: 96px
        - background: |
            [[[
              const master = states['input_boolean.brewassistant_notifications_enabled']?.state === 'on';
              const warnings = states['input_boolean.brewassistant_warnings_enabled']?.state === 'on';

              if (!master && !warnings) {
                return 'linear-gradient(135deg, rgba(45,45,52,0.98), rgba(18,18,24,0.98))';
              }

              if (!master && warnings) {
                return 'linear-gradient(135deg, rgba(130,65,20,0.98), rgba(42,24,12,0.98))';
              }

              return 'linear-gradient(135deg, rgba(0,97,140,0.98), rgba(8,35,65,0.98))';
            ]]]
        - box-shadow: 0 12px 30px rgba(0,0,0,0.45)
        - border: 1px solid rgba(255,255,255,0.10)
        - overflow: hidden
      grid:
        - grid-template-areas: "\"i n status_icon\" \"i l status_icon\""
        - grid-template-columns: 54px 1fr 54px
        - grid-template-rows: min-content min-content
      img_cell:
        - width: 46px
        - height: 46px
        - border-radius: 50%
        - background: rgba(255,255,255,0.14)
      icon:
        - width: 31px
        - color: |
            [[[
              const master = states['input_boolean.brewassistant_notifications_enabled']?.state === 'on';
              const warnings = states['input_boolean.brewassistant_warnings_enabled']?.state === 'on';

              if (master) return '#8fd3ff';
              if (warnings) return '#ffbf7a';
              return 'rgba(255,255,255,0.45)';
            ]]]
      name:
        - justify-self: start
        - align-self: end
        - font-size: 20px
        - font-weight: 900
        - color: white
        - text-shadow: 0 1px 3px rgba(0,0,0,0.55)
      label:
        - justify-self: start
        - align-self: start
        - font-size: 12px
        - font-weight: 600
        - color: rgba(255,255,255,0.78)
        - margin-top: 4px
        - white-space: normal
        - line-height: 1.35
        - text-shadow: 0 1px 3px rgba(0,0,0,0.55)
      custom_fields:
        status_icon:
          - justify-self: end
          - align-self: center
          - width: 46px
          - height: 46px
          - border-radius: 50%
          - display: flex
          - align-items: center
          - justify-content: center
          - background: rgba(255,255,255,0.12)
          - border: 1px solid rgba(255,255,255,0.18)
          - color: white
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: input_boolean.brewassistant_notifications_enabled
        name: Master
        icon: mdi:bell
        show_state: true
        tap_action:
          action: toggle
        styles:
          card:
            - height: 112px
            - border-radius: 22px
            - padding: 14px
            - background: |
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, rgba(0,112,165,0.98), rgba(10,47,82,0.98))'
                    : 'rgba(255,255,255,0.06)';
                ]]]
            - box-shadow: |
                [[[
                  return entity.state === 'on'
                    ? '0 0 22px rgba(33,150,243,0.22)'
                    : '0 4px 14px rgba(0,0,0,0.16)';
                ]]]
            - border: 1px solid rgba(255,255,255,0.10)
          icon:
            - width: 38px
            - color: |
                [[[
                  return entity.state === 'on' ? '#8fd3ff' : 'rgba(255,255,255,0.45)';
                ]]]
          name:
            - color: white
            - font-size: 15px
            - font-weight: 900
          state:
            - color: rgba(255,255,255,0.78)
            - font-size: 13px
            - font-weight: 700
      - type: custom:button-card
        entity: input_boolean.brewassistant_warnings_enabled
        name: Warnings
        icon: mdi:alert-circle
        show_state: true
        tap_action:
          action: toggle
        styles:
          card:
            - height: 112px
            - border-radius: 22px
            - padding: 14px
            - background: |
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, rgba(160,78,22,0.98), rgba(74,31,8,0.98))'
                    : 'rgba(255,255,255,0.06)';
                ]]]
            - box-shadow: |
                [[[
                  return entity.state === 'on'
                    ? '0 0 22px rgba(255,160,80,0.20)'
                    : '0 4px 14px rgba(0,0,0,0.16)';
                ]]]
            - border: 1px solid rgba(255,255,255,0.10)
          icon:
            - width: 38px
            - color: |
                [[[
                  return entity.state === 'on' ? '#ffbf7a' : 'rgba(255,255,255,0.45)';
                ]]]
          name:
            - color: white
            - font-size: 15px
            - font-weight: 900
          state:
            - color: rgba(255,255,255,0.78)
            - font-size: 13px
            - font-weight: 700
      - type: custom:button-card
        entity: input_boolean.brewassistant_persistent_notifications_enabled
        name: HA Inbox
        icon: mdi:message-alert
        show_state: true
        tap_action:
          action: toggle
        styles:
          card:
            - height: 112px
            - border-radius: 22px
            - padding: 14px
            - background: |
                [[[
                  return entity.state === 'on'
                    ? 'linear-gradient(135deg, rgba(54,130,67,0.98), rgba(22,68,31,0.98))'
                    : 'rgba(255,255,255,0.06)';
                ]]]
            - box-shadow: |
                [[[
                  return entity.state === 'on'
                    ? '0 0 22px rgba(90,220,120,0.18)'
                    : '0 4px 14px rgba(0,0,0,0.16)';
                ]]]
            - border: 1px solid rgba(255,255,255,0.10)
          icon:
            - width: 38px
            - color: |
                [[[
                  return entity.state === 'on' ? '#a6f0a6' : 'rgba(255,255,255,0.45)';
                ]]]
          name:
            - color: white
            - font-size: 15px
            - font-weight: 900
          state:
            - color: rgba(255,255,255,0.78)
            - font-size: 13px
            - font-weight: 700
  - type: custom:expander-card
    title-card:
      type: custom:button-card
      name: Advanced notification controls
      icon: mdi:tune-variant
      show_state: false
      show_label: true
      label: Module status, logic summary and test buttons
      styles:
        card:
          - margin: 8px 0 0 0
          - padding: 14px 16px
          - border-radius: 20px
          - background: rgba(255,255,255,0.06)
          - border: 1px solid rgba(255,255,255,0.10)
          - box-shadow: 0 4px 14px rgba(0,0,0,0.16)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px 1fr
        icon:
          - color: "#8fd3ff"
          - width: 28px
        name:
          - justify-self: start
          - color: white
          - font-size: 15px
          - font-weight: 900
        label:
          - justify-self: start
          - color: rgba(255,255,255,0.68)
          - font-size: 12px
          - font-weight: 600
    padding: 0
    clear: false
    cards:
      - type: custom:mushroom-title-card
        title: Active Notification Modules
        subtitle: Notifications only fire when the relevant module is active
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: input_boolean.brewassistant_fermentation_module_active
            name: Fermentation
            icon: mdi:beer
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - height: 112px
                - border-radius: 20px
                - padding: 14px
                - background: |
                    [[[
                      return entity.state === 'on'
                        ? 'linear-gradient(135deg, rgba(120,85,25,0.95), rgba(45,25,10,0.98))'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 36px
                - color: |
                    [[[
                      return entity.state === 'on' ? '#ffd28a' : 'rgba(255,255,255,0.38)';
                    ]]]
              name:
                - color: white
                - font-size: 14px
                - font-weight: 900
              state:
                - color: rgba(255,255,255,0.75)
                - font-size: 13px
                - font-weight: 700
          - type: custom:button-card
            entity: input_boolean.brewassistant_chamber_module_active
            name: Chamber
            icon: mdi:snowflake-thermometer
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - height: 112px
                - border-radius: 20px
                - padding: 14px
                - background: |
                    [[[
                      return entity.state === 'on'
                        ? 'linear-gradient(135deg, rgba(30,105,145,0.95), rgba(10,35,65,0.98))'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 36px
                - color: |
                    [[[
                      return entity.state === 'on' ? '#8fd3ff' : 'rgba(255,255,255,0.38)';
                    ]]]
              name:
                - color: white
                - font-size: 14px
                - font-weight: 900
              state:
                - color: rgba(255,255,255,0.75)
                - font-size: 13px
                - font-weight: 700
          - type: custom:button-card
            entity: input_boolean.brewassistant_serving_module_active
            name: Serving
            icon: mdi:glass-mug
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - height: 112px
                - border-radius: 20px
                - padding: 14px
                - background: |
                    [[[
                      return entity.state === 'on'
                        ? 'linear-gradient(135deg, rgba(70,120,70,0.95), rgba(25,55,25,0.98))'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 36px
                - color: |
                    [[[
                      return entity.state === 'on' ? '#a6f0a6' : 'rgba(255,255,255,0.38)';
                    ]]]
              name:
                - color: white
                - font-size: 14px
                - font-weight: 900
              state:
                - color: rgba(255,255,255,0.75)
                - font-size: 13px
                - font-weight: 700
          - type: custom:button-card
            entity: input_boolean.brewassistant_hot_side_module_active
            name: Hot Side
            icon: mdi:kettle-steam
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - height: 112px
                - border-radius: 20px
                - padding: 14px
                - background: |
                    [[[
                      return entity.state === 'on'
                        ? 'linear-gradient(135deg, rgba(160,70,35,0.95), rgba(65,25,10,0.98))'
                        : 'rgba(255,255,255,0.05)';
                    ]]]
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 36px
                - color: |
                    [[[
                      return entity.state === 'on' ? '#ff9b6a' : 'rgba(255,255,255,0.38)';
                    ]]]
              name:
                - color: white
                - font-size: 14px
                - font-weight: 900
              state:
                - color: rgba(255,255,255,0.75)
                - font-size: 13px
                - font-weight: 700
      - type: custom:button-card
        name: Notification Logic
        icon: mdi:source-branch
        show_state: false
        show_label: true
        label: |
          [[[
            const master = states['input_boolean.brewassistant_notifications_enabled']?.state === 'on';
            const warnings = states['input_boolean.brewassistant_warnings_enabled']?.state === 'on';
            const persistent = states['input_boolean.brewassistant_persistent_notifications_enabled']?.state === 'on';

            const chamber = states['input_boolean.brewassistant_chamber_module_active']?.state === 'on';
            const ferm = states['input_boolean.brewassistant_fermentation_module_active']?.state === 'on';
            const serving = states['input_boolean.brewassistant_serving_module_active']?.state === 'on';
            const hot = states['input_boolean.brewassistant_hot_side_module_active']?.state === 'on';

            const active = [];
            if (ferm) active.push('Fermentation');
            if (chamber) active.push('Chamber');
            if (serving) active.push('Serving');
            if (hot) active.push('Hot Side');

            const modules = active.length ? active.join(' · ') : 'No active modules';

            return `
              <div style="line-height:1.55;">
                <b>Mobile:</b> ${master ? 'Enabled' : 'Muted'}<br>
                <b>Warnings:</b> ${warnings ? 'Enabled' : 'Muted'}<br>
                <b>HA Inbox:</b> ${persistent ? 'Enabled' : 'Muted'}<br>
                <b>Active:</b> ${modules}
              </div>
            `;
          ]]]
        styles:
          card:
            - margin: 8px 0 8px 0
            - padding: 16px
            - border-radius: 20px
            - background: rgba(255,255,255,0.06)
            - border: 1px solid rgba(255,255,255,0.10)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 42px 1fr
          icon:
            - color: "#8fd3ff"
          name:
            - justify-self: start
            - color: white
            - font-size: 15px
            - font-weight: 900
          label:
            - justify-self: start
            - color: rgba(255,255,255,0.78)
            - font-size: 13px
            - text-align: left
      - type: custom:mushroom-title-card
        title: Test Notifications
        subtitle: Quick sanity check for mobile, warning and HA inbox paths
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            name: Test Mobile
            icon: mdi:cellphone-message
            tap_action:
              action: call-service
              service: script.brewassistant_notify_mobile
              data:
                title: 🍺 BrewAssistant Test
                message: Mobile notification path is working.
                tag: brewassistant_test_mobile
            styles:
              card:
                - height: 96px
                - border-radius: 20px
                - padding: 14px
                - background: >-
                    linear-gradient(135deg, rgba(35,90,130,0.95),
                    rgba(15,35,65,0.98))
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 34px
                - color: "#8fd3ff"
              name:
                - color: white
                - font-weight: 900
          - type: custom:button-card
            name: Test Warning
            icon: mdi:alert
            tap_action:
              action: call-service
              service: script.brewassistant_notify_warning
              data:
                title: ⚠️ BrewAssistant Test
                message: Warning notification path is working.
                tag: brewassistant_test_warning
            styles:
              card:
                - height: 96px
                - border-radius: 20px
                - padding: 14px
                - background: >-
                    linear-gradient(135deg, rgba(150,80,25,0.95),
                    rgba(65,30,10,0.98))
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 34px
                - color: "#ffbf7a"
              name:
                - color: white
                - font-weight: 900
          - type: custom:button-card
            name: Test HA Inbox
            icon: mdi:message-alert
            tap_action:
              action: call-service
              service: script.brewassistant_notify_persistent
              data:
                title: BrewAssistant Test
                message: Persistent notification path is working.
                notification_id: brewassistant_test_persistent
            styles:
              card:
                - height: 96px
                - border-radius: 20px
                - padding: 14px
                - background: >-
                    linear-gradient(135deg, rgba(70,115,70,0.95),
                    rgba(20,50,25,0.98))
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 34px
                - color: "#a6f0a6"
              name:
                - color: white
                - font-weight: 900
          - type: custom:button-card
            name: Clear Test Inbox
            icon: mdi:notification-clear-all
            tap_action:
              action: call-service
              service: persistent_notification.dismiss
              data:
                notification_id: brewassistant_test_persistent
            styles:
              card:
                - height: 96px
                - border-radius: 20px
                - padding: 14px
                - background: rgba(255,255,255,0.06)
                - border: 1px solid rgba(255,255,255,0.10)
              icon:
                - width: 34px
                - color: "#cccccc"
              name:
                - color: white
                - font-weight: 900
