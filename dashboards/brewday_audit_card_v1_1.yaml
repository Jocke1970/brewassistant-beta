# BrewAssistant Brewday Audit Card v1.1
# Audit controls + compact post-run analysis view.
# Required custom cards: custom:button-card, custom:mushroom-entity-card, custom:vertical-stack-in-card

type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_brewday_audit_summary
    name: Brewday Audit
    icon: mdi:clipboard-clock-outline
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const e = states['sensor.brewassistant_brewday_audit_summary'];
        const a = e?.attributes ?? {};
        const status = e?.state ?? 'unknown';
        const active = a.active === true || status === 'recording';
        const count = Number(a.event_count ?? 0);
        const max = Number(a.max_events ?? 250);
        const last = a.last_event_type ?? '–';
        const lastStep = a.last_step ?? '–';
        const lastStage = a.last_stage ?? '–';
        const lastTarget = a.last_target;
        const started = a.started_at ?? '–';
        const stopped = a.stopped_at ?? '–';
        const updated = a.updated_at ?? '–';
        const reason = a.last_control_reason ?? '';
        const pct = Number.isFinite(count) && Number.isFinite(max) && max > 0 ? Math.min(100, Math.max(0, count / max * 100)) : 0;

        const events = Array.isArray(a.events) ? a.events : [];
        const actionCount = events.filter(ev => ev?.event_type === 'brewzilla_action').length;
        const skippedCount = events.filter(ev => ev?.event_type === 'action_skipped').length;
        const waitCount = events.filter(ev => ev?.runtime_state === 'awaiting_snapshot').length;
        const pausedCount = events.filter(ev => ev?.runtime_state === 'paused').length;

        const chip = (text, bg='rgba(255,255,255,.10)', color='rgba(255,255,255,.84)') =>
          `<span style="padding:5px 9px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;">${text}</span>`;

        const statusChip = active
          ? chip('RECORDING', 'rgba(76,175,80,.18)', '#c8e6c9')
          : status === 'stopped'
            ? chip('STOPPED', 'rgba(255,202,40,.14)', '#ffe082')
            : chip('EMPTY', 'rgba(255,255,255,.08)', 'rgba(255,255,255,.70)');

        return `
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="font-size:13px;font-weight:950;letter-spacing:.8px;opacity:.70;text-transform:uppercase;">${active ? 'Recording audit log' : status}</div>
            <div style="font-size:24px;font-weight:950;line-height:1.14;">${count} / ${max} events</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${statusChip}
              ${chip(`Last ${last}`)}
              ${chip(`${actionCount} actions`, 'rgba(255,112,67,.14)', '#ffccbc')}
              ${chip(`${skippedCount} skips`)}
              ${waitCount ? chip(`${waitCount} waits`, 'rgba(255,202,40,.14)', '#ffe082') : ''}
              ${pausedCount ? chip(`${pausedCount} paused`, 'rgba(100,181,246,.14)', '#bbdefb') : ''}
              ${lastTarget !== undefined && lastTarget !== null ? chip(`Target ${Number(lastTarget).toFixed(1)}°C`, 'rgba(100,181,246,.14)', '#bbdefb') : ''}
            </div>
            <div style="font-size:13px;font-weight:850;opacity:.82;">${lastStage} · ${lastStep}</div>
            <div style="font-size:12px;opacity:.58;line-height:1.35;">Started: ${started}<br>Stopped: ${stopped}<br>Updated: ${updated}</div>
            ${reason ? `<div style="font-size:12px;opacity:.50;line-height:1.35;">${reason}</div>` : ''}
            <div style="height:8px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(100,181,246,.90),rgba(77,208,225,.90));"></div></div>
          </div>`;
      ]]]
    custom_fields:
      badge: |
        [[[
          const e = states['sensor.brewassistant_brewday_audit_summary'];
          const a = e?.attributes ?? {};
          const active = a.active === true || e?.state === 'recording';
          const text = active ? 'REC' : e?.state === 'stopped' ? 'DONE' : 'IDLE';
          const bg = active ? 'rgba(76,175,80,.18)' : e?.state === 'stopped' ? 'rgba(255,202,40,.14)' : 'rgba(255,255,255,.08)';
          const color = active ? '#c8e6c9' : e?.state === 'stopped' ? '#ffe082' : 'rgba(255,255,255,.70)';
          return `<div style="padding:7px 11px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;letter-spacing:.7px;">${text}</div>`;
        ]]]
    styles:
      card:
        - border-radius: 28px
        - padding: 18px
        - overflow: hidden
        - border: 1px solid rgba(255,255,255,.10)
        - box-shadow: 0 16px 40px rgba(0,0,0,.42)
        - background: |
            [[[
              const e = states['sensor.brewassistant_brewday_audit_summary'];
              const active = e?.attributes?.active === true || e?.state === 'recording';
              if (active) return 'radial-gradient(circle at top right, rgba(76,175,80,.22), transparent 40%), linear-gradient(135deg, rgba(14,38,22,.98), rgba(9,12,18,.98))';
              if (e?.state === 'stopped') return 'radial-gradient(circle at top right, rgba(255,202,40,.18), transparent 40%), linear-gradient(135deg, rgba(45,35,12,.98), rgba(9,12,18,.98))';
              return 'radial-gradient(circle at top right, rgba(144,164,174,.16), transparent 40%), linear-gradient(135deg, rgba(18,24,32,.98), rgba(9,12,18,.98))';
            ]]]
      grid:
        - grid-template-areas: '"i badge" "n n" "l l"'
        - grid-template-columns: 54px 1fr
      img_cell:
        - width: 48px
        - height: 48px
        - border-radius: 18px
        - background: rgba(255,255,255,.10)
      icon:
        - width: 32px
        - color: '#90caf9'
      name:
        - justify-self: start
        - align-self: end
        - margin-top: 12px
        - font-size: 25px
        - font-weight: 950
      label:
        - justify-self: stretch
        - text-align: left
        - white-space: normal
        - margin-top: 8px
      custom_fields:
        badge:
          - justify-self: end
          - align-self: start

  - type: horizontal-stack
    cards:
      - type: custom:button-card
        name: Start
        icon: mdi:record-rec
        tap_action:
          action: call-service
          service: brewassistant.brewday_audit_start
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(76,175,80,.16)
            - border: 1px solid rgba(76,175,80,.30)
          icon:
            - color: '#a5d6a7'
          name:
            - font-weight: 950
      - type: custom:button-card
        name: Snapshot
        icon: mdi:camera-outline
        tap_action:
          action: call-service
          service: brewassistant.brewday_audit_snapshot
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(100,181,246,.14)
            - border: 1px solid rgba(100,181,246,.28)
          icon:
            - color: '#bbdefb'
          name:
            - font-weight: 950
      - type: custom:button-card
        name: Stop
        icon: mdi:stop-circle-outline
        tap_action:
          action: call-service
          service: brewassistant.brewday_audit_stop
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(255,202,40,.13)
            - border: 1px solid rgba(255,202,40,.25)
          icon:
            - color: '#ffe082'
          name:
            - font-weight: 950
      - type: custom:button-card
        name: Clear
        icon: mdi:trash-can-outline
        tap_action:
          action: call-service
          service: brewassistant.brewday_audit_clear
        confirmation:
          text: Clear Brewday audit log?
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(244,67,54,.13)
            - border: 1px solid rgba(244,67,54,.25)
          icon:
            - color: '#ffcdd2'
          name:
            - font-weight: 950

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.brewassistant_brewday_audit_summary
        name: Status
        icon: mdi:clipboard-text-clock
      - type: custom:mushroom-entity-card
        entity: sensor.brewassistant_brewday_audit_event_count
        name: Events
        icon: mdi:counter
      - type: custom:mushroom-entity-card
        entity: sensor.brewassistant_brewday_audit_last_event
        name: Last event
        icon: mdi:history
      - type: custom:mushroom-entity-card
        entity: sensor.brewassistant_brewday_audit_last_step
        name: Last step
        icon: mdi:playlist-check
      - type: custom:mushroom-entity-card
        entity: sensor.brewassistant_brewday_audit_last_target
        name: Last target
        icon: mdi:target

  - type: custom:button-card
    entity: sensor.brewassistant_brewday_audit_summary
    name: Recent Audit Events
    icon: mdi:format-list-bulleted
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const a = entity?.attributes ?? {};
        const recent = Array.isArray(a.recent_events) ? a.recent_events.slice(-6).reverse() : [];
        if (!recent.length) return 'No audit events yet.';
        const row = (ev) => {
          const ts = String(ev.timestamp ?? '').split('T')[1]?.slice(0,8) ?? '–';
          const type = ev.event_type ?? 'event';
          const step = ev.step ?? '–';
          const target = ev.tracker_target ?? ev.requested_target ?? '–';
          const result = ev.apply_result ?? ev.control_reason ?? '';
          return `<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);"><b>${ts}</b> · ${type} · ${step} · target ${target}<br><span style="opacity:.58;">${result}</span></div>`;
        };
        return `<div style="display:flex;flex-direction:column;gap:0;">${recent.map(row).join('')}</div>`;
      ]]]
    styles:
      card:
        - border-radius: 20px
        - padding: 14px
        - background: rgba(255,255,255,.045)
        - border: 1px solid rgba(255,255,255,.07)
      grid:
        - grid-template-areas: '"i n" "i l"'
        - grid-template-columns: 42px 1fr
      icon:
        - color: '#90a4ae'
        - width: 26px
      name:
        - justify-self: start
        - font-size: 15px
        - font-weight: 950
      label:
        - justify-self: stretch
        - text-align: left
        - font-size: 12px
        - opacity: .78
        - white-space: normal
