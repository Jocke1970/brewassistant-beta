# BrewAssistant Counter Flow Chiller Card v1
# Optional operator card for CFC boil sanitation.
# Place near the Brewday operator card or in a hot-side tools section.

# Required custom cards:
# - custom:vertical-stack-in-card
# - custom:mushroom-template-card
# - custom:mushroom-number-card
# - custom:button-card

type: custom:vertical-stack-in-card
cards:
  - type: custom:mushroom-template-card
    entity: switch.brewassistant_counterflow_chiller_enabled
    primary: Counter Flow Chiller
    secondary: >-
      {% if is_state(entity, 'on') %}
        Enabled · {{ states('number.brewassistant_counterflow_chiller_sanitize_minutes') | float(15) | round(0) }} min · pump {{ states('number.brewassistant_counterflow_chiller_pump_utilization') | float(100) | round(0) }}%
      {% else %}
        Disabled for this brewday
      {% endif %}
    icon: mdi:snowflake-thermometer
    icon_color: >-
      {% if is_state(entity, 'on') %}cyan{% else %}grey{% endif %}
    tap_action:
      action: call-service
      service: switch.toggle
      target:
        entity_id: switch.brewassistant_counterflow_chiller_enabled

  - type: conditional
    conditions:
      - entity: switch.brewassistant_counterflow_chiller_enabled
        state: 'on'
    card:
      type: custom:vertical-stack-in-card
      cards:
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-number-card
              entity: number.brewassistant_counterflow_chiller_sanitize_minutes
              name: Hot wort time
              icon: mdi:timer-outline
              display_mode: buttons
            - type: custom:mushroom-number-card
              entity: number.brewassistant_counterflow_chiller_pump_utilization
              name: Pump %
              icon: mdi:pump
              display_mode: buttons

        - type: conditional
          conditions:
            - entity: sensor.brewassistant_brewday_addition_alert_state
              state_not: 'off'
            - entity: sensor.brewassistant_brewday_addition_alert_state
              state_not: 'none'
          card:
            type: custom:mushroom-template-card
            entity: sensor.brewassistant_brewday_addition_alert_state
            primary: >-
              {% if state_attr('sensor.brewassistant_brewday_addition_alert_message', 'next_addition_type') == 'counterflow_chiller_sanitize' %}
                CFC sanitation reminder
              {% else %}
                Brewday alert
              {% endif %}
            secondary: '{{ states("sensor.brewassistant_brewday_addition_alert_message") }}'
            icon: mdi:bell-alert-outline
            icon_color: >-
              {% if is_state('sensor.brewassistant_brewday_addition_alert_state', 'due_now') %}
                red
              {% elif is_state('sensor.brewassistant_brewday_addition_alert_state', 'due_soon') %}
                amber
              {% else %}
                cyan
              {% endif %}

        - type: conditional
          conditions:
            - entity: sensor.brewassistant_brewday_addition_alert_message
              attribute: next_addition_type
              state: counterflow_chiller_sanitize
          card:
            type: custom:button-card
            name: CFC READY
            label: Start pump circulation through chiller
            icon: mdi:pump
            show_icon: true
            show_name: true
            show_label: true
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.brewassistant_counterflow_chiller_ready
              confirmation:
                text: Är Counter Flow Chiller inkopplad och redo? Pumpen startas.
            styles:
              card:
                - min-height: 76px
                - border-radius: 22px
                - padding: 16px
                - background: linear-gradient(135deg, #0e7490 0%, #164e63 100%)
                - color: white
                - box-shadow: 0 8px 24px rgba(8, 145, 178, .35)
                - border: 1px solid rgba(165, 243, 252, .35)
              grid:
                - grid-template-areas: >-
                    "i n" "i l"
                - grid-template-columns: 52px 1fr
                - grid-template-rows: min-content min-content
              icon:
                - width: 36px
                - color: '#cffafe'
              name:
                - justify-self: start
                - font-size: 20px
                - font-weight: 900
                - letter-spacing: .4px
              label:
                - justify-self: start
                - font-size: 13px
                - font-weight: 700
                - color: '#ecfeff'
                - white-space: normal

        - type: custom:mushroom-template-card
          entity: button.brewassistant_counterflow_chiller_ready
          primary: CFC status
          secondary: >-
            {% set ready = state_attr(entity, 'ready') %}
            {% if ready %}
              Ready · pump {{ state_attr(entity, 'pump_utilization') }}% · {{ state_attr(entity, 'ready_at') }}
            {% else %}
              Not ready yet
            {% endif %}
          icon: mdi:check-decagram-outline
          icon_color: >-
            {% if state_attr(entity, 'ready') %}green{% else %}grey{% endif %}
