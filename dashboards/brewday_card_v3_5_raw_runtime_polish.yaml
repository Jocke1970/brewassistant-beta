# BrewAssistant Brewday Card v3.5 - RAW/runtime polish
# Top card is always visible. Details appear only when Brewday runtime is active.
# Adds clearer RAW vs BA resolved index display and end-of-mash/snapshot wording.
# Required custom cards: custom:button-card, custom:mushroom-entity-card, custom:vertical-stack-in-card

type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_brewday_runtime_state
    name: Brewday
    icon: mdi:beer-outline
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const s = (id) => states[id]?.state;
        const n = (id) => Number(s(id));
        const ok = (v) => Number.isFinite(v);
        const fmt = (v, d=1) => ok(v) ? v.toFixed(d) : '–';

        const runtime = s('sensor.brewassistant_brewday_runtime_state') ?? 'idle';
        const status = s('sensor.brewassistant_brewday_runtime_status') ?? 'unknown';
        const source = s('sensor.brewassistant_brewday_runtime_source') ?? 'None';
        const stage = s('sensor.brewassistant_brewday_runtime_stage') ?? 'Idle';
        const step = s('sensor.brewassistant_brewday_runtime_step') ?? 'Idle';
        const next = s('sensor.brewassistant_brewday_runtime_next_step') ?? 'None';
        const target = n('sensor.brewassistant_brewday_target_temperature');
        const remaining = n('sensor.brewassistant_brewday_live_time_remaining_minutes');
        const progress = n('sensor.brewassistant_brewday_live_progress');
        const ageMin = n('sensor.brewassistant_brewday_snapshot_age_minutes');
        const awaiting = s('sensor.brewassistant_brewday_awaiting_snapshot') ?? 'unknown';
        const refresh = s('sensor.brewassistant_brewday_refresh_recommended') ?? 'unknown';

        const current = n('sensor.brewassistant_brewzilla_current_temperature');
        const bzTarget = n('sensor.brewassistant_brewzilla_target_temperature');
        const requested = n('sensor.brewassistant_brewzilla_requested_target');
        const power = n('sensor.brewzilla_power');
        const main = s('switch.brewzilla') ?? 'unknown';
        const heater = s('switch.brewzilla_heater') ?? 'unknown';
        const pump = s('switch.brewzilla_pump') ?? 'unknown';

        const attrs = states['sensor.brewassistant_brewday_runtime_state']?.attributes ?? {};
        const rawIndex = attrs.raw_step_index ?? '–';
        const resolvedIndex = attrs.resolved_step_index ?? '–';
        const rawName = attrs.raw_step_name ?? '–';
        const rawRemaining = attrs.raw_stage_remaining_seconds;
        const stageRemaining = attrs.stage_remaining_seconds;
        const snapAge = attrs.snapshot_age_seconds;
        const nextDesc = attrs.next_step_description ?? '';
        const pausedFreeze = attrs.paused_freeze === true;
        const resolvedAhead = rawIndex !== '–' && resolvedIndex !== '–' && String(rawIndex) !== String(resolvedIndex);

        const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
        const inactive = inactiveStates.includes(runtime);
        const displayTarget = ok(target) ? target : ok(requested) ? requested : bzTarget;
        const progressWidth = ok(progress) ? Math.min(100, Math.max(0, progress)) : 0;

        const chip = (text, bg='rgba(255,255,255,.10)', color='rgba(255,255,255,.84)') =>
          `<span style="padding:5px 9px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;">${text}</span>`;

        const runtimeChip = inactive
          ? chip('STANDBY', 'rgba(255,255,255,.08)', 'rgba(255,255,255,.70)')
          : runtime === 'awaiting_snapshot'
            ? chip('AWAITING SNAPSHOT', 'rgba(255,202,40,.14)', '#ffe082')
            : runtime === 'paused'
              ? chip('PAUSED FREEZE', 'rgba(100,181,246,.14)', '#bbdefb')
              : chip('LIVE', 'rgba(76,175,80,.18)', '#c8e6c9');

        const rawChip = inactive ? '' : chip(
          `RAW ${rawIndex} · BA ${resolvedIndex}`,
          resolvedAhead ? 'rgba(255,202,40,.14)' : 'rgba(129,199,132,.14)',
          resolvedAhead ? '#ffe082' : '#a5d6a7'
        );

        const headline = inactive
          ? 'Standby'
          : runtime === 'awaiting_snapshot'
            ? `${stage} · waiting for Brewfather`
            : `${runtime} · ${stage}`;

        const title = inactive
          ? 'No active brewday'
          : runtime === 'awaiting_snapshot'
            ? `${step} · next ${next}`
            : step;

        const explain = inactive
          ? 'Runtime and RAW debug stay hidden until Brewday is active.'
          : runtime === 'awaiting_snapshot'
            ? (nextDesc || 'BrewAssistant väntar på nästa Brewfather snapshot/checkpoint.')
            : pausedFreeze
              ? 'Brewfather är pausad; BrewAssistant behåller aktuellt steg och target.'
              : resolvedAhead
                ? 'BA har räknat fram aktivt steg från stage-timing medan RAW-index fortfarande släpar.'
                : 'Runtime följer Brewfather Brew Tracker.';

        return `
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="font-size:13px;font-weight:950;letter-spacing:.8px;opacity:.70;text-transform:uppercase;">${headline}</div>
            <div style="font-size:24px;font-weight:950;line-height:1.14;">${title}</div>
            <div style="font-size:19px;font-weight:950;">
              ${ok(current) ? fmt(current) + '°C' : 'BrewZilla –'}${ok(displayTarget) ? ` → ${fmt(displayTarget)}°C` : ''}
              ${ok(power) ? `<span style="opacity:.52;"> · ${power.toFixed(1)} W</span>` : ''}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${runtimeChip}
              ${chip(source)}
              ${chip(`Power ${main.toUpperCase()}`, main === 'on' ? 'rgba(76,175,80,.18)' : 'rgba(255,255,255,.08)', main === 'on' ? '#c8e6c9' : 'rgba(255,255,255,.70)')}
              ${chip(`Heater ${heater.toUpperCase()}`, heater === 'on' ? 'rgba(255,112,67,.22)' : 'rgba(255,255,255,.08)', heater === 'on' ? '#ffccbc' : 'rgba(255,255,255,.70)')}
              ${chip(`Pump ${pump.toUpperCase()}`, pump === 'on' ? 'rgba(77,208,225,.18)' : 'rgba(255,255,255,.08)', pump === 'on' ? '#b2ebf2' : 'rgba(255,255,255,.70)')}
              ${rawChip}
              ${awaiting === 'on' || awaiting === 'true' ? chip('REFRESH WINDOW', 'rgba(255,202,40,.14)', '#ffe082') : ''}
              ${refresh === 'on' || refresh === 'true' ? chip('REFRESH RECOMMENDED', 'rgba(255,202,40,.14)', '#ffe082') : ''}
            </div>
            ${inactive ? `<div style="font-size:12px;opacity:.58;line-height:1.35;">${explain}</div>` : `<div style="font-size:13px;font-weight:850;opacity:.82;">Next: ${next}</div>`}
            ${inactive ? '' : `<div style="font-size:12px;opacity:.58;line-height:1.35;">${ok(remaining) ? remaining.toFixed(0) : '–'} min kvar · ${ok(progress) ? progress.toFixed(1) : '–'}% · snapshot age ${ok(ageMin) ? ageMin.toFixed(0) : '–'} min</div>`}
            ${inactive ? '' : `<div style="font-size:11px;opacity:.50;line-height:1.35;">Raw: ${rawName} · raw remaining ${rawRemaining ?? '–'}s · BA remaining ${stageRemaining ?? '–'}s</div>`}
            ${inactive ? '' : `<div style="font-size:12px;opacity:.55;line-height:1.35;">${explain}</div>`}
            ${inactive ? '' : `<div style="height:8px;border-radius:999px;background:rgba(255,255,255,.10);overflow:hidden;"><div style="height:100%;width:${progressWidth}%;background:linear-gradient(90deg,rgba(100,181,246,.90),rgba(77,208,225,.90));"></div></div>`}
          </div>`;
      ]]]
    custom_fields:
      badge: |
        [[[
          const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
          const main = states['switch.brewzilla']?.state ?? 'unknown';
          const heater = states['switch.brewzilla_heater']?.state === 'on';
          const pump = states['switch.brewzilla_pump']?.state === 'on';
          const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
          let text = 'IDLE', bg = 'rgba(255,255,255,.08)', color = 'rgba(255,255,255,.70)';
          if (!inactiveStates.includes(runtime)) { text = runtime === 'awaiting_snapshot' ? 'WAIT' : 'LIVE'; bg = runtime === 'awaiting_snapshot' ? 'rgba(255,202,40,.14)' : 'rgba(100,181,246,.16)'; color = runtime === 'awaiting_snapshot' ? '#ffe082' : '#bbdefb'; }
          if (main === 'on' && text === 'IDLE') { text = 'READY'; bg = 'rgba(76,175,80,.18)'; color = '#c8e6c9'; }
          if (heater || pump) { text = 'HOT SIDE'; bg = 'rgba(255,112,67,.20)'; color = '#ffccbc'; }
          return `<div style="padding:7px 11px;border-radius:999px;background:${bg};color:${color};font-size:11px;font-weight:950;letter-spacing:.7px;">${text}</div>`;
        ]]]
      power:
        card:
          type: custom:button-card
          entity: switch.brewzilla
          show_name: false
          show_icon: true
          icon: |
            [[[ return entity?.state === 'on' ? 'mdi:power' : 'mdi:power-off'; ]]]
          tap_action:
            action: toggle
          hold_action:
            action: more-info
          styles:
            card:
              - width: 42px
              - height: 42px
              - border-radius: 16px
              - box-shadow: none
              - padding: 0
              - background: |
                  [[[ return entity?.state === 'on' ? 'rgba(76,175,80,.20)' : 'rgba(244,67,54,.18)'; ]]]
              - border: |
                  [[[ return entity?.state === 'on' ? '1px solid rgba(76,175,80,.36)' : '1px solid rgba(244,67,54,.32)'; ]]]
            icon:
              - width: 25px
              - color: |
                  [[[ return entity?.state === 'on' ? '#c8e6c9' : '#ffcdd2'; ]]]
    styles:
      card:
        - border-radius: 28px
        - padding: 18px
        - min-height: |
            [[[
              const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
              const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
              return inactiveStates.includes(runtime) ? '166px' : '252px';
            ]]]
        - overflow: hidden
        - border: 1px solid rgba(255,255,255,.10)
        - box-shadow: 0 16px 40px rgba(0,0,0,.42)
        - background: |
            [[[
              const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
              const heater = states['switch.brewzilla_heater']?.state === 'on';
              const pump = states['switch.brewzilla_pump']?.state === 'on';
              const inactiveStates = ['idle','inactive','completed','unknown','unavailable','None','none',''];
              if (runtime === 'awaiting_snapshot') return 'radial-gradient(circle at top right, rgba(255,202,40,.22), transparent 40%), linear-gradient(135deg, rgba(45,35,12,.98), rgba(9,12,18,.98))';
              if (heater) return 'radial-gradient(circle at top right, rgba(255,112,67,.28), transparent 40%), linear-gradient(135deg, rgba(55,26,15,.98), rgba(9,12,18,.98))';
              if (pump) return 'radial-gradient(circle at top right, rgba(77,208,225,.22), transparent 40%), linear-gradient(135deg, rgba(12,39,45,.98), rgba(9,12,18,.98))';
              if (!inactiveStates.includes(runtime)) return 'radial-gradient(circle at top right, rgba(100,181,246,.24), transparent 40%), linear-gradient(135deg, rgba(13,31,48,.98), rgba(9,12,18,.98))';
              return 'radial-gradient(circle at top right, rgba(144,164,174,.16), transparent 40%), linear-gradient(135deg, rgba(18,24,32,.98), rgba(9,12,18,.98))';
            ]]]
      grid:
        - grid-template-areas: '"i badge power" "n n n" "l l l"'
        - grid-template-columns: 54px 1fr 46px
      img_cell:
        - width: 48px
        - height: 48px
        - border-radius: 18px
        - background: rgba(255,255,255,.10)
      icon:
        - width: 32px
        - color: '#64b5f6'
      name:
        - justify-self: start
        - align-self: end
        - margin-top: 12px
        - font-size: 25px
        - font-weight: 950
      label:
        - justify-self: stretch
        - text-align: left
        - white-space: normal
        - margin-top: 8px
      custom_fields:
        badge:
          - justify-self: end
          - align-self: start
        power:
          - justify-self: end
          - align-self: start

  - type: conditional
    conditions:
      - entity: sensor.brewassistant_brewday_runtime_state
        state_not: idle
      - entity: sensor.brewassistant_brewday_runtime_state
        state_not: inactive
      - entity: sensor.brewassistant_brewday_runtime_state
        state_not: completed
      - entity: sensor.brewassistant_brewday_runtime_state
        state_not: unknown
      - entity: sensor.brewassistant_brewday_runtime_state
        state_not: unavailable
    card:
      type: vertical-stack
      cards:
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_runtime_source
              name: Source
              icon: mdi:source-branch
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_runtime_status
              name: BF status
              icon: mdi:cloud-check-outline
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_runtime_stage
              name: Stage
              icon: mdi:playlist-play
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_runtime_step
              name: Current step
              icon: mdi:play-circle
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_runtime_next_step
              name: Next step
              icon: mdi:skip-next
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_target_temperature
              name: Tracker target
              icon: mdi:target
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_live_time_remaining_minutes
              name: Step remaining
              icon: mdi:timer-sand
            - type: custom:mushroom-entity-card
              entity: sensor.brewassistant_brewday_snapshot_age_minutes
              name: Snapshot age
              icon: mdi:clock-alert-outline

        - type: custom:button-card
          entity: sensor.brewassistant_brewday_runtime_state
          name: RAW vs BA Resolver
          icon: mdi:database-eye
          show_label: true
          tap_action:
            action: more-info
          label: |
            [[[
              const attrs = entity?.attributes ?? {};
              const raw = attrs.raw_step_index ?? '–';
              const resolved = attrs.resolved_step_index ?? '–';
              const rawName = attrs.raw_step_name ?? '–';
              const rawRemain = attrs.raw_stage_remaining_seconds ?? '–';
              const stageRemain = attrs.stage_remaining_seconds ?? '–';
              const age = attrs.snapshot_age_seconds ?? '–';
              const mismatch = String(raw) !== String(resolved);
              return `<div style="display:flex;flex-direction:column;gap:5px;"><div>RAW index: <b>${raw}</b> · BA resolved: <b>${resolved}</b>${mismatch ? ' · <span style="color:#ffe082;font-weight:950;">resolved ahead of RAW</span>' : ''}</div><div>Raw step: ${rawName}</div><div>Raw remaining: ${rawRemain}s · BA remaining: ${stageRemain}s · age: ${age}s</div><div style="opacity:.58;">Tap to open full runtime attributes/timeline.</div></div>`;
            ]]]
          styles:
            card:
              - border-radius: 20px
              - padding: 14px
              - background: rgba(255,255,255,.045)
              - border: 1px solid rgba(255,255,255,.07)
            grid:
              - grid-template-areas: '"i n" "i l"'
              - grid-template-columns: 42px 1fr
            icon:
              - color: '#90a4ae'
              - width: 26px
            name:
              - justify-self: start
              - font-size: 15px
              - font-weight: 950
            label:
              - justify-self: stretch
              - text-align: left
              - font-size: 12px
              - opacity: .78
              - white-space: normal
