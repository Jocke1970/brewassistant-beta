type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_smart_heat_state
    name: Fermentation Control
    icon: mdi:beer-outline
    show_state: true
    show_label: true
    tap_action:
      action: more-info
    hold_action:
      action: none
    custom_fields:
      apply:
        card:
          type: custom:button-card
          show_name: false
          show_state: false
          show_icon: true
          icon: mdi:crosshairs-gps
          tap_action:
            action: call-service
            service: script.fwk_apply_brewfather_target
          styles:
            card:
              - width: 36px
              - height: 36px
              - border-radius: 50%
              - padding: 0
              - background: rgba(144,202,249,0.24)
              - box-shadow: none
            icon:
              - width: 20px
              - color: rgba(255,255,255,0.96)
      expand:
        card:
          type: custom:button-card
          entity: input_boolean.brewassistant_smart_show_details
          show_name: false
          show_state: false
          show_icon: true
          icon: |
            [[[
              return entity?.state === 'on'
                ? 'mdi:chevron-up'
                : 'mdi:chevron-down';
            ]]]
          tap_action:
            action: call-service
            service: input_boolean.toggle
            target:
              entity_id: input_boolean.brewassistant_smart_show_details
          styles:
            card:
              - width: 36px
              - height: 36px
              - border-radius: 50%
              - padding: 0
              - background: |
                  [[[
                    return entity?.state === 'on'
                      ? 'rgba(144,202,249,0.24)'
                      : 'rgba(255,255,255,0.12)';
                  ]]]
              - box-shadow: none
            icon:
              - width: 22px
              - color: |
                  [[[
                    return entity?.state === 'on'
                      ? '#90caf9'
                      : 'rgba(255,255,255,0.65)';
                  ]]]
      power:
        card:
          type: custom:button-card
          entity: input_boolean.brewassistant_smart_fermentation_enabled
          show_name: false
          show_state: false
          show_icon: true
          icon: mdi:power
          tap_action:
            action: call-service
            service: input_boolean.toggle
            target:
              entity_id: input_boolean.brewassistant_smart_fermentation_enabled
          styles:
            card:
              - width: 36px
              - height: 36px
              - border-radius: 50%
              - padding: 0
              - background: rgba(255,255,255,0.12)
              - box-shadow: none
            icon:
              - width: 21px
              - color: |
                  [[[
                    const isOn = entity?.state === 'on';
                    return isOn ? '#7dff9b' : 'rgba(255,255,255,0.55)';
                  ]]]
    label: |
      [[[
        const batch = states['sensor.recipe_runtime_name']?.state ?? 'BrewAssistant';
        const process = states['sensor.fwk_process_status']?.state ?? 'Idle';
        const mode = states['input_select.brewassistant_smart_fermentation_mode']?.state ?? '—';
        const controlMode = states['sensor.brewassistant_smart_control_mode']?.state ?? '—';

        const temp = states['sensor.brewassistant_smart_liquid_temp']?.state ?? '—';
        const target = states['sensor.brewassistant_smart_target_temp']?.state ?? '—';
        const delta = states['sensor.brewassistant_smart_temp_delta']?.state ?? '—';
        const rate = states['sensor.brewassistant_smart_temp_rate']?.state ?? '—';
        const source = states['sensor.brewassistant_smart_liquid_temp_source']?.state ?? '—';

        const heatState = states['sensor.brewassistant_smart_heat_state']?.state ?? '—';
        const block = states['sensor.brewassistant_smart_heat_block_reason']?.state ?? '—';

        const matState = states['switch.fermentation_heat_mat']?.state ?? 'unknown';
        const matPowerRaw = states['sensor.fermentation_heat_mat_power']?.state;
        const matPower =
          matPowerRaw &&
          matPowerRaw !== 'unknown' &&
          matPowerRaw !== 'unavailable'
            ? parseFloat(matPowerRaw).toFixed(1)
            : '—';

        const fanState = states['switch.kegerator_fan']?.state ?? 'unknown';
        const fanAssist = states['sensor.brewassistant_smart_fan_assist_state']?.state ?? '—';
        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
        const fanPower =
          fanPowerRaw &&
          fanPowerRaw !== 'unknown' &&
          fanPowerRaw !== 'unavailable'
            ? parseFloat(fanPowerRaw).toFixed(1)
            : '—';

        const fridgeTempRaw = states['sensor.kyl_temperatur_4']?.state;
        const fridgeTemp =
          fridgeTempRaw &&
          fridgeTempRaw !== 'unknown' &&
          fridgeTempRaw !== 'unavailable'
            ? parseFloat(fridgeTempRaw).toFixed(1)
            : '—';

        const fridgeState = states['climate.kegerator_kylskap']?.state ?? 'unknown';
        const fridgeAction = states['climate.kegerator_kylskap']?.attributes?.hvac_action ?? fridgeState;
        const fridgeTargetRaw = states['climate.kegerator_kylskap']?.attributes?.temperature;
        const fridgeTarget =
          fridgeTargetRaw !== undefined &&
          fridgeTargetRaw !== null &&
          fridgeTargetRaw !== 'unknown' &&
          fridgeTargetRaw !== 'unavailable'
            ? parseFloat(fridgeTargetRaw).toFixed(1)
            : '—';

        const compressor = states['binary_sensor.kegerator_compressor_active']?.state ?? 'unknown';
        const fridgePowerRaw = states['sensor.kegerator_power']?.state;
        const fridgePower =
          fridgePowerRaw &&
          fridgePowerRaw !== 'unknown' &&
          fridgePowerRaw !== 'unavailable'
            ? parseFloat(fridgePowerRaw).toFixed(1)
            : '—';

        const smartOn = states['input_boolean.brewassistant_smart_fermentation_enabled']?.state === 'on';
        const fallback = states['binary_sensor.brewassistant_smart_temp_fallback_active']?.state === 'on';
        const stale = states['binary_sensor.brewassistant_smart_pill_temp_stale']?.state === 'on';
        const manual = states['input_boolean.brewassistant_smart_manual_override']?.state === 'on';
        const forceHeat = states['input_boolean.brewassistant_smart_force_heat']?.state === 'on';
        const forceFan = states['input_boolean.brewassistant_smart_force_fan']?.state === 'on';

        const matActive = matState === 'on';
        const fanActive = fanState === 'on';
        const compressorActive = compressor === 'on';

        const d = parseFloat(delta);
        const absDelta = isNaN(d) ? null : Math.abs(d);

        let statusIcon = '✓';
        let statusText = 'Stable';
        let statusSub = 'No action needed';
        let statusColor = '#7ee787';

        if (!smartOn) {
          statusIcon = '⏸';
          statusText = 'Disabled';
          statusSub = 'Smart fermentation control is off';
          statusColor = 'rgba(255,255,255,0.62)';
        } else if (forceHeat || forceFan || manual) {
          statusIcon = 'M';
          statusText = 'Manual override';
          statusSub = 'Automatic control partially paused';
          statusColor = '#ffd166';
        } else if (stale) {
          statusIcon = '!';
          statusText = 'Pill stale';
          statusSub = 'Temperature data is old';
          statusColor = '#ffd166';
        } else if (fallback) {
          statusIcon = 'F';
          statusText = 'Fallback active';
          statusSub = 'Using kegerator / chamber temperature';
          statusColor = '#90caf9';
        } else if (matActive) {
          statusIcon = 'H';
          statusText = 'Heating';
          statusSub = `${matPower} W · ${heatState}`;
          statusColor = '#ffab91';
        } else if (fanActive) {
          statusIcon = 'A';
          statusText = 'Fan running';
          statusSub = fanAssist;
          statusColor = '#80deea';
        } else if (heatState.includes('blocked')) {
          statusIcon = '!';
          statusText = 'Heat blocked';
          statusSub = block;
          statusColor = '#ffd166';
        } else if (heatState.includes('cooldown') || heatState.includes('Waiting')) {
          statusIcon = '…';
          statusText = 'Cooldown';
          statusSub = block;
          statusColor = '#ffd166';
        } else if (absDelta !== null && absDelta > 0.35) {
          statusIcon = 'Δ';
          statusText = 'Adjusting';

          if (d > 0 && target <= temp) {
            statusSub = 'Cooling toward target';
          } else if (d < 0) {
            statusSub = 'Heating toward target';
          } else {
            statusSub = `Delta ${delta} °C`;
          }

          statusColor = '#ffd166';
        }

        let sourceIcon = 'T';
        let sourceColor = '#ffffff';
        if (source === 'RAPT Pill') {
          sourceIcon = 'P';
          sourceColor = '#90caf9';
        }
        if (source === 'Kegerator fallback') {
          sourceIcon = 'F';
          sourceColor = '#ffd166';
        }
        if (source === 'Unavailable') {
          sourceIcon = '!';
          sourceColor = '#ff8a80';
        }

        const deltaColor =
          absDelta === null
            ? 'rgba(255,255,255,0.84)'
            : absDelta <= 0.25
              ? '#7ee787'
              : absDelta <= 0.5
                ? '#ffd166'
                : '#ff8a80';

        const pill = (icon, text, color, bg = 'rgba(255,255,255,0.10)') => `
          <span style="
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:4px 8px 4px 5px;
            border-radius:999px;
            background:${bg};
            border:1px solid rgba(255,255,255,0.08);
            font-size:12px;
            font-weight:850;
            line-height:1;
            white-space:nowrap;
          ">
            <span style="
              width:17px;
              height:17px;
              border-radius:50%;
              display:inline-flex;
              align-items:center;
              justify-content:center;
              background:${color};
              color:rgba(0,0,0,0.72);
              font-size:10px;
              font-weight:950;
              box-shadow:0 0 10px ${color}55;
            ">${icon}</span>
            <span>${text}</span>
          </span>
        `;

        const metric = (letter, value, unit, active, colorOn, colorOff = 'rgba(255,255,255,0.38)') => {
          const color = active ? colorOn : colorOff;
          const bg = active ? `${colorOn}22` : 'rgba(255,255,255,0.075)';
          return `
            <span style="
              display:inline-flex;
              align-items:center;
              gap:6px;
              padding:5px 8px 5px 6px;
              border-radius:999px;
              background:${bg};
              border:1px solid ${active ? `${colorOn}44` : 'rgba(255,255,255,0.07)'};
              font-size:12px;
              font-weight:900;
              line-height:1;
              white-space:nowrap;
            ">
              <span style="
                width:18px;
                height:18px;
                border-radius:50%;
                display:inline-flex;
                align-items:center;
                justify-content:center;
                background:${color};
                color:rgba(0,0,0,0.72);
                font-size:10px;
                font-weight:950;
                box-shadow:${active ? `0 0 12px ${colorOn}66` : 'none'};
              ">${letter}</span>
              <span>${value} ${unit}</span>
            </span>
          `;
        };

        return `
          <div style="line-height: 1.38;">
            <div style="font-size: 12px; opacity: 0.76;">${batch}</div>

            <div style="margin-top: 5px; font-size: 13px; font-weight: 800;">
              ${process} · ${mode} · ${controlMode}
            </div>

            <div style="
              margin-top: 9px;
              display: flex;
              flex-wrap: wrap;
              gap: 6px;
              align-items: center;
            ">
              ${pill(statusIcon, statusText, statusColor, 'rgba(255,255,255,0.12)')}
              ${pill(sourceIcon, `${temp} → ${target} °C`, sourceColor)}
              ${pill('Δ', `${delta} °C`, deltaColor)}
            </div>

            <div style="margin-top: 8px; font-size: 12px; opacity: 0.88;">
              Trend ${rate} °C/h · Källa: ${source}${fallback ? ' · fallback' : ''}${stale ? ' · stale' : ''}
            </div>

            <div style="margin-top: 3px; font-size: 12px; opacity: 0.80;">
              ${statusSub}
            </div>

            <div style="
              margin-top: 9px;
              display: flex;
              flex-wrap: wrap;
              gap: 6px;
              align-items: center;
            ">
              ${metric('H', matPower, 'W', matActive, '#ff8a65')}
              ${metric('F', fanPower, 'W', fanActive, '#26c6da')}
              ${metric('C', fridgePower, 'W', compressorActive, '#90caf9')}
              ${metric('K', `${fridgeTemp}/${fridgeTarget}`, '°C', true, '#cfd8dc')}
            </div>

            <div style="margin-top: 5px; font-size: 11px; opacity: 0.70;">
              Cooling: ${fridgeAction} · Compressor: ${compressor}
            </div>
          </div>
        `;
      ]]]
    styles:
      card:
        - border-radius: 26px
        - padding: 18px
        - min-height: 176px
        - color: white
        - background: |
            [[[
              const smartOn = states['input_boolean.brewassistant_smart_fermentation_enabled']?.state === 'on';
              const matOn = states['switch.fermentation_heat_mat']?.state === 'on';
              const fallback = states['binary_sensor.brewassistant_smart_temp_fallback_active']?.state === 'on';
              const stale = states['binary_sensor.brewassistant_smart_pill_temp_stale']?.state === 'on';
              const manual = states['input_boolean.brewassistant_smart_manual_override']?.state === 'on';
              const forceHeat = states['input_boolean.brewassistant_smart_force_heat']?.state === 'on';
              const forceFan = states['input_boolean.brewassistant_smart_force_fan']?.state === 'on';
              const heatState = states['sensor.brewassistant_smart_heat_state']?.state ?? '';
              const block = states['sensor.brewassistant_smart_heat_block_reason']?.state ?? '';

              if (!smartOn) {
                return 'linear-gradient(135deg, #34343a, #242428)';
              }

              if (manual || forceHeat || forceFan) {
                return 'linear-gradient(135deg, #5c3b00, #2a1c00)';
              }

              if (matOn) {
                return 'linear-gradient(135deg, #7a2600, #3b1200)';
              }

              if (stale) {
                return 'linear-gradient(135deg, #6d4c00, #332300)';
              }

              if (heatState.includes('blocked') || block.includes('Rising') || block.includes('too warm')) {
                return 'linear-gradient(135deg, #6d4c00, #332300)';
              }

              if (fallback) {
                return 'linear-gradient(135deg, #0d47a1, #263238)';
              }

              if (heatState === 'Heat ready') {
                return 'linear-gradient(135deg, #6d2c00, #3b1d00)';
              }

              return 'linear-gradient(135deg, #005739, #063324)';
            ]]]
        - box-shadow: 0 12px 34px rgba(0,0,0,0.36)
        - overflow: hidden
      grid:
        - grid-template-areas: >-
            "i n apply expand power" ". s apply expand power" ". l apply expand
            power"
        - grid-template-columns: 72px 1fr 38px 38px 38px
        - grid-template-rows: 52px min-content 1fr
      img_cell:
        - width: 52px
        - height: 52px
        - min-width: 52px
        - min-height: 52px
        - border-radius: 50%
        - background: |
            [[[
              const matOn = states['switch.fermentation_heat_mat']?.state === 'on';
              const fallback = states['binary_sensor.brewassistant_smart_temp_fallback_active']?.state === 'on';
              const stale = states['binary_sensor.brewassistant_smart_pill_temp_stale']?.state === 'on';
              const fanOn = states['switch.kegerator_fan']?.state === 'on';

              if (matOn) return 'rgba(255,138,101,0.24)';
              if (stale) return 'rgba(255,209,102,0.22)';
              if (fallback) return 'rgba(144,202,249,0.22)';
              if (fanOn) return 'rgba(38,198,218,0.20)';
              return 'rgba(255,255,255,0.14)';
            ]]]
        - border: 1px solid rgba(255,255,255,0.10)
        - align-self: start
        - justify-self: center
        - display: flex
        - align-items: center
        - justify-content: center
        - margin-top: 0px
      icon:
        - width: 29px
        - height: 29px
        - color: |
            [[[
              const matOn = states['switch.fermentation_heat_mat']?.state === 'on';
              const fallback = states['binary_sensor.brewassistant_smart_temp_fallback_active']?.state === 'on';
              const stale = states['binary_sensor.brewassistant_smart_pill_temp_stale']?.state === 'on';
              const fanOn = states['switch.kegerator_fan']?.state === 'on';
              const blocked = (states['sensor.brewassistant_smart_heat_state']?.state ?? '').includes('blocked');

              if (matOn) return '#ff8a65';
              if (stale || blocked) return '#ffd54f';
              if (fallback) return '#90caf9';
              if (fanOn) return '#80deea';
              return '#b8ffe8';
            ]]]
        - opacity: 1
        - filter: drop-shadow(0 0 8px rgba(120,255,215,0.45))
      name:
        - justify-self: start
        - align-self: end
        - text-align: left
        - font-size: 18px
        - font-weight: 900
        - color: white
        - white-space: normal
        - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
      state:
        - justify-self: start
        - align-self: start
        - text-align: left
        - font-size: 13px
        - font-weight: 800
        - color: rgba(255,255,255,0.92)
        - padding-top: 2px
        - white-space: normal
        - text-shadow: 0 1px 2px rgba(0,0,0,0.6)
      label:
        - justify-self: start
        - align-self: start
        - text-align: left
        - font-size: 12px
        - font-weight: 600
        - line-height: 1.38
        - color: white
        - padding-top: 6px
        - white-space: normal
        - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
      custom_fields:
        apply:
          - justify-self: end
          - align-self: start
        expand:
          - justify-self: end
          - align-self: start
        power:
          - justify-self: end
          - align-self: start
  - type: conditional
    conditions:
      - entity: input_boolean.brewassistant_smart_show_details
        state: "on"
    card:
      type: grid
      columns: 3
      square: false
      cards:
        - type: custom:mushroom-template-card
          primary: Styrtemp
          secondary: >
            {{ states('sensor.brewassistant_smart_liquid_temp') }} °C · {{
            states('sensor.brewassistant_smart_liquid_temp_source') }}
          icon: >
            {% if is_state('sensor.brewassistant_smart_liquid_temp_source',
            'RAPT Pill') %}
              mdi:thermometer-water
            {% elif is_state('sensor.brewassistant_smart_liquid_temp_source',
            'Kegerator fallback') %}
              mdi:fridge
            {% else %}
              mdi:alert-circle
            {% endif %}
          icon_color: >
            {% if is_state('sensor.brewassistant_smart_liquid_temp_source',
            'RAPT Pill') %}
              blue
            {% elif is_state('sensor.brewassistant_smart_liquid_temp_source',
            'Kegerator fallback') %}
              amber
            {% else %}
              red
            {% endif %}
          layout: vertical
          entity: sensor.brewassistant_smart_liquid_temp
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
                --card-primary-font-size: 14px;
                --card-primary-font-weight: 800;
                --card-secondary-font-size: 12px;
                --card-secondary-color: rgba(255,255,255,0.78);
              }
        - type: custom:mushroom-template-card
          primary: Target
          secondary: "{{ states('sensor.brewassistant_smart_target_temp') }} °C"
          icon: mdi:target
          icon_color: green
          layout: vertical
          entity: sensor.brewassistant_smart_target_temp
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
                --card-primary-font-size: 14px;
                --card-primary-font-weight: 800;
                --card-secondary-font-size: 12px;
                --card-secondary-color: rgba(255,255,255,0.78);
              }
        - type: custom:mushroom-template-card
          primary: Delta
          secondary: "{{ states('sensor.brewassistant_smart_temp_delta') }} °C"
          icon: mdi:delta
          icon_color: >
            {% set d = states('sensor.brewassistant_smart_temp_delta') |
            float(0) %} {% if d < -0.25 %}
              orange
            {% elif d > 0.25 %}
              red
            {% else %}
              green
            {% endif %}
          layout: vertical
          entity: sensor.brewassistant_smart_temp_delta
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
                --card-primary-font-size: 14px;
                --card-primary-font-weight: 800;
                --card-secondary-font-size: 12px;
                --card-secondary-color: rgba(255,255,255,0.78);
              }
        - type: custom:mushroom-template-card
          primary: Trend
          secondary: "{{ states('sensor.brewassistant_smart_temp_rate') }} °C/h"
          icon: mdi:chart-line
          icon_color: >
            {% if is_state('binary_sensor.brewassistant_smart_rising_too_fast',
            'on') %}
              red
            {% else %}
              green
            {% endif %}
          layout: vertical
          entity: sensor.brewassistant_smart_temp_rate
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
                --card-primary-font-size: 14px;
                --card-primary-font-weight: 800;
                --card-secondary-font-size: 12px;
                --card-secondary-color: rgba(255,255,255,0.78);
              }
        - type: custom:mushroom-template-card
          primary: Värmematta
          secondary: >
            {% set sw = states('switch.fermentation_heat_mat') %} {% set w =
            states('sensor.fermentation_heat_mat_power') %} {% if sw == 'on' %}
              På · {{ w }} W
            {% elif sw == 'off' %}
              Av · {{ w }} W
            {% else %}
              {{ sw }} · {{ w }} W
            {% endif %}
          icon: mdi:radiator
          icon_color: >
            {% set sw = states('switch.fermentation_heat_mat') %} {% set w =
            states('sensor.fermentation_heat_mat_power') | float(0) %} {% if sw
            == 'on' and w > 2 %}
              red
            {% elif sw == 'on' %}
              orange
            {% else %}
              grey
            {% endif %}
          layout: vertical
          entity: switch.fermentation_heat_mat
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
                background: rgba(255,255,255,0.045);
                border: 1px solid rgba(255,255,255,0.07);
                box-shadow: none;
                --card-primary-font-size: 14px;
                --card-primary-font-weight: 800;
                --card-secondary-font-size: 12px;
                --card-secondary-color: rgba(255,255,255,0.78);
              }
        - type: custom:mushroom-template-card
          primary: Fläkt
          secondary: >
            {% set sw = states('switch.kegerator_fan') %} {% set w =
            states('sensor.kegerator_fan_power') %} {% set assist =
            states('sensor.brewassistant_smart_fan_assist_state') %} {{ sw }} ·
            {{ w }} W · {{ assist }}
          icon: mdi:fan
          icon_color: >
            {% if is_state('switch.kegerator_fan', 'on') %}
              cyan
            {% elif
            is_state('binary_sensor.brewassistant_smart_fan_assist_recommended',
            'on') %}
              amber
            {% else %}
              grey
            {% endif %}
          layout: vertical
          entity: switch.kegerator_fan
          tap_action:
            action: more-info
          card_mod:
            style: |
              ha-card {
                min-height: 104px;
                border-radius: 18px;
