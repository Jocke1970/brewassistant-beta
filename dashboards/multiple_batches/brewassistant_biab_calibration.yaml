###############################################################################
# BrewAssistant - BIAB Calibration v1
# File: /config/packages/brewassistant_biab_calibration_v1.yaml
###############################################################################

input_boolean:
  brewassistant_biab_calibration_enabled:
    name: BrewAssistant BIAB Calibration Enabled
    icon: mdi:tune-variant
    initial: true

input_select:
  brewassistant_biab_calibration_profile:
    name: BrewAssistant BIAB Calibration Profile
    icon: mdi:kettle
    options:
      - Digiboil 35L BIAB - 20L FV
      - Digiboil 35L BIAB - 9L FV
      - Custom
    initial: Digiboil 35L BIAB - 20L FV
  brewassistant_biab_brew_day_mode:
    name: BrewAssistant BIAB Brew Day Mode
    icon: mdi:clipboard-flow-outline
    options:
      - Planning
      - Pre-boil check
      - Post-boil check
      - Fermenter check
      - Summary
    initial: Planning


input_number:
  brewassistant_biab_planned_pre_boil_volume_l:
    name: BrewAssistant BIAB Planned Pre-Boil Volume
    min: 0
    max: 35
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:kettle-outline
    initial: 25.0

  brewassistant_biab_planned_fermenter_volume_l:
    name: BrewAssistant BIAB Planned Fermenter Volume
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:fermentation
    initial: 20.0

  brewassistant_biab_planned_boil_off_rate_l_h:
    name: BrewAssistant BIAB Planned Boil-Off Rate
    min: 0
    max: 8
    step: 0.1
    mode: box
    unit_of_measurement: "L/h"
    icon: mdi:waves-arrow-up
    initial: 2.7

  brewassistant_biab_planned_trub_chiller_loss_l:
    name: BrewAssistant BIAB Planned Trub Chiller Loss
    min: 0
    max: 8
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:beaker-minus-outline
    initial: 1.2

  brewassistant_biab_planned_mash_efficiency_pct:
    name: BrewAssistant BIAB Planned Mash Efficiency
    min: 40
    max: 100
    step: 0.1
    mode: box
    unit_of_measurement: "%"
    icon: mdi:percent-circle-outline
    initial: 75.0

  brewassistant_biab_boil_time_min:
    name: BrewAssistant BIAB Boil Time
    min: 0
    max: 240
    step: 1
    mode: box
    unit_of_measurement: "min"
    icon: mdi:timer-outline
    initial: 60

  brewassistant_biab_grain_bill_kg:
    name: BrewAssistant BIAB Grain Bill
    min: 0
    max: 15
    step: 0.01
    mode: box
    unit_of_measurement: "kg"
    icon: mdi:barley
    initial: 0

  brewassistant_biab_malt_potential_points_l_kg:
    name: BrewAssistant BIAB Malt Potential
    min: 250
    max: 330
    step: 1
    mode: box
    unit_of_measurement: "points·L/kg"
    icon: mdi:chart-bell-curve
    initial: 309

  brewassistant_biab_cooling_shrinkage_pct:
    name: BrewAssistant BIAB Cooling Shrinkage
    min: 0
    max: 6
    step: 0.1
    mode: box
    unit_of_measurement: "%"
    icon: mdi:snowflake-thermometer
    initial: 4.0

  brewassistant_biab_measured_pre_boil_volume_l:
    name: BrewAssistant BIAB Measured Pre-Boil Volume
    min: 0
    max: 35
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:kettle-steam-outline
    initial: 0

  brewassistant_biab_measured_pre_boil_sg:
    name: BrewAssistant BIAB Measured Pre-Boil SG
    min: 0.990
    max: 1.120
    step: 0.001
    mode: box
    icon: mdi:hydrometer
    initial: 1.000

  brewassistant_biab_measured_post_boil_hot_volume_l:
    name: BrewAssistant BIAB Measured Post-Boil Hot Volume
    min: 0
    max: 35
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:kettle-steam
    initial: 0

  brewassistant_biab_measured_fermenter_volume_l:
    name: BrewAssistant BIAB Measured Fermenter Volume
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: "L"
    icon: mdi:bucket-outline
    initial: 0

  brewassistant_biab_measured_og:
    name: BrewAssistant BIAB Measured OG
    min: 0.990
    max: 1.140
    step: 0.001
    mode: box
    icon: mdi:hydrometer
    initial: 1.000

template:
  - sensor:
      - name: "BrewAssistant BIAB Calibration State"
        unique_id: brewassistant_biab_calibration_state
        icon: mdi:clipboard-pulse-outline
        state: >
          {% set enabled = is_state('input_boolean.brewassistant_biab_calibration_enabled', 'on') %}
          {% set grain = states('input_number.brewassistant_biab_grain_bill_kg') | float(0) %}
          {% set pre_vol = states('input_number.brewassistant_biab_measured_pre_boil_volume_l') | float(0) %}
          {% set pre_sg = states('input_number.brewassistant_biab_measured_pre_boil_sg') | float(1) %}
          {% set post_hot = states('input_number.brewassistant_biab_measured_post_boil_hot_volume_l') | float(0) %}
          {% set ferm_vol = states('input_number.brewassistant_biab_measured_fermenter_volume_l') | float(0) %}
          {% set og = states('input_number.brewassistant_biab_measured_og') | float(1) %}
          {% if not enabled %}
            Disabled
          {% elif grain <= 0 %}
            Enter grain bill
          {% elif pre_vol <= 0 or pre_sg <= 1 %}
            Enter pre-boil data
          {% elif post_hot <= 0 %}
            Enter post-boil volume
          {% elif ferm_vol <= 0 or og <= 1 %}
            Enter fermenter volume and OG
          {% else %}
            Complete
          {% endif %}
        attributes:
          profile: "{{ states('input_select.brewassistant_biab_calibration_profile') }}"
          planned_pre_boil_volume_l: "{{ states('input_number.brewassistant_biab_planned_pre_boil_volume_l') }}"
          measured_pre_boil_volume_l: "{{ states('input_number.brewassistant_biab_measured_pre_boil_volume_l') }}"
          measured_pre_boil_sg: "{{ states('input_number.brewassistant_biab_measured_pre_boil_sg') }}"
          measured_post_boil_hot_volume_l: "{{ states('input_number.brewassistant_biab_measured_post_boil_hot_volume_l') }}"
          measured_fermenter_volume_l: "{{ states('input_number.brewassistant_biab_measured_fermenter_volume_l') }}"
          measured_og: "{{ states('input_number.brewassistant_biab_measured_og') }}"

      - name: "BrewAssistant BIAB Pre-Boil Gravity Points"
        unique_id: brewassistant_biab_pre_boil_gravity_points
        unit_of_measurement: "points"
        icon: mdi:counter
        state_class: measurement
        state: >
          {% set sg = states('input_number.brewassistant_biab_measured_pre_boil_sg') | float(1) %}
          {% if sg > 1 %}
            {{ ((sg - 1) * 1000) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Collected Points"
        unique_id: brewassistant_biab_collected_points
        unit_of_measurement: "points·L"
        icon: mdi:beaker-check-outline
        state_class: measurement
        state: >
          {% set vol = states('input_number.brewassistant_biab_measured_pre_boil_volume_l') | float(0) %}
          {% set sg = states('input_number.brewassistant_biab_measured_pre_boil_sg') | float(1) %}
          {% set points = (sg - 1) * 1000 %}
          {% if vol > 0 and points > 0 %}
            {{ (vol * points) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Theoretical Points"
        unique_id: brewassistant_biab_theoretical_points
        unit_of_measurement: "points·L"
        icon: mdi:chart-bell-curve
        state_class: measurement
        state: >
          {% set grain = states('input_number.brewassistant_biab_grain_bill_kg') | float(0) %}
          {% set potential = states('input_number.brewassistant_biab_malt_potential_points_l_kg') | float(309) %}
          {% if grain > 0 and potential > 0 %}
            {{ (grain * potential) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Mash Efficiency"
        unique_id: brewassistant_biab_mash_efficiency
        unit_of_measurement: "%"
        icon: mdi:percent-circle
        state_class: measurement
        state: >
          {% set collected = states('sensor.brewassistant_biab_collected_points') | float(0) %}
          {% set theoretical = states('sensor.brewassistant_biab_theoretical_points') | float(0) %}
          {% if collected > 0 and theoretical > 0 %}
            {{ ((collected / theoretical) * 100) | round(1) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          planned_mash_efficiency_pct: "{{ states('input_number.brewassistant_biab_planned_mash_efficiency_pct') }}"
          collected_points: "{{ states('sensor.brewassistant_biab_collected_points') }}"
          theoretical_points: "{{ states('sensor.brewassistant_biab_theoretical_points') }}"

      - name: "BrewAssistant BIAB Post-Boil Cold Volume Estimate"
        unique_id: brewassistant_biab_post_boil_cold_volume_estimate
        unit_of_measurement: "L"
        icon: mdi:snowflake-thermometer
        state_class: measurement
        state: >
          {% set post_hot = states('input_number.brewassistant_biab_measured_post_boil_hot_volume_l') | float(0) %}
          {% set shrink = states('input_number.brewassistant_biab_cooling_shrinkage_pct') | float(4) %}
          {% if post_hot > 0 %}
            {{ (post_hot * (1 - shrink / 100)) | round(2) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Actual Boil-Off Rate"
        unique_id: brewassistant_biab_actual_boil_off_rate
        unit_of_measurement: "L/h"
        icon: mdi:waves-arrow-up
        state_class: measurement
        state: >
          {% set pre = states('input_number.brewassistant_biab_measured_pre_boil_volume_l') | float(0) %}
          {% set post_hot = states('input_number.brewassistant_biab_measured_post_boil_hot_volume_l') | float(0) %}
          {% set hours = (states('input_number.brewassistant_biab_boil_time_min') | float(0)) / 60 %}
          {% if pre > 0 and post_hot > 0 and hours > 0 and pre >= post_hot %}
            {{ ((pre - post_hot) / hours) | round(2) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          planned_boil_off_rate_l_h: "{{ states('input_number.brewassistant_biab_planned_boil_off_rate_l_h') }}"
          boil_time_min: "{{ states('input_number.brewassistant_biab_boil_time_min') }}"

      - name: "BrewAssistant BIAB Actual Trub Chiller Loss"
        unique_id: brewassistant_biab_actual_trub_chiller_loss
        unit_of_measurement: "L"
        icon: mdi:beaker-minus-outline
        state_class: measurement
        state: >
          {% set post_cold = states('sensor.brewassistant_biab_post_boil_cold_volume_estimate') | float(0) %}
          {% set ferm = states('input_number.brewassistant_biab_measured_fermenter_volume_l') | float(0) %}
          {% if post_cold > 0 and ferm > 0 %}
            {{ (post_cold - ferm) | round(2) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          planned_trub_chiller_loss_l: "{{ states('input_number.brewassistant_biab_planned_trub_chiller_loss_l') }}"

      - name: "BrewAssistant BIAB Brewhouse Efficiency"
        unique_id: brewassistant_biab_brewhouse_efficiency
        unit_of_measurement: "%"
        icon: mdi:home-percent-outline
        state_class: measurement
        state: >
          {% set ferm = states('input_number.brewassistant_biab_measured_fermenter_volume_l') | float(0) %}
          {% set og = states('input_number.brewassistant_biab_measured_og') | float(1) %}
          {% set theoretical = states('sensor.brewassistant_biab_theoretical_points') | float(0) %}
          {% set og_points = (og - 1) * 1000 %}
          {% if ferm > 0 and og_points > 0 and theoretical > 0 %}
            {{ ((ferm * og_points / theoretical) * 100) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Estimated OG From Pre-Boil"
        unique_id: brewassistant_biab_estimated_og_from_pre_boil
        icon: mdi:hydrometer
        state: >
          {% set collected = states('sensor.brewassistant_biab_collected_points') | float(0) %}
          {% set post_cold = states('sensor.brewassistant_biab_post_boil_cold_volume_estimate') | float(0) %}
          {% if collected > 0 and post_cold > 0 %}
            {{ (1 + (collected / post_cold) / 1000) | round(3) }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          note: "Estimated from pre-boil gravity points and estimated cold post-boil kettle volume."

      - name: "BrewAssistant BIAB Fermenter Volume Delta"
        unique_id: brewassistant_biab_fermenter_volume_delta
        unit_of_measurement: "L"
        icon: mdi:delta
        state_class: measurement
        state: >
          {% set measured = states('input_number.brewassistant_biab_measured_fermenter_volume_l') | float(0) %}
          {% set planned = states('input_number.brewassistant_biab_planned_fermenter_volume_l') | float(0) %}
          {% if measured > 0 and planned > 0 %}
            {{ (measured - planned) | round(2) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Boil-Off Delta"
        unique_id: brewassistant_biab_boil_off_delta
        unit_of_measurement: "L/h"
        icon: mdi:delta
        state_class: measurement
        state: >
          {% set actual = states('sensor.brewassistant_biab_actual_boil_off_rate') | float(0) %}
          {% set planned = states('input_number.brewassistant_biab_planned_boil_off_rate_l_h') | float(0) %}
          {% if actual > 0 and planned > 0 %}
            {{ (actual - planned) | round(2) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Trub Loss Delta"
        unique_id: brewassistant_biab_trub_loss_delta
        unit_of_measurement: "L"
        icon: mdi:delta
        state_class: measurement
        state: >
          {% set actual = states('sensor.brewassistant_biab_actual_trub_chiller_loss') | float(0) %}
          {% set planned = states('input_number.brewassistant_biab_planned_trub_chiller_loss_l') | float(0) %}
          {% if actual != 0 and planned > 0 %}
            {{ (actual - planned) | round(2) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Mash Efficiency Delta"
        unique_id: brewassistant_biab_mash_efficiency_delta
        unit_of_measurement: "%"
        icon: mdi:delta
        state_class: measurement
        state: >
          {% set actual = states('sensor.brewassistant_biab_mash_efficiency') | float(0) %}
          {% set planned = states('input_number.brewassistant_biab_planned_mash_efficiency_pct') | float(0) %}
          {% if actual > 0 and planned > 0 %}
            {{ (actual - planned) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "BrewAssistant BIAB Calibration Advice"
        unique_id: brewassistant_biab_calibration_advice
        icon: mdi:lightbulb-on-outline
        state: >
          {% set state = states('sensor.brewassistant_biab_calibration_state') %}
          {% set mash_delta = states('sensor.brewassistant_biab_mash_efficiency_delta') | float(0) %}
          {% set boil_delta = states('sensor.brewassistant_biab_boil_off_delta') | float(0) %}
          {% set trub_delta = states('sensor.brewassistant_biab_trub_loss_delta') | float(0) %}
          {% set ferm_delta = states('sensor.brewassistant_biab_fermenter_volume_delta') | float(0) %}
          {% set trub_actual = states('sensor.brewassistant_biab_actual_trub_chiller_loss') | float(0) %}
          {% if state != 'Complete' %}
            {{ state }}
          {% elif trub_actual < -0.2 %}
            Check volume measurements
          {% elif mash_delta <= -5 %}
            Mash efficiency lower than planned
          {% elif mash_delta >= 5 %}
            Mash efficiency higher than planned
          {% elif boil_delta | abs >= 0.4 %}
            Adjust boil-off rate
          {% elif trub_delta | abs >= 0.4 %}
            Adjust trub/chiller loss
          {% elif ferm_delta | abs >= 0.5 %}
            Fermenter volume off target
          {% else %}
            Profile looks good
          {% endif %}
        attributes:
          suggested_boil_off_rate_l_h: "{{ states('sensor.brewassistant_biab_actual_boil_off_rate') }}"
          suggested_trub_chiller_loss_l: "{{ states('sensor.brewassistant_biab_actual_trub_chiller_loss') }}"
          suggested_mash_efficiency_pct: "{{ states('sensor.brewassistant_biab_mash_efficiency') }}"
          suggested_brewhouse_efficiency_pct: "{{ states('sensor.brewassistant_biab_brewhouse_efficiency') }}"
          note: "Use after 2-3 batches before permanently changing Brewfather profile values."


      - name: "BrewAssistant BIAB Calibration Stage SV"
        unique_id: brewassistant_biab_calibration_stage_sv
        icon: mdi:clipboard-text-clock-outline
        state: >
          {% set st = states('sensor.brewassistant_biab_calibration_state') %}
          {% if st == 'Disabled' %}
            Avstängd
          {% elif st == 'Enter grain bill' %}
            Ange maltmängd
          {% elif st == 'Enter pre-boil data' %}
            Ange pre-boil-värden
          {% elif st == 'Enter post-boil volume' %}
            Ange volym efter kok
          {% elif st == 'Enter fermenter volume and OG' %}
            Ange jäskärlsvolym och OG
          {% elif st == 'Complete' %}
            Kalibrering klar
          {% else %}
            {{ st }}
          {% endif %}

      - name: "BrewAssistant BIAB Calibration Advice SV"
        unique_id: brewassistant_biab_calibration_advice_sv
        icon: mdi:lightbulb-on-outline
        state: >
          {% set advice = states('sensor.brewassistant_biab_calibration_advice') %}
          {% if advice == 'Disabled' %}
            Modulen är avstängd
          {% elif advice == 'Enter grain bill' %}
            Ange maltmängd för receptet
          {% elif advice == 'Enter pre-boil data' %}
            Ange volym och SG före kok
          {% elif advice == 'Enter post-boil volume' %}
            Ange varm volym i kokkärlet efter kok
          {% elif advice == 'Enter fermenter volume and OG' %}
            Ange volym till jäskärl och uppmätt OG
          {% elif advice == 'Check volume measurements' %}
            Kontrollera volymmätningarna
          {% elif advice == 'Mash efficiency lower than planned' %}
            Mäskutbytet är lägre än planerat
          {% elif advice == 'Mash efficiency higher than planned' %}
            Mäskutbytet är högre än planerat
          {% elif advice == 'Adjust boil-off rate' %}
            Justera bortkok i Brewfather-profilen
          {% elif advice == 'Adjust trub/chiller loss' %}
            Justera trub/kylförlust i Brewfather-profilen
          {% elif advice == 'Fermenter volume off target' %}
            Volym till jäskärl avviker från plan
          {% elif advice == 'Profile looks good' %}
            Profilen ser bra ut
          {% else %}
            {{ advice }}
          {% endif %}
        attributes:
          original_advice: "{{ states('sensor.brewassistant_biab_calibration_advice') }}"

      - name: "BrewAssistant BIAB Calibration Severity"
        unique_id: brewassistant_biab_calibration_severity
        icon: mdi:alert-decagram-outline
        state: >
          {% set enabled = is_state('input_boolean.brewassistant_biab_calibration_enabled', 'on') %}
          {% set state = states('sensor.brewassistant_biab_calibration_state') %}
          {% set advice = states('sensor.brewassistant_biab_calibration_advice') %}
          {% if not enabled or state == 'Disabled' %}
            disabled
          {% elif state != 'Complete' %}
            input_needed
          {% elif advice == 'Profile looks good' %}
            ok
          {% elif advice in ['Check volume measurements'] %}
            error
          {% else %}
            warning
          {% endif %}

      - name: "BrewAssistant BIAB Calibration Next Step SV"
        unique_id: brewassistant_biab_calibration_next_step_sv
        icon: mdi:debug-step-over
        state: >
          {% set st = states('sensor.brewassistant_biab_calibration_state') %}
          {% if st == 'Disabled' %}
            Slå på modulen
          {% elif st == 'Enter grain bill' %}
            Mata in total maltmängd i kg
          {% elif st == 'Enter pre-boil data' %}
            Mät volym och SG före kok
          {% elif st == 'Enter post-boil volume' %}
            Mät varm volym i kokkärlet direkt efter kok
          {% elif st == 'Enter fermenter volume and OG' %}
            Mät volym till jäskärl och OG
          {% elif st == 'Complete' %}
            Granska råd och spara värden till nästa bryggning
          {% else %}
            Kontrollera mätvärden
          {% endif %}

      - name: "BrewAssistant BIAB Calibration Summary"
        unique_id: brewassistant_biab_calibration_summary
        icon: mdi:clipboard-list-outline
        state: >
          {% set stage = states('sensor.brewassistant_biab_calibration_stage_sv') %}
          {% set advice = states('sensor.brewassistant_biab_calibration_advice_sv') %}
          {{ stage }} · {{ advice }}
        attributes:
          profile: "{{ states('input_select.brewassistant_biab_calibration_profile') }}"
          next_step: "{{ states('sensor.brewassistant_biab_calibration_next_step_sv') }}"
          mash_efficiency: "{{ states('sensor.brewassistant_biab_mash_efficiency') }}"
          brewhouse_efficiency: "{{ states('sensor.brewassistant_biab_brewhouse_efficiency') }}"
          boil_off_rate: "{{ states('sensor.brewassistant_biab_actual_boil_off_rate') }}"
          trub_chiller_loss: "{{ states('sensor.brewassistant_biab_actual_trub_chiller_loss') }}"
          estimated_og_from_pre_boil: "{{ states('sensor.brewassistant_biab_estimated_og_from_pre_boil') }}"

      - name: "BrewAssistant BIAB Brew Day Mode SV"
        unique_id: brewassistant_biab_brew_day_mode_sv
        icon: mdi:clipboard-flow-outline
        state: >
          {% set mode = states('input_select.brewassistant_biab_brew_day_mode') %}
          {% if mode == 'Planning' %}
            Planering
          {% elif mode == 'Pre-boil check' %}
            Före kok
          {% elif mode == 'Post-boil check' %}
            Efter kok
          {% elif mode == 'Fermenter check' %}
            Till jäskärl
          {% elif mode == 'Summary' %}
            Sammanfattning
          {% else %}
            {{ mode }}
          {% endif %}

      - name: "BrewAssistant BIAB Brew Day Instruction"
        unique_id: brewassistant_biab_brew_day_instruction
        icon: mdi:comment-text-outline
        state: >
          {% set mode = states('input_select.brewassistant_biab_brew_day_mode') %}
          {% if mode == 'Planning' %}
            Kontrollera profil, maltmängd och planerade volymer
          {% elif mode == 'Pre-boil check' %}
            Mata in pre-boil volume och pre-boil SG
          {% elif mode == 'Post-boil check' %}
            Mata in varm volym i kokkärlet efter kok
          {% elif mode == 'Fermenter check' %}
            Mata in volym till jäskärl och uppmätt OG
          {% elif mode == 'Summary' %}
            Granska utbyte, bortkok, förluster och kalibreringsråd
          {% else %}
            Kontrollera bryggdagsläge
          {% endif %}

      - name: "BrewAssistant BIAB Brew Day Readiness"
        unique_id: brewassistant_biab_brew_day_readiness
        icon: mdi:clipboard-check-outline
        state: >
          {% set mode = states('input_select.brewassistant_biab_brew_day_mode') %}
          {% set grain = states('input_number.brewassistant_biab_grain_bill_kg') | float(0) %}
          {% set pre_vol = states('input_number.brewassistant_biab_measured_pre_boil_volume_l') | float(0) %}
          {% set pre_sg = states('input_number.brewassistant_biab_measured_pre_boil_sg') | float(1) %}
          {% set post_hot = states('input_number.brewassistant_biab_measured_post_boil_hot_volume_l') | float(0) %}
          {% set ferm_vol = states('input_number.brewassistant_biab_measured_fermenter_volume_l') | float(0) %}
          {% set og = states('input_number.brewassistant_biab_measured_og') | float(1) %}

          {% if mode == 'Planning' %}
            {% if grain > 0 %}
              Ready for mash
            {% else %}
              Enter grain bill
            {% endif %}
          {% elif mode == 'Pre-boil check' %}
            {% if grain > 0 and pre_vol > 0 and pre_sg > 1 %}
              Pre-boil complete
            {% elif grain <= 0 %}
              Enter grain bill first
            {% else %}
              Enter pre-boil data
            {% endif %}
          {% elif mode == 'Post-boil check' %}
            {% if post_hot > 0 %}
              Post-boil complete
            {% else %}
              Enter post-boil volume
            {% endif %}
          {% elif mode == 'Fermenter check' %}
            {% if ferm_vol > 0 and og > 1 %}
              Fermenter data complete
            {% else %}
              Enter fermenter volume and OG
            {% endif %}
          {% elif mode == 'Summary' %}
            {% if states('sensor.brewassistant_biab_calibration_state') == 'Complete' %}
              Complete
            {% else %}
              Missing measurements
            {% endif %}
          {% else %}
            Unknown
          {% endif %}

      - name: "BrewAssistant BIAB Brew Day Readiness SV"
        unique_id: brewassistant_biab_brew_day_readiness_sv
        icon: mdi:clipboard-check-outline
        state: >
          {% set r = states('sensor.brewassistant_biab_brew_day_readiness') %}
          {% if r == 'Ready for mash' %}
            Redo för mäskning
          {% elif r == 'Enter grain bill' %}
            Ange maltmängd
          {% elif r == 'Enter grain bill first' %}
            Ange maltmängd först
          {% elif r == 'Pre-boil complete' %}
            Före kok komplett
          {% elif r == 'Enter pre-boil data' %}
            Ange pre-boil-värden
          {% elif r == 'Post-boil complete' %}
            Efter kok komplett
          {% elif r == 'Enter post-boil volume' %}
            Ange volym efter kok
          {% elif r == 'Fermenter data complete' %}
            Jäskärlsdata komplett
          {% elif r == 'Enter fermenter volume and OG' %}
            Ange jäskärlsvolym och OG
          {% elif r == 'Complete' %}
            Komplett
          {% elif r == 'Missing measurements' %}
            Mätvärden saknas
          {% else %}
            {{ r }}
          {% endif %}

      - name: "BrewAssistant BIAB Brew Day Progress"
        unique_id: brewassistant_biab_brew_day_progress
        unit_of_measurement: "%"
        icon: mdi:progress-check
        state: >
          {% set mode = states('input_select.brewassistant_biab_brew_day_mode') %}
          {% if mode == 'Planning' %}
            20
          {% elif mode == 'Pre-boil check' %}
            40
          {% elif mode == 'Post-boil check' %}
            60
          {% elif mode == 'Fermenter check' %}
            80
          {% elif mode == 'Summary' %}
            100
          {% else %}
            0
          {% endif %}

      - name: "BrewAssistant BIAB Brew Day Summary"
        unique_id: brewassistant_biab_brew_day_summary
        icon: mdi:clipboard-list-outline
        state: >
          {% set mode = states('sensor.brewassistant_biab_brew_day_mode_sv') %}
          {% set ready = states('sensor.brewassistant_biab_brew_day_readiness_sv') %}
          {{ mode }} · {{ ready }}
        attributes:
          instruction: "{{ states('sensor.brewassistant_biab_brew_day_instruction') }}"
          calibration_state: "{{ states('sensor.brewassistant_biab_calibration_stage_sv') }}"
          calibration_advice: "{{ states('sensor.brewassistant_biab_calibration_advice_sv') }}"
          progress_pct: "{{ states('sensor.brewassistant_biab_brew_day_progress') }}"
          
script:
  brewassistant_biab_load_20l_profile:
    alias: BrewAssistant BIAB Load 20L Profile
    icon: mdi:numeric-20-circle-outline
    mode: single
    sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_biab_calibration_profile
        data:
          option: "Digiboil 35L BIAB - 20L FV"
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_planned_pre_boil_volume_l
        data:
          value: 25.0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_planned_fermenter_volume_l
        data:
          value: 20.0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_planned_boil_off_rate_l_h
        data:
          value: 2.7
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_planned_trub_chiller_loss_l
        data:
          value: 1.2
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_planned_mash_efficiency_pct
        data:
          value: 75.0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_boil_time_min
        data:
          value: 60
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_cooling_shrinkage_pct
        data:
          value: 4.0

  brewassistant_biab_load_9l_profile:
