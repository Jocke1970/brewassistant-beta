  brewassistant_biab_reset_measurements:
    alias: BrewAssistant BIAB Reset Measurements
    icon: mdi:restore
    mode: single
    sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_grain_bill_kg
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_measured_pre_boil_volume_l
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_measured_pre_boil_sg
        data:
          value: 1.000
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_measured_post_boil_hot_volume_l
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_measured_fermenter_volume_l
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: input_number.brewassistant_biab_measured_og
        data:
          value: 1.000
      - service: input_select.select_option
        target:
          entity_id: input_select.brewassistant_biab_brew_day_mode
        data:
          option: "Planning"
          
