      as_datetime(raw, none) else raw }} Start time: {{
      as_datetime(raw).strftime('%H:%M') if as_datetime(raw, none) else '' }} {%
      else %} Start date: unknown Start time: unknown {% endif %} {% endif %}
    icon: mdi:glass-mug-variant
    icon_color: grey
    multiline_secondary: true
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          margin: 0 8px 8px 8px;
          border-radius: 18px;
          background: rgba(255,255,255,0.035);
          border: 1px solid rgba(255,255,255,0.07);
          box-shadow: none;
          box-sizing: border-box;
        }
        ha-card .primary {
          font-weight: 700;
          line-height: 1.25;
          white-space: pre-line;
        }
        ha-card .secondary {
          line-height: 1.55;
          white-space: pre-line;
        }
  - type: custom:mushroom-template-card
    entity: sensor.brewassistant_bf_batch_3_summary
