# BrewAssistant BrewZilla Card v3.6
# Operator-focused hardware cockpit for BrewZilla.
# Role: machine state, heater/pump/target/power, local vs RAPT telemetry hints.
# Keep audit, learning and deep RAPT diagnosis in separate cards.

# Required custom cards:
# - custom:button-card
# - custom:vertical-stack-in-card
# - custom:mushroom-template-card
# - custom:mushroom-chips-card
# - custom:expander-card

# Paste this card into the Brewday/BrewZilla dashboard view.

type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_brewzilla_runtime_state
    show_icon: true
    show_name: false
    show_state: false
    icon: mdi:kettle-steam-outline
    styles:
      card:
        - padding: 18px
        - border-radius: 24px
        - color: white
        - box-shadow: 0 10px 30px rgba(0,0,0,.35)
        - background: >
            [[[ 
              const state = states['sensor.brewassistant_brewzilla_runtime_state']?.state || 'unknown';
              const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state || 'monitor';
              const power = Number(states['sensor.brewassistant_brewzilla_power']?.state);
              if (mode === 'blocked') return 'linear-gradient(135deg, #3f0d12 0%, #111827 100%)';
              if (state === 'disconnected') return 'linear-gradient(135deg, #1f2937 0%, #020617 100%)';
              if (state === 'heating' || state === 'heating_pumping' || (!isNaN(power) && power > 1000)) return 'linear-gradient(135deg, #7c2d12 0%, #451a03 100%)';
              if (state === 'pumping') return 'linear-gradient(135deg, #075985 0%, #0f172a 100%)';
              if (state === 'holding') return 'linear-gradient(135deg, #14532d 0%, #0f172a 100%)';
              return 'linear-gradient(135deg, #102033 0%, #172554 100%)';
            ]]]
      icon:
        - width: 42px
        - color: rgba(255,255,255,.94)
      grid:
        - grid-template-areas: >-
            "i title title" "i temp temp" "i meta meta" "reason reason reason"
        - grid-template-columns: 52px 1fr 1fr
        - grid-template-rows: min-content min-content min-content min-content
      custom_fields:
        title:
          - align-self: start
          - justify-self: start
          - font-size: 22px
          - font-weight: 800
          - line-height: 1.1
        temp:
          - align-self: start
          - justify-self: start
          - font-size: 34px
          - font-weight: 900
          - letter-spacing: -1px
          - margin-top: 4px
        meta:
          - align-self: start
          - justify-self: start
          - font-size: 13px
          - opacity: .88
          - margin-top: 4px
        reason:
          - align-self: start
          - justify-self: stretch
          - font-size: 13px
          - font-weight: 700
          - margin-top: 14px
          - padding: 10px 12px
          - border-radius: 14px
          - background: rgba(255,255,255,.13)
          - white-space: normal
    custom_fields:
      title: >
        [[[ 
          const state = states['sensor.brewassistant_brewzilla_runtime_state']?.state || 'unknown';
          const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state || 'monitor';
          return `BrewZilla · ${state} · ${mode}`;
        ]]]
      temp: >
        [[[ 
          const rawTemp = Number(states['sensor.brewassistant_brewzilla_current_temperature']?.state);
          const rawTarget = Number(states['sensor.brewassistant_brewzilla_target_temperature']?.state);
          const rawDelta = Number(states['sensor.brewassistant_brewzilla_temperature_delta']?.state);
          const temp = isNaN(rawTemp) ? '—' : rawTemp.toFixed(1);
          const target = isNaN(rawTarget) ? '—' : rawTarget.toFixed(1);
          const delta = isNaN(rawDelta) ? '—' : rawDelta.toFixed(1);
          return `${temp} → ${target} °C`;
        ]]]
      meta: >
        [[[ 
          const p = Number(states['sensor.brewassistant_brewzilla_power']?.state);
          const heat = Number(states['sensor.brewassistant_brewzilla_heat_utilization']?.state);
          const pump = Number(states['sensor.brewassistant_brewzilla_pump_utilization']?.state);
          const power = isNaN(p) ? '— W' : `${Math.round(p)} W`;
          const heatTxt = isNaN(heat) ? 'Heat —' : `Heat ${Math.round(heat)}%`;
          const pumpTxt = isNaN(pump) ? 'Pump —' : `Pump ${Math.round(pump)}%`;
          return `${power} · ${heatTxt} · ${pumpTxt}`;
        ]]]
      reason: >
        [[[ return states['sensor.brewassistant_brewzilla_control_reason']?.state || 'Monitor BrewZilla'; ]]]

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_current_temperature
        primary: Current
        secondary: '{{ states(entity) | float(0) | round(1) }} °C'
        icon: mdi:thermometer
        icon_color: orange
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_target_temperature
        primary: Target
        secondary: '{{ states(entity) | float(0) | round(1) }} °C'
        icon: mdi:bullseye-arrow
        icon_color: blue
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_temperature_delta
        primary: Delta
        secondary: '{{ states(entity) | float(0) | round(1) }} °C'
        icon: mdi:delta
        icon_color: >-
          {% set d = states(entity) | float(0) %}
          {% if d | abs > 2 %}red{% elif d | abs > 0.5 %}amber{% else %}green{% endif %}
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_power
        primary: Local power
        secondary: >-
          {% if states(entity) in ['unknown', 'unavailable', 'none', ''] %}
            — W
          {% else %}
            {{ states(entity) | float(0) | round(0) }} W
          {% endif %}
        icon: mdi:flash
        icon_color: yellow

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_heat_utilization
        primary: Heat utilization
        secondary: '{{ states(entity) | float(0) | round(0) }} %'
        icon: mdi:fire
        icon_color: deep-orange
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_pump_utilization
        primary: Pump utilization
        secondary: '{{ states(entity) | float(0) | round(0) }} %'
        icon: mdi:pump
        icon_color: cyan
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_device_target_temperature
        primary: Device target
        secondary: '{{ states(entity) | float(0) | round(1) }} °C'
        icon: mdi:target
        icon_color: indigo
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_runtime_target_temperature
        primary: Runtime target
        secondary: '{{ states(entity) | float(0) | round(1) }} °C'
        icon: mdi:timeline-clock
        icon_color: purple

  - type: custom:mushroom-chips-card
    chips:
      - type: entity
        entity: sensor.brewassistant_brewzilla_connection_state
        icon: mdi:wifi
      - type: entity
        entity: sensor.brewassistant_brewzilla_orchestration_mode
        icon: mdi:robot
      - type: entity
        entity: sensor.brewassistant_brewzilla_energy_session
        icon: mdi:lightning-bolt
      - type: entity
        entity: sensor.brewassistant_brewzilla_energy_cost_session
        icon: mdi:cash
      - type: action
        icon: mdi:stop-circle-outline
        tap_action:
          action: call-service
          service: brewassistant.abort_brewzilla
          confirmation:
            text: Stoppa BrewZilla heater och pump?

  - type: custom:expander-card
    title: Telemetry freshness
    padding: 0
    clear: false
    cards:
      - type: markdown
        content: >-
          {% set local = state_attr('sensor.brewassistant_brewzilla_orchestration_mode', 'brewzilla_local_power_age_seconds') %}
          {% set control = state_attr('sensor.brewassistant_brewzilla_orchestration_mode', 'brewzilla_rapt_control_age_seconds') %}
          {% set config = state_attr('sensor.brewassistant_brewzilla_orchestration_mode', 'brewzilla_rapt_config_age_seconds') %}
          **Local/Shelly power:** {{ local if local is not none else '—' }} s  
          **RAPT control temp/target:** {{ control if control is not none else '—' }} s  
          **RAPT config heat/pump:** {{ config if config is not none else '—' }} s
      - type: entities
        title: Source diagnostics
        entities:
          - entity: sensor.brewassistant_brewzilla_connection_state
          - entity: sensor.brewassistant_brewzilla_runtime_summary
          - entity: sensor.brewassistant_brewzilla_control_reason
          - entity: sensor.brewassistant_brewzilla_power
          - entity: sensor.brewassistant_brewzilla_energy_power
