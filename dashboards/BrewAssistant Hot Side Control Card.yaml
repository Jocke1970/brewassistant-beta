type: custom:vertical-stack-in-card
cards:
  # ============================================================
  # HOT SIDE HEADER / STATUS
  # ============================================================
  - type: custom:button-card
    entity: sensor.brewassistant_hot_side_status
    name: HOT SIDE / BREW DAY
    icon: mdi:kettle-steam
    show_state: true
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const phase = states['input_select.brewassistant_hot_side_phase']?.state || 'Unknown';
        const progress = states['sensor.brewassistant_hot_side_progress']?.state || '0';
        const recipe = states['sensor.brewassistant_hot_side_recipe_name']?.state || 'Unknown recipe';
        const timer = states['sensor.brewassistant_hot_side_timer_display']?.state || 'No timer';
        return `${phase} · ${progress}%\n${recipe}\n${timer}`;
      ]]]
    styles:
      card:
        - padding: 18px
        - border-radius: 22px
        - background: |
            [[[
              const status = entity?.state;
              const phase = states['input_select.brewassistant_hot_side_phase']?.state;

              if (status === 'Paused') {
                return 'linear-gradient(135deg, rgba(120,120,120,0.35), rgba(40,40,40,0.92))';
              }

              if (phase === 'Boil' || phase === 'Heat To Boil') {
                return 'linear-gradient(135deg, rgba(255,120,40,0.45), rgba(60,22,8,0.95))';
              }

              if (phase === 'Mash Rest' || phase === 'Mash In' || phase === 'Mash Out') {
                return 'linear-gradient(135deg, rgba(255,180,80,0.35), rgba(60,40,10,0.94))';
              }

              if (phase === 'Chill') {
                return 'linear-gradient(135deg, rgba(70,170,255,0.38), rgba(8,26,50,0.95))';
              }

              if (phase === 'Done') {
                return 'linear-gradient(135deg, rgba(70,220,140,0.36), rgba(10,45,28,0.95))';
              }

              return 'linear-gradient(135deg, rgba(255,150,60,0.28), rgba(25,18,12,0.96))';
            ]]]
        - box-shadow: 0 0 24px rgba(255, 140, 50, 0.18)
        - border: 1px solid rgba(255,255,255,0.08)
      grid:
        - grid-template-areas: '"i n" "i s" "i l"'
        - grid-template-columns: 58px 1fr
        - grid-template-rows: min-content min-content min-content
      icon:
        - width: 42px
        - color: |
            [[[
              const phase = states['input_select.brewassistant_hot_side_phase']?.state;
              if (phase === 'Chill') return '#6ec6ff';
              if (phase === 'Done') return '#5cff9a';
              return '#ffb45c';
            ]]]
      name:
        - justify-self: start
        - font-size: 13px
        - font-weight: 800
        - letter-spacing: 1.4px
        - color: rgba(255,255,255,0.72)
      state:
        - justify-self: start
        - font-size: 28px
        - font-weight: 900
        - color: white
        - padding-top: 2px
      label:
        - justify-self: start
        - text-align: left
        - white-space: pre-line
        - font-size: 13px
        - line-height: 1.45
        - color: rgba(255,255,255,0.78)
        - padding-top: 6px

  # ============================================================
  # PROGRESS BAR
  # ============================================================
  - type: custom:button-card
    entity: sensor.brewassistant_hot_side_progress
    show_icon: false
    show_name: false
    show_state: false
    styles:
      card:
        - height: 12px
        - padding: 0
        - margin: 0 16px 10px 16px
        - border-radius: 999px
        - background: rgba(255,255,255,0.08)
        - overflow: hidden
      custom_fields:
        bar:
          - height: 100%
          - width: |
              [[[
                const p = parseFloat(entity?.state || 0);
                return `${Math.max(0, Math.min(100, p))}%`;
              ]]]
          - background: |
              [[[
                const phase = states['input_select.brewassistant_hot_side_phase']?.state;
                if (phase === 'Chill') return 'linear-gradient(90deg, #3aa7ff, #9ee7ff)';
                if (phase === 'Done') return 'linear-gradient(90deg, #2ee881, #b7ffd4)';
                return 'linear-gradient(90deg, #ff8a3d, #ffd36b)';
              ]]]
          - border-radius: 999px
          - box-shadow: 0 0 16px rgba(255,170,70,0.35)
    custom_fields:
      bar: ""

  # ============================================================
  # RECIPE / BATCH INFO
  # ============================================================
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: Recept
        secondary: "{{ states('sensor.brewassistant_hot_side_recipe_name') }}"
        icon: mdi:beer
        multiline_secondary: true
        tap_action:
          action: more-info
        entity: sensor.brewassistant_hot_side_recipe_name
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-template-card
        primary: Batch
        secondary: "{{ states('sensor.brewassistant_hot_side_batch_name') }}"
        icon: mdi:clipboard-text
        multiline_secondary: true
        tap_action:
          action: more-info
        entity: sensor.brewassistant_hot_side_batch_name
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

  # ============================================================
  # CURRENT PHASE / INSTRUCTION
  # ============================================================
  - type: custom:mushroom-template-card
    entity: input_select.brewassistant_hot_side_phase
    primary: "{{ states('input_select.brewassistant_hot_side_phase') }}"
    secondary: "{{ states('sensor.brewassistant_hot_side_instruction') }}"
    icon: |
      {% set phase = states('input_select.brewassistant_hot_side_phase') %}
      {% if phase == 'Idle' %}
        mdi:sleep
      {% elif phase == 'Preparation' %}
        mdi:clipboard-check
      {% elif phase == 'Heat Strike Water' %}
        mdi:kettle-steam
      {% elif phase == 'Mash In' %}
        mdi:sack
      {% elif phase == 'Mash Rest' %}
        mdi:pot-steam
      {% elif phase == 'Mash Out' %}
        mdi:thermometer-chevron-up
      {% elif phase == 'Sparge / Drain' %}
        mdi:water-sync
      {% elif phase == 'Heat To Boil' %}
        mdi:fire
      {% elif phase == 'Boil' %}
        mdi:pot-mix
      {% elif phase == 'Whirlpool' %}
        mdi:weather-tornado
      {% elif phase == 'Chill' %}
        mdi:snowflake-thermometer
      {% elif phase == 'Transfer To Fermenter' %}
        mdi:transfer
      {% elif phase == 'Done' %}
        mdi:check-circle
      {% else %}
        mdi:help-circle
      {% endif %}
    multiline_secondary: true
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          margin: 4px 12px 8px 12px;
          border-radius: 20px;
          background: rgba(255,255,255,0.055);
          border: 1px solid rgba(255,255,255,0.08);
        }

  # ============================================================
  # TIMER / TARGETS
  # ============================================================
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: timer.brewassistant_hot_side_timer
        primary: Timer
        secondary: "{{ states('sensor.brewassistant_hot_side_timer_display') }}"
        icon: mdi:timer-outline
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_hot_side_next_phase
        primary: Nästa steg
        secondary: "{{ states('sensor.brewassistant_hot_side_next_phase') }}"
        icon: mdi:skip-next-circle
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-template-card
        entity: input_number.brewassistant_hot_side_mash_target_temp
        primary: Mäskmål
        secondary: "{{ states('input_number.brewassistant_hot_side_mash_target_temp') }} °C"
        icon: mdi:thermometer-water
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-template-card
        entity: input_number.brewassistant_hot_side_chill_target_temp
        primary: Kylmål
        secondary: "{{ states('input_number.brewassistant_hot_side_chill_target_temp') }} °C"
        icon: mdi:snowflake-thermometer
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

  # ============================================================
  # MAIN CONTROL BUTTONS
  # ============================================================
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_start
        name: Start
        icon: mdi:play-circle
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_start
        styles:
          card:
            - border-radius: 18px
            - padding: 14px 8px
            - background: linear-gradient(135deg, rgba(40,210,120,0.28), rgba(20,50,30,0.8))
            - border: 1px solid rgba(120,255,180,0.20)
          icon:
            - color: "#6dff9f"
          name:
            - color: white
            - font-weight: 800

      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_previous
        name: Föregående
        icon: mdi:skip-previous-circle
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_previous
        styles:
          card:
            - border-radius: 18px
            - padding: 14px 8px
            - background: rgba(255,255,255,0.055)
            - border: 1px solid rgba(255,255,255,0.08)
          icon:
            - color: "#dddddd"
          name:
            - color: white
            - font-weight: 700

      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_next
        name: Nästa
        icon: mdi:skip-next-circle
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_next
        styles:
          card:
            - border-radius: 18px
            - padding: 14px 8px
            - background: linear-gradient(135deg, rgba(255,150,60,0.32), rgba(70,35,10,0.82))
            - border: 1px solid rgba(255,190,100,0.22)
          icon:
            - color: "#ffbd68"
          name:
            - color: white
            - font-weight: 800

  # ============================================================
  # SECONDARY CONTROL BUTTONS
  # ============================================================
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_pause_resume
        name: Paus
        icon: mdi:pause-circle
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_pause_resume
        styles:
          card:
            - border-radius: 18px
            - padding: 12px 8px
            - background: rgba(255,255,255,0.045)
            - border: 1px solid rgba(255,255,255,0.07)
          icon:
            - color: "#ffd36b"
          name:
            - color: white
            - font-weight: 700

      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_start_timer
        name: Timer
        icon: mdi:timer-play
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_start_timer
        styles:
          card:
            - border-radius: 18px
            - padding: 12px 8px
            - background: rgba(255,255,255,0.045)
            - border: 1px solid rgba(255,255,255,0.07)
          icon:
            - color: "#7ec8ff"
          name:
            - color: white
            - font-weight: 700

      - type: custom:button-card
        entity: input_button.brewassistant_hot_side_reset
        name: Reset
        icon: mdi:restart
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.brewassistant_hot_side_reset
        confirmation:
          text: Vill du verkligen återställa Hot Side workflow?
        styles:
          card:
            - border-radius: 18px
            - padding: 12px 8px
            - background: rgba(255,80,80,0.11)
            - border: 1px solid rgba(255,120,120,0.16)
          icon:
            - color: "#ff8a8a"
          name:
            - color: white
            - font-weight: 700

  # ============================================================
  # SETTINGS / HOT SIDE TUNING
  # ============================================================
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-entity-card
        entity: input_boolean.brewassistant_hot_side_auto_start_timers
        name: Autostarta timers
        icon: mdi:timer-play
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_boolean.brewassistant_hot_side_notifications
        name: Notiser
        icon: mdi:bell-ring
        tap_action:
          action: toggle
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_strike_water_temp
        name: Strike temp
        icon: mdi:thermometer-chevron-up
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_mash_target_temp
        name: Mäsktemperatur
        icon: mdi:thermometer-water
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_mash_minutes
        name: Mäsk minuter
        icon: mdi:timer-sand
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_mashout_minutes
        name: Mash-out minuter
        icon: mdi:timer-sand-complete
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_boil_minutes
        name: Kok minuter
        icon: mdi:pot-steam
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_whirlpool_minutes
        name: Whirlpool minuter
        icon: mdi:weather-tornado
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_number.brewassistant_hot_side_chill_target_temp
        name: Kylmål
        icon: mdi:snowflake-thermometer
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_text.brewassistant_hot_side_manual_recipe_name
        name: Manuellt recept
        icon: mdi:beer
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

      - type: custom:mushroom-entity-card
        entity: input_text.brewassistant_hot_side_manual_batch_name
        name: Manuell batch
        icon: mdi:clipboard-text
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
            }

card_mod:
  style: |
    ha-card {
      border-radius: 26px;
      background:
        radial-gradient(circle at top left, rgba(255,150,60,0.20), transparent 32%),
        linear-gradient(180deg, rgba(20,20,20,0.96), rgba(8,8,8,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 34px rgba(0,0,0,0.36);
      overflow: hidden;
    }
