type: vertical-stack
cards:
  - type: custom:button-card
    entity: climate.kegerator_kylskap
    name: Kegerator
    icon: mdi:fridge-industrial
    show_state: true
    show_label: true
    state_display: |
      [[[ 
        const hvac = entity?.state ?? 'unknown';
        const action = entity?.attributes?.hvac_action ?? 'unknown';
        if (hvac === 'off') return 'Kegerator Off';
        if (action === 'cooling') return 'Cooling';
        if (action === 'idle') return 'Idle';
        if (hvac === 'cool') return 'Cooling enabled';
        return hvac;
      ]]]
    tap_action:
      action: none
    hold_action:
      action: none
    triggers_update:
      - climate.kegerator_kylskap
      - sensor.kyl_temperatur_4
      - switch.kegerator
      - sensor.kegerator_power
      - switch.kegerator_fan
      - sensor.kegerator_fan_power
      - binary_sensor.kegerator_compressor_active
      - input_select.kegerator_card_section
      - input_select.kegerator_fan_mode
      - input_boolean.brewassistant_kegerator_enabled
      - sensor.kegerator_temperature_trend
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: climate.kegerator_kylskap
          show_name: false
          show_state: false
          show_icon: true
          icon: mdi:power
          tap_action:
            action: call-service
            service: |
              [[[ 
                return entity?.state === 'off'
                  ? 'climate.set_hvac_mode'
                  : 'climate.turn_off';
              ]]]
            target:
              entity_id: climate.kegerator_kylskap
            data: |
              [[[ 
                if (entity?.state === 'off') return { hvac_mode: 'cool' };
                return {};
              ]]]
          styles:
            card:
              - width: 42px
              - height: 42px
              - border-radius: 50%
              - padding: 0
              - background: rgba(255,255,255,0.15)
              - box-shadow: none
              - cursor: pointer
              - pointer-events: auto
            icon:
              - width: 22px
              - color: |
                  [[[ 
                    const hvac = entity?.state;
                    const isOn = hvac !== 'off' && hvac !== 'unavailable' && hvac !== 'unknown';
                    return isOn ? '#90caf9' : 'rgba(255,255,255,0.65)';
                  ]]]
    label: |
      [[[ 
        const enabled = states['input_boolean.brewassistant_kegerator_enabled']?.state === 'on';
        const climateCurrentRaw = entity?.attributes?.current_temperature;
        const externalRaw = states['sensor.kyl_temperatur_4']?.state;
        const fan = states['switch.kegerator_fan']?.state;
        const fanMode = states['input_select.kegerator_fan_mode']?.state ?? '-';
        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
        const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
        const powerRaw = states['sensor.kegerator_power']?.state;
        const hvac = entity?.state ?? 'unknown';
        const hvacAction = entity?.attributes?.hvac_action ?? 'unknown';
        const targetRaw = entity?.attributes?.temperature;
        const trendRaw = states['sensor.kegerator_temperature_trend']?.state;

        const num = (v) => v !== undefined && v !== null && v !== 'unknown' && v !== 'unavailable' ? parseFloat(v) : null;
        const power = num(powerRaw);
        const fanPower = num(fanPowerRaw);
        const current = num(climateCurrentRaw) ?? num(externalRaw);
        const target = num(targetRaw);
        const trend = num(trendRaw);

        const compressorActive = compressorRaw === 'on' || ((compressorRaw === 'unknown' || compressorRaw === 'unavailable' || compressorRaw === undefined) && power !== null && power > 20);
        const compressorKnown = compressorRaw === 'on' || compressorRaw === 'off' || power !== null;

        const currentTxt = current !== null ? `${current.toFixed(1)} °C` : 'unavailable';
        const targetTxt = target !== null ? `${target.toFixed(1)} °C` : 'unavailable';
        const deltaTxt = current !== null && target !== null ? `${(current - target) > 0 ? '+' : ''}${(current - target).toFixed(1)} °C` : 'unavailable';
        const trendTxt = trend !== null ? `${trend > 0 ? '+' : ''}${trend.toFixed(2)} °C/h` : '-';
        const modeTxt = hvac === 'cool' ? 'Cooling enabled' : hvac === 'off' ? 'Off' : hvac;
        const actionTxt = hvacAction === 'cooling' ? 'Cooling' : hvacAction === 'idle' ? 'Idle' : hvacAction;
        const compressorTxt = !compressorKnown ? 'unavailable' : compressorActive ? 'Running' : 'Idle';
        const fanTxt = fanPower !== null && fanPower > 2 ? `Running ${fanPower.toFixed(1)} W` : fan === 'on' ? 'On' : fan === 'off' ? 'Off' : '-';
        const powerTxt = power !== null ? `${power.toFixed(0)} W` : '-';

        if (!enabled) {
          return `<div style="line-height:1.45;">Kegerator module disabled<br>Climate: ${modeTxt} · Current: ${currentTxt}</div>`;
        }

        return `
          <div style="line-height: 1.45;">
            <div>Now: ${currentTxt} · Target: ${targetTxt} · Delta: ${deltaTxt}</div>
            <div>Trend: ${trendTxt} · Action: ${actionTxt} · Compressor: ${compressorTxt}</div>
            <div>Power: ${powerTxt} · Fan: ${fanTxt} · Fan mode: ${fanMode}</div>
          </div>
        `;
      ]]]
    styles:
      card:
        - border-radius: 24px
        - padding: 18px
        - min-height: 150px
        - background: |
            [[[ 
              const enabled = states['input_boolean.brewassistant_kegerator_enabled']?.state === 'on';
              const action = entity?.attributes?.hvac_action;
              const hvac = entity?.state;
              const current = entity?.attributes?.current_temperature;
              const target = entity?.attributes?.temperature;
              const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
              const powerRaw = states['sensor.kegerator_power']?.state;
              const power = powerRaw && powerRaw !== 'unknown' && powerRaw !== 'unavailable' ? parseFloat(powerRaw) : null;
              const compressorActive = compressorRaw === 'on' || (power !== null && power > 20);
              let delta = null;
              if (current !== undefined && current !== null && target !== undefined && target !== null) delta = Number(current) - Number(target);
              if (!enabled || hvac === 'off') return 'linear-gradient(135deg, #34343a, #242428)';
              if (compressorActive || action === 'cooling') return 'linear-gradient(135deg, #0d47a1, #1e3a5f)';
              if (delta !== null && !isNaN(delta) && delta > 1.0) return 'linear-gradient(135deg, #6d4c00, #332300)';
              if (delta !== null && !isNaN(delta) && Math.abs(delta) <= 0.5) return 'linear-gradient(135deg, #005739, #063324)';
              return 'linear-gradient(135deg, #26354d, #18202e)';
            ]]]
        - color: white
        - box-shadow: 0 10px 26px rgba(0,0,0,0.28)
        - overflow: hidden
      grid:
        - grid-template-areas: "\"i n power\" \"i s power\" \"i l power\""
        - grid-template-columns: 72px 1fr 42px
        - grid-template-rows: min-content min-content 1fr
      icon:
        - width: 32px
        - color: white
      img_cell:
        - width: 52px
        - height: 52px
        - border-radius: 50%
        - background: rgba(255,255,255,0.14)
        - align-self: start
      name:
        - justify-self: start
        - align-self: end
        - font-size: 18px
        - font-weight: 900
        - color: white
        - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
      state:
        - justify-self: start
        - align-self: start
        - font-size: 14px
        - font-weight: 900
        - color: white
        - padding-top: 2px
        - white-space: normal
        - text-shadow: 0 1px 2px rgba(0,0,0,0.6)
      label:
        - justify-self: start
        - align-self: start
        - text-align: left
        - font-size: 12px
        - font-weight: 600
        - line-height: 1.45
        - white-space: normal
        - color: white
        - padding-top: 6px
        - text-shadow: 0 1px 3px rgba(0,0,0,0.6)
      custom_fields:
        power:
          - justify-self: end
          - align-self: start
          - pointer-events: auto
          - z-index: 10
  - type: conditional
    conditions:
      - entity: climate.kegerator_kylskap
        state_not: "off"
      - entity: climate.kegerator_kylskap
        state_not: unavailable
    card:
      type: vertical-stack
      cards:
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              entity: climate.kegerator_kylskap
              name: Current
              icon: mdi:thermometer
              show_state: false
              show_label: true
              tap_action:
                action: more-info
              label: |
                [[[ 
                  const climateCurrent = entity?.attributes?.current_temperature;
                  const external = states['sensor.kyl_temperatur_4']?.state;
                  const v = climateCurrent !== undefined && climateCurrent !== null ? climateCurrent : external;
                  if (v === undefined || v === null || v === 'unknown' || v === 'unavailable') return '-';
                  return `${parseFloat(v).toFixed(1)} °C`;
                ]]]
              styles:
                card:
                  - height: 102px
                  - border-radius: 18px
                  - background: rgba(120,170,255,0.16)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                icon:
                  - color: "#90caf9"
                  - width: 34px
                name:
                  - font-weight: 800
                  - color: white
                label:
                  - font-size: 13px
                  - font-weight: 700
                  - color: rgba(255,255,255,0.92)
            - type: custom:button-card
              entity: climate.kegerator_kylskap
              name: Target
              icon: mdi:crosshairs-gps
              show_state: false
              show_label: true
              tap_action:
                action: more-info
              label: |
                [[[ 
                  const t = entity?.attributes?.temperature;
                  if (t === undefined || t === null || t === 'unknown' || t === 'unavailable') return '-';
                  return `${parseFloat(t).toFixed(1)} °C`;
                ]]]
              styles:
                card:
                  - height: 102px
                  - border-radius: 18px
                  - background: rgba(255,255,255,0.08)
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                icon:
                  - color: "#90caf9"
                  - width: 34px
                name:
                  - font-weight: 800
                  - color: white
                label:
                  - font-size: 13px
                  - font-weight: 700
                  - color: rgba(255,255,255,0.92)
            - type: custom:button-card
              entity: climate.kegerator_kylskap
              name: Delta
              icon: mdi:delta
              show_state: false
              show_label: true
              tap_action:
                action: more-info
              label: |
                [[[ 
                  const currentRaw = entity?.attributes?.current_temperature ?? states['sensor.kyl_temperatur_4']?.state;
                  const targetRaw = entity?.attributes?.temperature;
                  if (currentRaw === undefined || currentRaw === null || currentRaw === 'unknown' || currentRaw === 'unavailable' || targetRaw === undefined || targetRaw === null || targetRaw === 'unknown' || targetRaw === 'unavailable') return '-';
                  const delta = parseFloat(currentRaw) - parseFloat(targetRaw);
                  return `${delta > 0 ? '+' : ''}${delta.toFixed(1)} °C`;
                ]]]
              styles:
                card:
                  - height: 102px
                  - border-radius: 18px
                  - background: |
                      [[[ 
                        const currentRaw = entity?.attributes?.current_temperature ?? states['sensor.kyl_temperatur_4']?.state;
                        const targetRaw = entity?.attributes?.temperature;
                        if (currentRaw === undefined || currentRaw === null || currentRaw === 'unknown' || currentRaw === 'unavailable' || targetRaw === undefined || targetRaw === null || targetRaw === 'unknown' || targetRaw === 'unavailable') return 'rgba(255,255,255,0.08)';
                        const delta = parseFloat(currentRaw) - parseFloat(targetRaw);
                        if (delta > 1.0) return 'rgba(255,170,70,0.18)';
                        if (delta < -1.0) return 'rgba(70,140,255,0.18)';
                        return 'rgba(70,200,120,0.18)';
                      ]]]
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                icon:
                  - color: "#90caf9"
                  - width: 34px
                name:
                  - font-weight: 800
                  - color: white
                label:
                  - font-size: 13px
                  - font-weight: 700
                  - color: rgba(255,255,255,0.92)
            - type: custom:button-card
              entity: climate.kegerator_kylskap
              name: Cooling
              icon: mdi:snowflake
              show_state: false
              show_label: true
              tap_action:
                action: more-info
              label: |
                [[[ 
                  const action = entity?.attributes?.hvac_action;
                  const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
                  const powerRaw = states['sensor.kegerator_power']?.state;
                  const power = powerRaw && powerRaw !== 'unknown' && powerRaw !== 'unavailable' ? parseFloat(powerRaw) : null;
                  const compressorActive = compressorRaw === 'on' || (power !== null && power > 20);
                  if (compressorActive) return 'Active';
                  if (action === 'cooling') return 'Cooling';
                  if (action === 'idle') return 'Idle';
                  return action ?? '-';
                ]]]
              styles:
                card:
                  - height: 102px
                  - border-radius: 18px
                  - background: |
                      [[[ 
                        const action = entity?.attributes?.hvac_action;
                        const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
                        const powerRaw = states['sensor.kegerator_power']?.state;
                        const power = powerRaw && powerRaw !== 'unknown' && powerRaw !== 'unavailable' ? parseFloat(powerRaw) : null;
                        const compressorActive = compressorRaw === 'on' || (power !== null && power > 20);
                        return compressorActive || action === 'cooling' ? 'rgba(70,140,255,0.22)' : 'rgba(255,255,255,0.08)';
                      ]]]
                  - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                icon:
                  - color: |
                      [[[ 
                        const action = entity?.attributes?.hvac_action;
                        const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
                        const powerRaw = states['sensor.kegerator_power']?.state;
                        const power = powerRaw && powerRaw !== 'unknown' && powerRaw !== 'unavailable' ? parseFloat(powerRaw) : null;
                        const compressorActive = compressorRaw === 'on' || (power !== null && power > 20);
                        return compressorActive || action === 'cooling' ? '#90caf9' : 'rgba(255,255,255,0.55)';
                      ]]]
                  - width: 34px
                name:
                  - font-weight: 800
                  - color: white
                label:
                  - font-size: 13px
                  - font-weight: 700
                  - color: rgba(255,255,255,0.92)
        - type: custom:button-card
          entity: sensor.kegerator_temperature_trend
          name: Temp Trend
          icon: mdi:chart-line
          show_state: false
          show_label: true
          label: |
            [[[ 
              const trend = Number(states['sensor.kegerator_temperature_trend']?.state ?? 0);
              const temp = states['sensor.kyl_temperatur_4']?.state ?? '—';
              const compressor = states['binary_sensor.kegerator_compressor_active']?.state === 'on';
              let direction = 'Stabil';
              if (trend <= -0.20) direction = 'Kyler aktivt';
              else if (trend < -0.05) direction = 'Sjunker långsamt';
              else if (trend >= 0.20) direction = 'Stiger snabbt';
              else if (trend > 0.05) direction = 'Stiger långsamt';
              return `${temp} °C · ${trend > 0 ? '+' : ''}${trend.toFixed(2)} °C/h · ${direction}${compressor ? ' · kompressor aktiv' : ''}`;
            ]]]
          styles:
            card:
              - height: 64px
              - border-radius: 18px
              - padding: 10px 14px
              - background: |
                  [[[ 
                    const trend = Number(states['sensor.kegerator_temperature_trend']?.state ?? 0);
                    if (trend <= -0.20) return 'linear-gradient(135deg, rgba(33,150,243,0.22), rgba(3,169,244,0.08))';
                    if (trend < -0.05) return 'linear-gradient(135deg, rgba(0,188,212,0.18), rgba(0,150,136,0.07))';
                    if (trend >= 0.20) return 'linear-gradient(135deg, rgba(244,67,54,0.24), rgba(255,152,0,0.10))';
                    if (trend > 0.05) return 'linear-gradient(135deg, rgba(255,193,7,0.22), rgba(255,152,0,0.08))';
                    return 'linear-gradient(135deg, rgba(76,175,80,0.18), rgba(139,195,74,0.06))';
                  ]]]
              - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
              - border: 1px solid rgba(255,255,255,0.08)
            grid:
              - grid-template-areas: "\"i n\" \"i l\""
              - grid-template-columns: 42px 1fr
              - grid-template-rows: 22px 22px
            icon:
              - width: 24px
              - color: |
                  [[[ 
                    const trend = Number(states['sensor.kegerator_temperature_trend']?.state ?? 0);
                    if (trend <= -0.20) return '#42a5f5';
                    if (trend < -0.05) return '#26c6da';
                    if (trend >= 0.20) return '#ef5350';
                    if (trend > 0.05) return '#ffca28';
                    return '#66bb6a';
                  ]]]
            name:
              - justify-self: start
              - font-size: 13px
              - font-weight: 900
              - color: white
            label:
              - justify-self: start
              - font-size: 12px
              - font-weight: 600
              - color: rgba(255,255,255,0.88)
              - white-space: normal
        - type: grid
          columns: 4
          square: false
          cards:
            - type: custom:button-card
              entity: input_select.kegerator_card_section
              name: Temps
              icon: mdi:thermometer-lines
              show_icon: true
              show_name: true
              tap_action:
                action: call-service
                service: input_select.select_option
                target:
                  entity_id: input_select.kegerator_card_section
                data:
                  option: |
                    [[[ return entity?.state === 'temps' ? 'none' : 'temps'; ]]]
              styles:
                card:
                  - height: 64px
                  - border-radius: 16px
                  - padding: 6px 4px
                  - background: >
                      [[[ return entity?.state === 'temps' ?
                      'rgba(33,150,243,0.24)' : 'rgba(255,255,255,0.08)'; ]]]
                  - box-shadow: >
                      [[[ return entity?.state === 'temps' ? '0 0 18px
                      rgba(33,150,243,0.35)' : '0 4px 14px rgba(0,0,0,0.12)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,0.08)
                grid:
                  - grid-template-areas: "\"i\" \"n\""
                  - grid-template-columns: 1fr
                  - grid-template-rows: 32px 18px
                img_cell:
                  - height: 30px
                  - align-self: center
                icon:
                  - width: 22px
                  - color: >
                      [[[ return entity?.state === 'temps' ? '#90caf9' :
                      'rgba(255,255,255,0.65)'; ]]]
                name:
                  - color: white
                  - font-size: 11px
                  - font-weight: 800
            - type: custom:button-card
              entity: input_select.kegerator_card_section
              name: Fan
              icon: mdi:fan
              show_icon: true
              show_name: true
              triggers_update:
                - input_select.kegerator_card_section
                - switch.kegerator_fan
                - sensor.kegerator_fan_power
              tap_action:
                action: call-service
                service: input_select.select_option
                target:
                  entity_id: input_select.kegerator_card_section
                data:
                  option: |
                    [[[ return entity?.state === 'fan' ? 'none' : 'fan'; ]]]
              extra_styles: >
                @keyframes kegerator-fan-spin { from { transform: rotate(0deg);
                } to { transform: rotate(360deg); } }
              styles:
                card:
                  - height: 64px
                  - border-radius: 16px
                  - padding: 6px 4px
                  - background: |
                      [[[ 
                        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
                        const fanPower = fanPowerRaw && fanPowerRaw !== 'unknown' && fanPowerRaw !== 'unavailable' ? parseFloat(fanPowerRaw) : 0;
                        if (entity?.state === 'fan') return 'rgba(33,150,243,0.24)';
                        if (fanPower > 2) return 'rgba(33,150,243,0.18)';
                        return 'rgba(255,255,255,0.08)';
                      ]]]
                  - box-shadow: |
                      [[[ 
                        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
                        const fanPower = fanPowerRaw && fanPowerRaw !== 'unknown' && fanPowerRaw !== 'unavailable' ? parseFloat(fanPowerRaw) : 0;
                        if (entity?.state === 'fan') return '0 0 18px rgba(33,150,243,0.35)';
                        if (fanPower > 2) return '0 0 18px rgba(33,150,243,0.25)';
                        return '0 4px 14px rgba(0,0,0,0.12)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,0.08)
                grid:
                  - grid-template-areas: "\"i\" \"n\""
                  - grid-template-columns: 1fr
                  - grid-template-rows: 32px 18px
                img_cell:
                  - height: 30px
                  - align-self: center
                icon:
                  - width: 22px
                  - transform-origin: center
                  - color: |
                      [[[ 
                        const sectionActive = entity?.state === 'fan';
                        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
                        const fanPower = fanPowerRaw && fanPowerRaw !== 'unknown' && fanPowerRaw !== 'unavailable' ? parseFloat(fanPowerRaw) : 0;
                        if (fanPower > 2) return '#8fd3ff';
                        return sectionActive ? '#90caf9' : 'rgba(255,255,255,0.65)';
                      ]]]
                  - animation: |
                      [[[ 
                        const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
                        const fanPower = fanPowerRaw && fanPowerRaw !== 'unknown' && fanPowerRaw !== 'unavailable' ? parseFloat(fanPowerRaw) : 0;
                        return fanPower > 2 ? 'kegerator-fan-spin 1.2s linear infinite' : 'none';
                      ]]]
                name:
                  - color: white
                  - font-size: 11px
                  - font-weight: 800
            - type: custom:button-card
              entity: input_select.kegerator_card_section
              name: System
              icon: mdi:information-outline
              show_icon: true
              show_name: true
              tap_action:
                action: call-service
                service: input_select.select_option
                target:
                  entity_id: input_select.kegerator_card_section
                data:
                  option: >
                    [[[ return entity?.state === 'status' ? 'none' : 'status';
                    ]]]
              styles:
                card:
                  - height: 64px
                  - border-radius: 16px
                  - padding: 6px 4px
                  - background: >
                      [[[ return entity?.state === 'status' ?
                      'rgba(33,150,243,0.24)' : 'rgba(255,255,255,0.08)'; ]]]
                  - box-shadow: >
                      [[[ return entity?.state === 'status' ? '0 0 18px
                      rgba(33,150,243,0.35)' : '0 4px 14px rgba(0,0,0,0.12)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,0.08)
                grid:
                  - grid-template-areas: "\"i\" \"n\""
                  - grid-template-columns: 1fr
                  - grid-template-rows: 32px 18px
                img_cell:
                  - height: 30px
                  - align-self: center
                icon:
                  - width: 22px
                  - color: >
                      [[[ return entity?.state === 'status' ? '#90caf9' :
                      'rgba(255,255,255,0.65)'; ]]]
                name:
                  - color: white
                  - font-size: 11px
                  - font-weight: 800
            - type: custom:button-card
              entity: input_select.kegerator_card_section
              name: Settings
              icon: mdi:cog-outline
              show_icon: true
              show_name: true
              tap_action:
                action: call-service
                service: input_select.select_option
                target:
                  entity_id: input_select.kegerator_card_section
                data:
                  option: >
                    [[[ return entity?.state === 'settings' ? 'none' :
                    'settings'; ]]]
              styles:
                card:
                  - height: 64px
                  - border-radius: 16px
                  - padding: 6px 4px
                  - background: >
                      [[[ return entity?.state === 'settings' ?
                      'rgba(33,150,243,0.24)' : 'rgba(255,255,255,0.08)'; ]]]
                  - box-shadow: >
                      [[[ return entity?.state === 'settings' ? '0 0 18px
                      rgba(33,150,243,0.35)' : '0 4px 14px rgba(0,0,0,0.12)';
                      ]]]
                  - border: 1px solid rgba(255,255,255,0.08)
                grid:
                  - grid-template-areas: "\"i\" \"n\""
                  - grid-template-columns: 1fr
                  - grid-template-rows: 32px 18px
                img_cell:
                  - height: 30px
                  - align-self: center
                icon:
                  - width: 22px
                  - color: >
                      [[[ return entity?.state === 'settings' ? '#90caf9' :
                      'rgba(255,255,255,0.65)'; ]]]
                name:
                  - color: white
                  - font-size: 11px
                  - font-weight: 800
        - type: conditional
          conditions:
            - entity: input_select.kegerator_card_section
              state: temps
          card:
            type: vertical-stack
            cards:
              - type: entities
                title: Temperatures
                show_header_toggle: false
                entities:
                  - entity: sensor.kyl_temperatur_4
                    name: External temperature sensor
                  - type: attribute
                    entity: climate.kegerator_kylskap
                    attribute: current_temperature
                    name: Climate current temperature
                    suffix: °C
                  - type: attribute
                    entity: climate.kegerator_kylskap
                    attribute: temperature
                    name: Target temperature
                    suffix: °C
                  - entity: sensor.kegerator_temperature_trend
                    name: Temperature trend
              - type: custom:button-card
                entity: climate.kegerator_kylskap
                name: Temperature Summary
                icon: mdi:thermometer-lines
                show_state: false
                show_label: true
                tap_action:
                  action: more-info
                label: |
                  [[[ 
                    const currentRaw = entity?.attributes?.current_temperature ?? states['sensor.kyl_temperatur_4']?.state;
                    const targetRaw = entity?.attributes?.temperature;
                    const trendRaw = states['sensor.kegerator_temperature_trend']?.state;
                    if (currentRaw === undefined || currentRaw === null || currentRaw === 'unknown' || currentRaw === 'unavailable' || targetRaw === undefined || targetRaw === null || targetRaw === 'unknown' || targetRaw === 'unavailable') return 'Temperature data unavailable';
                    const current = parseFloat(currentRaw);
                    const target = parseFloat(targetRaw);
                    const delta = current - target;
                    const trend = trendRaw && trendRaw !== 'unknown' && trendRaw !== 'unavailable' ? parseFloat(trendRaw) : null;
                    let status = 'Stable';
                    if (delta > 0.6) status = 'Too warm';
                    if (delta < -0.6) status = 'Too cold';
                    return `Current ${current.toFixed(1)} °C · Target ${target.toFixed(1)} °C · Delta ${delta > 0 ? '+' : ''}${delta.toFixed(1)} °C · Trend ${trend !== null ? trend.toFixed(2) : '-'} °C/h · ${status}`;
                  ]]]
                styles:
                  card:
                    - border-radius: 18px
                    - padding: 14px
                    - background: >-
                        linear-gradient(135deg, rgba(45,45,55,0.96),
                        rgba(20,20,30,0.96))
                    - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  icon:
                    - color: "#90caf9"
                  name:
                    - font-weight: 800
                    - color: white
                  label:
                    - font-size: 13px
                    - color: rgba(255,255,255,0.92)
                    - white-space: normal
        - type: conditional
          conditions:
            - entity: input_select.kegerator_card_section
              state: status
          card:
            type: vertical-stack
            cards:
              - type: entities
                title: System
                show_header_toggle: false
                entities:
                  - entity: climate.kegerator_kylskap
                    name: Kegerator climate
                  - entity: switch.kegerator
                    name: Kegerator power relay
                  - entity: binary_sensor.kegerator_compressor_active
                    name: Compressor
                  - entity: sensor.kegerator_power
                    name: Power usage
                  - entity: switch.kegerator_fan
                    name: Fan
                  - entity: sensor.kegerator_fan_power
                    name: Fan power
              - type: custom:button-card
                entity: climate.kegerator_kylskap
                name: System Status
                icon: mdi:information-outline
                show_state: false
                show_label: true
                tap_action:
                  action: more-info
                label: |
                  [[[ 
                    const fan = states['switch.kegerator_fan']?.state;
                    const fanPowerRaw = states['sensor.kegerator_fan_power']?.state;
                    const compressorRaw = states['binary_sensor.kegerator_compressor_active']?.state;
                    const powerRaw = states['sensor.kegerator_power']?.state;
                    const hvac = entity?.state ?? 'unknown';
                    const action = entity?.attributes?.hvac_action ?? 'unknown';
                    const power = powerRaw && powerRaw !== 'unknown' && powerRaw !== 'unavailable' ? parseFloat(powerRaw) : null;
                    const fanPower = fanPowerRaw && fanPowerRaw !== 'unknown' && fanPowerRaw !== 'unavailable' ? parseFloat(fanPowerRaw) : null;
                    const powerTxt = power !== null ? `${power.toFixed(1)} W` : '-';
                    const fanPowerTxt = fanPower !== null ? `${fanPower.toFixed(1)} W` : '-';
                    const compressorActive = compressorRaw === 'on' || (power !== null && power > 20);
                    const compressorKnown = compressorRaw === 'on' || compressorRaw === 'off' || power !== null;
                    const fanTxt = fanPower !== null && fanPower > 2 ? `Fan running · ${fanPowerTxt}` : fan === 'on' ? `Fan on · ${fanPowerTxt}` : fan === 'off' ? 'Fan off' : 'Fan unavailable';
                    const compressorTxt = !compressorKnown ? 'Compressor unavailable' : compressorActive ? 'Compressor running' : 'Compressor idle';
                    return `${compressorTxt} · ${powerTxt} · ${fanTxt} · HVAC ${hvac} · ${action}`;
                  ]]]
                styles:
                  card:
                    - border-radius: 18px
                    - padding: 14px
                    - background: >-
                        linear-gradient(135deg, rgba(45,45,55,0.96),
                        rgba(20,20,30,0.96))
                    - box-shadow: 0 4px 14px rgba(0,0,0,0.18)
                  icon:
                    - color: "#90caf9"
                  name:
                    - font-weight: 800
                    - color: white
                  label:
                    - font-size: 13px
                    - color: rgba(255,255,255,0.92)
                    - white-space: normal
        - type: conditional
          conditions:
            - entity: input_select.kegerator_card_section
