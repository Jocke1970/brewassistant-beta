          card:
            type: vertical-stack
            cards:
              - type: custom:mushroom-title-card
                title: Fan Control
                subtitle: Fläktläge, status och kompressorlogik
              - type: custom:mushroom-select-card
                entity: input_select.kegerator_fan_mode
