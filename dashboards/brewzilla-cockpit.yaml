type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_brewzilla_runtime_state
    show_icon: true
    show_name: false
    show_state: false
    icon: mdi:kettle-steam-outline
    styles:
      card:
        - padding: 18px
        - border-radius: 24px
        - color: white
        - box-shadow: 0 10px 30px rgba(0,0,0,.35)
        - background: |
            [[[ 
              const state = states['sensor.brewassistant_brewzilla_runtime_state']?.state || 'unknown';
              const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state || 'monitor';
              const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state || 'idle';
              const power = Number(states['sensor.brewassistant_brewzilla_power']?.state);

              if (mode === 'blocked' && runtime !== 'idle') return 'linear-gradient(135deg, #3f0d12 0%, #111827 100%)';
              if (state === 'disconnected') return 'linear-gradient(135deg, #1f2937 0%, #020617 100%)';
              if (state === 'heating' || state === 'heating_pumping' || (!isNaN(power) && power > 1000)) return 'linear-gradient(135deg, #7c2d12 0%, #451a03 100%)';
              if (state === 'pumping') return 'linear-gradient(135deg, #075985 0%, #0f172a 100%)';
              if (state === 'holding') return 'linear-gradient(135deg, #14532d 0%, #0f172a 100%)';

              return 'linear-gradient(135deg, #102033 0%, #172554 100%)';
            ]]]
      icon:
        - width: 42px
        - color: rgba(255,255,255,.94)
      grid:
        - grid-template-areas: "\"i title title\" \"i temp temp\" \"i meta meta\" \"reason reason reason\""
        - grid-template-columns: 52px 1fr 1fr
        - grid-template-rows: min-content min-content min-content min-content
      custom_fields:
        title:
          - align-self: start
          - justify-self: start
          - font-size: 20px
          - font-weight: 800
          - line-height: 1.1
          - max-width: 100%
          - overflow: hidden
          - text-overflow: ellipsis
          - white-space: nowrap
        temp:
          - align-self: start
          - justify-self: start
          - font-size: 34px
          - font-weight: 900
          - letter-spacing: "-1px"
          - margin-top: 4px
        meta:
          - align-self: start
          - justify-self: start
          - font-size: 13px
          - opacity: 0.88
          - margin-top: 4px
          - line-height: 1.35
        reason:
          - align-self: start
          - justify-self: stretch
          - font-size: 13px
          - font-weight: 700
          - margin-top: 14px
          - padding: 10px 12px
          - border-radius: 14px
          - background: rgba(255,255,255,.13)
          - white-space: normal
    custom_fields:
      title: |
        [[[ 
          const state = states['sensor.brewassistant_brewzilla_runtime_state']?.state || 'unknown';
          const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state || 'monitor';
          const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state || 'idle';
          const displayMode = (mode === 'blocked' && runtime === 'idle') ? 'idle/safe' : mode;
          return `BrewZilla · ${state} · ${displayMode}`;
        ]]]
      temp: |
        [[[ 
          const mash = Number(states['sensor.brewassistant_brewzilla_mash_temperature']?.state);
          const target = Number(states['sensor.brewassistant_brewzilla_target_temperature']?.state);

          const mashTxt = Number.isNaN(mash) ? '—' : mash.toFixed(1);
          const targetTxt = Number.isNaN(target) ? '—' : target.toFixed(1);

          return `${mashTxt} → ${targetTxt} °C`;
        ]]]
      meta: |
        [[[ 
          const p = Number(states['sensor.brewassistant_brewzilla_power']?.state);
          const heat = Number(states['sensor.brewassistant_brewzilla_heat_utilization']?.state);
          const pump = Number(states['sensor.brewassistant_brewzilla_pump_utilization']?.state);
          const wort = Number(states['sensor.brewassistant_brewzilla_wort_temperature']?.state);
          const d = Number(states['sensor.brewassistant_brewzilla_temperature_delta_mash_wort']?.state);
          const src = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state || '—';

          const power = Number.isNaN(p) ? '— W' : `${Math.round(p)} W`;
          const heatTxt = Number.isNaN(heat) ? 'Heat —' : `Heat ${Math.round(heat)}%`;
          const pumpTxt = Number.isNaN(pump) ? 'Pump —' : `Pump ${Math.round(pump)}%`;
          const wortTxt = Number.isNaN(wort) ? 'Wort —' : `Wort ${wort.toFixed(1)}°C`;
          const deltaTxt = Number.isNaN(d) ? 'Δ —' : `Δ ${d > 0 ? '+' : ''}${d.toFixed(1)}°C`;

          return `${power} · ${heatTxt} · ${pumpTxt}<br>${wortTxt} · ${deltaTxt} · ${src}`;
        ]]]
      reason: >
        [[[ return
        states['sensor.brewassistant_brewzilla_control_reason']?.state ||
        'Monitor BrewZilla'; ]]]
    tap_action:
      action: more-info
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: switch.brewzilla
        primary: Main power
        secondary: "{{ states(entity) }}"
        icon: mdi:power
        icon_color: "{% if is_state(entity, 'on') %}green{% else %}grey{% endif %}"
        tap_action:
          action: call-service
          service: switch.toggle
          target:
            entity_id: switch.brewzilla
          confirmation:
            text: Växla BrewZilla main power?
      - type: custom:mushroom-template-card
        entity: sensor.brewassistant_brewzilla_connection_state
        primary: Connection
        secondary: "{{ states(entity) }}"
        icon: mdi:wifi
        icon_color: "{% if is_state(entity, 'Connected') %}green{% else %}red{% endif %}"
  - type: conditional
    conditions:
      - entity: sensor.brewassistant_brewzilla_connection_state
        state: Connected
    card:
      type: custom:vertical-stack-in-card
      cards:
        - type: custom:button-card
          name: PANIKSTOPP
          label: HEATER + PUMP OFF
          icon: mdi:alert-octagon
          show_icon: true
          show_name: true
          show_label: true
          tap_action:
            action: call-service
            service: brewassistant.abort_brewzilla
            confirmation:
              text: Panikstoppa BrewZilla? Heater och pump stängs av.
          styles:
            card:
              - min-height: 88px
              - border-radius: 22px
              - padding: 16px
              - background: linear-gradient(135deg,
              - color: white
              - box-shadow: 0 8px 26px rgba(127, 29, 29, .55)
              - border: 1px solid rgba(254, 202, 202, .45)
            grid:
              - grid-template-areas: "\"i n\" \"i l\""
              - grid-template-columns: 52px 1fr
              - grid-template-rows: min-content min-content
            icon:
              - width: 38px
              - color: "#fecaca"
            name:
              - justify-self: start
              - font-size: 22px
              - font-weight: 900
              - letter-spacing: .5px
              - white-space: normal
              - overflow: visible
              - text-overflow: unset
            label:
              - justify-self: start
              - font-size: 13px
              - font-weight: 800
              - color: "#fee2e2"
              - margin-top: 2px
              - white-space: normal
              - overflow: visible
              - text-overflow: unset
        - type: custom:button-card
          name: Mash / Wort Temperatures
          icon: mdi:thermometer-lines
          show_icon: true
          show_name: true
          show_state: false
          styles:
            card:
              - padding: 14px
              - border-radius: 20px
              - background: rgba(15,23,42,.72)
              - color: white
            grid:
              - grid-template-areas: "\"i n\""
              - grid-template-columns: 42px 1fr
            icon:
              - width: 30px
              - color: rgba(191,219,254,.95)
            name:
              - justify-self: start
              - font-size: 15px
              - font-weight: 900
        - type: custom:mushroom-select-card
          entity: select.brewassistant_brewzilla_mash_temperature_source
          name: Mash temperature source
          icon: mdi:thermometer-auto
          icon_color: blue
          fill_container: true
          layout: horizontal
          card_mod:
            style: |
              ha-card {
                margin: 0 10px 8px 10px;
                border-radius: 16px;
                background: rgba(30,41,59,.92) !important;
                color: white !important;
                box-shadow: none;
              }
              mushroom-select {
                --mdc-theme-surface: rgba(30,41,59,.98);
                --mdc-theme-on-surface: white;
                --secondary-text-color: rgba(255,255,255,.68);
                --primary-text-color: white;
              }
        - type: custom:button-card
          entity: sensor.brewassistant_brewzilla_mash_temperature
          show_icon: false
          show_name: false
          show_state: false
          tap_action:
            action: more-info
          styles:
            card:
              - margin: 0 10px 8px 10px
              - padding: 10px
              - border-radius: 18px
              - background: rgba(255,255,255,.055)
              - color: white
            custom_fields:
              temps:
                - justify-self: stretch
                - width: 100%
          custom_fields:
            temps: |
              [[[
                const mash = Number(states['sensor.brewassistant_brewzilla_mash_temperature']?.state);
                const wort = Number(states['sensor.brewassistant_brewzilla_wort_temperature']?.state);
                const delta = Number(states['sensor.brewassistant_brewzilla_temperature_delta_mash_wort']?.state);
                const src = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state ?? '—';

                const fmt = (v) => Number.isNaN(v) ? '—' : `${v.toFixed(1)} °C`;
                const fmtDelta = (v) => {
                  if (Number.isNaN(v)) return '—';
                  const sign = v > 0 ? '+' : '';
                  return `${sign}${v.toFixed(1)} °C`;
                };

                const deltaColor =
                  Number.isNaN(delta) ? 'rgba(255,255,255,.65)' :
                  Math.abs(delta) > 2 ? '#f87171' :
                  Math.abs(delta) > 0.5 ? '#fbbf24' :
                  '#22c55e';

                const srcColor =
                  src === 'RAPT BLE Thermometer' ? '#38bdf8' :
                  src === 'BrewZilla Control Device' ? '#22d3ee' :
                  src === 'BrewZilla Internal' ? '#fb923c' :
                  'rgba(255,255,255,.65)';

                const tile = (icon, color, title, value, sub) => `
                  <div style="
                    display:grid;
                    grid-template-columns: 26px 1fr;
                    column-gap:7px;
                    align-items:center;
                    min-width:0;
                    padding:8px 8px;
                    border-radius:14px;
                    background:rgba(15,23,42,.42);
                  ">
                    <ha-icon icon="${icon}" style="
                      grid-row:1 / span 3;
                      color:${color};
                      width:24px;
                      height:24px;
                      align-self:center;
                    "></ha-icon>

                    <div style="
                      font-size:12px;
                      font-weight:900;
                      line-height:1.05;
                      white-space:nowrap;
                      overflow:hidden;
                      text-overflow:ellipsis;
                    ">${title}</div>

                    <div style="
                      font-size:19px;
                      font-weight:950;
                      line-height:1.05;
                      white-space:nowrap;
                    ">${value}</div>

                    <div style="
                      font-size:10px;
                      opacity:.62;
                      line-height:1.1;
                      white-space:nowrap;
                      overflow:hidden;
                      text-overflow:ellipsis;
                    ">${sub}</div>
                  </div>
                `;

                return `
                  <div style="
                    display:grid;
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                    gap:8px;
                    width:100%;
                  ">
                    ${tile('mdi:thermometer-water', srcColor, 'Mash', fmt(mash), src)}
                    ${tile('mdi:kettle', '#fb923c', 'Wort', fmt(wort), 'Internal')}
                    ${tile('mdi:delta', deltaColor, 'Delta', fmtDelta(delta), 'Mash - Wort')}
                  </div>
                `;
              ]]]
        - type: custom:button-card
          entity: sensor.brewassistant_brewzilla_mash_temperature_source
          icon: mdi:source-branch
          show_icon: true
          show_name: false
          show_state: false
          tap_action:
            action: more-info
          styles:
            card:
              - margin: 0 10px 8px 10px
              - padding: 10px 12px
              - border-radius: 16px
              - background: rgba(255,255,255,.06)
              - color: white
            grid:
              - grid-template-areas: "\"i info\""
              - grid-template-columns: 34px 1fr
              - align-items: center
            icon:
              - width: 22px
              - color: |
                  [[[
                    const src = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state;
                    if (src === 'RAPT BLE Thermometer') return '#38bdf8';
                    if (src === 'BrewZilla Control Device') return '#22d3ee';
                    if (src === 'BrewZilla Internal') return '#fb923c';
                    return 'rgba(255,255,255,.65)';
                  ]]]
            custom_fields:
              info:
                - justify-self: stretch
                - text-align: left
                - font-size: 12px
                - line-height: 1.45
                - white-space: normal
          custom_fields:
            info: |
              [[[
                const mode = states['select.brewassistant_brewzilla_mash_temperature_source']?.state ?? 'Auto';
                const src = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state ?? '—';
                const ent = states['sensor.brewassistant_brewzilla_mash_temperature_source_entity']?.state ?? '—';

                return `
                  <b>Mode:</b> ${mode} · <b>Active:</b> ${src}<br>
                  <span style="opacity:.65;">${ent}</span>
                `;
              ]]]
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_target_temperature
              primary: Target
              secondary: "{{ states(entity) | float(0) | round(1) }} °C"
              icon: mdi:bullseye-arrow
              icon_color: blue
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_power
              primary: Local power
              secondary: >-
                {% if states(entity) in ['unknown', 'unavailable', 'none', '']
                %}
                  — W
                {% else %}
                  {{ states(entity) | float(0) | round(0) }} W
                {% endif %}
              icon: mdi:flash
              icon_color: yellow
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_heat_utilization
              primary: Heat utilization
              secondary: "{{ states(entity) | float(0) | round(0) }} %"
              icon: mdi:fire
              icon_color: deep-orange
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_pump_utilization
              primary: Pump utilization
              secondary: "{{ states(entity) | float(0) | round(0) }} %"
              icon: mdi:pump
              icon_color: cyan
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_device_target_temperature
              primary: Device target
              secondary: "{{ states(entity) | float(0) | round(1) }} °C"
              icon: mdi:target
              icon_color: indigo
            - type: custom:mushroom-template-card
              entity: sensor.brewassistant_brewzilla_runtime_target_temperature
              primary: Runtime target
              secondary: "{{ states(entity) | float(0) | round(1) }} °C"
              icon: mdi:timeline-clock
              icon_color: purple
        - type: custom:button-card
          name: Heater / Pump control
          show_icon: false
          show_state: false
          styles:
            card:
              - padding: 12px
              - border-radius: 20px
              - background: rgba(15,23,42,.68)
              - color: white
            name:
              - justify-self: start
              - font-size: 14px
              - font-weight: 800
        - type: grid
          columns: 2
          square: false
          cards:
            - type: custom:mushroom-template-card
              entity: switch.brewzilla_heater
              primary: Heater
              secondary: "{{ states(entity) }}"
              icon: mdi:fire
              icon_color: >-
                {% if is_state(entity, 'on') %}deep-orange{% else %}grey{% endif
                %}
              tap_action:
                action: call-service
                service: switch.toggle
                target:
                  entity_id: switch.brewzilla_heater
                confirmation:
                  text: Växla BrewZilla heater?
            - type: custom:mushroom-template-card
              entity: switch.brewzilla_pump
              primary: Pump
              secondary: "{{ states(entity) }}"
              icon: mdi:pump
              icon_color: "{% if is_state(entity, 'on') %}cyan{% else %}grey{% endif %}"
              tap_action:
                action: call-service
                service: switch.toggle
                target:
                  entity_id: switch.brewzilla_pump
                confirmation:
                  text: Växla BrewZilla pump?
        - type: custom:button-card
          name: Heat / Pump utilization
          show_icon: false
          show_state: false
          styles:
            card:
              - padding: 12px
              - border-radius: 20px
              - background: rgba(15,23,42,.68)
              - color: white
            name:
              - justify-self: start
              - font-size: 14px
              - font-weight: 800
        - type: grid
          columns: 4
          square: false
          cards:
            - type: custom:button-card
              name: Heat -5
              icon: mdi:minus
              tap_action:
                action: call-service
                service: number.set_value
                target:
                  entity_id: number.brewzilla_heat_utilization
                data:
                  value: >
                    [[[ return Math.max(0,
                    (Number(states['number.brewzilla_heat_utilization']?.state)
                    || 0) - 5); ]]]
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(127,29,29,.28)
                  - color: white
                name:
                  - font-size: 13px
                  - font-weight: 800
                icon:
                  - color: "#fecaca"
            - type: custom:button-card
              name: Heat +5
              icon: mdi:plus
              tap_action:
                action: call-service
                service: number.set_value
                target:
                  entity_id: number.brewzilla_heat_utilization
                data:
                  value: >
                    [[[ return Math.min(100,
                    (Number(states['number.brewzilla_heat_utilization']?.state)
                    || 0) + 5); ]]]
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(194,65,12,.30)
                  - color: white
                name:
                  - font-size: 13px
                  - font-weight: 800
                icon:
                  - color: "#fed7aa"
            - type: custom:button-card
              name: Pump -5
              icon: mdi:minus
              tap_action:
                action: call-service
                service: number.set_value
                target:
                  entity_id: number.brewzilla_pump_utilization
                data:
                  value: >
                    [[[ return Math.max(0,
                    (Number(states['number.brewzilla_pump_utilization']?.state)
                    || 0) - 5); ]]]
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(14,116,144,.24)
                  - color: white
                name:
                  - font-size: 13px
                  - font-weight: 800
                icon:
                  - color: "#cffafe"
            - type: custom:button-card
              name: Pump +5
              icon: mdi:plus
              tap_action:
                action: call-service
                service: number.set_value
                target:
                  entity_id: number.brewzilla_pump_utilization
                data:
                  value: >
                    [[[ return Math.min(100,
                    (Number(states['number.brewzilla_pump_utilization']?.state)
                    || 0) + 5); ]]]
              styles:
                card:
                  - border-radius: 16px
                  - padding: 12px
                  - background: rgba(8,145,178,.30)
                  - color: white
                name:
                  - font-size: 13px
                  - font-weight: 800
                icon:
                  - color: "#a5f3fc"
        - type: custom:mushroom-chips-card
          chips:
            - type: entity
              entity: sensor.brewassistant_brewzilla_orchestration_mode
              icon: mdi:robot
            - type: entity
              entity: sensor.brewassistant_brewzilla_energy_session
              icon: mdi:lightning-bolt
            - type: entity
              entity: sensor.brewassistant_brewzilla_energy_cost_session
              icon: mdi:cash
        - type: custom:expander-card
          title: Telemetry freshness
          padding: 0
          clear: false
          cards:
            - type: markdown
              content: >-
                {% set local =
                state_attr('sensor.brewassistant_brewzilla_orchestration_mode',
                'brewzilla_local_power_age_seconds') %} {% set control =
                state_attr('sensor.brewassistant_brewzilla_orchestration_mode',
                'brewzilla_rapt_control_age_seconds') %} {% set config =
                state_attr('sensor.brewassistant_brewzilla_orchestration_mode',
                'brewzilla_rapt_config_age_seconds') %} **Local/Shelly power:**
                {{ local if local is not none else '—' }} s   **RAPT control
                temp/target:** {{ control if control is not none else '—' }} s  
                **RAPT config heat/pump:** {{ config if config is not none else
                '—' }} s
            - type: entities
              title: Source diagnostics
              entities:
                - entity: sensor.brewassistant_brewzilla_connection_state
                - entity: sensor.brewassistant_brewzilla_runtime_summary
                - entity: sensor.brewassistant_brewzilla_control_reason
                - entity: sensor.brewassistant_brewzilla_power
                - entity: sensor.brewassistant_brewzilla_energy_power
                - entity: select.brewassistant_brewzilla_mash_temperature_source
                - entity: sensor.brewassistant_brewzilla_mash_temperature
                - entity: sensor.brewassistant_brewzilla_wort_temperature
                - entity: sensor.brewassistant_brewzilla_temperature_delta_mash_wort
                - entity: sensor.brewassistant_brewzilla_mash_temperature_source
                - entity: >-
                    sensor.brewassistant_brewzilla_mash_temperature_source_entity
