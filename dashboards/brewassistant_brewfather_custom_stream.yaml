            - text-align: left
            - font-size: 12px
            - line-height: 1.35
            - color: rgba(255,255,255,0.68)
            - white-space: normal
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.yellow_pill_gravity_2
            primary: SG
            secondary: "{{ states(entity) }}"
