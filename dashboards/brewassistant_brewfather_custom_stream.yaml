            icon_color: purple
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
          - type: custom:mushroom-template-card
            entity: sensor.yellow_pill_temperature
            primary: Pill Temp
            secondary: "{{ states(entity) }} °C"
            icon: mdi:thermometer-water
            icon_color: blue
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
          - type: custom:mushroom-template-card
            entity: sensor.kyl_temperatur_4
