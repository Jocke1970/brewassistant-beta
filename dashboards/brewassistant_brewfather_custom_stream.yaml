type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_custom_stream_rapt_pill_status
    name: Brewfather Custom Stream
    icon: mdi:cloud-upload
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    label: |
      [[[
        const master = states['input_boolean.brewassistant_custom_stream_enabled']?.state === 'on';
        const pillReady = states['binary_sensor.brewassistant_custom_stream_rapt_pill_ready']?.state === 'on';
        const envReady = states['binary_sensor.brewassistant_custom_stream_environment_ready']?.state === 'on';
        const pillStatus = states['sensor.brewassistant_custom_stream_rapt_pill_status']?.state || 'Unknown';
        const envStatus = states['sensor.brewassistant_custom_stream_environment_status']?.state || 'Unknown';

        if (!master) return 'Stream disabled · Brewfather logging paused';

        if (pillReady && envReady)
          return 'Online · Pill ready · Environment ready · 15 min interval';

        if (pillReady && !envReady)
          return `Partial · Pill ready · Environment: ${envStatus}`;

        if (!pillReady && envReady)
          return `Partial · Pill: ${pillStatus} · Environment ready`;

        return `Not ready · Pill: ${pillStatus} · Environment: ${envStatus}`;
      ]]]
    custom_fields:
      power:
        card:
          type: custom:button-card
          entity: input_boolean.brewassistant_custom_stream_enabled
          show_name: false
          show_state: false
          show_icon: true
          icon: mdi:power
          tap_action:
            action: toggle
          styles:
            card:
              - width: 38px
              - height: 38px
              - border-radius: 50%
              - padding: 0
              - background: |
                  [[[
                    return entity.state === 'on'
                      ? 'rgba(129,199,132,0.30)'
                      : 'rgba(244,67,54,0.22)';
                  ]]]
              - border: |
                  [[[
                    return entity.state === 'on'
                      ? '1px solid rgba(129,199,132,0.55)'
                      : '1px solid rgba(244,67,54,0.45)';
                  ]]]
              - box-shadow: none
            icon:
              - width: 20px
              - color: |
                  [[[
                    return entity.state === 'on'
                      ? 'rgba(200,255,210,1)'
                      : 'rgba(255,170,170,1)';
                  ]]]
      statusdot: |
        [[[
          const master = states['input_boolean.brewassistant_custom_stream_enabled']?.state === 'on';
          const pillReady = states['binary_sensor.brewassistant_custom_stream_rapt_pill_ready']?.state === 'on';
          const envReady = states['binary_sensor.brewassistant_custom_stream_environment_ready']?.state === 'on';

          let color = 'rgba(244,67,54,0.95)';
          let text = 'OFF';

          if (master && pillReady && envReady) {
            color = 'rgba(129,199,132,0.95)';
            text = 'LIVE';
          } else if (master && (pillReady || envReady)) {
            color = 'rgba(255,193,7,0.95)';
            text = 'PARTIAL';
          }

          return `
            <div style="
              display:flex;
              align-items:center;
              gap:7px;
              justify-content:flex-end;
              font-size:11px;
              font-weight:800;
              letter-spacing:.9px;
              color:${color};
            ">
              <span style="
                width:9px;
                height:9px;
                border-radius:50%;
                background:${color};
                box-shadow:0 0 12px ${color};
                display:inline-block;
              "></span>
              ${text}
            </div>
          `;
        ]]]
    styles:
      grid:
        - grid-template-areas: "\"i n power\" \"i l power\" \"i statusdot power\""
        - grid-template-columns: 48px 1fr 44px
        - grid-template-rows: min-content min-content min-content
        - column-gap: 12px
      card:
        - border-radius: 24px
        - padding: 18px
        - overflow: hidden
        - background: |
            [[[
              const master = states['input_boolean.brewassistant_custom_stream_enabled']?.state === 'on';
              const pillReady = states['binary_sensor.brewassistant_custom_stream_rapt_pill_ready']?.state === 'on';
              const envReady = states['binary_sensor.brewassistant_custom_stream_environment_ready']?.state === 'on';

              if (!master)
                return 'linear-gradient(135deg, rgba(45,45,55,0.95), rgba(20,20,26,0.98))';

              if (pillReady && envReady)
                return 'linear-gradient(135deg, rgba(24,70,55,0.96), rgba(12,32,45,0.98))';

              if (pillReady || envReady)
                return 'linear-gradient(135deg, rgba(88,66,22,0.96), rgba(35,31,23,0.98))';

              return 'linear-gradient(135deg, rgba(82,32,38,0.96), rgba(30,18,24,0.98))';
            ]]]
        - border: 1px solid rgba(255,255,255,0.10)
        - box-shadow: 0 14px 38px rgba(0,0,0,0.35)
      icon:
        - width: 34px
        - color: |
            [[[
              const master = states['input_boolean.brewassistant_custom_stream_enabled']?.state === 'on';
              const pillReady = states['binary_sensor.brewassistant_custom_stream_rapt_pill_ready']?.state === 'on';
              const envReady = states['binary_sensor.brewassistant_custom_stream_environment_ready']?.state === 'on';

              if (!master) return 'rgba(210,210,220,0.65)';
              if (pillReady && envReady) return 'rgba(170,255,210,1)';
              if (pillReady || envReady) return 'rgba(255,220,140,1)';
              return 'rgba(255,160,160,1)';
            ]]]
      name:
        - align-self: end
        - justify-self: start
        - font-size: 18px
        - font-weight: 800
        - letter-spacing: .2px
        - color: rgba(255,255,255,0.96)
      label:
        - justify-self: start
        - text-align: left
        - font-size: 12px
        - line-height: 1.35
        - color: rgba(255,255,255,0.72)
        - white-space: normal
      custom_fields:
        power:
          - align-self: start
          - justify-self: end
        statusdot:
          - align-self: end
          - justify-self: end
          - padding-top: 4px
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        entity: binary_sensor.brewassistant_custom_stream_rapt_pill_ready
        primary: RAPT Pill Stream
        secondary: >-
          {% set status =
          states('sensor.brewassistant_custom_stream_rapt_pill_status') %} {%
          set sg =
          state_attr('sensor.brewassistant_custom_stream_rapt_pill_status',
          'pill_sg') %} {% set temp =
          state_attr('sensor.brewassistant_custom_stream_rapt_pill_status',
          'pill_temp') %} {{ status }} · SG {{ sg }} · {{ temp }} °C
        icon: mdi:pill
        icon_color: >-
          {% if is_state(entity, 'on') %}
            green
          {% elif is_state('input_boolean.brewassistant_custom_stream_enabled',
          'on') %}
            amber
          {% else %}
            grey
          {% endif %}
        multiline_secondary: true
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
      - type: custom:mushroom-template-card
        entity: binary_sensor.brewassistant_custom_stream_environment_ready
        primary: Environment Stream
        secondary: >-
          {% set status =
          states('sensor.brewassistant_custom_stream_environment_status') %} {%
          set keg =
          state_attr('sensor.brewassistant_custom_stream_environment_status',
          'kegerator_temp') %} {% set room =
          state_attr('sensor.brewassistant_custom_stream_environment_status',
          'brewing_space_temp') %} {{ status }} · Keg {{ keg }} °C · Room {{
          room }} °C
        icon: mdi:fridge-outline
        icon_color: >-
          {% if is_state(entity, 'on') %}
            green
          {% elif is_state('input_boolean.brewassistant_custom_stream_enabled',
          'on') %}
            amber
          {% else %}
            grey
          {% endif %}
        multiline_secondary: true
        tap_action:
          action: more-info
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background: rgba(255,255,255,0.045);
              border: 1px solid rgba(255,255,255,0.07);
              box-shadow: none;
            }
  - type: custom:vertical-stack-in-card
    cards:
      - type: custom:button-card
