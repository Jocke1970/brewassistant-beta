            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
          - type: custom:mushroom-template-card
            entity: sensor.brewingspace_temperature
            primary: Brew Room
            secondary: "{{ states(entity) }} °C"
            icon: mdi:home-thermometer-outline
            icon_color: amber
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  border-radius: 16px;
                  background: rgba(255,255,255,0.04);
                  border: 1px solid rgba(255,255,255,0.06);
                  box-shadow: none;
                }
    card_mod:
      style: |
        ha-card {
          margin: 0 8px 8px 8px;
          border-radius: 20px;
          background: rgba(255,255,255,0.035);
          border: 1px solid rgba(255,255,255,0.065);
          box-shadow: none;
          overflow: hidden;
        }
