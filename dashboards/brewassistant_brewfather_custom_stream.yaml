            - color: rgba(255,255,255,0.82)
  - type: custom:expander-card
    title-card:
      type: custom:mushroom-template-card
      primary: Custom Stream Details
      secondary: Devices, stale limit and payload preview
      icon: mdi:tune-variant
      icon_color: blue
      card_mod:
        style: |
          ha-card {
            border-radius: 18px;
