type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    show_label: false
    triggers_update:
      - switch.brewzilla
      - sensor.brewzilla_power
      - sensor.brewassistant_brewzilla_orchestration_mode
      - sensor.brewassistant_brewzilla_connection_state
      - sensor.brewassistant_brewzilla_wort_temperature
      - sensor.brewassistant_brewzilla_requested_target
      - sensor.brewassistant_brewday_runtime_state
      - sensor.brewassistant_brewday_runtime_source
      - sensor.brewassistant_brewday_stage
      - sensor.brewassistant_manual_brewday_summary
      - switch.brewassistant_show_brewday
      - switch.brewassistant_show_manual_brewday
      - switch.brewassistant_show_brewfather_feed
      - switch.brewassistant_show_brewzilla
      - switch.brewassistant_show_brewzilla_learning
      - switch.brewassistant_show_event_log
      - switch.brewassistant_show_source_health
      - switch.brewassistant_show_fermentation
      - switch.brewassistant_show_carbonation
      - switch.brewassistant_show_kegerator
      - switch.brewassistant_kegerator_fan_auto_enabled
      - climate.kegerator_kylskap
      - sensor.kyl_temperatur_4
      - switch.kegerator_fan
      - climate.fermentation_chamber
      - sensor.brewassistant_fermentation_chamber_air_temperature_average
      - sensor.brewassistant_gravity
      - sensor.brewassistant_carbonation_status
      - sensor.brewassistant_carbonation_recommended_pressure_bar
    styles:
      card:
        - border-radius: 20px 20px 8px 8px
        - padding: 14px
        - background: >-
            linear-gradient(135deg, rgba(255,183,77,.13),
            rgba(127,127,127,.035))
        - border: 1px solid rgba(127,127,127,.14)
        - box-shadow: var(--ha-card-box-shadow)
      grid:
        - grid-template-areas: "\"head\" \"summary\" \"source\""
        - grid-template-columns: 1fr
        - row-gap: 9px
      custom_fields:
        head:
          - grid-area: head
        summary:
          - grid-area: summary
        source:
          - grid-area: source
    custom_fields:
      head: |
        [[[ 
          const bzPower = states['switch.brewzilla']?.state ?? 'unknown';
          const bzWatts = states['sensor.brewzilla_power']?.state ?? '—';
          const badgeBg = bzPower === 'on' ? 'rgba(76,175,80,.13)' : 'rgba(127,127,127,.10)';
          const badgeBorder = bzPower === 'on' ? 'rgba(76,175,80,.28)' : 'rgba(127,127,127,.18)';
          const badgeIcon = bzPower === 'on' ? 'mdi:power-plug' : 'mdi:power-plug-off-outline';

          return `
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <div style="min-width:0;">
                <div style="font-size:20px; font-weight:950; line-height:1.05; letter-spacing:-.02em;">
                  BrewAssistant Hub
                </div>
                <div style="font-size:12px; font-weight:750; opacity:.68; margin-top:3px;">
                  Modules · visibility · BrewZilla power
                </div>
              </div>
              <div style="
                border-radius:999px;
                padding:6px 10px;
                border:1px solid ${badgeBorder};
                background:${badgeBg};
                display:flex;
                align-items:center;
                gap:6px;
                font-size:11px;
                font-weight:950;
                white-space:nowrap;
              ">
                <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                BZ ${String(bzPower).toUpperCase()} · ${bzWatts} W
              </div>
            </div>
          `;
        ]]]
      summary: |
        [[[ 
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function num(id) {
            const raw = states[id]?.state;
            const n = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(n) ? n : null;
          }

          function fmt(n, unit = '', d = 1) {
            if (!Number.isFinite(n)) return '—';
            return `${n.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          const bzTemp = num('sensor.brewassistant_brewzilla_wort_temperature') ?? num('sensor.brewzilla_temperature');
          const bzMode = clean(states['sensor.brewassistant_brewzilla_orchestration_mode']?.state) || '—';
          const bzConn = clean(states['sensor.brewassistant_brewzilla_connection_state']?.state) || '—';
          const runtime = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || clean(states['sensor.brewassistant_brewday_stage']?.state) || 'idle';
          const source = clean(states['sensor.brewassistant_brewday_runtime_source']?.state) || '—';

          const fermClimate = clean(states['climate.fermentation_chamber']?.state) || 'off';
          const fermTemp = num('sensor.brewassistant_fermentation_chamber_air_temperature_average');
          const carbStatus = clean(states['sensor.brewassistant_carbonation_status']?.state) || 'Inactive';
          const carbBar = num('sensor.brewassistant_carbonation_recommended_pressure_bar');
          const kegStatus = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status) || clean(states['climate.kegerator_kylskap']?.state) || '—';
          const kegTemp = num('sensor.kyl_temperatur_4');
          const fan = clean(states['switch.kegerator_fan']?.state) || '—';

          return `
            <div style="font-size:12px; font-weight:800; opacity:.76; line-height:1.35;">
              Brewday ${runtime} · ${source}<br>
              BrewZilla ${fmt(bzTemp,'°C')} · ${bzMode} · ${bzConn}<br>
              Fermentation ${fermClimate} · ${fmt(fermTemp,'°C')} · Carbonation ${carbStatus} · ${fmt(carbBar,'bar',2)}<br>
              Kegerator ${fmt(kegTemp,'°C')} · ${kegStatus} · fan ${fan}
            </div>
          `;
        ]]]
      source: |
        [[[ 
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          const runtimeSource = clean(states['sensor.brewassistant_brewday_runtime_source']?.state) || 'Manual / lokal';
          const recipe = clean(states['sensor.brewassistant_runtime_recipe_name']?.state) || clean(states['sensor.brewfather_next_fermentation_step']?.attributes?.recipe_name);
          const hasBrewfather = !!recipe || String(runtimeSource).toLowerCase().includes('brewfather');
          const title = hasBrewfather ? 'Brewfather / Runtime' : 'Brewfather vilande';
          const detail = hasBrewfather ? `${recipe || 'Aktiv källa'} · ${runtimeSource}` : 'Ingen aktiv Brewfather-batch · Manual Brewday kan vara primär controller';
          const bg = hasBrewfather ? 'rgba(33,150,243,.10)' : 'rgba(127,127,127,.055)';
          const border = hasBrewfather ? 'rgba(33,150,243,.22)' : 'rgba(127,127,127,.10)';
          const icon = hasBrewfather ? 'mdi:beer-outline' : 'mdi:cloud-check-outline';

          return `
            <div style="
              display:grid;
              grid-template-columns:22px minmax(0,1fr);
              gap:8px;
              align-items:center;
              border-radius:14px;
              padding:7px 10px;
              background:${bg};
              border:1px solid ${border};
              min-width:0;
            ">
              <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.68;"></ha-icon>
              <div style="min-width:0;display:flex;gap:7px;align-items:baseline;overflow:hidden;">
                <div style="font-size:11px;font-weight:950;line-height:1.1;white-space:nowrap;">${title}</div>
                <div style="font-size:10.5px;font-weight:750;opacity:.62;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${detail}</div>
              </div>
            </div>
          `;
        ]]]
  - type: entities
    title: Modules & Power
    show_header_toggle: false
    entities:
      - entity: switch.brewzilla
        name: BrewZilla Main Power
        icon: mdi:power
      - type: divider
      - entity: switch.brewassistant_show_brewday
        name: Show Brewday Runtime
      - entity: switch.brewassistant_show_manual_brewday
        name: Show Manual Brewday
      - entity: switch.brewassistant_show_brewfather_feed
        name: Show Brewfather Feed
      - entity: switch.brewassistant_show_brewzilla
        name: Show BrewZilla
      - entity: switch.brewassistant_show_brewzilla_learning
        name: Show BrewZilla Learning
      - entity: switch.brewassistant_show_event_log
        name: Show Event Log
      - entity: switch.brewassistant_show_source_health
        name: Show Source Health
      - entity: switch.brewassistant_show_fermentation
        name: Show Fermentation
      - entity: switch.brewassistant_show_carbonation
        name: Show Carbonation
      - entity: switch.brewassistant_show_kegerator
        name: Show Kegerator
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.brewassistant_brewday_runtime_summary
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:calendar-clock
        name: Brewday
        tap_action:
          action: more-info
          entity: sensor.brewassistant_brewday_runtime_summary
        label: |
          [[[ 
            const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state || 'idle';
            const source = states['sensor.brewassistant_brewday_runtime_source']?.state || '—';
            const stage = states['sensor.brewassistant_brewday_stage']?.state || states['sensor.brewassistant_brewday_runtime_stage']?.state || '—';
            const step = states['sensor.brewassistant_brewday_runtime_step']?.state || '—';
            return `${runtime} · ${source}<br>${stage} · ${step}`;
          ]]]
        styles: &module_tile
          card:
            - min-height: 86px
            - padding: 12px
            - border-radius: 16px
            - background: rgba(127,127,127,.07)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 36px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
          name:
            - justify-self: start
            - font-size: 15px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        entity: switch.brewassistant_show_manual_brewday
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:hand-back-right-outline
        name: Manual Brewday
        tap_action:
          action: more-info
          entity: switch.brewassistant_show_manual_brewday
        label: |
          [[[ 
            const state = states['sensor.brewassistant_manual_brewday_status']?.state || states['sensor.brewassistant_brewday_runtime_state']?.state || '—';
            const stage = states['sensor.brewassistant_manual_brewday_stage']?.state || states['sensor.brewassistant_brewday_runtime_stage']?.state || '—';
            const visible = states['switch.brewassistant_show_manual_brewday']?.state || '—';
            return `${state} · ${stage}<br>visibility ${visible}`;
          ]]]
        styles: *module_tile
      - type: custom:button-card
        entity: sensor.brewassistant_brewzilla_orchestration_mode
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:kettle-steam-outline
        name: BrewZilla
        tap_action:
          action: more-info
          entity: sensor.brewassistant_brewzilla_orchestration_mode
        label: |
          [[[ 
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state || '—';
            const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state || '—';
            const temp = num('sensor.brewassistant_brewzilla_wort_temperature') ?? num('sensor.brewzilla_temperature');
            const target = num('sensor.brewassistant_brewzilla_requested_target');
            return `${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} → ${Number.isFinite(target) ? target.toFixed(1) + ' °C' : '—'}<br>${mode} · ${conn}`;
          ]]]
        styles: *module_tile
      - type: custom:button-card
        entity: climate.fermentation_chamber
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:beer-outline
        name: Fermentation
        tap_action:
          action: more-info
          entity: climate.fermentation_chamber
        label: |
          [[[ 
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const climate = states['climate.fermentation_chamber']?.state || '—';
            const chamber = num('sensor.brewassistant_fermentation_chamber_air_temperature_average');
            const sgRaw = num('sensor.brewassistant_gravity');
            const sg = Number.isFinite(sgRaw) && sgRaw > 0.95 && sgRaw < 1.2 ? sgRaw.toFixed(3) : '—';
            return `${climate} · ${Number.isFinite(chamber) ? chamber.toFixed(1) + ' °C' : '—'}<br>SG ${sg}`;
          ]]]
        styles: *module_tile
      - type: custom:button-card
        entity: sensor.brewassistant_carbonation_status
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:chart-bubble
        name: Carbonation
        tap_action:
          action: more-info
          entity: sensor.brewassistant_carbonation_status
        label: |
          [[[ 
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const status = states['sensor.brewassistant_carbonation_status']?.state || 'Inactive';
            const target = num('sensor.brewassistant_carbonation_target_volumes');
            const bar = num('sensor.brewassistant_carbonation_recommended_pressure_bar');
            return `${status}<br>${Number.isFinite(target) ? target.toFixed(2) + ' vol' : '—'} · ${Number.isFinite(bar) ? bar.toFixed(2) + ' bar' : '—'}`;
          ]]]
        styles: *module_tile
      - type: custom:button-card
        entity: switch.brewassistant_kegerator_fan_auto_enabled
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:snowflake
        name: Kegerator
        tap_action:
          action: more-info
          entity: switch.brewassistant_kegerator_fan_auto_enabled
        label: |
          [[[ 
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const temp = num('sensor.kyl_temperatur_4');
            const climate = states['climate.kegerator_kylskap']?.state || '—';
            const fan = states['switch.kegerator_fan']?.state || '—';
            const status = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status || '—';
            return `${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} · ${climate}<br>fan ${fan} · ${status}`;
          ]]]
        styles: *module_tile
  - type: custom:button-card
    show_icon: true
    show_name: true
    show_label: true
    icon: mdi:information-outline
    name: Nästa naturliga steg
    label: |
      [[[ 
        function clean(v) {
          if (v === undefined || v === null) return null;
          const s = String(v);
          return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
        }
        const carb = clean(states['sensor.brewassistant_carbonation_status']?.state) || 'Inactive';
        const ferm = clean(states['climate.fermentation_chamber']?.state) || 'off';
        const brewday = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || 'idle';
        const bzPower = clean(states['switch.brewzilla']?.state) || 'unknown';
        const fanReason = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.fan_reason);

        if (brewday !== 'idle' && brewday !== 'completed') return `Brewday är aktiv · följ Runtime, BrewZilla och Event Log.`;
        if (bzPower === 'on') return 'BrewZilla är på · kontrollera att heater/pump är i rätt läge innan du lämnar den.';
        if (carb === 'Ready to serve') return 'Carbonation är klar · dags att servera eller flytta till lagring.';
        if (ferm !== 'off') return 'Fermentation chamber är aktiv · följ chamber temp, SG och klimatlogik.';
        if (fanReason) return `Kegerator fan-logik: ${fanReason}.`;
        return 'Allt ser lugnt ut · slå på moduler i Hub när du vill visa mer detaljer.';
      ]]]
    tap_action:
      action: none
    styles:
      card:
        - margin-top: 4px
        - border-radius: 8px 8px 18px 18px
        - padding: 10px 12px
        - background: rgba(127,127,127,.06)
        - border: 1px solid rgba(127,127,127,.12)
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 30px minmax(0,1fr)
        - column-gap: 8px
      icon:
        - width: 18px
        - opacity: 0.72
      name:
        - justify-self: start
        - font-size: 13px
        - font-weight: 950
      label:
        - justify-self: start
        - text-align: left
        - white-space: normal
        - font-size: 11.5px
        - font-weight: 750
        - opacity: 0.72
