type: horizontal-stack
cards:
  - type: custom:button-card
    entity: switch.brewassistant_show_brewzilla_learning
    name: Advice
    icon: mdi:brain
    show_state: false
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    styles:
      card:
        - border-radius: 999px
        - padding: 8px 10px
        - background: |
            [[[
              const on = states['switch.brewassistant_show_brewzilla_learning']?.state === 'on';
              return on ? 'rgba(255,193,7,.14)' : 'rgba(127,127,127,.07)';
            ]]]
        - border: |
            [[[
              const on = states['switch.brewassistant_show_brewzilla_learning']?.state === 'on';
              return on ? '1px solid rgba(255,193,7,.30)' : '1px solid rgba(127,127,127,.15)';
            ]]]
      name:
        - font-size: 11px
        - font-weight: 950
      icon:
        - width: 18px
        - height: 18px
  - type: custom:button-card
    entity: switch.brewassistant_show_brewzilla_safety_rcl
    name: Safety/RCL
    icon: mdi:shield-alert-outline
    show_state: false
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    styles:
      card:
        - border-radius: 999px
        - padding: 8px 10px
        - background: |
            [[[
              const on = states['switch.brewassistant_show_brewzilla_safety_rcl']?.state === 'on';
              return on ? 'rgba(244,67,54,.14)' : 'rgba(127,127,127,.07)';
            ]]]
        - border: |
            [[[
              const on = states['switch.brewassistant_show_brewzilla_safety_rcl']?.state === 'on';
              return on ? '1px solid rgba(244,67,54,.30)' : '1px solid rgba(127,127,127,.15)';
            ]]]
      name:
        - font-size: 11px
        - font-weight: 950
      icon:
        - width: 18px
        - height: 18px
