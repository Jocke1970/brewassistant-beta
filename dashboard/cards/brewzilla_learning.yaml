type: conditional
conditions:
  - entity: sensor.brewassistant_brewday_runtime_state
    state_not: idle
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: sensor.brewassistant_brewzilla_learning_status
      name: Brewday Advice
      icon: |
        [[[
          const status = states['sensor.brewassistant_brewzilla_learning_status']?.state ?? 'unknown';
          const rec = states['sensor.brewassistant_brewzilla_learning_recommendation_state']?.state ?? 'none';
          const risk = states['sensor.brewassistant_brewzilla_overshoot_risk']?.state ?? 'unknown';

          if (rec === 'pending') return 'mdi:lightbulb-alert-outline';
          if (risk === 'high' || risk === 'active_overshoot') return 'mdi:thermometer-alert';
          if (status === 'observing') return 'mdi:school-outline';
          return 'mdi:brain';
        ]]]
      show_state: false
      show_label: true
      tap_action:
        action: more-info
      hold_action:
        action: more-info
      label: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function n(id) {
            const raw = states[id]?.state;
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function fmt(v, unit = '', d = 1) {
            if (!Number.isFinite(v)) return '—';
            return `${v.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          function shortText(v, max = 38) {
            const s = String(v ?? '—');
            return s.length > max ? s.slice(0, max - 1) + '…' : s;
          }

          const status = clean(states['sensor.brewassistant_brewzilla_learning_status']?.state) || 'offline';
          const recState = clean(states['sensor.brewassistant_brewzilla_learning_recommendation_state']?.state) || 'none';
          const recKind = clean(states['sensor.brewassistant_brewzilla_learning_recommendation_kind']?.state) || '—';
          const recReason = clean(states['sensor.brewassistant_brewzilla_learning_recommendation_reason']?.state) || 'No actionable recommendation right now.';
          const phase = clean(states['sensor.brewassistant_brewzilla_learning_phase']?.state) || '—';
          const confidence = clean(states['sensor.brewassistant_brewzilla_learning_confidence']?.state) || '—';
          const stage = clean(states['sensor.brewassistant_brewzilla_stage_kind']?.state) || '—';
          const risk = clean(states['sensor.brewassistant_brewzilla_overshoot_risk']?.state) || 'unknown';

          const context = clean(states['select.brewassistant_brewzilla_learning_context']?.state) || 'Unknown';
          const source = clean(states['sensor.brewassistant_brewzilla_learning_temperature_source']?.state) || '—';
          const role = clean(states['sensor.brewassistant_brewzilla_learning_temperature_role']?.state) || '—';

          const mash = n('sensor.brewassistant_brewzilla_mash_temperature');
          const wort = n('sensor.brewassistant_brewzilla_wort_temperature');
          const delta = n('sensor.brewassistant_brewzilla_temperature_delta_mash_wort');
          const learningTemp = n('sensor.brewassistant_brewzilla_learning_temperature');
          const rateMin = n('sensor.brewassistant_brewzilla_temp_rate');
          const targetDelta = n('sensor.brewassistant_brewzilla_delta_to_target');

          const currentValue = n('sensor.brewassistant_brewzilla_learning_recommendation_current_value');
          const recommendedValue = n('sensor.brewassistant_brewzilla_learning_recommendation_recommended_value');
          const suggestedHeat = n('sensor.brewassistant_brewzilla_suggested_heat_utilization');
          const heatAdjustment = n('sensor.brewassistant_brewzilla_heat_adjustment');

          let headline = 'Observerar';
          let badge = 'Observing';
          let badgeIcon = 'mdi:school-outline';
          let chipBg = 'rgba(76,175,80,.12)';
          let chipBorder = 'rgba(76,175,80,.24)';

          if (status === 'pending' || recState === 'pending') {
            headline = 'Rekommendation väntar';
            badge = 'Pending';
            badgeIcon = 'mdi:lightbulb-alert-outline';
            chipBg = 'rgba(255,193,7,.14)';
            chipBorder = 'rgba(255,193,7,.28)';
          } else if (risk === 'high' || risk === 'active_overshoot') {
            headline = 'Overshoot-risk';
            badge = 'Risk';
            badgeIcon = 'mdi:thermometer-alert';
            chipBg = 'rgba(244,67,54,.12)';
            chipBorder = 'rgba(244,67,54,.26)';
          } else if (status === 'offline' || status === 'unavailable') {
            headline = 'Väntar på data';
            badge = 'Offline';
            badgeIcon = 'mdi:cloud-question-outline';
            chipBg = 'rgba(127,127,127,.12)';
            chipBorder = 'rgba(127,127,127,.20)';
          }

          const reasonLine = recState === 'pending'
            ? `${recKind} · ${fmt(currentValue, '%', 0)} → ${fmt(recommendedValue, '%', 0)}`
            : shortText(recReason, 72);

          const metric = (title, main, sub, icon, kind = 'neutral') => {
            const bg =
              kind === 'blue' ? 'rgba(33,150,243,.09)' :
              kind === 'cyan' ? 'rgba(0,188,212,.10)' :
              kind === 'green' ? 'rgba(76,175,80,.11)' :
              kind === 'yellow' ? 'rgba(255,193,7,.13)' :
              kind === 'red' ? 'rgba(244,67,54,.11)' :
              'rgba(127,127,127,.08)';
            const border =
              kind === 'blue' ? 'rgba(33,150,243,.20)' :
              kind === 'cyan' ? 'rgba(0,188,212,.22)' :
              kind === 'green' ? 'rgba(76,175,80,.24)' :
              kind === 'yellow' ? 'rgba(255,193,7,.26)' :
              kind === 'red' ? 'rgba(244,67,54,.24)' :
              'rgba(127,127,127,.14)';
            return `
              <div style="
                min-width:0;
                border-radius:13px;
                padding:7px 6px;
                background:${bg};
                border:1px solid ${border};
                display:grid;
                grid-template-columns:18px minmax(0,1fr);
                gap:5px;
                align-items:center;
              ">
                <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
                <div style="min-width:0;text-align:center;">
                  <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                  <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                  <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                </div>
              </div>
            `;
          };

          const riskKind =
            risk === 'high' || risk === 'active_overshoot' ? 'red' :
            risk === 'medium' ? 'yellow' :
            risk === 'low' ? 'green' : 'neutral';

          const heatKind =
            Number.isFinite(heatAdjustment) && Math.abs(heatAdjustment) >= 20 ? 'yellow' :
            Number.isFinite(heatAdjustment) && Math.abs(heatAdjustment) >= 5 ? 'cyan' :
            'neutral';

          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="min-width:0;">
                  <div style="font-size:12px;font-weight:850;opacity:.66;">Advisory · BrewZilla-specific · APPLY/DENY</div>
                  <div style="font-size:12px;font-weight:850;opacity:.66;">context ${context}</div>
                </div>
                <div style="
                  display:inline-flex;
                  align-items:center;
                  gap:6px;
                  padding:6px 9px;
                  border-radius:999px;
                  background:${chipBg};
                  border:1px solid ${chipBorder};
                  font-size:11px;
                  font-weight:950;
                  white-space:nowrap;
                ">
                  <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                  <span>${badge}</span>
                </div>
              </div>

              <div style="margin-top:8px;text-align:center;">
                <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
                <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                  ${status} · ${phase} · ${stage} · confidence ${confidence}<br>${reasonLine}
                </div>
              </div>

              <div style="
                margin-top:11px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Mash', fmt(mash, '°C'), 'mash', 'mdi:thermometer-lines', 'blue')}
                ${metric('Wort', fmt(wort, '°C'), 'kettle', 'mdi:kettle-steam-outline', 'cyan')}
                ${metric('Δ M/W', fmt(delta, '°C'), 'diff', 'mdi:delta', Number.isFinite(delta) && Math.abs(delta) > 1.0 ? 'yellow' : 'green')}
                ${metric('Rate', fmt(rateMin, '°C/min', 2), 'trend', 'mdi:chart-line', Number.isFinite(rateMin) && rateMin > 0.8 ? 'yellow' : 'neutral')}
              </div>

              <div style="
                margin-top:7px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Advice', fmt(learningTemp, '°C'), source, 'mdi:brain', 'blue')}
                ${metric('Target Δ', fmt(targetDelta, '°C'), role, 'mdi:target', Number.isFinite(targetDelta) && targetDelta < -0.3 ? 'red' : 'neutral')}
                ${metric('Heat', fmt(suggestedHeat, '%', 0), Number.isFinite(heatAdjustment) ? `${heatAdjustment >= 0 ? '+' : ''}${heatAdjustment.toFixed(0)} %` : '—', 'mdi:fire', heatKind)}
                ${metric('Risk', risk, confidence, 'mdi:alert-outline', riskKind)}
              </div>

              <div style="
                margin-top:10px;
                display:grid;
                grid-template-columns:20px minmax(0,1fr);
                gap:7px;
                align-items:center;
                border-radius:14px;
                padding:8px 9px;
                background:${recState === 'pending' ? 'rgba(255,193,7,.12)' : 'rgba(76,175,80,.10)'};
                border:1px solid ${recState === 'pending' ? 'rgba(255,193,7,.28)' : 'rgba(76,175,80,.24)'};
              ">
                <ha-icon icon="${recState === 'pending' ? 'mdi:lightbulb-alert-outline' : 'mdi:check-circle-outline'}" style="width:15px;height:15px;opacity:.76;"></ha-icon>
                <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                  ${shortText(recReason, 115)}
                </div>
              </div>
            </div>
          `;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - overflow: hidden
          - background: >-
              linear-gradient(135deg, rgba(255,193,7,.10),
              rgba(127,127,127,.035))
          - border: 1px solid rgba(255,193,7,.20)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px minmax(0,1fr)
          - grid-template-rows: min-content min-content
          - column-gap: 12px
        icon:
          - width: 27px
          - height: 27px
        img_cell:
          - width: 42px
          - height: 42px
          - border-radius: 50%
          - background: rgba(255,193,7,.15)
          - color: rgb(255,193,7)
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 950
          - letter-spacing: "-.02em"
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
          - margin-top: 4px
    - type: horizontal-stack
      cards:
        - type: custom:button-card
          entity: button.brewassistant_brewzilla_learning_apply
          name: APPLY
          icon: mdi:check-decagram
          tap_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.brewassistant_brewzilla_learning_apply
            confirmation:
              text: Apply current Brewday Advice recommendation?
          styles:
            card:
              - border-radius: 16px
              - padding: 10px
              - background: rgba(76,175,80,.10)
              - border: 1px solid rgba(76,175,80,.24)
            name:
              - font-size: 12px
              - font-weight: 950
        - type: custom:button-card
          entity: button.brewassistant_brewzilla_learning_deny
          name: DENY
          icon: mdi:close-octagon
          tap_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.brewassistant_brewzilla_learning_deny
            confirmation:
              text: Deny and snooze current Brewday Advice recommendation?
          styles:
            card:
              - border-radius: 16px
              - padding: 10px
              - background: rgba(244,67,54,.09)
              - border: 1px solid rgba(244,67,54,.22)
            name:
              - font-size: 12px
              - font-weight: 950
    - type: custom:expander-card
      title-card:
        type: custom:button-card
        entity: sensor.brewassistant_brewzilla_learning_status
        name: Brewday Advice detaljer
        icon: mdi:tune-variant
        show_state: false
        show_label: true
        label: |
          [[[
            const status = states['sensor.brewassistant_brewzilla_learning_status']?.state ?? '—';
            const rec = states['sensor.brewassistant_brewzilla_learning_recommendation_state']?.state ?? '—';
            const kind = states['sensor.brewassistant_brewzilla_learning_recommendation_kind']?.state ?? '—';
            const risk = states['sensor.brewassistant_brewzilla_overshoot_risk']?.state ?? '—';
            const confidence = states['sensor.brewassistant_brewzilla_learning_confidence']?.state ?? '—';
            return `${status} · recommendation ${rec} · ${kind} · risk ${risk} · ${confidence}`;
          ]]]
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(127,127,127,.055)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - height: 22px
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      cards:
        - type: entities
          show_header_toggle: false
          entities:
            - entity: select.brewassistant_brewzilla_learning_context
              name: Advice context
            - entity: select.brewassistant_brewzilla_mash_temperature_source
              name: Mash temperature source
            - entity: sensor.brewassistant_brewzilla_learning_status
              name: Status
            - entity: sensor.brewassistant_brewzilla_learning_recommendation_state
              name: Recommendation state
            - entity: sensor.brewassistant_brewzilla_learning_recommendation_kind
              name: Recommendation kind
            - entity: >-
                sensor.brewassistant_brewzilla_learning_recommendation_current_value
              name: Current value
            - entity: >-
                sensor.brewassistant_brewzilla_learning_recommendation_recommended_value
              name: Recommended value
            - entity: sensor.brewassistant_brewzilla_learning_recommendation_reason
              name: Reason
            - entity: sensor.brewassistant_brewzilla_stage_kind
              name: Stage kind
            - entity: sensor.brewassistant_brewzilla_learning_temperature_source
              name: Advice temp source
            - entity: sensor.brewassistant_brewzilla_learning_temperature_role
              name: Advice temp role
            - entity: sensor.brewassistant_brewzilla_heat_strategy_reason
              name: Heat strategy reason
