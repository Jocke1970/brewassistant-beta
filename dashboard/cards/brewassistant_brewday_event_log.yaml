type: conditional
conditions:
  - entity: switch.brewassistant_show_event_log
    state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: sensor.brewassistant_brewday_event_log_summary
      name: Brewday Event Log
      icon: |
        [[[
          const count = Number(states['sensor.brewassistant_brewday_event_log_event_count']?.state);
          const summary = String(states['sensor.brewassistant_brewday_event_log_summary']?.state ?? '').toLowerCase();

          if (summary === 'empty' || !Number.isFinite(count) || count === 0) return 'mdi:clipboard-text-outline';
          if (summary.includes('record') || summary.includes('running') || summary.includes('active')) return 'mdi:clipboard-pulse-outline';
          return 'mdi:clipboard-text-clock-outline';
        ]]]
      show_state: false
      show_label: true
      tap_action:
        action: more-info
      hold_action:
        action: more-info
      label: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function n(id) {
            const raw = states[id]?.state;
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function short(v, max = 44) {
            const s = String(v ?? '—');
            return s.length > max ? s.slice(0, max - 1) + '…' : s;
          }

          const summary = clean(states['sensor.brewassistant_brewday_event_log_summary']?.state) || 'empty';
          const count = n('sensor.brewassistant_brewday_event_log_event_count') ?? 0;
          const lastEvent = clean(states['sensor.brewassistant_brewday_event_log_last_event']?.state) || '—';
          const lastStep = clean(states['sensor.brewassistant_brewday_event_log_last_step']?.state) || '—';
          const lastTarget = clean(states['sensor.brewassistant_brewday_event_log_last_target']?.state) || '—';

          const runtime = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || 'idle';
          const stage = clean(states['sensor.brewassistant_brewday_runtime_stage']?.state) || '—';
          const step = clean(states['sensor.brewassistant_brewday_runtime_step']?.state) || '—';

          let headline = 'Loggen är tom';
          let badge = 'Empty';
          let badgeIcon = 'mdi:clipboard-text-outline';
          let chipBg = 'rgba(127,127,127,.12)';
          let chipBorder = 'rgba(127,127,127,.20)';

          if (count > 0) {
            headline = 'Event log aktiv';
            badge = `${count} events`;
            badgeIcon = 'mdi:clipboard-text-clock-outline';
            chipBg = 'rgba(76,175,80,.12)';
            chipBorder = 'rgba(76,175,80,.24)';
          }

          if (runtime !== 'idle' && count > 0) {
            headline = 'Brygglogg kör';
            badge = 'Brewday';
            badgeIcon = 'mdi:clipboard-pulse-outline';
            chipBg = 'rgba(33,150,243,.12)';
            chipBorder = 'rgba(33,150,243,.24)';
          }

          const metric = (title, main, sub, icon, kind = 'neutral') => {
            const bg =
              kind === 'blue' ? 'rgba(33,150,243,.09)' :
              kind === 'cyan' ? 'rgba(0,188,212,.10)' :
              kind === 'green' ? 'rgba(76,175,80,.11)' :
              kind === 'yellow' ? 'rgba(255,193,7,.13)' :
              kind === 'red' ? 'rgba(244,67,54,.11)' :
              'rgba(127,127,127,.08)';
            const border =
              kind === 'blue' ? 'rgba(33,150,243,.20)' :
              kind === 'cyan' ? 'rgba(0,188,212,.22)' :
              kind === 'green' ? 'rgba(76,175,80,.24)' :
              kind === 'yellow' ? 'rgba(255,193,7,.26)' :
              kind === 'red' ? 'rgba(244,67,54,.24)' :
              'rgba(127,127,127,.14)';
            return `
              <div style="
                min-width:0;
                border-radius:13px;
                padding:7px 6px;
                background:${bg};
                border:1px solid ${border};
                display:grid;
                grid-template-columns:18px minmax(0,1fr);
                gap:5px;
                align-items:center;
              ">
                <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
                <div style="min-width:0;text-align:center;">
                  <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                  <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                  <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                </div>
              </div>
            `;
          };

          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="min-width:0;">
                  <div style="font-size:12px;font-weight:850;opacity:.66;">Brewday audit/event backend · snapshots</div>
                  <div style="font-size:12px;font-weight:850;opacity:.66;">${short(summary, 62)}</div>
                </div>
                <div style="
                  display:inline-flex;
                  align-items:center;
                  gap:6px;
                  padding:6px 9px;
                  border-radius:999px;
                  background:${chipBg};
                  border:1px solid ${chipBorder};
                  font-size:11px;
                  font-weight:950;
                  white-space:nowrap;
                ">
                  <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                  <span>${badge}</span>
                </div>
              </div>

              <div style="margin-top:8px;text-align:center;">
                <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
                <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                  ${runtime} · ${stage} · ${short(step, 54)}<br>last: ${short(lastEvent, 62)}
                </div>
              </div>

              <div style="
                margin-top:11px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Events', String(count), summary, 'mdi:counter', count > 0 ? 'green' : 'neutral')}
                ${metric('Last', short(lastEvent, 14), 'event', 'mdi:history', 'blue')}
                ${metric('Step', short(lastStep, 14), 'last step', 'mdi:format-list-checks', 'cyan')}
                ${metric('Target', short(lastTarget, 14), 'last target', 'mdi:target', 'neutral')}
              </div>

              <div style="
                margin-top:10px;
                display:grid;
                grid-template-columns:20px minmax(0,1fr);
                gap:7px;
                align-items:center;
                border-radius:14px;
                padding:8px 9px;
                background:${count > 0 ? 'rgba(76,175,80,.10)' : 'rgba(127,127,127,.08)'};
                border:1px solid ${count > 0 ? 'rgba(76,175,80,.24)' : 'rgba(127,127,127,.14)'};
              ">
                <ha-icon icon="${count > 0 ? 'mdi:check-circle-outline' : 'mdi:information-outline'}" style="width:15px;height:15px;opacity:.76;"></ha-icon>
                <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                  ${count > 0 ? `latest ${short(lastEvent, 42)} · ${short(lastStep, 42)}` : 'Start log when you want a clean Brewday diagnostic timeline.'}
                </div>
              </div>
            </div>
          `;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - overflow: hidden
          - background: linear-gradient(135deg, rgba(76,175,80,.10), rgba(127,127,127,.035))
          - border: 1px solid rgba(76,175,80,.18)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px minmax(0,1fr)
          - grid-template-rows: min-content min-content
          - column-gap: 12px
        icon:
          - width: 27px
          - height: 27px
        img_cell:
          - width: 42px
          - height: 42px
          - border-radius: 50%
          - background: rgba(76,175,80,.14)
          - color: rgb(76,175,80)
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 950
          - letter-spacing: "-.02em"
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
          - margin-top: 4px
    - type: horizontal-stack
      cards:
        - type: custom:button-card
          name: Start log
          icon: mdi:record-rec
          tap_action:
            action: call-service
            service: brewassistant.brewday_audit_start
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(76,175,80,.10)
              - border: 1px solid rgba(76,175,80,.24)
            icon:
              - width: 22px
              - height: 22px
              - color: rgb(76,175,80)
            name:
              - font-size: 11px
              - font-weight: 950
        - type: custom:button-card
          name: Snapshot
          icon: mdi:camera-outline
          tap_action:
            action: call-service
            service: brewassistant.brewday_audit_snapshot
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(33,150,243,.09)
              - border: 1px solid rgba(33,150,243,.22)
            icon:
              - width: 22px
              - height: 22px
              - color: rgb(33,150,243)
            name:
              - font-size: 11px
              - font-weight: 950
    - type: horizontal-stack
      cards:
        - type: custom:button-card
          name: Stop log
          icon: mdi:stop-circle-outline
          tap_action:
            action: call-service
            service: brewassistant.brewday_audit_stop
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(255,193,7,.11)
              - border: 1px solid rgba(255,193,7,.25)
            icon:
              - width: 22px
              - height: 22px
              - color: rgb(255,193,7)
            name:
              - font-size: 11px
              - font-weight: 950
        - type: custom:button-card
          name: Clear
          icon: mdi:trash-can-outline
          tap_action:
            action: call-service
            service: brewassistant.brewday_audit_clear
            confirmation:
              text: Clear Brewday Event Log?
          styles:
            card:
              - border-radius: 15px
              - padding: 9px 7px
              - min-height: 54px
              - background: rgba(244,67,54,.09)
              - border: 1px solid rgba(244,67,54,.22)
            icon:
              - width: 22px
              - height: 22px
              - color: rgb(244,67,54)
            name:
              - font-size: 11px
              - font-weight: 950
    - type: custom:expander-card
      title-card:
        type: custom:button-card
        entity: sensor.brewassistant_brewday_event_log_summary
        name: Event Log detaljer
        icon: mdi:tune-variant
        show_state: false
        show_label: true
        label: |
          [[[
            const summary = states['sensor.brewassistant_brewday_event_log_summary']?.state ?? 'empty';
            const count = states['sensor.brewassistant_brewday_event_log_event_count']?.state ?? '0';
            const last = states['sensor.brewassistant_brewday_event_log_last_event']?.state ?? '—';
            return `${summary} · events ${count} · last ${last}`;
          ]]]
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(127,127,127,.055)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - height: 22px
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      cards:
        - type: entities
          show_header_toggle: false
          entities:
            - entity: sensor.brewassistant_brewday_event_log_summary
              name: Event log summary
            - entity: sensor.brewassistant_brewday_event_log_event_count
              name: Event count
            - entity: sensor.brewassistant_brewday_event_log_last_event
              name: Last event
            - entity: sensor.brewassistant_brewday_event_log_last_step
              name: Last step
            - entity: sensor.brewassistant_brewday_event_log_last_target
              name: Last target
