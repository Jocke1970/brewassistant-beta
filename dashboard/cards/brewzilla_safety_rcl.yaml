type: custom:button-card
entity: sensor.brewassistant_brewzilla_safety_state
name: Safety / RCL
icon: mdi:shield-alert-outline
show_state: false
show_label: true
triggers_update:
  - switch.brewassistant_show_brewzilla_safety_rcl
  - sensor.brewassistant_brewzilla_safety_state
  - sensor.brewassistant_brewzilla_orchestration_mode
  - sensor.brewassistant_brewzilla_control_reason
  - switch.brewassistant_brewzilla_safe_mode
label: |
  [[[ 
    const st = states;
    const attr = (id, key) => st[id]?.attributes?.[key];
    const clean = (v) => {
      if (v === undefined || v === null) return null;
      const s = String(v);
      return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
    };
    const manual = st['switch.brewassistant_show_brewzilla_safety_rcl']?.state === 'on';
    const safety = clean(st['sensor.brewassistant_brewzilla_safety_state']?.state) || 'unknown';
    const mode = clean(st['sensor.brewassistant_brewzilla_orchestration_mode']?.state) || '—';
    const reason = clean(st['sensor.brewassistant_brewzilla_control_reason']?.state) || '—';
    const rclAge = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'rcl_freshness_age_seconds');
    const rclBlocking = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'rcl_freshness_guard_blocking') === true;
    const staleHeat = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'stale_heat_guard_active') === true;
    const filtered = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'temperature_sample_filtered') === true;
    const trust = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'target_trust_guard_suppressed_sync') === true;
    const abort = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'abort_lockout_active') === true;
    return `
      <div style="line-height:1.25;min-width:0;">
        <div style="font-size:12px;font-weight:850;opacity:.66;">visas automatiskt vid varning · switch kan tvinga fram</div>
        <div style="margin-top:7px;font-size:21px;font-weight:950;text-align:center;">${safety}</div>
        <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;text-align:center;">${mode} · RCL ${rclAge ?? '—'}s · manual ${manual ? 'on' : 'off'}</div>
        <div style="margin-top:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;">
          <div style="border-radius:13px;padding:7px;background:${rclBlocking ? 'rgba(244,67,54,.12)' : 'rgba(127,127,127,.08)'};border:1px solid rgba(127,127,127,.14);text-align:center;"><b>${rclBlocking ? 'BLOCK' : 'OK'}</b><br><span style="font-size:10px;opacity:.65;">RCL</span></div>
          <div style="border-radius:13px;padding:7px;background:${staleHeat ? 'rgba(255,193,7,.12)' : 'rgba(127,127,127,.08)'};border:1px solid rgba(127,127,127,.14);text-align:center;"><b>${staleHeat ? 'ON' : 'off'}</b><br><span style="font-size:10px;opacity:.65;">stale heat</span></div>
          <div style="border-radius:13px;padding:7px;background:${filtered ? 'rgba(255,193,7,.12)' : 'rgba(127,127,127,.08)'};border:1px solid rgba(127,127,127,.14);text-align:center;"><b>${filtered ? 'YES' : 'no'}</b><br><span style="font-size:10px;opacity:.65;">filter</span></div>
          <div style="border-radius:13px;padding:7px;background:${abort ? 'rgba(244,67,54,.12)' : trust ? 'rgba(255,193,7,.12)' : 'rgba(127,127,127,.08)'};border:1px solid rgba(127,127,127,.14);text-align:center;"><b>${abort ? 'ABORT' : trust ? 'TRUST' : 'OK'}</b><br><span style="font-size:10px;opacity:.65;">guard</span></div>
        </div>
        <div style="margin-top:10px;border-radius:14px;padding:8px 9px;background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.18);font-size:11.5px;font-weight:800;opacity:.78;white-space:normal;">${String(reason).slice(0, 150)}</div>
      </div>`;
  ]]]
styles:
  card:
    - display: |
        [[[
          const st = states;
          const attr = (id, key) => st[id]?.attributes?.[key];
          const manual = st['switch.brewassistant_show_brewzilla_safety_rcl']?.state === 'on';
          const safety = String(st['sensor.brewassistant_brewzilla_safety_state']?.state ?? '').toLowerCase();
          const rclActive = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'rcl_freshness_guard_active') === true;
          const rclBlocking = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'rcl_freshness_guard_blocking') === true;
          const staleHeat = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'stale_heat_guard_active') === true;
          const filtered = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'temperature_sample_filtered') === true;
          const trust = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'target_trust_guard_suppressed_sync') === true;
          const critical = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'rapt_critical_refresh_recommended') === true;
          const show = manual || rclActive || rclBlocking || staleHeat || filtered || trust || critical || safety.includes('abort') || safety.includes('blocked') || safety.includes('warning');
          return show ? 'block' : 'none';
        ]]]
    - border-radius: 22px
    - padding: 14px
    - background: linear-gradient(135deg, rgba(244,67,54,.10), rgba(127,127,127,.035))
    - border: 1px solid rgba(244,67,54,.20)
    - box-shadow: 0 2px 10px rgba(0,0,0,.08)
  grid:
    - grid-template-areas: "\"i n\" \"i l\""
    - grid-template-columns: 42px minmax(0,1fr)
    - column-gap: 12px
  label:
    - justify-self: stretch
    - text-align: left
    - white-space: normal
