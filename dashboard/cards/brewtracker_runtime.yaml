type: conditional
conditions:
  - entity: binary_sensor.brewassistant_runtime_brewfather_available
    state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: sensor.brewassistant_brewday_runtime_summary
      name: BrewTracker Runtime
      icon: mdi:timer-play-outline
      show_state: false
      show_label: true
      triggers_update:
        - sensor.brewassistant_brewday_runtime_summary
        - sensor.brewassistant_brewday_runtime_state
        - sensor.brewassistant_brewday_runtime_status
        - sensor.brewassistant_brewday_runtime_stage
        - sensor.brewassistant_brewday_runtime_step
        - sensor.brewassistant_brewday_runtime_next_step
        - sensor.brewassistant_brewday_live_progress
        - sensor.brewassistant_brewday_live_time_remaining_minutes
        - sensor.brewassistant_brewday_snapshot_age_minutes
        - sensor.brewassistant_brewday_target_temperature
        - sensor.brewfather_brew_tracker_status
        - sensor.brewassistant_brewzilla_control_reason
      tap_action:
        action: more-info
      hold_action:
        action: call-service
        service: brewassistant.force_brewfather_refresh
      label: |
        [[[ 
          const clean = (v) => {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          };
          const num = (id) => {
            const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
            return Number.isFinite(n) ? n : null;
          };
          const attrNum = (attrs, key) => {
            const n = Number(String(attrs?.[key] ?? '').replace(',', '.'));
            return Number.isFinite(n) ? n : null;
          };
          const boolish = (v) => {
            const s = String(v ?? '').toLowerCase();
            return v === true || ['on','true','yes','1'].includes(s);
          };
          const fmt = (n, u = '', d = 1) => Number.isFinite(n) ? `${n.toFixed(d)}${u ? ' ' + u : ''}` : '—';
          const short = (v, m = 56) => String(v ?? '—').length > m ? String(v ?? '—').slice(0, m - 1) + '…' : String(v ?? '—');
          const runtime = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || 'idle';
          const status = clean(states['sensor.brewassistant_brewday_runtime_status']?.state) || runtime;
          const bfStatus = clean(states['sensor.brewfather_brew_tracker_status']?.state) || '—';
          const stage = clean(states['sensor.brewassistant_brewday_runtime_stage']?.state) || '—';
          const step = clean(states['sensor.brewassistant_brewday_runtime_step']?.state) || '—';
          const next = clean(states['sensor.brewassistant_brewday_runtime_next_step']?.state) || '—';
          const progress = num('sensor.brewassistant_brewday_live_progress');
          const remaining = num('sensor.brewassistant_brewday_live_time_remaining_minutes');
          const age = num('sensor.brewassistant_brewday_snapshot_age_minutes');
          const target = num('sensor.brewassistant_brewday_target_temperature');
          const progressWidth = Number.isFinite(progress) ? Math.max(0, Math.min(100, progress)) : 0;
          const oz = states['sensor.brewassistant_brewzilla_control_reason']?.attributes || {};
          const cleanHeat = boolish(oz.clean_heat_strike_active);
          const heatLatch = boolish(oz.heat_strike_latch_active);
          const physicalPhase = clean(oz.advice_physical_phase) || '';
          const mashGateState = clean(oz.mash_in_gate_state) || 'idle';
          const preMashHeatstrike = cleanHeat || (heatLatch && String(physicalPhase).startsWith('pre_mash_in'));
          const strikeTarget = attrNum(oz, 'heat_strike_target') ?? attrNum(oz, 'heat_strike_clean_control_target') ?? target;
          const gateTemp = attrNum(oz, 'clean_heat_strike_gate_temperature');
          const gateDelta = attrNum(oz, 'clean_heat_strike_gate_delta_to_target');
          const safetyTemp = attrNum(oz, 'clean_heat_strike_safety_temperature');
          const safetyDelta = attrNum(oz, 'clean_heat_strike_safety_delta_to_target');
          const heat = attrNum(oz, 'desired_heat_utilization');
          const pump = attrNum(oz, 'desired_pump_utilization');
          const pumpReason = clean(oz.clean_heat_strike_pump_reason) || '—';
          const paused = String(bfStatus).toLowerCase() === 'paused' || String(status).toLowerCase() === 'paused';
          const statusText = preMashHeatstrike
            ? `BF ${bfStatus} · parkerad · BA styr fysisk heatstrike`
            : paused ? 'PAUSED · väntar på operatör/BF FORTSÄTT' : `BF ${bfStatus} · ${runtime} / ${status} · ${stage}`;
          const activeTitle = preMashHeatstrike ? `BA Heatstrike ${fmt(strikeTarget, '°C')}` : short(step, 64);
          const activeSub = preMashHeatstrike
            ? `Mash/BLE gate ${fmt(gateTemp, '°C')} · Δ ${fmt(gateDelta, '°C')} · wort safety ${fmt(safetyTemp, '°C')} · Δ ${fmt(safetyDelta, '°C')}`
            : `Nuvarande steg · ${fmt(progress,'%',0)} · ${fmt(remaining,'min',0)} kvar`;
          const nextBox = preMashHeatstrike
            ? `Fysiskt nästa: nå strike på Mash/BLE → Mash-In Started i BA → BF FORTSÄTT efter inmäskning`
            : `Nästa: ${short(next, 72)}`;
          const progressLabel = preMashHeatstrike ? 'BF parked' : 'progress';
          const remainingLabel = preMashHeatstrike ? 'BF remaining' : 'remaining';
          const targetLabel = preMashHeatstrike ? 'strike target' : 'target';
          const fourthMain = preMashHeatstrike ? fmt(pump, '%', 0) : fmt(age, 'min');
          const fourthLabel = preMashHeatstrike ? 'pump mix' : 'snapshot';
          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="font-size:11px;font-weight:900;letter-spacing:.06em;opacity:.62;text-transform:uppercase;">BrewTracker runtime</div>
              <div style="margin-top:6px;font-size:11px;font-weight:850;opacity:.76;text-align:center;">${statusText}</div>
              <div style="margin-top:10px;font-size:10px;font-weight:950;letter-spacing:.08em;opacity:.70;text-align:center;text-transform:uppercase;">AKTIVT NU</div>
              <div style="margin-top:3px;font-size:24px;font-weight:950;letter-spacing:-.04em;text-align:center;">${activeTitle}</div>
              <div style="margin:10px auto 0;max-width:320px;height:7px;border-radius:999px;background:rgba(127,127,127,.18);overflow:hidden;">
                <div style="width:${progressWidth}%;height:7px;border-radius:999px;background:rgba(33,150,243,.78);"></div>
              </div>
              <div style="margin-top:7px;font-size:12px;font-weight:800;opacity:.72;text-align:center;">${activeSub}</div>
              <div style="margin-top:8px;border-radius:14px;padding:8px;background:${preMashHeatstrike ? 'rgba(255,193,7,.10)' : 'rgba(127,127,127,.07)'};border:1px solid ${preMashHeatstrike ? 'rgba(255,193,7,.26)' : 'rgba(127,127,127,.13)'};font-size:12px;font-weight:800;opacity:.82;text-align:center;">${nextBox}</div>
              ${preMashHeatstrike ? `<div style="margin-top:7px;font-size:10.8px;font-weight:800;opacity:.66;text-align:center;">BF steg parkerat: ${short(step, 54)} · kommande BF-steg: ${short(next, 54)}</div>` : ''}
              <div style="margin-top:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;">
                <div style="border-radius:13px;padding:7px;background:rgba(33,150,243,.09);border:1px solid rgba(33,150,243,.20);text-align:center;"><b>${fmt(progress,'%',0)}</b><br><span style="font-size:10px;opacity:.65;">${progressLabel}</span></div>
                <div style="border-radius:13px;padding:7px;background:rgba(0,188,212,.10);border:1px solid rgba(0,188,212,.22);text-align:center;"><b>${fmt(remaining,'min',0)}</b><br><span style="font-size:10px;opacity:.65;">${remainingLabel}</span></div>
                <div style="border-radius:13px;padding:7px;background:rgba(76,175,80,.10);border:1px solid rgba(76,175,80,.22);text-align:center;"><b>${fmt(strikeTarget ?? target,'°C')}</b><br><span style="font-size:10px;opacity:.65;">${targetLabel}</span></div>
                <div style="border-radius:13px;padding:7px;background:${preMashHeatstrike ? 'rgba(33,150,243,.10)' : Number.isFinite(age) && age > 2 ? 'rgba(255,193,7,.12)' : 'rgba(127,127,127,.08)'};border:1px solid rgba(127,127,127,.14);text-align:center;"><b>${fourthMain}</b><br><span style="font-size:10px;opacity:.65;">${fourthLabel}</span></div>
              </div>
              ${preMashHeatstrike ? `<div style="margin-top:7px;font-size:10.8px;font-weight:800;opacity:.66;text-align:center;">Heat ${fmt(heat, '%', 0)} · pump ${fmt(pump, '%', 0)} · ${pumpReason} · gate ${mashGateState}</div>` : ''}
            </div>`;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - background: linear-gradient(135deg, rgba(33,150,243,.10), rgba(127,127,127,.035))
          - border: 1px solid rgba(33,150,243,.20)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px minmax(0,1fr)
          - column-gap: 12px
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
    - type: horizontal-stack
      cards:
        - type: custom:button-card
          name: BF refresh
          icon: mdi:refresh
          tap_action:
            action: call-service
            service: brewassistant.force_brewfather_refresh
          styles:
            card:
              - border-radius: 15px
              - padding: 9px
              - background: rgba(33,150,243,.09)
              - border: 1px solid rgba(33,150,243,.22)
            name:
              - font-size: 11px
              - font-weight: 950
        - type: custom:button-card
          entity: sensor.brewfather_brew_tracker_status
          name: BrewTracker status
          icon: mdi:cloud-sync-outline
          tap_action:
            action: more-info
          styles:
            card:
              - border-radius: 15px
              - padding: 9px
              - background: rgba(76,175,80,.09)
              - border: 1px solid rgba(76,175,80,.22)
            name:
              - font-size: 11px
              - font-weight: 950
