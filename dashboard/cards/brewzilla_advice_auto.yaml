type: conditional
conditions:
  - condition: state
    attribute: status
    entity: sensor.brewassistant_brewday_runtime_status
    state_not: inactive
card:
  type: custom:button-card
  entity: sensor.brewassistant_brewzilla_learning_status
  name: Brewday Advice
  icon: mdi:brain
  show_state: false
  show_label: true
  triggers_update:
    - switch.brewassistant_show_brewzilla_learning
    - sensor.brewassistant_brewzilla_learning_status
    - sensor.brewassistant_brewzilla_learning_recommendation_state
    - sensor.brewassistant_brewzilla_learning_confidence
    - sensor.brewassistant_brewzilla_overshoot_risk
    - sensor.brewassistant_brewzilla_orchestration_mode
    - select.brewassistant_brewzilla_learning_context
  label: |
    [[[ 
      const st = states;
      const clean = (v) => {
        if (v === undefined || v === null) return null;
        const s = String(v);
        return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
      };
      const attr = (id, key) => st[id]?.attributes?.[key];
      const manual = st['switch.brewassistant_show_brewzilla_learning']?.state === 'on';
      const rec = clean(st['sensor.brewassistant_brewzilla_learning_recommendation_state']?.state) || 'none';
      const risk = clean(st['sensor.brewassistant_brewzilla_overshoot_risk']?.state) || 'unknown';
      const confidence = clean(st['sensor.brewassistant_brewzilla_learning_confidence']?.state) || 'unknown';
      const context = clean(st['select.brewassistant_brewzilla_learning_context']?.state) || 'unknown';
      const suppressed = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'advice_local_profile_suppressed') === true;
      const active = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'advice_local_profile_active') === true;
      const profile = attr('sensor.brewassistant_brewzilla_orchestration_mode', 'advice_local_profile_heat_utilization');
      const reason = clean(st['sensor.brewassistant_brewzilla_learning_recommendation_reason']?.state) || clean(st['sensor.brewassistant_brewzilla_heat_strategy_reason']?.state) || 'No active recommendation.';
      const attention = rec === 'pending' || suppressed || risk === 'high' || risk === 'active_overshoot' || confidence === 'unknown' || context === 'unknown' || active;
      return `
        <div style="line-height:1.25;min-width:0;">
          <div style="font-size:12px;font-weight:850;opacity:.66;">${attention ? 'aktiv advice / diagnostik' : 'inga aktiva advice-varningar'} · switch ${manual ? 'on' : 'off'}</div>
          <div style="margin-top:7px;font-size:21px;font-weight:950;text-align:center;">${rec === 'pending' ? 'Rekommendation väntar' : suppressed ? 'Profil suppressad' : active ? 'Profil aktiv' : 'Advice OK'}</div>
          <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;text-align:center;">context ${context} · confidence ${confidence} · risk ${risk}<br>profile ${profile ?? '—'}%</div>
          <div style="margin-top:10px;border-radius:14px;padding:8px 9px;background:${attention ? 'rgba(255,193,7,.10)' : 'rgba(76,175,80,.08)'};border:1px solid ${attention ? 'rgba(255,193,7,.22)' : 'rgba(76,175,80,.18)'};font-size:11.5px;font-weight:800;opacity:.78;white-space:normal;">${String(reason).slice(0, 150)}</div>
        </div>`;
    ]]]
  styles:
    card:
      - border-radius: 22px
      - padding: 14px
      - background: |
          [[[
            const st = states;
            const rec = String(st['sensor.brewassistant_brewzilla_learning_recommendation_state']?.state ?? '').toLowerCase();
            const risk = String(st['sensor.brewassistant_brewzilla_overshoot_risk']?.state ?? '').toLowerCase();
            const confidence = String(st['sensor.brewassistant_brewzilla_learning_confidence']?.state ?? '').toLowerCase();
            const context = String(st['select.brewassistant_brewzilla_learning_context']?.state ?? '').toLowerCase();
            const suppressed = st['sensor.brewassistant_brewzilla_orchestration_mode']?.attributes?.advice_local_profile_suppressed === true;
            const active = st['sensor.brewassistant_brewzilla_orchestration_mode']?.attributes?.advice_local_profile_active === true;
            const attention = rec === 'pending' || suppressed || risk === 'high' || risk === 'active_overshoot' || confidence === 'unknown' || context === 'unknown' || active;
            return attention ? 'linear-gradient(135deg, rgba(255,193,7,.10), rgba(127,127,127,.035))' : 'linear-gradient(135deg, rgba(76,175,80,.08), rgba(127,127,127,.035))';
          ]]]
      - border: 1px solid rgba(127,127,127,.18)
      - box-shadow: 0 2px 10px rgba(0,0,0,.08)
    grid:
      - grid-template-areas: "\"i n\" \"i l\""
      - grid-template-columns: 42px minmax(0,1fr)
      - column-gap: 12px
    label:
      - justify-self: stretch
      - text-align: left
      - white-space: normal
