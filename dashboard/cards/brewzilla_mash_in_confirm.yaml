type: conditional
conditions:
  - condition: state
    entity: binary_sensor.brewassistant_brewzilla_mash_in_gate_pending
    state: "on"
card:
  type: custom:button-card
  entity: button.brewassistant_brewzilla_mash_in_complete
  name: Mash-in klar · starta pump
  icon: mdi:barley
  show_state: false
  show_label: true
  tap_action:
    action: call-service
    service: button.press
    target:
      entity_id: button.brewassistant_brewzilla_mash_in_complete
  hold_action:
    action: more-info
  label: |
    [[[
      const pending = states['binary_sensor.brewassistant_brewzilla_mash_in_gate_pending'];
      const target = pending?.attributes?.last_target ?? '—';
      return `Pump pausad · target ${target} °C<br>Kvitterar mash-in och startar pump 50 %`;
    ]]]
  styles:
    card:
      - min-height: 74px
      - padding: 11px
      - border-radius: 16px
      - background: rgba(255,193,7,.18)
      - border: 1px solid rgba(255,193,7,.46)
    grid:
      - grid-template-areas: '"i n" "i l"'
      - grid-template-columns: 32px minmax(0,1fr)
      - column-gap: 9px
    icon:
      - width: 22px
      - color: rgb(255,193,7)
    name:
      - justify-self: start
      - font-size: 13px
      - font-weight: 950
    label:
      - justify-self: start
      - text-align: left
      - white-space: normal
      - font-size: 10.7px
      - font-weight: 760
      - line-height: 1.22
      - opacity: 0.78
