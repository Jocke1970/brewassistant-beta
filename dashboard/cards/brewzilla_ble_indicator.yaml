type: custom:button-card
entity: sensor.brewassistant_brewzilla_mash_temperature_source
name: BLE Thermometer
icon: mdi:bluetooth
show_state: false
show_label: true
triggers_update:
  - sensor.brewassistant_brewzilla_mash_temperature_source
  - sensor.brewassistant_brewzilla_mash_temperature_source_entity
  - sensor.brewassistant_brewzilla_mash_temperature
  - sensor.brewassistant_brewzilla_wort_temperature
  - sensor.brewassistant_brewzilla_temperature_delta_mash_wort
  - sensor.brewassistant_brewzilla_learning_status
label: |
  [[[
    const st = states;
    const clean = (v) => {
      if (v === undefined || v === null) return null;
      const s = String(v);
      return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
    };
    const num = (id) => {
      const n = Number(String(st[id]?.state ?? '').replace(',', '.'));
      return Number.isFinite(n) ? n : null;
    };
    const source = clean(st['sensor.brewassistant_brewzilla_mash_temperature_source']?.state) || '—';
    const sourceEntity = clean(st['sensor.brewassistant_brewzilla_mash_temperature_source_entity']?.state) || '—';
    const mash = num('sensor.brewassistant_brewzilla_mash_temperature');
    const wort = num('sensor.brewassistant_brewzilla_wort_temperature');
    const delta = num('sensor.brewassistant_brewzilla_temperature_delta_mash_wort');
    const active = source === 'RAPT BLE Thermometer' || sourceEntity === 'sensor.brewzilla_ble_thermometer_temperature';
    const external = active || source === 'BrewZilla Control Device' || sourceEntity === 'sensor.brewzilla_control_device_temperature';
    const status = active ? 'BLE aktiv' : external ? 'Extern aktiv' : 'BLE ej aktiv';
    return `${status} · mash ${mash?.toFixed(1) ?? '—'}°C · wort ${wort?.toFixed(1) ?? '—'}°C · Δ ${delta?.toFixed(1) ?? '—'}°C`;
  ]]]
styles:
  card:
    - border-radius: 999px
    - padding: 8px 11px
    - min-height: 38px
    - background: |
        [[[
          const source = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state;
          const sourceEntity = states['sensor.brewassistant_brewzilla_mash_temperature_source_entity']?.state;
          const active = source === 'RAPT BLE Thermometer' || sourceEntity === 'sensor.brewzilla_ble_thermometer_temperature';
          const external = active || source === 'BrewZilla Control Device' || sourceEntity === 'sensor.brewzilla_control_device_temperature';
          return active ? 'rgba(76,175,80,.13)' : external ? 'rgba(33,150,243,.11)' : 'rgba(244,67,54,.10)';
        ]]]
    - border: |
        [[[
          const source = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state;
          const sourceEntity = states['sensor.brewassistant_brewzilla_mash_temperature_source_entity']?.state;
          const active = source === 'RAPT BLE Thermometer' || sourceEntity === 'sensor.brewzilla_ble_thermometer_temperature';
          const external = active || source === 'BrewZilla Control Device' || sourceEntity === 'sensor.brewzilla_control_device_temperature';
          return active ? '1px solid rgba(76,175,80,.32)' : external ? '1px solid rgba(33,150,243,.28)' : '1px solid rgba(244,67,54,.26)';
        ]]]
  icon:
    - width: 18px
    - height: 18px
    - color: |
        [[[
          const source = states['sensor.brewassistant_brewzilla_mash_temperature_source']?.state;
          const sourceEntity = states['sensor.brewassistant_brewzilla_mash_temperature_source_entity']?.state;
          const active = source === 'RAPT BLE Thermometer' || sourceEntity === 'sensor.brewzilla_ble_thermometer_temperature';
          const external = active || source === 'BrewZilla Control Device' || sourceEntity === 'sensor.brewzilla_control_device_temperature';
          return active ? 'rgb(76,175,80)' : external ? 'rgb(33,150,243)' : 'rgb(244,67,54)';
        ]]]
  name:
    - font-size: 11px
    - font-weight: 950
  label:
    - font-size: 10px
    - font-weight: 850
    - white-space: normal
    - opacity: 0.78
