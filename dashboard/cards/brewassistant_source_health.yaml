type: custom:vertical-stack-in-card
cards:
  - type: custom:button-card
    show_icon: false
    show_name: false
    show_state: false
    show_label: false
    triggers_update: all
    styles:
      card:
        - border-radius: 20px 20px 10px 10px
        - padding: 14px
        - background: |
            [[[
              const legacy = Object.keys(states).filter((eid) =>
                eid.includes('brewassistant') &&
                ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
              ).length;

              const bzPower = Number(states['sensor.brewzilla_power']?.state);
              const bzConn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
              const kegFanStatus = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
              const chamber = states['climate.fermentation_chamber']?.state;

              const realIssue =
                (Number.isFinite(bzPower) && bzPower > 1 && String(bzConn).toLowerCase() === 'disconnected');

              if (realIssue) return 'linear-gradient(135deg, rgba(244,67,54,.15), rgba(127,127,127,.04))';
              if (kegFanStatus === 'cooling' || kegFanStatus === 'afterrun') return 'linear-gradient(135deg, rgba(33,150,243,.14), rgba(127,127,127,.04))';
              if (legacy > 0) return 'linear-gradient(135deg, rgba(255,193,7,.13), rgba(127,127,127,.04))';
              return 'linear-gradient(135deg, rgba(76,175,80,.13), rgba(127,127,127,.04))';
            ]]]
        - border: 1px solid rgba(127,127,127,.14)
        - box-shadow: var(--ha-card-box-shadow)
      grid:
        - grid-template-areas: "\"head\" \"summary\""
        - grid-template-columns: 1fr
        - row-gap: 10px
      custom_fields:
        head:
          - grid-area: head
        summary:
          - grid-area: summary
    custom_fields:
      head: |
        [[[
          const legacy = Object.keys(states).filter((eid) =>
            eid.includes('brewassistant') &&
            ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
          ).length;

          const kegFanStatus = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
          const bzPower = Number(states['sensor.brewzilla_power']?.state);
          const bzConn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
          const realIssue =
            (Number.isFinite(bzPower) && bzPower > 1 && String(bzConn).toLowerCase() === 'disconnected');

          let badge = 'OK';
          let icon = 'mdi:check-circle-outline';

          if (realIssue) {
            badge = 'Attention';
            icon = 'mdi:alert-circle-outline';
          } else if (kegFanStatus === 'cooling' || kegFanStatus === 'afterrun') {
            badge = 'Active';
            icon = 'mdi:fan';
          } else if (legacy > 0) {
            badge = 'Cleanup';
            icon = 'mdi:broom';
          }

          return `
            <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
              <div style="min-width:0;">
                <div style="font-size:20px; font-weight:950; line-height:1.05; letter-spacing:-.02em;">
                  BrewAssistant Source Health
                </div>
                <div style="font-size:12px; font-weight:750; opacity:.68; margin-top:3px;">
                  Backend · Runtime · Sources · Registry
                </div>
              </div>
              <div style="
                border-radius:999px;
                padding:6px 10px;
                border:1px solid rgba(127,127,127,.18);
                background:rgba(255,255,255,.45);
                display:flex;
                align-items:center;
                gap:6px;
                font-size:11px;
                font-weight:950;
                white-space:nowrap;
              ">
                <ha-icon icon="${icon}" style="width:14px;height:14px;"></ha-icon>
                ${badge}
              </div>
            </div>
          `;
        ]]]
      summary: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return '—';
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? '—' : s;
          }

          function num(id) {
            const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
            return Number.isFinite(n) ? n : null;
          }

          function fmt(n, unit = '', d = 1) {
            if (!Number.isFinite(n)) return '—';
            return `${n.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          const core = clean(states['sensor.brewassistant_core_version']?.state);
          const runtime = clean(states['sensor.brewassistant_brewday_runtime_status']?.state);
          const stage = clean(states['sensor.brewassistant_brewday_stage']?.state);
          const kegTemp = num('sensor.brewassistant_kegerator_air_temperature');
          const fanStatus = clean(states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status);
          const carb = clean(states['sensor.brewassistant_carbonation_status']?.state);

          const legacy = Object.keys(states).filter((eid) =>
            eid.includes('brewassistant') &&
            ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
          ).length;

          return `
            <div style="font-size:12px; font-weight:800; opacity:.76; line-height:1.35;">
              Core ${core} · Brewday ${runtime} / ${stage}<br>
              Kegerator ${fmt(kegTemp,'°C')} · fan ${fanStatus} · Carbonation ${carb}<br>
              Registry cleanup backlog: ${legacy} unknown/unavailable BrewAssistant entities
            </div>
          `;
        ]]]
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:home-assistant
        name: Core
        tap_action:
          action: none
        label: |
          [[[
            const version = states['sensor.brewassistant_core_version']?.state ?? 'unknown';
            const next = states['sensor.brewassistant_next_action']?.state ?? 'unknown';
            const niceNext = ['unknown','unavailable','none',''].includes(String(next).toLowerCase()) ? 'standby' : next;
            return `v${version} · ${niceNext}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: rgba(76,175,80,.10)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: rgb(76,175,80)
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:kettle-outline
        name: Brewday
        tap_action:
          action: more-info
          entity: sensor.brewassistant_brewday_runtime_status
        label: |
          [[[
            const source = states['sensor.brewassistant_brewday_runtime_source']?.state ?? 'None';
            const status = states['sensor.brewassistant_brewday_runtime_status']?.state ?? 'unknown';
            const state = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'unknown';
            const stage = states['sensor.brewassistant_brewday_stage']?.state ?? 'unknown';
            return `${source} · ${status} · ${state} · ${stage}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const status = states['sensor.brewassistant_brewday_runtime_status']?.state;
                  if (status === 'active' || status === 'running') return 'rgba(76,175,80,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const status = states['sensor.brewassistant_brewday_runtime_status']?.state;
                  if (status === 'active' || status === 'running') return 'rgb(76,175,80)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:cloud-sync-outline
        name: Brewfather
        tap_action:
          action: more-info
          entity: sensor.brewfather_brew_tracker_status
        label: |
          [[[
            const available = states['binary_sensor.brewassistant_runtime_brewfather_available']?.state ?? 'off';
            const tracker = states['sensor.brewfather_brew_tracker_status']?.state ?? 'unknown';
            const recipe = states['sensor.brewfather_recipe_name']?.state ?? 'unknown';
            const niceRecipe = ['unknown','unavailable','none',''].includes(String(recipe).toLowerCase()) ? 'no active recipe' : recipe;
            return `${available} · tracker ${tracker} · ${niceRecipe}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const tracker = states['sensor.brewfather_brew_tracker_status']?.state;
                  if (tracker && tracker !== 'inactive' && tracker !== 'unknown' && tracker !== 'unavailable') return 'rgba(33,150,243,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const tracker = states['sensor.brewfather_brew_tracker_status']?.state;
                  if (tracker && tracker !== 'inactive' && tracker !== 'unknown' && tracker !== 'unavailable') return 'rgb(33,150,243)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:kettle-steam-outline
        name: BrewZilla
        tap_action:
          action: more-info
          entity: sensor.brewassistant_brewzilla_connection_state
        label: |
          [[[
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state ?? 'unknown';
            const mode = states['sensor.brewassistant_brewzilla_orchestration_mode']?.state ?? 'unknown';
            const wort = num('sensor.brewassistant_brewzilla_wort_temperature');
            const power = num('sensor.brewzilla_power');
            const idle = conn === 'Disconnected' && Number.isFinite(power) && power < 1;
            return `${idle ? 'vilande' : conn} · ${mode} · ${Number.isFinite(wort) ? wort.toFixed(1) + ' °C' : '—'} · ${Number.isFinite(power) ? power.toFixed(1) + ' W' : '—'}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
                  const power = Number(states['sensor.brewzilla_power']?.state);
                  if (Number.isFinite(power) && power > 1 && conn === 'Disconnected') return 'rgba(244,67,54,.13)';
                  if (Number.isFinite(power) && power > 1) return 'rgba(76,175,80,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const conn = states['sensor.brewassistant_brewzilla_connection_state']?.state;
                  const power = Number(states['sensor.brewzilla_power']?.state);
                  if (Number.isFinite(power) && power > 1 && conn === 'Disconnected') return 'rgb(244,67,54)';
                  if (Number.isFinite(power) && power > 1) return 'rgb(76,175,80)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:snowflake
        name: Kegerator
        tap_action:
          action: more-info
          entity: switch.brewassistant_kegerator_fan_auto_enabled
        label: |
          [[[
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const climate = states['climate.kegerator_kylskap']?.state ?? 'unknown';
            const temp = num('sensor.brewassistant_kegerator_air_temperature');
            const power = num('sensor.brewassistant_kegerator_power');
            const fanAuto = states['switch.brewassistant_kegerator_fan_auto_enabled']?.state ?? states['switch.brewassistant_kegerator_fan_auto_enabled']?.state ?? 'unknown';
            const fanStatus = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status ?? '—';
            return `${climate} · ${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} · ${Number.isFinite(power) ? power.toFixed(1) + ' W' : '—'} · auto ${fanAuto} · ${fanStatus}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const fanStatus = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
                  if (fanStatus === 'cooling') return 'rgba(33,150,243,.13)';
                  if (fanStatus === 'afterrun') return 'rgba(0,188,212,.13)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const fanStatus = states['switch.brewassistant_kegerator_fan_auto_enabled']?.attributes?.status;
                  if (fanStatus === 'cooling') return 'rgb(33,150,243)';
                  if (fanStatus === 'afterrun') return 'rgb(0,188,212)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:beer-outline
        name: Fermentation
        tap_action:
          action: more-info
          entity: climate.fermentation_chamber
        label: |
          [[[
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const chamber = states['climate.fermentation_chamber']?.state ?? 'unknown';
            const temp = num('sensor.brewassistant_fermentation_chamber_air_temperature_average');
            const supervisor = states['switch.brewassistant_fermentation_climate_supervisor_enabled']?.state ?? 'unknown';
            const gravity = num('sensor.brewassistant_gravity');
            const sg = Number.isFinite(gravity) && gravity > 0.95 && gravity < 1.2 ? gravity.toFixed(3) : '—';
            return `${chamber} · chamber ${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} · SG ${sg} · supervisor ${supervisor}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const chamber = states['climate.fermentation_chamber']?.state;
                  if (chamber === 'heat') return 'rgba(255,152,0,.13)';
                  if (chamber === 'cool') return 'rgba(33,150,243,.13)';
                  if (chamber === 'heat_cool') return 'rgba(76,175,80,.12)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const chamber = states['climate.fermentation_chamber']?.state;
                  if (chamber === 'heat') return 'rgb(255,152,0)';
                  if (chamber === 'cool') return 'rgb(33,150,243)';
                  if (chamber === 'heat_cool') return 'rgb(76,175,80)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:beer
        name: Carbonation
        tap_action:
          action: more-info
          entity: sensor.brewassistant_carbonation_status
        label: |
          [[[
            function num(id) {
              const n = Number(String(states[id]?.state ?? '').replace(',', '.'));
              return Number.isFinite(n) ? n : null;
            }
            const status = states['sensor.brewassistant_carbonation_status']?.state ?? 'unknown';
            const method = states['sensor.brewassistant_carbonation_method']?.state ?? 'unknown';
            const target = num('sensor.brewassistant_carbonation_target_volumes');
            const temp = num('sensor.brewassistant_carbonation_temperature');
            const bar = num('sensor.brewassistant_carbonation_recommended_pressure_bar');
            return `${status} · ${method} · ${Number.isFinite(target) ? target.toFixed(2) + ' vol' : '—'} · ${Number.isFinite(temp) ? temp.toFixed(1) + ' °C' : '—'} · ${Number.isFinite(bar) ? bar.toFixed(2) + ' bar' : '—'}`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const status = states['sensor.brewassistant_carbonation_status']?.state;
                  if (status === 'Ready to serve') return 'rgba(76,175,80,.13)';
                  if (status === 'Conditioning') return 'rgba(0,188,212,.13)';
                  if (status === 'Carbonating') return 'rgba(33,150,243,.13)';
                  return 'rgba(127,127,127,.07)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const status = states['sensor.brewassistant_carbonation_status']?.state;
                  if (status === 'Ready to serve') return 'rgb(76,175,80)';
                  if (status === 'Conditioning') return 'rgb(0,188,212)';
                  if (status === 'Carbonating') return 'rgb(33,150,243)';
                  return 'rgba(127,127,127,.9)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      - type: custom:button-card
        show_icon: true
        show_name: true
        show_label: true
        icon: mdi:broom
        name: Registry cleanup
        tap_action:
          action: none
        label: |
          [[[
            const total = Object.keys(states).filter((eid) =>
              eid.includes('brewassistant') &&
              ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
            ).length;

            const unavailable = Object.keys(states).filter((eid) =>
              eid.includes('brewassistant') &&
              String(states[eid]?.state).toLowerCase() === 'unavailable'
            ).length;

            const unknown = Object.keys(states).filter((eid) =>
              eid.includes('brewassistant') &&
              String(states[eid]?.state).toLowerCase() === 'unknown'
            ).length;

            return `${total} total · ${unavailable} unavailable · ${unknown} unknown · cleanup backlog`;
          ]]]
        styles:
          card:
            - min-height: 76px
            - padding: 11px
            - border-radius: 16px
            - background: |
                [[[
                  const total = Object.keys(states).filter((eid) =>
                    eid.includes('brewassistant') &&
                    ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
                  ).length;
                  if (total > 0) return 'rgba(255,193,7,.13)';
                  return 'rgba(76,175,80,.12)';
                ]]]
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 9px
          icon:
            - width: 21px
            - color: |
                [[[
                  const total = Object.keys(states).filter((eid) =>
                    eid.includes('brewassistant') &&
                    ['unknown','unavailable'].includes(String(states[eid]?.state).toLowerCase())
                  ).length;
                  if (total > 0) return 'rgb(255,193,7)';
                  return 'rgb(76,175,80)';
                ]]]
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
