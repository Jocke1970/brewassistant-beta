type: conditional
conditions:
  - entity: switch.brewassistant_show_kegerator
    state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: switch.brewassistant_kegerator_fan_auto_enabled
      name: Kylskåp / Kegerator
      icon: |
        [[[
          const fan = states['switch.brewassistant_kegerator_fan_auto_enabled'];
          const status = String(fan?.attributes?.status ?? '').toLowerCase();
          const climate = states['climate.kegerator_kylskap']?.state ?? 'unknown';
          const compressor = fan?.attributes?.compressor_active === true;

          if (climate === 'off') return 'mdi:fridge-off-outline';
          if (status === 'cooling' || compressor) return 'mdi:snowflake';
          if (status === 'afterrun') return 'mdi:fan-clock';
          if (status === 'standby') return 'mdi:fridge-outline';
          return 'mdi:fridge-industrial-outline';
        ]]]
      show_state: false
      show_label: true
      tap_action:
        action: more-info
      hold_action:
        action: more-info
      label: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function n(id) {
            const raw = states[id]?.state;
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function attrNum(entity, attr) {
            const raw = states[entity]?.attributes?.[attr];
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function fmt(v, unit = '', d = 1) {
            if (!Number.isFinite(v)) return '—';
            return `${v.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          function bool(v) {
            return v === true || String(v).toLowerCase() === 'true';
          }

          function shortReason(reason) {
            const r = String(reason ?? '—');
            if (r === 'compressor_idle_afterrun_expired') return 'expired';
            if (r === 'compressor_active') return 'compressor';
            if (r === 'mode_always_on') return 'always on';
            if (r === 'afterrun') return 'afterrun';
            if (r === 'fan_auto_disabled') return 'disabled';
            if (r === 'climate_off') return 'climate off';
            return r.replaceAll('_', ' ');
          }

          const climate = states['climate.kegerator_kylskap'];
          const fan = states['switch.brewassistant_kegerator_fan_auto_enabled'];
          const guard = states['switch.brewassistant_kegerator_guard_enabled'];

          const temp = n('sensor.brewassistant_kegerator_air_temperature_average');
          const target = Number(climate?.attributes?.temperature);
          const power = attrNum('sensor.brewassistant_source_health_summary', 'kegerator_power_entity_state');
          const fanPower = attrNum('sensor.brewassistant_source_health_summary', 'kegerator_fan_power_entity_state');

          const climateState = clean(climate?.state) || '—';
          const hvac = clean(climate?.attributes?.hvac_action) || climateState;
          const fanState = clean(states['switch.kegerator_fan']?.state) || '—';
          const fanMode = clean(states['select.brewassistant_kegerator_fan_mode']?.state) || '—';
          const afterrunMinutes = n('number.brewassistant_kegerator_fan_afterrun_minutes');

          const status = clean(fan?.attributes?.status) || 'standby';
          const reason = clean(fan?.attributes?.fan_reason) || '—';
          const reasonShort = shortReason(reason);
          const compressor = bool(fan?.attributes?.compressor_active) || (Number.isFinite(power) && power > 20);
          const fanShouldRun = bool(fan?.attributes?.fan_should_run);
          const afterrunActive = bool(fan?.attributes?.afterrun_active);
          const afterrunLeft = attrNum('switch.brewassistant_kegerator_fan_auto_enabled', 'afterrun_remaining_minutes');
          const trend = attrNum('switch.brewassistant_kegerator_fan_auto_enabled', 'trend_c_per_hour');
          const delta = Number.isFinite(temp) && Number.isFinite(target) ? temp - target : null;

          let headline = 'Standby';
          let badge = 'Standby';
          let badgeIcon = 'mdi:fridge-outline';
          let chipBg = 'rgba(76,175,80,.12)';
          let chipBorder = 'rgba(76,175,80,.24)';

          if (climateState === 'off' || status === 'off') {
            headline = 'Kylskåp av';
            badge = 'Av';
            badgeIcon = 'mdi:fridge-off-outline';
            chipBg = 'rgba(127,127,127,.12)';
            chipBorder = 'rgba(127,127,127,.20)';
          } else if (compressor || status === 'cooling') {
            headline = 'Kyler aktivt';
            badge = 'Kyler';
            badgeIcon = 'mdi:snowflake';
            chipBg = 'rgba(33,150,243,.13)';
            chipBorder = 'rgba(33,150,243,.26)';
          } else if (afterrunActive || status === 'afterrun') {
            headline = 'Afterrun';
            badge = 'Afterrun';
            badgeIcon = 'mdi:fan-clock';
            chipBg = 'rgba(0,188,212,.13)';
            chipBorder = 'rgba(0,188,212,.26)';
          } else if (fanState === 'on' || status === 'circulating') {
            headline = 'Cirkulerar';
            badge = 'Cirkulerar';
            badgeIcon = 'mdi:fan';
            chipBg = 'rgba(0,188,212,.10)';
            chipBorder = 'rgba(0,188,212,.22)';
          }

          const deltaText = Number.isFinite(delta) ? `${delta >= 0 ? '+' : ''}${delta.toFixed(1)} °C` : '—';
          const trendMain = Number.isFinite(trend) ? `${trend >= 0 ? '+' : ''}${trend.toFixed(2)}` : '—';
          const afterrunMain = afterrunActive ? 'Aktiv' : 'Av';
          const afterrunSub = afterrunActive ? `${fmt(afterrunLeft, 'min')}` : `${fmt(afterrunMinutes, 'min')}`;
          const compressorText = compressor ? 'Aktiv' : 'Vilar';
          const fanText = fanState === 'on' ? 'På' : fanState === 'off' ? 'Av' : fanState;
          const fanAutoText = fan?.state === 'on' ? 'På' : fan?.state === 'off' ? 'Av' : '—';

          const line1 = `${status} · ${fmt(temp, '°C')} → ${fmt(target, '°C')} · Δ ${deltaText} · ${trendMain} °C/h`;
          const line2 = `${compressor ? 'compressor active' : 'compressor idle'} · fan ${fanText.toLowerCase()} · ${reasonShort}`;

          const metric = (title, main, sub, icon, kind = 'neutral') => {
            const bg =
              kind === 'blue' ? 'rgba(33,150,243,.09)' :
              kind === 'cyan' ? 'rgba(0,188,212,.10)' :
              kind === 'green' ? 'rgba(76,175,80,.11)' :
              kind === 'yellow' ? 'rgba(255,193,7,.13)' :
              kind === 'red' ? 'rgba(244,67,54,.11)' :
              'rgba(127,127,127,.08)';
            const border =
              kind === 'blue' ? 'rgba(33,150,243,.20)' :
              kind === 'cyan' ? 'rgba(0,188,212,.22)' :
              kind === 'green' ? 'rgba(76,175,80,.24)' :
              kind === 'yellow' ? 'rgba(255,193,7,.26)' :
              kind === 'red' ? 'rgba(244,67,54,.24)' :
              'rgba(127,127,127,.14)';
            return `
              <div style="
                min-width:0;
                border-radius:13px;
                padding:7px 6px;
                background:${bg};
                border:1px solid ${border};
                display:grid;
                grid-template-columns:18px minmax(0,1fr);
                gap:5px;
                align-items:center;
              ">
                <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
                <div style="min-width:0;text-align:center;">
                  <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                  <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                  <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                </div>
              </div>
            `;
          };

          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="min-width:0;">
                  <div style="font-size:12px;font-weight:850;opacity:.66;">Serving · fermentation chamber · fan backend</div>
                  <div style="font-size:12px;font-weight:850;opacity:.66;">auto ${fanAutoText.toLowerCase()}</div>
                </div>
                <div style="
                  display:inline-flex;
                  align-items:center;
                  gap:6px;
                  padding:6px 9px;
                  border-radius:999px;
                  background:${chipBg};
                  border:1px solid ${chipBorder};
                  font-size:11px;
                  font-weight:950;
                  white-space:nowrap;
                ">
                  <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                  <span>${badge}</span>
                </div>
              </div>

              <div style="margin-top:8px;text-align:center;">
                <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
                <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                  ${line1}<br>${line2}
                </div>
              </div>

              <div style="
                margin-top:11px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Nu', fmt(temp, '°C'), 'luft', 'mdi:thermometer', 'blue')}
                ${metric('Mål', fmt(target, '°C'), hvac, 'mdi:crosshairs-gps', 'neutral')}
                ${metric('Delta', deltaText, 'diff', 'mdi:triangle-outline', Number.isFinite(delta) && delta > 0.6 ? 'yellow' : 'green')}
                ${metric('Trend', trendMain, '°C/h', 'mdi:chart-line', Number.isFinite(trend) && trend < -1 ? 'blue' : 'neutral')}
              </div>

              <div style="
                margin-top:7px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Kompr.', compressorText, fmt(power, 'W'), 'mdi:snowflake', compressor ? 'blue' : 'neutral')}
                ${metric('Fläkt', fanText, fmt(fanPower, 'W'), 'mdi:fan', fanState === 'on' ? 'cyan' : 'neutral')}
                ${metric('Fan auto', fanAutoText, reasonShort, 'mdi:fan-auto', fanShouldRun ? 'green' : 'neutral')}
                ${metric('Afterrun', afterrunMain, afterrunSub, 'mdi:fan-clock', afterrunActive ? 'cyan' : 'neutral')}
              </div>

              <div style="
                margin-top:10px;
                display:grid;
                grid-template-columns:20px minmax(0,1fr);
                gap:7px;
                align-items:center;
                border-radius:14px;
                padding:8px 9px;
                background:rgba(76,175,80,.10);
                border:1px solid rgba(76,175,80,.24);
              ">
                <ha-icon icon="mdi:check-circle-outline" style="width:15px;height:15px;opacity:.76;"></ha-icon>
                <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                  ${status} · ${fmt(temp, '°C')} → ${fmt(target, '°C')} · Δ ${deltaText} · fan ${fanText.toLowerCase()} · ${reasonShort} · guard ${guard?.state ?? '—'}
                </div>
              </div>
            </div>
          `;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - overflow: hidden
          - background: linear-gradient(135deg, rgba(76,175,80,.10), rgba(127,127,127,.035))
          - border: 1px solid rgba(76,175,80,.18)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px minmax(0,1fr)
          - grid-template-rows: min-content min-content
          - column-gap: 12px
        icon:
          - width: 27px
          - height: 27px
        img_cell:
          - width: 42px
          - height: 42px
          - border-radius: 50%
          - background: rgba(76,175,80,.14)
          - color: rgb(76,175,80)
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 950
          - letter-spacing: "-.02em"
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
          - margin-top: 4px
    - type: custom:expander-card
      title-card:
        type: custom:button-card
        entity: climate.kegerator_kylskap
        name: Kegerator detaljer
        icon: mdi:tune-variant
        show_state: false
        show_label: true
        label: |
          [[[
            function shortReason(reason) {
              const r = String(reason ?? '—');
              if (r === 'compressor_idle_afterrun_expired') return 'expired';
              if (r === 'compressor_active') return 'compressor';
              if (r === 'mode_always_on') return 'always on';
              if (r === 'afterrun') return 'afterrun';
              return r.replaceAll('_', ' ');
            }
            const fan = states['switch.brewassistant_kegerator_fan_auto_enabled'];
            const temp = states['sensor.brewassistant_kegerator_air_temperature_average']?.state ?? '—';
            const target = states['climate.kegerator_kylskap']?.attributes?.temperature ?? '—';
            const status = fan?.attributes?.status ?? 'standby';
            const reason = shortReason(fan?.attributes?.fan_reason ?? '—');
            const fanState = states['switch.kegerator_fan']?.state ?? '—';
            const power = states['sensor.brewassistant_source_health_summary']?.attributes?.kegerator_power_entity_state ?? '—';
            return `${status} · ${temp} → ${target} °C · fan ${fanState} · effekt ${power} W · ${reason}`;
          ]]]
        styles:
          card:
            - border-radius: 18px
            - padding: 12px
            - background: rgba(127,127,127,.055)
            - border: 1px solid rgba(127,127,127,.14)
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: 34px minmax(0,1fr)
            - column-gap: 10px
          icon:
            - width: 22px
            - height: 22px
          name:
            - justify-self: start
            - font-size: 14px
            - font-weight: 950
          label:
            - justify-self: start
            - text-align: left
            - white-space: normal
            - font-size: 11.5px
            - font-weight: 750
            - opacity: 0.72
      cards:
        - type: entities
          show_header_toggle: false
          entities:
            - entity: climate.kegerator_kylskap
              name: Climate
            - entity: switch.brewassistant_kegerator_guard_enabled
              name: Guard enabled
            - entity: switch.brewassistant_kegerator_fan_auto_enabled
              name: Fan auto enabled
            - entity: select.brewassistant_kegerator_fan_mode
              name: Fan mode
            - entity: number.brewassistant_kegerator_fan_afterrun_minutes
              name: Afterrun minutes
            - entity: switch.kegerator_fan
              name: Fan switch
            - type: attribute
              entity: switch.brewassistant_kegerator_fan_auto_enabled
              attribute: summary
              name: Backend summary
            - type: attribute
              entity: switch.brewassistant_kegerator_fan_auto_enabled
              attribute: fan_should_run
              name: Fan should run
            - type: attribute
              entity: switch.brewassistant_kegerator_fan_auto_enabled
              attribute: afterrun_remaining_minutes
              name: Afterrun remaining
