type: conditional
conditions:
  - entity: switch.brewassistant_show_fermentation
    state: "on"
card:
  type: vertical-stack
  cards:
    - type: custom:button-card
      entity: climate.fermentation_chamber
      name: Fermentation Cockpit
      icon: |
        [[[
          const chamber = states['climate.fermentation_chamber']?.state ?? 'off';
          const demand = String(states['sensor.brewassistant_fermentation_climate_demand']?.state ?? 'standby').toLowerCase();
          const mode = String(states['sensor.brewassistant_fermentation_climate_mode']?.state ?? 'standby').toLowerCase();
          const heatPower = Number(states['sensor.brewassistant_fermentation_heat_power']?.state);
          const heatOn = states['switch.fermentation_heat_mat']?.state === 'on' || (Number.isFinite(heatPower) && heatPower > 2);

          if (chamber === 'off') return 'mdi:power';
          if (heatOn || demand === 'heat' || mode === 'heating') return 'mdi:heat-wave';
          if (demand === 'cool' || mode === 'cooling' || chamber === 'cool') return 'mdi:snowflake-thermometer';
          if (chamber !== 'off') return 'mdi:flask-outline';
          return 'mdi:fridge-outline';
        ]]]
      show_state: false
      show_label: true
      tap_action:
        action: more-info
        entity: climate.fermentation_chamber
      hold_action:
        action: more-info
        entity: switch.brewassistant_fermentation_climate_supervisor_enabled
      label: |
        [[[
          function clean(v) {
            if (v === undefined || v === null) return null;
            const s = String(v);
            return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
          }

          function n(id) {
            const raw = states[id]?.state;
            const val = Number(String(raw ?? '').replace(',', '.'));
            return Number.isFinite(val) ? val : null;
          }

          function firstNum(ids) {
            for (const id of ids) {
              const val = n(id);
              if (Number.isFinite(val)) return val;
            }
            return null;
          }

          function validSg(id) {
            const val = n(id);
            if (!Number.isFinite(val)) return null;
            return val >= 0.980 && val <= 1.250 ? val : null;
          }

          function firstSg(ids) {
            for (const id of ids) {
              const val = validSg(id);
              if (Number.isFinite(val)) return val;
            }
            return null;
          }

          function fmt(v, unit = '', d = 1) {
            if (!Number.isFinite(v)) return '—';
            return `${v.toFixed(d)}${unit ? ' ' + unit : ''}`;
          }

          function short(v, max = 48) {
            const s = String(v ?? '—');
            return s.length > max ? s.slice(0, max - 1) + '…' : s;
          }

          const chamberState = states['climate.fermentation_chamber']?.state ?? 'off';
          const supervisorOn = states['switch.brewassistant_fermentation_climate_supervisor_enabled']?.state === 'on';
          const heatPower = Number(states['sensor.brewassistant_fermentation_heat_power']?.state);
          const heatOn = states['switch.fermentation_heat_mat']?.state === 'on' || (Number.isFinite(heatPower) && heatPower > 2);

          const demand = clean(states['sensor.brewassistant_fermentation_climate_demand']?.state) || 'standby';
          const mode = clean(states['sensor.brewassistant_fermentation_climate_mode']?.state) || 'standby';
          const reason = clean(states['sensor.brewassistant_fermentation_air_target_reason']?.state) || '';
          const summary = clean(states['sensor.brewassistant_fermentation_air_target_summary']?.state);
          const smart = clean(states['sensor.brewassistant_smart_recommendation_summary']?.state);
          const pillStatus = clean(states['sensor.brewassistant_smart_pill_status_core']?.state) || '—';

          const chamberAvg = n('sensor.brewassistant_fermentation_chamber_air_temperature_average');

          const pillTemp = n('sensor.brewassistant_liquid_temperature');
          const sg = validSg('sensor.brewassistant_gravity');

          const airTarget = n('sensor.brewassistant_fermentation_effective_air_target');
          const targetDelta = Number.isFinite(chamberAvg) && Number.isFinite(airTarget) ? chamberAvg - airTarget : null;
          const tempAge = n('sensor.brewassistant_smart_pill_temp_age_minutes_core');
          const heatPulse = n('sensor.brewassistant_smart_suggested_heat_pulse_minutes');

          const activeScope =
            !reason.toLowerCase().includes('no active fermentation') &&
            !reason.toLowerCase().includes('no active') &&
            demand !== 'standby';

          let headline = 'Avstängd';
          let badge = 'Av';
          let badgeIcon = 'mdi:power';
          let chipBg = 'rgba(127,127,127,.12)';
          let chipBorder = 'rgba(127,127,127,.20)';
          let cardTone = 'neutral';

          if (heatOn || demand === 'heat' || mode === 'heating') {
            headline = 'Värmer';
            badge = 'Värmer';
            badgeIcon = 'mdi:heat-wave';
            chipBg = 'rgba(255,152,0,.15)';
            chipBorder = 'rgba(255,152,0,.28)';
            cardTone = 'heat';
          } else if (demand === 'cool' || mode === 'cooling' || chamberState === 'cool') {
            headline = 'Kyler';
            badge = 'Kyler';
            badgeIcon = 'mdi:snowflake';
            chipBg = 'rgba(33,150,243,.13)';
            chipBorder = 'rgba(33,150,243,.26)';
            cardTone = 'cool';
          } else if (activeScope) {
            headline = 'Jäsning aktiv';
            badge = 'Aktiv';
            badgeIcon = 'mdi:flask-outline';
            chipBg = 'rgba(76,175,80,.14)';
            chipBorder = 'rgba(76,175,80,.25)';
            cardTone = 'active';
          } else if (chamberState !== 'off' && supervisorOn) {
            headline = 'Standby';
            badge = 'Standby';
            badgeIcon = 'mdi:shield-check-outline';
            chipBg = 'rgba(33,150,243,.10)';
            chipBorder = 'rgba(33,150,243,.20)';
            cardTone = 'standby';
          } else if (chamberState !== 'off') {
            headline = 'Idle';
            badge = 'Idle';
            badgeIcon = 'mdi:sleep';
            cardTone = 'idle';
          }

          const cardSummary =
            chamberState === 'off'
              ? 'OFF: jäskammaren är avstängd. Extra cockpit-delar är dolda tills climate startas.'
              : summary || smart || reason || 'Fermentation cockpit är redo.';

          const metric = (title, main, sub, icon, kind = 'neutral') => {
            const bg =
              kind === 'blue' ? 'rgba(33,150,243,.09)' :
              kind === 'cyan' ? 'rgba(0,188,212,.10)' :
              kind === 'green' ? 'rgba(76,175,80,.11)' :
              kind === 'yellow' ? 'rgba(255,193,7,.13)' :
              kind === 'orange' ? 'rgba(255,152,0,.13)' :
              kind === 'red' ? 'rgba(244,67,54,.11)' :
              'rgba(127,127,127,.08)';
            const border =
              kind === 'blue' ? 'rgba(33,150,243,.20)' :
              kind === 'cyan' ? 'rgba(0,188,212,.22)' :
              kind === 'green' ? 'rgba(76,175,80,.24)' :
              kind === 'yellow' ? 'rgba(255,193,7,.26)' :
              kind === 'orange' ? 'rgba(255,152,0,.26)' :
              kind === 'red' ? 'rgba(244,67,54,.24)' :
              'rgba(127,127,127,.14)';
            return `
              <div style="
                min-width:0;
                border-radius:13px;
                padding:7px 6px;
                background:${bg};
                border:1px solid ${border};
                display:grid;
                grid-template-columns:18px minmax(0,1fr);
                gap:5px;
                align-items:center;
              ">
                <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
                <div style="min-width:0;text-align:center;">
                  <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                  <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                  <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
                </div>
              </div>
            `;
          };

          const deltaKind = Number.isFinite(targetDelta) && Math.abs(targetDelta) > 0.8 ? 'yellow' : 'green';
          const heatKind = heatOn ? 'orange' : 'neutral';
          const supervisorKind = supervisorOn ? 'green' : 'neutral';
          const sgText = Number.isFinite(sg) ? sg.toFixed(3) : '—';

          return `
            <div style="line-height:1.25;min-width:0;">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                <div style="min-width:0;">
                  <div style="font-size:12px;font-weight:850;opacity:.66;">Pill · chamber · climate supervisor</div>
                  <div style="font-size:12px;font-weight:850;opacity:.66;">${chamberState} · ${mode} · ${demand}</div>
                </div>
                <div style="
                  display:inline-flex;
                  align-items:center;
                  gap:6px;
                  padding:6px 9px;
                  border-radius:999px;
                  background:${chipBg};
                  border:1px solid ${chipBorder};
                  font-size:11px;
                  font-weight:950;
                  white-space:nowrap;
                ">
                  <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                  <span>${badge}</span>
                </div>
              </div>

              <div style="margin-top:8px;text-align:center;">
                <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
                <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                  ${chamberState} · chamber ${fmt(chamberAvg, '°C')} · target ${fmt(airTarget, '°C')}<br>${short(cardSummary, 78)}
                </div>
              </div>

              <div style="
                margin-top:11px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Chamber', fmt(chamberAvg, '°C'), 'air avg', 'mdi:fridge-thermometer', 'blue')}
                ${metric('Pill', fmt(pillTemp, '°C'), pillStatus, 'mdi:thermometer-water', 'cyan')}
                ${metric('SG', sgText, Number.isFinite(sg) ? 'gravity' : 'missing', 'mdi:water-percent', Number.isFinite(sg) ? 'green' : 'neutral')}
                ${metric('Target', fmt(airTarget, '°C'), 'air target', 'mdi:target', 'neutral')}
              </div>

              <div style="
                margin-top:7px;
                display:grid;
                grid-template-columns:repeat(4,minmax(0,1fr));
                gap:7px;
              ">
                ${metric('Delta', fmt(targetDelta, '°C'), 'air-target', 'mdi:delta', deltaKind)}
                ${metric('Demand', demand, mode, 'mdi:thermostat', demand === 'cool' ? 'blue' : demand === 'heat' ? 'orange' : 'neutral')}
                ${metric('Supervisor', supervisorOn ? 'På' : 'Av', 'climate', 'mdi:thermostat-auto', supervisorKind)}
                ${metric('Heat mat', heatOn ? 'På' : 'Av', Number.isFinite(heatPower) ? `${heatPower.toFixed(1)} W` : '—', 'mdi:heat-wave', heatKind)}
              </div>

              <div style="
                margin-top:10px;
                display:grid;
                grid-template-columns:20px minmax(0,1fr);
                gap:7px;
                align-items:center;
                border-radius:14px;
                padding:8px 9px;
                background:${cardTone === 'heat' ? 'rgba(255,152,0,.11)' : cardTone === 'cool' ? 'rgba(33,150,243,.10)' : cardTone === 'active' ? 'rgba(76,175,80,.10)' : 'rgba(127,127,127,.08)'};
                border:1px solid ${cardTone === 'heat' ? 'rgba(255,152,0,.22)' : cardTone === 'cool' ? 'rgba(33,150,243,.20)' : cardTone === 'active' ? 'rgba(76,175,80,.20)' : 'rgba(127,127,127,.14)'};
              ">
                <ha-icon icon="${chamberState === 'off' ? 'mdi:power' : cardTone === 'heat' ? 'mdi:heat-wave' : cardTone === 'cool' ? 'mdi:snowflake' : 'mdi:information-outline'}" style="width:15px;height:15px;opacity:.76;"></ha-icon>
                <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                  ${short(cardSummary, 120)}
                </div>
              </div>
            </div>
          `;
        ]]]
      styles:
        card:
          - border-radius: 22px
          - padding: 14px
          - overflow: hidden
          - background: |
              [[[
                const chamber = states['climate.fermentation_chamber']?.state ?? 'off';
                const demand = String(states['sensor.brewassistant_fermentation_climate_demand']?.state ?? 'standby').toLowerCase();
                const mode = String(states['sensor.brewassistant_fermentation_climate_mode']?.state ?? 'standby').toLowerCase();
                const heatPower = Number(states['sensor.brewassistant_fermentation_heat_power']?.state);
                const heatOn = states['switch.fermentation_heat_mat']?.state === 'on' || (Number.isFinite(heatPower) && heatPower > 2);

                if (heatOn || demand === 'heat' || mode === 'heating') return 'linear-gradient(135deg, rgba(255,152,0,.14), rgba(127,127,127,.035))';
                if (demand === 'cool' || mode === 'cooling' || chamber === 'cool') return 'linear-gradient(135deg, rgba(33,150,243,.12), rgba(127,127,127,.035))';
                if (chamber !== 'off') return 'linear-gradient(135deg, rgba(76,175,80,.10), rgba(127,127,127,.035))';
                return 'linear-gradient(135deg, rgba(127,127,127,.10), rgba(127,127,127,.035))';
              ]]]
          - border: 1px solid rgba(127,127,127,.18)
          - box-shadow: 0 2px 10px rgba(0,0,0,.08)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 42px minmax(0,1fr)
          - grid-template-rows: min-content min-content
          - column-gap: 12px
        icon:
          - width: 27px
          - height: 27px
        img_cell:
          - width: 42px
          - height: 42px
          - border-radius: 50%
          - background: rgba(127,127,127,.14)
          - color: rgba(127,127,127,.95)
        name:
          - justify-self: start
          - align-self: end
          - font-size: 15px
          - font-weight: 950
          - letter-spacing: "-.02em"
        label:
          - justify-self: stretch
          - text-align: left
          - white-space: normal
          - margin-top: 4px
    - type: conditional
      conditions:
        - entity: climate.fermentation_chamber
          state_not: "off"
      card:
        type: grid
        columns: 4
        square: false
        cards:
          - type: custom:button-card
            entity: switch.brewassistant_fermentation_climate_supervisor_enabled
            name: Supervisor
            icon: mdi:thermostat-auto
            show_state: true
            tap_action:
              action: toggle
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(127,127,127,.055)
                - border: 1px solid rgba(127,127,127,.14)
              icon:
                - width: 22px
                - height: 22px
              name:
                - font-size: 10.5px
                - font-weight: 950
                - white-space: normal
              state:
                - font-size: 10.5px
                - font-weight: 850
                - opacity: 0.7
          - type: custom:button-card
            entity: climate.fermentation_chamber
            name: Chamber
            icon: mdi:fridge-outline
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(127,127,127,.055)
                - border: 1px solid rgba(127,127,127,.14)
              icon:
                - width: 22px
                - height: 22px
              name:
                - font-size: 10.5px
                - font-weight: 950
                - white-space: normal
              state:
                - font-size: 10.5px
                - font-weight: 850
                - opacity: 0.7
          - type: custom:button-card
            entity: switch.fermentation_heat_mat
            name: Heat mat
            icon: mdi:heat-wave
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(127,127,127,.055)
                - border: 1px solid rgba(127,127,127,.14)
              icon:
                - width: 22px
                - height: 22px
              name:
                - font-size: 10.5px
                - font-weight: 950
                - white-space: normal
              state:
                - font-size: 10.5px
                - font-weight: 850
                - opacity: 0.7
          - type: custom:button-card
            entity: sensor.brewassistant_smart_pill_status_core
            name: RAPT Pill
            icon: mdi:radio-tower
            show_state: true
            tap_action:
              action: more-info
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(127,127,127,.055)
                - border: 1px solid rgba(127,127,127,.14)
              icon:
                - width: 22px
                - height: 22px
              name:
                - font-size: 10.5px
                - font-weight: 950
                - white-space: normal
              state:
                - font-size: 10.5px
                - font-weight: 850
                - opacity: 0.7
    - type: conditional
      conditions:
        - entity: climate.fermentation_chamber
          state_not: "off"
      card:
        type: custom:expander-card
        title-card:
          type: custom:button-card
          entity: climate.fermentation_chamber
          name: Fermentation detaljer
          icon: mdi:tune-variant
          show_state: false
          show_label: true
          label: |
            [[[
              function n(id) {
                const raw = states[id]?.state;
                const val = Number(String(raw ?? '').replace(',', '.'));
                return Number.isFinite(val) ? val : null;
              }
              function validSg(id) {
                const val = n(id);
                return Number.isFinite(val) && val >= 0.980 && val <= 1.250 ? val : null;
              }
              function fmt(v, unit='', d=1) {
                return Number.isFinite(v) ? `${v.toFixed(d)}${unit ? ' ' + unit : ''}` : '—';
              }
              const chamber = n('sensor.brewassistant_fermentation_chamber_air_temperature_average');
              const pill = n('sensor.brewassistant_liquid_temperature');
              const sg = validSg('sensor.brewassistant_gravity');
              const sup = states['switch.brewassistant_fermentation_climate_supervisor_enabled']?.state === 'on' ? 'klimat på' : 'klimat av';
              return `Kammare ${fmt(chamber, '°C')} · Pill ${fmt(pill, '°C')} · SG ${Number.isFinite(sg) ? sg.toFixed(3) : '—'} · ${sup}`;
            ]]]
          styles:
            card:
              - border-radius: 18px
              - padding: 12px
              - background: rgba(127,127,127,.055)
              - border: 1px solid rgba(127,127,127,.14)
            grid:
              - grid-template-areas: "\"i n\" \"i l\""
              - grid-template-columns: 34px minmax(0,1fr)
              - column-gap: 10px
            icon:
              - width: 22px
              - height: 22px
            name:
              - justify-self: start
              - font-size: 14px
              - font-weight: 950
            label:
              - justify-self: start
              - text-align: left
              - white-space: normal
              - font-size: 11.5px
              - font-weight: 750
              - opacity: 0.72
        cards:
          - type: entities
            title: Fermentation climate core
            show_header_toggle: false
            entities:
              - entity: switch.brewassistant_fermentation_climate_supervisor_enabled
                name: Climate supervisor
              - entity: select.brewassistant_fermentation_air_target_test_mode
                name: Testläge
              - entity: climate.fermentation_chamber
                name: Fermentation chamber
              - entity: >-
                  sensor.brewassistant_fermentation_chamber_air_temperature_average
                name: Chamber air avg
              - entity: sensor.brewassistant_fermentation_effective_air_target
                name: Effektiv luftmåltemp
              - entity: sensor.brewassistant_fermentation_climate_demand
                name: Climate demand
              - entity: sensor.brewassistant_fermentation_climate_mode
                name: Climate mode
              - entity: sensor.brewassistant_fermentation_air_target_reason
                name: Reason
              - entity: sensor.brewassistant_fermentation_air_target_summary
                name: Summary
          - type: entities
            title: Pill / gravity
            show_header_toggle: false
            entities:
              - entity: sensor.brewassistant_smart_pill_status_core
                name: Pill status
              - entity: sensor.brewassistant_liquid_temperature
                name: Liquid temperature
              - entity: sensor.brewassistant_gravity
                name: BrewAssistant SG
              - entity: sensor.brewassistant_gravity_last_updated
                name: SG last updated
              - entity: sensor.brewassistant_smart_pill_temp_age_minutes_core
                name: Pill temp age
          - type: entities
            title: Heat / recommendations
            show_header_toggle: false
            entities:
              - entity: switch.fermentation_heat_mat
                name: Heat mat
              - entity: sensor.brewassistant_fermentation_heat_power
                name: Heat mat power
              - entity: sensor.brewassistant_smart_recommendation_summary
                name: Smart summary
              - entity: sensor.brewassistant_smart_heat_recommendation
                name: Heat recommendation
              - entity: sensor.brewassistant_smart_cooling_recommendation
                name: Cooling recommendation
              - entity: sensor.brewassistant_smart_fan_recommendation
                name: Fan recommendation
              - entity: sensor.brewassistant_smart_heat_block_reason_core
                name: Heat block reason
              - entity: sensor.brewassistant_smart_suggested_heat_pulse_minutes
                name: Suggested heat pulse
              - entity: sensor.brewassistant_smart_recommendation_mode
                name: Recommendation mode
