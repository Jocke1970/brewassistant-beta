type: vertical-stack
cards:
  - type: custom:button-card
    entity: sensor.brewassistant_brewday_runtime_summary
    name: Manual Brewday
    icon: |
      [[[
        const state = String(states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle').toLowerCase();
        const stage = String(states['sensor.brewassistant_brewday_runtime_stage']?.state ?? '').toLowerCase();

        if (state === 'idle') return 'mdi:sleep';
        if (state === 'paused') return 'mdi:pause-circle-outline';
        if (state === 'completed' || state === 'finished') return 'mdi:check-decagram-outline';
        if (stage.includes('mash')) return 'mdi:barley';
        if (stage.includes('boil')) return 'mdi:kettle-steam-outline';
        if (stage.includes('cool') || stage.includes('chill')) return 'mdi:snowflake-thermometer';
        return 'mdi:gesture-tap-button';
      ]]]
    show_state: false
    show_label: true
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    label: |
      [[[
        function clean(v) {
          if (v === undefined || v === null) return null;
          const s = String(v);
          return ['unknown','unavailable','none',''].includes(s.toLowerCase()) ? null : s;
        }

        function n(id) {
          const raw = states[id]?.state;
          const val = Number(String(raw ?? '').replace(',', '.'));
          return Number.isFinite(val) ? val : null;
        }

        function firstNum(ids) {
          for (const id of ids) {
            const val = n(id);
            if (Number.isFinite(val)) return val;
          }
          return null;
        }

        function firstState(ids) {
          for (const id of ids) {
            const v = clean(states[id]?.state);
            if (v !== null) return v;
          }
          return null;
        }

        function fmt(v, unit = '', d = 1) {
          if (!Number.isFinite(v)) return '—';
          return `${v.toFixed(d)}${unit ? ' ' + unit : ''}`;
        }

        function short(v, max = 42) {
          const s = String(v ?? '—');
          return s.length > max ? s.slice(0, max - 1) + '…' : s;
        }

        const summary = clean(states['sensor.brewassistant_brewday_runtime_summary']?.state) || 'Idle · Prepare brewday or connect Brew Tracker';
        const runtime = clean(states['sensor.brewassistant_brewday_runtime_state']?.state) || 'idle';
        const stage = clean(states['sensor.brewassistant_brewday_runtime_stage']?.state) || 'Idle';
        const step = clean(states['sensor.brewassistant_brewday_runtime_step']?.state) || 'Prepare brewday or connect Brew Tracker';
        const next = clean(states['sensor.brewassistant_brewday_runtime_next_step']?.state) || '—';

        const statusLine = clean(states['sensor.brewassistant_brewday_stage_status_line']?.state) || `${runtime} · ${stage} · operator-supervised`;
        const suggestedAction = clean(states['sensor.brewassistant_brewday_stage_suggested_action']?.state) || '—';
        const controlHint = clean(states['sensor.brewassistant_brewday_stage_control_hint']?.state) || 'operator-supervised';

        const progress = n('sensor.brewassistant_brewday_live_progress');
        const remaining = n('sensor.brewassistant_brewday_live_time_remaining_minutes');

        const temp = firstNum([
          'sensor.brewassistant_brewzilla_wort_temperature',
          'sensor.brewassistant_brewzilla_mash_temperature',
          'sensor.brewzilla_temperature'
        ]);

        const target = firstNum([
          'sensor.brewassistant_brewzilla_runtime_target_temperature',
          'sensor.brewassistant_brewzilla_requested_target',
          'sensor.brewassistant_brewzilla_target_temperature',
          'sensor.brewassistant_brewzilla_device_target_temperature',
          'number.brewzilla_target_temperature'
        ]);

        const delta = Number.isFinite(temp) && Number.isFinite(target) ? temp - target : null;

        const bzState = firstState(['sensor.brewassistant_brewzilla_runtime_state']) || '—';
        const eventCount = n('sensor.brewassistant_brewday_event_log_event_count');
        const eventSummary = clean(states['sensor.brewassistant_brewday_event_log_summary']?.state) || 'empty';

        let headline = 'Idle';
        let badge = 'Idle';
        let badgeIcon = 'mdi:sleep';
        let chipBg = 'rgba(127,127,127,.12)';
        let chipBorder = 'rgba(127,127,127,.20)';

        if (runtime === 'running' || runtime === 'live') {
          headline = 'Manual Brewday aktiv';
          badge = 'Running';
          badgeIcon = 'mdi:play-circle-outline';
          chipBg = 'rgba(76,175,80,.12)';
          chipBorder = 'rgba(76,175,80,.24)';
        } else if (runtime === 'paused') {
          headline = 'Manual Brewday pausad';
          badge = 'Paused';
          badgeIcon = 'mdi:pause-circle-outline';
          chipBg = 'rgba(255,193,7,.14)';
          chipBorder = 'rgba(255,193,7,.28)';
        } else if (runtime === 'completed' || runtime === 'finished') {
          headline = 'Manual Brewday klar';
          badge = 'Done';
          badgeIcon = 'mdi:check-decagram-outline';
          chipBg = 'rgba(76,175,80,.13)';
          chipBorder = 'rgba(76,175,80,.28)';
        } else if (runtime === 'awaiting_snapshot') {
          headline = 'Väntar på snapshot';
          badge = 'Waiting';
          badgeIcon = 'mdi:cloud-sync-outline';
          chipBg = 'rgba(33,150,243,.12)';
          chipBorder = 'rgba(33,150,243,.24)';
        }

        const metric = (title, main, sub, icon, kind = 'neutral') => {
          const bg =
            kind === 'blue' ? 'rgba(33,150,243,.09)' :
            kind === 'cyan' ? 'rgba(0,188,212,.10)' :
            kind === 'green' ? 'rgba(76,175,80,.11)' :
            kind === 'yellow' ? 'rgba(255,193,7,.13)' :
            kind === 'red' ? 'rgba(244,67,54,.11)' :
            'rgba(127,127,127,.08)';
          const border =
            kind === 'blue' ? 'rgba(33,150,243,.20)' :
            kind === 'cyan' ? 'rgba(0,188,212,.22)' :
            kind === 'green' ? 'rgba(76,175,80,.24)' :
            kind === 'yellow' ? 'rgba(255,193,7,.26)' :
            kind === 'red' ? 'rgba(244,67,54,.24)' :
            'rgba(127,127,127,.14)';
          return `
            <div style="
              min-width:0;
              border-radius:13px;
              padding:7px 6px;
              background:${bg};
              border:1px solid ${border};
              display:grid;
              grid-template-columns:18px minmax(0,1fr);
              gap:5px;
              align-items:center;
            ">
              <ha-icon icon="${icon}" style="width:15px;height:15px;opacity:.82;"></ha-icon>
              <div style="min-width:0;text-align:center;">
                <div style="font-size:8.7px;font-weight:950;opacity:.55;letter-spacing:.045em;text-transform:uppercase;">${title}</div>
                <div style="font-size:12.8px;font-weight:950;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${main}</div>
                <div style="font-size:9px;font-weight:800;opacity:.58;line-height:1.1;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sub}</div>
              </div>
            </div>
          `;
        };

        const progressMain = Number.isFinite(progress) ? `${progress.toFixed(0)} %` : '—';
        const remainingSub = Number.isFinite(remaining) ? `${remaining.toFixed(0)} min left` : 'progress';
        const deltaKind = Number.isFinite(delta) && Math.abs(delta) > 5 ? 'yellow' : 'green';

        return `
          <div style="line-height:1.25;min-width:0;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
              <div style="min-width:0;">
                <div style="font-size:12px;font-weight:850;opacity:.66;">Manual · beta service backend · operator cockpit</div>
                <div style="font-size:12px;font-weight:850;opacity:.66;">${short(summary, 62)}</div>
              </div>
              <div style="
                display:inline-flex;
                align-items:center;
                gap:6px;
                padding:6px 9px;
                border-radius:999px;
                background:${chipBg};
                border:1px solid ${chipBorder};
                font-size:11px;
                font-weight:950;
                white-space:nowrap;
              ">
                <ha-icon icon="${badgeIcon}" style="width:14px;height:14px;"></ha-icon>
                <span>${badge}</span>
              </div>
            </div>

            <div style="margin-top:8px;text-align:center;">
              <div style="font-size:23px;font-weight:950;letter-spacing:-.04em;line-height:1.02;">${headline}</div>
              <div style="margin-top:5px;font-size:12px;font-weight:800;opacity:.74;">
                ${runtime} · ${stage} · ${short(step, 56)}<br>next: ${short(next, 60)}
              </div>
            </div>

            <div style="
              margin-top:11px;
              display:grid;
              grid-template-columns:repeat(4,minmax(0,1fr));
              gap:7px;
            ">
              ${metric('State', runtime, 'runtime', 'mdi:play-circle-outline', runtime === 'idle' ? 'neutral' : 'green')}
              ${metric('Stage', short(stage, 14), 'stage', 'mdi:map-marker-path', 'blue')}
              ${metric('Temp', fmt(temp, '°C'), 'current', 'mdi:thermometer', 'cyan')}
              ${metric('Target', fmt(target, '°C'), 'manual/BZ', 'mdi:target', 'neutral')}
            </div>

            <div style="
              margin-top:7px;
              display:grid;
              grid-template-columns:repeat(4,minmax(0,1fr));
              gap:7px;
            ">
              ${metric('Delta', fmt(delta, '°C'), 'temp-target', 'mdi:delta', deltaKind)}
              ${metric('Progress', progressMain, remainingSub, 'mdi:progress-clock', Number.isFinite(progress) && progress > 0 ? 'green' : 'neutral')}
              ${metric('BrewZilla', short(bzState, 14), 'hardware', 'mdi:kettle-outline', bzState === 'disconnected' ? 'neutral' : 'blue')}
              ${metric('Events', Number.isFinite(eventCount) ? String(eventCount.toFixed(0)) : '0', eventSummary, 'mdi:clipboard-text-clock-outline', Number.isFinite(eventCount) && eventCount > 0 ? 'green' : 'neutral')}
            </div>

            <div style="
              margin-top:10px;
              display:grid;
              grid-template-columns:20px minmax(0,1fr);
              gap:7px;
              align-items:center;
              border-radius:14px;
              padding:8px 9px;
              background:rgba(127,127,127,.08);
              border:1px solid rgba(127,127,127,.14);
            ">
              <ha-icon icon="mdi:information-outline" style="width:15px;height:15px;opacity:.76;"></ha-icon>
              <div style="font-size:11.5px;line-height:1.25;font-weight:800;opacity:.78;text-align:left;white-space:normal;">
                ${short(statusLine, 96)} · ${short(controlHint, 32)}
              </div>
            </div>
          </div>
        `;
      ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 14px
        - overflow: hidden
        - background: >-
            linear-gradient(135deg, rgba(127,127,127,.10),
            rgba(127,127,127,.035))
        - border: 1px solid rgba(127,127,127,.18)
        - box-shadow: 0 2px 10px rgba(0,0,0,.08)
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: 42px minmax(0,1fr)
        - grid-template-rows: min-content min-content
        - column-gap: 12px
      icon:
        - width: 27px
        - height: 27px
      img_cell:
        - width: 42px
        - height: 42px
        - border-radius: 50%
        - background: rgba(127,127,127,.14)
        - color: rgba(127,127,127,.95)
      name:
        - justify-self: start
        - align-self: end
        - font-size: 15px
        - font-weight: 950
        - letter-spacing: "-.02em"
      label:
        - justify-self: stretch
        - text-align: left
        - white-space: normal
        - margin-top: 4px
  - type: custom:expander-card
    title-card:
      type: custom:button-card
      entity: sensor.brewassistant_brewday_runtime_summary
      name: Manual Brewday kontroller
      icon: mdi:gesture-tap-button
      show_state: false
      show_label: true
      label: |
        [[[
          const runtime = states['sensor.brewassistant_brewday_runtime_state']?.state ?? 'idle';
          const stage = states['sensor.brewassistant_brewday_runtime_stage']?.state ?? 'Idle';
          const step = states['sensor.brewassistant_brewday_runtime_step']?.state ?? 'öppna för service-knappar';
          return `${runtime} · ${stage} · ${step}`;
        ]]]
      styles:
        card:
          - border-radius: 18px
          - padding: 12px
          - background: rgba(127,127,127,.055)
          - border: 1px solid rgba(127,127,127,.14)
        grid:
          - grid-template-areas: "\"i n\" \"i l\""
          - grid-template-columns: 34px minmax(0,1fr)
          - column-gap: 10px
        icon:
          - width: 22px
          - height: 22px
        name:
          - justify-self: start
          - font-size: 14px
          - font-weight: 950
        label:
          - justify-self: start
          - text-align: left
          - white-space: normal
          - font-size: 11.5px
          - font-weight: 750
          - opacity: 0.72
    cards:
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            name: Prepare
            icon: mdi:clipboard-check-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_prepare
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Start
            icon: mdi:play-circle-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_start
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Pause
            icon: mdi:pause-circle-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_pause
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Next
            icon: mdi:skip-next-circle-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_next
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Mash
            icon: mdi:barley
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_start_mash
              confirmation:
                text: Jump Manual Brewday to Mash?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Boil
            icon: mdi:kettle-steam-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_start_boil
              confirmation:
                text: Jump Manual Brewday to Boil?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Hopstand
            icon: mdi:leaf
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_start_whirlpool
              confirmation:
                text: Jump Manual Brewday to Whirlpool / Hopstand?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Chill
            icon: mdi:snowflake-thermometer
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_start_cooling
              confirmation:
                text: Jump Manual Brewday to Cooling / Chill?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Finish
            icon: mdi:check-circle-outline
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_finish
              confirmation:
                text: Finish Manual Brewday?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 58px
                - background: rgba(255,152,0,.08)
                - border: 1px solid rgba(255,152,0,.18)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(255,152,0)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: Apply BZ Target
            icon: mdi:target-account
            tap_action:
              action: call-service
              service: brewassistant.apply_brewzilla_target
              confirmation:
                text: Apply current runtime target to BrewZilla?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 52px
                - background: rgba(76,175,80,.10)
                - border: 1px solid rgba(76,175,80,.24)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(76,175,80)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
          - type: custom:button-card
            name: Reset
            icon: mdi:restart-alert
            tap_action:
              action: call-service
              service: brewassistant.manual_brewday_reset
              confirmation:
                text: Reset Manual Brewday runtime?
            styles:
              card:
                - border-radius: 15px
                - padding: 9px 7px
                - min-height: 52px
                - background: rgba(244,67,54,.09)
                - border: 1px solid rgba(244,67,54,.22)
              icon:
                - width: 22px
                - height: 22px
                - color: rgb(244,67,54)
              name:
                - font-size: 11px
                - font-weight: 950
                - white-space: normal
