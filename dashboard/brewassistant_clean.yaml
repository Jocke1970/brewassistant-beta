title: BrewAssistant
path: brewassistant
icon: mdi:beer-outline
cards:
  - !include cards/brewassistant_hub.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_brewday
        state: "on"
    card: !include cards/brewassistant_brewday.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_manual_brewday
        state: "on"
    card: !include cards/brewassistant_manual_brewday.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_brewfather_feed
        state: "on"
    card: !include cards/brewfather_feed.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_brewzilla
        state: "on"
    card: !include cards/brewzilla.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_brewzilla_learning
        state: "on"
    card: !include cards/brewzilla_learning.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_event_log
        state: "on"
    card: !include cards/brewassistant_brewday_event_log.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_source_health
        state: "on"
    card: !include cards/brewassistant_source_health.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_fermentation
        state: "on"
    card: !include cards/fermentation.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_carbonation
        state: "on"
    card: !include cards/carbonation.yaml

  - type: conditional
    conditions:
      - entity: switch.brewassistant_show_kegerator
        state: "on"
    card: !include cards/kegerator.yaml
