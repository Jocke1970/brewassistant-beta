name: Agent configured sensor cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/configured-sensor-sources
          fetch-depth: 0

      - name: Decode cleanup patch
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          payload = Path('.github/scripts/agent_sensor_cleanup.py.gz.b64').read_text().strip()
          Path('/tmp/agent_sensor_cleanup.py').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY

      - name: Apply normalized sensor cleanup
        id: apply
        continue-on-error: true
        shell: bash
        run: python /tmp/agent_sensor_cleanup.py > /tmp/agent_sensor_cleanup.log 2>&1

      - name: Capture patch failure
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          cp /tmp/agent_sensor_cleanup.log agent-sensor-cleanup-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-sensor-cleanup-error.txt
          git commit -m "Capture normalized sensor cleanup failure"
          git push origin HEAD:agent/configured-sensor-sources
          exit 1

      - name: Install lint tooling
        if: steps.apply.outcome == 'success'
        run: python -m pip install --quiet flake8

      - name: Validate cleanup
        if: steps.apply.outcome == 'success'
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          {
            python -m compileall -q custom_components/brewassistant
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          } > /tmp/agent_sensor_validation.log 2>&1

      - name: Capture validation failure
        if: steps.validate.outcome == 'failure'
        shell: bash
        run: |
          cp /tmp/agent_sensor_validation.log agent-sensor-cleanup-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-sensor-cleanup-error.txt
          git commit -m "Capture normalized sensor validation failure"
          git push origin HEAD:agent/configured-sensor-sources
          exit 1

      - name: Publish normalized sensor cleanup
        if: steps.apply.outcome == 'success' && steps.validate.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/workflows/agent-configured-sensor-cleanup.yml
          rm -f .github/scripts/agent_sensor_cleanup.py.gz.b64
          rm -f agent-sensor-cleanup-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Expose configured sensor values through BrewAssistant"
          git push origin HEAD:agent/configured-sensor-sources
