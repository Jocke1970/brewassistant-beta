          set +e
          python /tmp/agent_patch_sensors.py > /tmp/agent_sensor_patch.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/agent_sensor_patch.log agent-sensor-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-sensor-patch-error.txt
            git commit -m "Capture sensor patch failure"
            git push origin HEAD:agent/configured-sensor-sources
            exit "$status"
          fi
          rm .github/workflows/agent-configured-sensor-sources.yml

      - name: Validate Python
        run: python -m compileall -q custom_components/brewassistant

      - name: Commit sensor-source normalization
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components dashboard .github/workflows/agent-configured-sensor-sources.yml
          git diff --cached --check
          git commit -m "Make sensor sources configuration-driven"
          git push origin HEAD:agent/configured-sensor-sources
