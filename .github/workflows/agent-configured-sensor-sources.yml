name: Agent configured sensor sources

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/configured-sensor-sources
          fetch-depth: 0

      - name: Decode sensor patch
        run: base64 -d .github/scripts/agent_patch_sensors.py.gz.b64 | gzip -d > /tmp/agent_patch_sensors.py

      - name: Apply configuration-backed sensor patch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python /tmp/agent_patch_sensors.py > /tmp/agent_sensor_patch.log 2>&1

      - name: Capture patch failure
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          {
            echo 'Decoded script excerpt:'
            sed -n '88,110p' /tmp/agent_patch_sensors.py
            echo
            echo 'Patch output:'
            cat /tmp/agent_sensor_patch.log
          } > agent-sensor-patch-error-next.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-sensor-patch-error-next.txt
          git commit -m "Capture next sensor patch failure"
          git push origin HEAD:agent/configured-sensor-sources
          exit 1

      - name: Validate and publish sensor normalization
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          python -m compileall -q custom_components/brewassistant
          rm -f .github/workflows/agent-configured-sensor-sources.yml
          rm -f .github/scripts/agent_patch_sensors.py.gz.b64
          rm -f .agent-sensor-trigger
          rm -f agent-sensor-patch-error.txt agent-sensor-patch-error-next.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Make sensor sources configuration-driven"
          git push origin HEAD:agent/configured-sensor-sources
